<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>404 — HATHOR Royal Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Space+Grotesk:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/png" href="/img/favicon.webp"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#f0c060;--gold2:#ffd980;--bg:#050508;--cream:#e8e0d0;}
body{background:var(--bg);font-family:'Space Grotesk',sans-serif;color:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:hidden;position:relative;}

/* Background ambient glow */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 60%,rgba(201,168,76,0.06) 0%,transparent 70%);pointer-events:none;}

.container{max-width:500px;width:100%;text-align:center;position:relative;z-index:1;}

/* Illustration */
.illus-wrap{width:280px;height:280px;margin:0 auto 32px;position:relative;}
.illus-wrap img{width:100%;height:100%;object-fit:contain;border-radius:20px;opacity:0.92;}
.illus-wrap::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 30% at 50% 100%,rgba(201,168,76,0.15),transparent 60%);border-radius:20px;}

/* Badge */
.error-code{font-family:'Orbitron',monospace;font-size:clamp(72px,18vw,120px);font-weight:900;line-height:1;background:linear-gradient(135deg,#c9a84c 0%,#ffd680 40%,#f0c060 60%,#a07830 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-4px;margin-bottom:8px;}

.title{font-family:'Cinzel',serif;font-size:clamp(18px,4vw,24px);font-weight:700;color:rgba(232,220,200,0.9);margin-bottom:12px;letter-spacing:1px;}

.sub{font-size:13px;color:rgba(232,220,200,0.35);line-height:1.7;max-width:360px;margin:0 auto 32px;letter-spacing:0.3px;}

/* Buttons */
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:100px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,#c9a84c,#f0c060,#a07830);color:#080600;border:none;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(240,192,96,0.35);}
.btn-ghost{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(232,220,200,0.6);}
.btn-ghost:hover{color:var(--cream);background:rgba(255,255,255,0.09);}

/* Card suit decorations */
.suits{position:fixed;font-size:80px;opacity:0.03;pointer-events:none;user-select:none;}
.suit-tl{top:10%;left:5%;}
.suit-tr{top:10%;right:5%;transform:rotate(15deg);}
.suit-bl{bottom:10%;left:5%;transform:rotate(-10deg);}
.suit-br{bottom:10%;right:5%;transform:rotate(20deg);}

/* Sparkles */
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
.spark{position:absolute;width:6px;height:6px;background:var(--gold);border-radius:50%;animation:sparkle 2s ease infinite;}
</style>
</head>
<body>

<div class="suits suit-tl">♠</div>
<div class="suits suit-tr">♥</div>
<div class="suits suit-bl">♦</div>
<div class="suits suit-br">♣</div>

<div class="container">
  <div class="illus-wrap">
    <img src="/img/404-illustration.webp" alt="404 — Empty table"
         onerror="this.style.display='none';document.querySelector('.fallback-emoji').style.display='block'"/>
    <div class="fallback-emoji" style="display:none;font-size:80px;line-height:280px;">🃏</div>
  </div>

  <div class="error-code">404</div>
  <div class="title">The Table Is Empty</div>
  <p class="sub">
    Looks like this seat doesn't exist. The dealer may have shuffled the deck —
    or this page was never dealt.
  </p>

  <div class="btns">
    <a href="/" class="btn btn-primary">🏠 Back to Lobby</a>
    <a href="/crash.html" class="btn btn-ghost">🚀 Play Crash</a>
  </div>
</div>

<script>
// Redirect to lobby after 15 seconds
var countdown = 15;
var t = setInterval(function() {
  countdown--;
  if (countdown <= 0) { clearInterval(t); window.location.href = '/'; }
}, 1000);
</script>
</body>
</html>
