<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>HATHOR — Crash</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Orbitron:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#04040a;--gold:#f0c060;--gold2:#ffd980;--green:#00e676;--red:#ff3d71;
  --neon:#00e5ff;--cream:#e8e0d0;--border:rgba(255,255,255,0.08);--glass:rgba(255,255,255,0.04);
  --purple:#7c3aed;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);font-family:'Space Grotesk',sans-serif;color:var(--cream);display:flex;flex-direction:column;}

/* Header */
.header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(4,4,10,.98);border-bottom:1px solid var(--border);flex-shrink:0;z-index:20;}
.logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-center{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;letter-spacing:2px;color:var(--cream);}
.balance{font-family:'DM Mono',monospace;font-size:14px;color:var(--gold);display:flex;align-items:center;gap:6px;}
.back-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:var(--glass);
  color:rgba(232,224,208,.5);font-size:11px;cursor:pointer;text-decoration:none;font-family:'Space Grotesk',sans-serif;transition:all .2s;}
.back-btn:hover{color:var(--cream);}

/* Layout */
.main{flex:1;display:grid;grid-template-columns:1fr 280px;overflow:hidden;}
@media(max-width:700px){.main{grid-template-columns:1fr;grid-template-rows:1fr auto;}}

/* Canvas area */
.canvas-wrap{position:relative;background:#060610;overflow:hidden;}
canvas{width:100%;height:100%;display:block;}

/* Multiplier overlay */
.mult-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
.mult-value{font-family:'Orbitron',monospace;font-size:clamp(48px,8vw,96px);font-weight:900;
  transition:color .15s;text-shadow:0 0 40px currentColor;}
.mult-value.low{color:#00e5ff;}
.mult-value.mid{color:var(--gold);}
.mult-value.high{color:#ff9900;}
.mult-value.ultra{color:var(--red);}
.mult-label{font-size:12px;letter-spacing:3px;color:rgba(232,224,208,.3);margin-top:4px;}

/* Crashed overlay */
.crashed-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(255,61,113,.08);display:none;pointer-events:none;}
.crashed-text{font-family:'Orbitron',monospace;font-size:clamp(36px,6vw,72px);font-weight:900;
  color:var(--red);text-shadow:0 0 60px var(--red);animation:crashPulse 1s ease-in-out infinite alternate;}
@keyframes crashPulse{from{transform:scale(1)}to{transform:scale(1.05)}}

/* Rocket */
.rocket{position:absolute;font-size:36px;transition:left .05s linear,bottom .05s linear;
  transform:rotate(-45deg);filter:drop-shadow(0 0 12px rgba(0,229,255,.8));pointer-events:none;}

/* Bet panel */
.bet-panel{background:rgba(8,8,18,.95);border-left:1px solid var(--border);padding:20px;
  display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
@media(max-width:700px){.bet-panel{border-left:none;border-top:1px solid var(--border);padding:14px 16px;}}

.panel-title{font-family:'Orbitron',monospace;font-size:12px;color:rgba(232,224,208,.3);letter-spacing:2px;}

/* Bet input */
.bet-row{display:flex;flex-direction:column;gap:6px;}
.bet-label{font-size:10px;letter-spacing:2px;color:rgba(232,224,208,.3);text-transform:uppercase;}
.bet-inp-wrap{display:flex;gap:6px;align-items:center;}
.bet-inp{flex:1;padding:10px 12px;background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:9px;
  color:var(--gold);font-family:'DM Mono',monospace;font-size:15px;font-weight:700;outline:none;
  transition:border-color .2s;}
.bet-inp:focus{border-color:rgba(240,192,96,.4);}
.bet-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.bq{padding:5px;border-radius:6px;border:1px solid var(--border);background:var(--glass);
  color:rgba(232,224,208,.5);font-size:10px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;}
.bq:hover{border-color:rgba(240,192,96,.3);color:var(--gold);}

/* Auto cashout */
.auto-row{display:flex;align-items:center;gap:10px;}
.auto-inp{width:80px;padding:8px 10px;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;
  color:var(--neon);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .2s;}
.auto-inp:focus{border-color:rgba(0,229,255,.4);}
.toggle-btn{position:relative;width:40px;height:22px;cursor:pointer;}
.toggle-btn input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;border-radius:11px;background:rgba(255,255,255,.1);transition:.3s;}
.toggle-btn input:checked ~ .toggle-track{background:rgba(0,229,255,.4);}
.toggle-thumb{position:absolute;height:16px;width:16px;left:3px;bottom:3px;border-radius:50%;background:rgba(232,224,208,.4);transition:.3s;}
.toggle-btn input:checked ~ .toggle-thumb{transform:translateX(18px);background:var(--neon);}

/* Main bet button */
.bet-btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;font-family:'Orbitron',monospace;
  font-size:14px;font-weight:900;letter-spacing:1px;transition:all .2s;position:relative;overflow:hidden;}
.bet-btn.idle{background:linear-gradient(135deg,#c9a84c,#f0c060,#a07830);color:#080600;}
.bet-btn.idle:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(240,192,96,.4);}
.bet-btn.waiting{background:rgba(0,229,255,.15);border:1px solid rgba(0,229,255,.3);color:var(--neon);}
.bet-btn.flying{background:linear-gradient(135deg,#00b894,#00e676);color:#003320;}
.bet-btn.flying:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,230,118,.4);}
.bet-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}

/* Live bets */
.live-bets{flex:1;min-height:0;}
.live-bets-title{font-size:10px;letter-spacing:2px;color:rgba(232,224,208,.25);text-transform:uppercase;margin-bottom:8px;}
.live-bet-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;}
.live-bet-item .name{color:rgba(232,224,208,.5);}
.live-bet-item .amount{font-family:'DM Mono',monospace;color:rgba(232,224,208,.4);}
.live-bet-item .mult{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;}
.live-bet-item .mult.won{color:var(--green);}
.live-bet-item .mult.flying{color:var(--neon);animation:blink .8s ease infinite alternate;}
@keyframes blink{from{opacity:.5}to{opacity:1}}

/* History pills */
.history{display:flex;gap:4px;flex-wrap:wrap;}
.hist-pill{padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;}
.hist-pill.low{background:rgba(0,229,255,.12);color:var(--neon);}
.hist-pill.mid{background:rgba(240,192,96,.12);color:var(--gold);}
.hist-pill.high{background:rgba(255,153,0,.15);color:#ff9900;}
.hist-pill.crash{background:rgba(255,61,113,.12);color:var(--red);}

/* Stats row */
.stats-row{display:flex;gap:8px;}
.stat-pill{flex:1;padding:8px;border-radius:8px;background:rgba(0,0,0,.3);border:1px solid var(--border);text-align:center;}
.stat-pill .sv{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--gold);}
.stat-pill .sl{font-size:9px;letter-spacing:1px;color:rgba(232,224,208,.25);margin-top:2px;}

/* Win flash */
@keyframes winFlash{
  0%{background:rgba(0,230,118,.0)}
  30%{background:rgba(0,230,118,.15)}
  100%{background:rgba(0,230,118,.0)}
}
.win-flash{animation:winFlash 1.5s ease-out;}

/* Toast */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);padding:12px 24px;
  border-radius:12px;font-size:13px;font-weight:600;letter-spacing:.5px;z-index:999;
  opacity:0;transition:all .3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.win{background:rgba(0,230,118,.2);border:1px solid rgba(0,230,118,.4);color:var(--green);}
.toast.loss{background:rgba(255,61,113,.2);border:1px solid rgba(255,61,113,.3);color:#ff8ca0;}
</style>
</head>
<body>

<div class="header">
  <a class="back-btn" href="/">← Lobby</a>
  <div class="header-center">🚀 CRASH</div>
  <div class="balance">🪙 <span id="balanceDisplay">—</span></div>
</div>

<div class="main">
  <!-- Canvas -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="crashCanvas"></canvas>
    <div class="mult-overlay">
      <div class="mult-value low" id="multDisplay">1.00×</div>
      <div class="mult-label" id="multLabel">LAUKIAMA...</div>
    </div>
    <div class="crashed-overlay" id="crashedOverlay">
      <div class="crashed-text" id="crashedText">CRASHED!</div>
    </div>
    <div class="rocket" id="rocket">🚀</div>
  </div>

  <!-- Bet panel -->
  <div class="bet-panel">
    <div class="panel-title">🎰 LAŽYBOS</div>

    <!-- History -->
    <div>
      <div class="live-bets-title">Istorija</div>
      <div class="history" id="historyPills"></div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-pill"><div class="sv" id="statBest">—</div><div class="sl">GERIAUSIAS</div></div>
      <div class="stat-pill"><div class="sv" id="statWins">0</div><div class="sl">LAIMĖTA</div></div>
      <div class="stat-pill"><div class="sv" id="statLost">0</div><div class="sl">PRALAIMĖTA</div></div>
    </div>

    <!-- Bet amount -->
    <div class="bet-row">
      <div class="bet-label">Statymų suma</div>
      <div class="bet-inp-wrap">
        <input class="bet-inp" id="betInput" type="number" value="100" min="10" max="100000"/>
      </div>
      <div class="bet-quick">
        <button class="bq" onclick="addBet(50)">+50</button>
        <button class="bq" onclick="addBet(100)">+100</button>
        <button class="bq" onclick="addBet(500)">+500</button>
        <button class="bq" onclick="halfBet()">½</button>
        <button class="bq" onclick="doubleBet()">×2</button>
        <button class="bq" onclick="setBet(100)">100</button>
        <button class="bq" onclick="setBet(500)">500</button>
        <button class="bq" onclick="maxBet()">MAX</button>
      </div>
    </div>

    <!-- Auto cashout -->
    <div class="bet-row">
      <div class="bet-label">Automatinis išėmimas</div>
      <div class="auto-row">
        <label class="toggle-btn">
          <input type="checkbox" id="autoToggle"/>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span style="font-size:12px;color:rgba(232,224,208,.4);">Ties</span>
        <input class="auto-inp" id="autoValue" type="number" value="2.00" step="0.1" min="1.1"/>
        <span style="font-size:13px;color:rgba(232,224,208,.4);">×</span>
      </div>
    </div>

    <!-- Button -->
    <button class="bet-btn idle" id="betBtn" onclick="handleBetBtn()">
      STATYTI
    </button>

    <!-- Live bets -->
    <div class="live-bets">
      <div class="live-bets-title">Žaidėjai šiame raunde</div>
      <div id="liveBetsList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<script>
const uid = localStorage.getItem('casino_uid');
const socket = typeof io !== 'undefined' ? null : null;
let tokens = parseInt(localStorage.getItem('casino_tokens') || '10000');

// ── State ──────────────────────────────────────────────────
const STATE = { WAITING: 'waiting', FLYING: 'flying', CRASHED: 'crashed' };
let state = STATE.WAITING;
let multiplier = 1.00;
let crashPoint = 0;
let betPlaced = false;
let betAmount = 0;
let cashedOut = false;
let cashOutMult = 0;
let roundId = 0;
let waitTimer = null;
let flyInterval = null;
let graphPoints = [];
let history = [];
let stats = { best: 0, wins: 0, lost: 0 };
let animFrame = null;
let liveBets = [];
let nextRoundBet = null; // pending bet for next round

// ── Canvas ─────────────────────────────────────────────────
const canvas = document.getElementById('crashCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

function resizeCanvas() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawGraph() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if(graphPoints.length < 2) return;

  // Background grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for(let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const maxX = graphPoints.length;
  const maxY = Math.max(multiplier * 1.2, 2);

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  if(state === STATE.CRASHED) {
    grad.addColorStop(0, 'rgba(255,61,113,0.3)');
    grad.addColorStop(1, 'rgba(255,61,113,0.0)');
  } else {
    grad.addColorStop(0, 'rgba(0,229,255,0.25)');
    grad.addColorStop(0.5, 'rgba(0,229,255,0.08)');
    grad.addColorStop(1, 'rgba(0,229,255,0.0)');
  }

  ctx.beginPath();
  graphPoints.forEach((pt, i) => {
    const x = (i / (maxX - 1)) * W;
    const y = H - ((pt - 1) / (maxY - 1)) * (H * 0.8) - H * 0.05;
    if(i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Main line
  ctx.beginPath();
  graphPoints.forEach((pt, i) => {
    const x = (i / (maxX - 1)) * W;
    const y = H - ((pt - 1) / (maxY - 1)) * (H * 0.8) - H * 0.05;
    if(i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = state === STATE.CRASHED ? 'rgba(255,61,113,0.9)' : 'rgba(0,229,255,0.9)';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.shadowColor = state === STATE.CRASHED ? 'rgba(255,61,113,0.6)' : 'rgba(0,229,255,0.6)';
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function moveRocket() {
  if(graphPoints.length < 2) return;
  const W = canvas.width, H = canvas.height;
  const maxX = graphPoints.length;
  const maxY = Math.max(multiplier * 1.2, 2);
  const i = graphPoints.length - 1;
  const x = (i / (maxX - 1)) * W;
  const y = H - ((multiplier - 1) / (maxY - 1)) * (H * 0.8) - H * 0.05;
  const rocket = document.getElementById('rocket');
  rocket.style.left = (x - 20) + 'px';
  rocket.style.bottom = (H - y - 20) + 'px';
  rocket.style.display = state === STATE.FLYING ? 'block' : 'none';
}

// ── Game Logic ─────────────────────────────────────────────
function generateCrashPoint() {
  // Provably fair-style distribution
  const r = Math.random();
  if(r < 0.15) return 1.00 + Math.random() * 0.2; // 15% instant crash ~1.0-1.2
  const h = -Math.log(Math.random()) / 0.8;
  return Math.max(1.01, Math.min(100, 1 + h));
}

function startWaiting() {
  state = STATE.WAITING;
  multiplier = 1.00;
  graphPoints = [];
  betPlaced = false;
  cashedOut = false;
  liveBets = [];
  nextRoundBet = null;
  roundId++;

  // Add some fake players
  for(let i = 0; i < 3 + Math.floor(Math.random() * 4); i++) {
    const names = ['Viktor','Sofia','Marco','Elena','Carlos','Yuki','Aleksas','Marta'];
    liveBets.push({
      name: names[Math.floor(Math.random()*names.length)],
      amount: [100,200,300,500,1000][Math.floor(Math.random()*5)],
      isReal: false, cashedOut: false, mult: null
    });
  }

  updateUI();
  updateBetBtn();
  document.getElementById('crashedOverlay').style.display = 'none';
  document.getElementById('rocket').style.display = 'none';
  drawGraph();
  renderLiveBets();

  waitTimer = setTimeout(startFlight, 4000 + Math.random() * 2000);
}

function startFlight() {
  if(state !== STATE.WAITING) return;
  state = STATE.FLYING;
  crashPoint = generateCrashPoint();
  multiplier = 1.00;
  graphPoints = [1.00];
  updateBetBtn();

  // Process pending bet
  if(nextRoundBet) {
    betPlaced = true;
    betAmount = nextRoundBet;
    nextRoundBet = null;
    if(betPlaced) {
      liveBets.push({name:'Tu', amount:betAmount, isReal:true, cashedOut:false, mult:null});
    }
  } else if(betPlaced) {
    liveBets.push({name:'Tu', amount:betAmount, isReal:true, cashedOut:false, mult:null});
  }

  let elapsed = 0;
  const tick = 50;
  flyInterval = setInterval(() => {
    elapsed += tick;
    const t = elapsed / 1000;
    multiplier = Math.pow(Math.E, 0.06 * t * Math.sqrt(t + 1));
    multiplier = Math.round(multiplier * 100) / 100;
    if(multiplier > crashPoint) multiplier = crashPoint;

    graphPoints.push(multiplier);
    if(graphPoints.length > 300) graphPoints.shift();

    // Auto cashout
    const autoToggle = document.getElementById('autoToggle');
    const autoVal = parseFloat(document.getElementById('autoValue').value);
    if(autoToggle.checked && betPlaced && !cashedOut && multiplier >= autoVal) {
      doCashOut();
    }

    // Random bot cashouts
    liveBets.forEach(lb => {
      if(!lb.isReal && !lb.cashedOut && Math.random() < 0.02) {
        lb.cashedOut = true;
        lb.mult = multiplier;
      }
    });

    updateMultDisplay();
    drawGraph();
    moveRocket();
    renderLiveBets();

    if(multiplier >= crashPoint) {
      clearInterval(flyInterval);
      doCrash();
    }
  }, tick);
}

function doCrash() {
  state = STATE.CRASHED;
  document.getElementById('crashedOverlay').style.display = 'flex';
  document.getElementById('crashedText').textContent = 'CRASHED @ ' + crashPoint.toFixed(2) + '×';
  document.getElementById('rocket').style.display = 'none';

  updateMultDisplay();

  if(betPlaced && !cashedOut) {
    // Lost
    tokens = Math.max(0, tokens - betAmount);
    saveTokens();
    stats.lost++;
    showToast('❌ Praradote 🪙' + fmt(betAmount), 'loss');
    logGame(betAmount, 0);
  }

  addToHistory(crashPoint);
  updateStats();
  updateUI();
  updateBetBtn();

  setTimeout(startWaiting, 3000);
}

function doCashOut() {
  if(!betPlaced || cashedOut || state !== STATE.FLYING) return;
  cashedOut = true;
  cashOutMult = multiplier;
  const won = Math.floor(betAmount * cashOutMult);
  tokens += won - betAmount;
  saveTokens();
  stats.wins++;
  if(cashOutMult > stats.best) stats.best = cashOutMult;
  showToast('🎉 Išėmėte × ' + cashOutMult.toFixed(2) + ' → +🪙' + fmt(won - betAmount), 'win');
  logGame(betAmount, won);

  const myBet = liveBets.find(b => b.isReal);
  if(myBet) { myBet.cashedOut = true; myBet.mult = cashOutMult; }

  updateStats();
  updateUI();
  updateBetBtn();
  renderLiveBets();

  document.getElementById('canvasWrap').classList.add('win-flash');
  setTimeout(() => document.getElementById('canvasWrap').classList.remove('win-flash'), 1500);
}

// ── UI Updates ─────────────────────────────────────────────
function updateMultDisplay() {
  const el = document.getElementById('multDisplay');
  const label = document.getElementById('multLabel');
  el.textContent = multiplier.toFixed(2) + '×';
  el.className = 'mult-value';
  if(state === STATE.CRASHED) { el.classList.add('ultra'); label.textContent = 'CRASHED!'; }
  else if(state === STATE.WAITING) { el.classList.add('low'); label.textContent = 'Ruošiamasi...'; }
  else if(multiplier < 2) { el.classList.add('low'); label.textContent = 'SKRENDA...'; }
  else if(multiplier < 5) { el.classList.add('mid'); label.textContent = '🔥 ŠAUNU!'; }
  else if(multiplier < 10) { el.classList.add('high'); label.textContent = '🚀 NEĮTIKĖTINA!'; }
  else { el.classList.add('ultra'); label.textContent = '💥 EPINIS SKRYDIS!'; }
}

function updateBetBtn() {
  const btn = document.getElementById('betBtn');
  if(state === STATE.WAITING) {
    if(nextRoundBet) {
      btn.className = 'bet-btn waiting';
      btn.textContent = 'LAUKIAMA → 🪙' + fmt(nextRoundBet);
      btn.disabled = false;
    } else {
      btn.className = 'bet-btn idle';
      btn.textContent = 'STATYTI';
      btn.disabled = false;
    }
  } else if(state === STATE.FLYING) {
    if(betPlaced && !cashedOut) {
      const potential = Math.floor(betAmount * multiplier);
      btn.className = 'bet-btn flying';
      btn.innerHTML = `IŠIMTI <span style="font-size:12px;opacity:.8">🪙+${fmt(potential - betAmount)}</span>`;
      btn.disabled = false;
    } else if(cashedOut) {
      btn.className = 'bet-btn idle';
      btn.textContent = 'IŠIMTA ✓';
      btn.disabled = true;
    } else {
      btn.className = 'bet-btn idle';
      btn.textContent = 'SKRENDA...';
      btn.disabled = true;
    }
  } else {
    btn.className = 'bet-btn idle';
    btn.textContent = 'STATYTI';
    btn.disabled = true;
  }
}

function handleBetBtn() {
  if(state === STATE.WAITING) {
    if(nextRoundBet) {
      // Cancel pending bet
      nextRoundBet = null;
      betPlaced = false;
      updateBetBtn();
      return;
    }
    const amt = parseInt(document.getElementById('betInput').value);
    if(!amt || amt < 10) return;
    if(amt > tokens) { showToast('Nepakanka žetonų', 'loss'); return; }
    nextRoundBet = amt;
    betAmount = amt;
    betPlaced = true;
    updateBetBtn();
  } else if(state === STATE.FLYING) {
    if(betPlaced && !cashedOut) doCashOut();
  }
}

function updateUI() {
  document.getElementById('balanceDisplay').textContent = fmt(tokens);
}

function addToHistory(cp) {
  history.unshift(cp);
  if(history.length > 20) history.pop();
  const el = document.getElementById('historyPills');
  el.innerHTML = history.map(v => {
    let cls = v >= 10 ? 'ultra' : v >= 3 ? 'high' : v >= 2 ? 'mid' : v >= 1.5 ? 'low' : 'crash';
    return `<div class="hist-pill ${cls}">${v.toFixed(2)}×</div>`;
  }).join('');
}

function updateStats() {
  document.getElementById('statBest').textContent = stats.best > 0 ? stats.best.toFixed(2)+'×' : '—';
  document.getElementById('statWins').textContent = stats.wins;
  document.getElementById('statLost').textContent = stats.lost;
}

function renderLiveBets() {
  const el = document.getElementById('liveBetsList');
  if(!liveBets.length) { el.innerHTML = ''; return; }
  el.innerHTML = liveBets.map(b => `
    <div class="live-bet-item">
      <span class="name">${b.isReal ? '<strong style="color:var(--gold)">Tu</strong>' : b.name}</span>
      <span class="amount">🪙${fmt(b.amount)}</span>
      <span class="mult ${b.cashedOut ? 'won' : 'flying'}">${b.cashedOut ? b.mult.toFixed(2)+'×' : state===STATE.FLYING ? multiplier.toFixed(2)+'×' : '—'}</span>
    </div>
  `).join('');
}

// ── Bet controls ───────────────────────────────────────────
function addBet(n) { const inp=document.getElementById('betInput'); inp.value=Math.max(10,parseInt(inp.value||0)+n); }
function setBet(n) { document.getElementById('betInput').value=n; }
function halfBet() { const inp=document.getElementById('betInput'); inp.value=Math.max(10,Math.floor(parseInt(inp.value||10)/2)); }
function doubleBet() { const inp=document.getElementById('betInput'); inp.value=Math.min(tokens,parseInt(inp.value||10)*2); }
function maxBet() { document.getElementById('betInput').value=Math.min(tokens,50000); }

// ── Helpers ────────────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString(); }
function saveTokens() {
  localStorage.setItem('casino_tokens', tokens);
  updateUI();
  fetch('/api/log-game',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid,game:'crash',bet:0,result:0,won:false})}).catch(()=>{});
}
function logGame(bet, result) {
  fetch('/api/log-game',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({uid,game:'crash',bet,result,won:result>bet})}).catch(()=>{});
}

let toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toastEl');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init ───────────────────────────────────────────────────
if(!uid) { window.location.href = '/login.html'; }
else {
  const saved = localStorage.getItem('casino_tokens');
  if(saved) tokens = parseInt(saved);
  updateUI();
  updateStats();
  startWaiting();
}
</script>
</body>
</html>
