// HATHOR PYRAMID DROP
// ═══════════════════════════════════════════════════

// Risk profiles — multiplier arrays (17 buckets)
const RISK_PROFILES = {
  low: {
    name:'LOW', color:'#00e676',
    mults:[0.5,0.7,1.0,1.2,1.5,1.8,2.5,5.0,2.5,1.8,1.5,1.2,1.0,0.7,0.5,0.3,0.2],
  },
  medium: {
    name:'MEDIUM', color:'#f0c060',
    mults:[0.2,0.4,0.7,1.0,1.5,2.0,4.0,10,4.0,2.0,1.5,1.0,0.7,0.4,0.2,0.1,0.0],
  },
  high: {
    name:'HIGH', color:'#ff3d71',
    mults:[0.0,0.0,0.3,0.5,1.0,2.0,5.0,25,5.0,2.0,1.0,0.5,0.3,0.0,0.0,0.0,0.0],
  },
};

// Physics ball simulation
class PyramidBall {
  constructor(canvasW, rows) {
    this.x = canvasW / 2 + (Math.random()-0.5)*4;
    this.y = 30;
    this.vx = (Math.random()-0.5)*0.5;
    this.vy = 0;
    this.r = 7;
    this.trail = [];
    this.landed = false;
    this.bucket = -1;
    this.glow = 0;
    this.rows = rows;
    this.color = '#f0c060';
  }
  update(pegs, W, H) {
    if(this.landed) return;
    this.vy += 0.28; // gravity
    this.vx *= 0.995; // slight friction
    this.x += this.vx;
    this.y += this.vy;
    // Store trail
    this.trail.push({x:this.x, y:this.y});
    if(this.trail.length > 12) this.trail.shift();
    // Bounce off pegs
    for(const peg of pegs) {
      const dx = this.x - peg.x;
      const dy = this.y - peg.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < this.r + peg.r) {
        const nx = dx/dist, ny = dy/dist;
        const speed = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
        this.vx = nx * speed * 0.7 + (Math.random()-0.5)*1.5;
        this.vy = Math.abs(ny * speed * 0.6) + 0.5;
        this.x = peg.x + nx*(this.r+peg.r+1);
        this.y = peg.y + ny*(this.r+peg.r+1);
        peg.hit = 8;
        this.glow = 6;
      }
    }
    // Wall bounce
    if(this.x < this.r) { this.x = this.r; this.vx = Math.abs(this.vx)*0.5; }
    if(this.x > W-this.r) { this.x = W-this.r; this.vx = -Math.abs(this.vx)*0.5; }
    // Landing
    if(this.y > H - 40) {
      this.landed = true;
      this.y = H - 40;
      this.bucket = Math.floor((this.x / W) * 17);
      this.bucket = Math.max(0, Math.min(16, this.bucket));
      this.glow = 20;
    }
  }
  draw(ctx) {
    // Trail
    this.trail.forEach((p,i)=>{
      const a = (i/this.trail.length)*0.25;
      ctx.beginPath();
      ctx.arc(p.x, p.y, this.r*(i/this.trail.length)*0.7, 0, Math.PI*2);
      ctx.fillStyle = `rgba(240,192,96,${a})`;
      ctx.fill();
    });
    // Glow
    if(this.glow > 0) {
      const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*3);
      g.addColorStop(0,`rgba(240,192,96,${this.glow/20*0.4})`);
      g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r*3,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
      this.glow--;
    }
    // Ball
    const ballGrad = ctx.createRadialGradient(this.x-2,this.y-2,1,this.x,this.y,this.r);
    ballGrad.addColorStop(0,'#ffd980');
    ballGrad.addColorStop(0.5,'#f0c060');
    ballGrad.addColorStop(1,'#8a6020');
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=ballGrad; ctx.fill();
    // Shine
    ctx.beginPath(); ctx.arc(this.x-2,this.y-2,2.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
    // Hathor symbol
    ctx.fillStyle='rgba(10,8,6,0.6)'; ctx.font='bold 7px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⬡',this.x,this.y);
  }
}

function PyramidDrop({user, setUser}) {
  const canvasRef = useRef();
  const stateRef = useRef({balls:[], pegs:[], animating:false, hitBucket:-1, hitTimer:0});
  const rafRef = useRef();
  const [risk, setRisk] = useState('medium');
  const [bet, setBet] = useState(100);
  const [dropping, setDropping] = useState(false);
  const [result, setResult] = useState(null);
  const [history, setHistory] = useState([]);
  const [auto, setAuto] = useState(false);
  const [stats, setStats] = useState({plays:0, wins:0, totalWon:0, totalBet:0, biggestMult:0});
  const autoRef = useRef(false);
  const droppingRef = useRef(false);

  const ROWS = 14;
  const W = 520, H = 480;

  // Build pegs
  useEffect(()=>{
    const pegs = [];
    for(let row=0; row<ROWS; row++) {
      const cols = row + 3;
      const spacing = W / (cols + 1);
      const yPos = 60 + row * (H-100-60) / ROWS;
      for(let col=0; col<cols; col++) {
        pegs.push({
          x: spacing*(col+1) + (W - spacing*cols)/2 - spacing/2,
          y: yPos,
          r: 4.5,
          hit: 0,
          baseY: yPos,
        });
      }
    }
    stateRef.current.pegs = pegs;
  }, []);

  // Draw loop
  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const profile = RISK_PROFILES[risk];
    const bucketW = W/17;

    const draw = ()=>{
      ctx.clearRect(0,0,W,H);

      // Starfield background
      ctx.fillStyle='rgba(4,4,10,0.3)';
      ctx.fillRect(0,0,W,H);

      // Draw peg grid lines (subtle)
      ctx.strokeStyle='rgba(240,192,96,0.03)';
      ctx.lineWidth=1;
      stateRef.current.pegs.forEach((p,i)=>{
        if(i%3===0) {
          ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(W/2,30);
          ctx.stroke();
        }
      });

      // Draw pegs
      stateRef.current.pegs.forEach(peg=>{
        if(peg.hit>0) peg.hit--;
        const glowA = peg.hit>0 ? 0.8 : 0.15;
        const pegColor = peg.hit>0 ? '#ffd980' : '#c9a84c';
        // Peg glow
        if(peg.hit>0) {
          const g=ctx.createRadialGradient(peg.x,peg.y,0,peg.x,peg.y,12);
          g.addColorStop(0,`rgba(240,192,96,${peg.hit/8*0.5})`);
          g.addColorStop(1,'transparent');
          ctx.beginPath(); ctx.arc(peg.x,peg.y,12,0,Math.PI*2);
          ctx.fillStyle=g; ctx.fill();
        }
        ctx.beginPath(); ctx.arc(peg.x,peg.y,peg.r,0,Math.PI*2);
        ctx.fillStyle=pegColor; ctx.fill();
        ctx.beginPath(); ctx.arc(peg.x-1,peg.y-1,1.5,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
      });

      // Draw bucket dividers
      for(let i=0; i<=17; i++) {
        ctx.strokeStyle='rgba(240,192,96,0.08)';
        ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(i*bucketW,H-45); ctx.lineTo(i*bucketW,H);
        ctx.stroke();
      }

      // Draw multiplier buckets
      profile.mults.forEach((m,i)=>{
        const x=i*bucketW, bw=bucketW;
        const isHit = stateRef.current.hitBucket===i && stateRef.current.hitTimer>0;
        if(isHit) stateRef.current.hitTimer--;
        // Color based on value
        let bg, glow;
        if(m>=10)      {bg='rgba(255,61,113,0.25)'; glow='rgba(255,61,113,0.6)';}
        else if(m>=5)  {bg='rgba(124,58,237,0.2)'; glow='rgba(124,58,237,0.5)';}
        else if(m>=2)  {bg='rgba(240,192,96,0.15)'; glow='rgba(240,192,96,0.4)';}
        else if(m>=1)  {bg='rgba(0,229,255,0.08)'; glow='rgba(0,229,255,0.3)';}
        else           {bg='rgba(255,255,255,0.03)'; glow='rgba(255,255,255,0.1)';}
        if(isHit) {
          ctx.fillStyle=glow.replace('0.','0.5'); ctx.fillRect(x+1,H-44,bw-2,43);
        } else {
          ctx.fillStyle=bg; ctx.fillRect(x+1,H-44,bw-2,43);
        }
        // Text
        ctx.fillStyle=isHit?'#fff':(m>=2?'#f0c060':'rgba(232,224,208,0.5)');
        ctx.font=`bold ${m>=10?11:10}px 'DM Mono'`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(m>=1?`×${m}`:m===0?'💀':`×${m}`, x+bw/2, H-22);
      });

      // Update & draw balls
      const doneBalls = [];
      stateRef.current.balls.forEach(ball=>{
        ball.update(stateRef.current.pegs, W, H);
        ball.draw(ctx);
        if(ball.landed) doneBalls.push(ball);
      });
      // Remove landed balls after delay
      doneBalls.forEach(ball=>{
        setTimeout(()=>{
          stateRef.current.balls = stateRef.current.balls.filter(b=>b!==ball);
        }, 1200);
      });

      rafRef.current = requestAnimationFrame(draw);
    };
    draw();
    return()=>cancelAnimationFrame(rafRef.current);
  }, [risk]);

  const drop = useCallback(()=>{
    if(droppingRef.current || user.tokens < bet) return;
    droppingRef.current = true;
    setDropping(true);
    setResult(null);

    setUser(u=>({...u,tokens:u.tokens-bet}));
    sfx.chip();

    const ball = new PyramidBall(W, ROWS);
    stateRef.current.balls.push(ball);

    // Wait for ball to land
    const check = setInterval(()=>{
      if(ball.landed) {
        clearInterval(check);
        const profile = RISK_PROFILES[risk];
        const mult = profile.mults[ball.bucket];
        const won = Math.floor(bet * mult);
        stateRef.current.hitBucket = ball.bucket;
        stateRef.current.hitTimer = 40;

        if(won > 0) {
          setUser(u=>({...u,tokens:u.tokens+won}));
          sfx.win();
          if(mult >= 10) sfx.jackpot();
        } else {
          sfx.lose();
        }

        const res = {mult, won, bet};
        setResult(res);
        setHistory(h=>[{mult,won,bet,ts:Date.now()},...h].slice(0,20));
        setStats(s=>({
          plays: s.plays+1,
          wins: s.wins+(won>bet?1:0),
          totalWon: s.totalWon+won,
          totalBet: s.totalBet+bet,
          biggestMult: Math.max(s.biggestMult,mult),
        }));

        droppingRef.current = false;
        setDropping(false);

        // Auto drop
        if(autoRef.current) {
          setTimeout(()=>{ if(autoRef.current) drop(); }, 800);
        }
      }
    }, 50);
  }, [bet, risk, user.tokens]);

  const toggleAuto = ()=>{
    const next=!auto;
    setAuto(next); autoRef.current=next;
    if(next) drop();
  };

  const profile = RISK_PROFILES[risk];

  return(
    <div className="pyramid-scene">
      <div className="pyramid-left">
        <div className="pyramid-title">PYRAMID DROP</div>
        <div className="pyramid-sub">HATHOR ROYAL CASINO · ORIGINAL GAME</div>
        <div className="pyramid-canvas-wrap">
          <canvas ref={canvasRef} id="pyramidCanvas" width={W} height={H}/>
        </div>
        <div className="pyramid-result">
          {result ? (
            <>
              <div className={`pyramid-result-big ${result.won>0?'win':'lose'}`}>
                {result.won>0?`+${fmt(result.won)} 🪙`:'MISS'}
              </div>
              <div className="pyramid-result-mult">
                ×{result.mult} · Bet: {fmt(result.bet)}
              </div>
            </>
          ) : <div style={{color:'rgba(232,224,208,.2)',fontSize:13,letterSpacing:'2px'}}>DROP THE BALL</div>}
        </div>
        <button className="drop-btn" onClick={drop} disabled={dropping||user.tokens<bet||auto}>
          {dropping?'FALLING...':'⬇ DROP'}
        </button>
      </div>

      <div className="pyramid-right">
        {/* Risk */}
        <div className="pyr-panel">
          <div className="pyr-panel-title">Risk Level</div>
          <div className="risk-tabs">
            {['low','medium','high'].map(r=>(
              <button key={r} className={`risk-tab${risk===r?' active':''}`}
                style={risk===r?{borderColor:RISK_PROFILES[r].color,color:RISK_PROFILES[r].color,background:`${RISK_PROFILES[r].color}15`}:{}}
                onClick={()=>{sfx.click();setRisk(r);}}>
                {r.toUpperCase()}
              </button>
            ))}
          </div>
          {/* Bet */}
          <div className="pyr-panel-title">Bet Amount</div>
          <div className="bet-group" style={{marginBottom:8}}>
            <button className="bet-minus" onClick={()=>setBet(b=>Math.max(10,b-10))}>−</button>
            <div className="bet-display">🪙{fmt(bet)}</div>
            <button className="bet-plus" onClick={()=>setBet(b=>Math.min(user.tokens,b+50))}>+</button>
          </div>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>
            {[50,100,500,1000,5000].map(v=>(
              <button key={v} className="preset" onClick={()=>setBet(Math.min(v,user.tokens))}>{fmt(v)}</button>
            ))}
          </div>
          {/* Auto */}
          <div className="auto-row">
            <span style={{fontSize:12,color:'rgba(232,224,208,.5)'}}>Auto Drop</span>
            <div className={`auto-toggle${auto?' on':''}`} onClick={toggleAuto}>
              <div className="auto-dot"/>
            </div>
          </div>
          <div style={{fontSize:10,color:'rgba(232,224,208,.2)',letterSpacing:'1px'}}>
            Max win: ×{Math.max(...profile.mults)} · House edge: ~3%
          </div>
        </div>

        {/* Stats */}
        <div className="pyr-panel">
          <div className="pyr-panel-title">Session Stats</div>
          <div className="stats-row"><span>Plays</span><strong>{stats.plays}</strong></div>
          <div className="stats-row"><span>Win rate</span><strong>{stats.plays>0?Math.round(stats.wins/stats.plays*100):0}%</strong></div>
          <div className="stats-row"><span>Best mult</span><strong>×{stats.biggestMult}</strong></div>
          <div className="stats-row"><span>Net</span><strong style={{color:stats.totalWon>=stats.totalBet?'var(--green)':'var(--red)'}}>
            {stats.totalWon>=stats.totalBet?'+':''}{fmt(stats.totalWon-stats.totalBet)}
          </strong></div>
        </div>

        {/* History */}
        <div className="pyr-panel" style={{flex:1}}>
          <div className="pyr-panel-title">Drop History</div>
          <div className="history-list">
            {history.length===0?<div style={{fontSize:11,color:'rgba(232,224,208,.2)',textAlign:'center',padding:'12px'}}>No drops yet</div>
              :history.map((h,i)=>(
                <div key={h.ts} className={`history-item ${h.won>h.bet?'win':'lose'}`}>
                  <span>×{h.mult}</span>
                  <span>{h.won>h.bet?'+':''}{fmt(h.won-h.bet)}</span>
                </div>
              ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function getSupportReply(msg) {
  const m = msg.toLowerCase();
  if(m.includes('bonus') || m.includes('bonusas')) return SUPPORT_REPLIES.bonus;
  if(m.includes('jackpot')) return SUPPORT_REPLIES.jackpot;
  if(m.includes('išmokėj') || m.includes('withdraw') || m.includes('isimokej')) return SUPPORT_REPLIES.withdraw;
  if(m.includes('depozit') || m.includes('papild') || m.includes('deposit')) return SUPPORT_REPLIES.deposit;
  if(m.includes('žaidim') || m.includes('game') || m.includes('zaidi')) return SUPPORT_REPLIES.game;
  if(m.includes('fair') || m.includes('teising') || m.includes('tikr')) return SUPPORT_REPLIES.fair;
  if(m.includes('paskyr') || m.includes('account') || m.includes('registr')) return SUPPORT_REPLIES.account;
  return SUPPORT_REPLIES.default;
}

  const send = (text) => {
    const msg = text || inp;

    setInp('');

function useMissions(user) {
  const [progress, setProgress] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('hrc_missions_'+user.uid)||'{}'); } catch{return {};}
  });
  const [newAchiev, setNewAchiev] = React.useState(null);

  const save = (p) => {
    localStorage.setItem('hrc_missions_'+user.uid, JSON.stringify(p));
    setProgress(p);
  };

  const update = (game, value=1) => {
    const p = {...progress};
    let changed = false;
    MISSIONS_DEF.forEach(m => {
      if(m.game !== game) return;
      if(p[m.id]?.done) return;
      const prev = p[m.id]?.count || 0;
      const next = game === 'balance' ? value : Math.min(prev + value, m.goal);
      if(next !== prev) {
        p[m.id] = {count: next, done: next >= m.goal};
        if(next >= m.goal && !progress[m.id]?.done) {
          changed = true;
          setNewAchiev(m);
          setTimeout(() => setNewAchiev(null), 4000);
          sfx.lv();
        }
      }
    });
    if(changed || JSON.stringify(p) !== JSON.stringify(progress)) save(p);
  };

  const getProgress = (m) => {
    const p = progress[m.id];
    if(!p) return 0;
    return Math.min(100, Math.round((p.count||0) / m.goal * 100));
  };

  return { progress, update, getProgress, newAchiev };
}

function useAIPersonalization(user) {
  const [insight, setInsight] = React.useState(null);

  React.useEffect(()=>{
    if(!user) return;
    // Analyze user patterns
    const now = new Date();
    const hour = now.getHours();
    const stored = JSON.parse(localStorage.getItem('hrc_ai_data_'+user.uid)||'{"sessions":[],"favGame":null,"bestHour":null}');

    // Track session
    stored.sessions.push({hour, ts: Date.now()});
    if(stored.sessions.length > 50) stored.sessions = stored.sessions.slice(-50);

    // Find best hour
    const hourCounts = {};
    stored.sessions.forEach(s=>{ hourCounts[s.hour]=(hourCounts[s.hour]||0)+1; });
    const bestHour = Object.entries(hourCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
    stored.bestHour = bestHour;

    localStorage.setItem('hrc_ai_data_'+user.uid, JSON.stringify(stored));

    // Generate insight
    if(bestHour && stored.sessions.length >= 3) {
      const h = parseInt(bestHour);
      const timeLabel = h < 12 ? 'rytas' : h < 18 ? 'popietė' : 'vakaras';
      const insights = [
        `Tavo laimingiausia valanda yra ${h}:00 (${timeLabel})`,
        user.tokens > 50000 ? `Puikus balansas! Bandyk VIP automatą 💎` : `Dar ${(10000-user.tokens%10000).toLocaleString()} iki kito lygio`,
        `Tu jau žaidi ${stored.sessions.length} sesijas — esi tikras kazinokas!`,
      ];
      setInsight(insights[Math.floor(Math.random()*insights.length)]);
    }
  }, [user?.uid]);

  return insight;
}

function MusicBtn(){
  const [on,setOn]=useState(false);
  const ac=useRef(null);
  const iv=useRef(null);
  function toggle(){
    if(on){
      if(ac.current){ac.current.close();ac.current=null;}
      if(iv.current){clearInterval(iv.current);iv.current=null;}
      setOn(false);
    }else{
      try{
        var ctx=new(window.AudioContext||window.webkitAudioContext)();
        ac.current=ctx;
        var chords=[[261,329,392],[293,369,440],[246,311,369],[261,329,493]];
        var ci=0;
        function play(){
          if(!ac.current)return;
          var t=ctx.currentTime;
          chords[ci%4].forEach(function(f,j){
            var o=ctx.createOscillator(),g=ctx.createGain();
            o.connect(g);g.connect(ctx.destination);
            o.type=j===0?'sine':'triangle';o.frequency.value=f;
            g.gain.setValueAtTime(0,t);
            g.gain.linearRampToValueAtTime(j===0?0.05:0.015,t+0.3);
            g.gain.linearRampToValueAtTime(0,t+3.5);
            o.start(t);o.stop(t+4);
          });ci++;
        }
        play();iv.current=setInterval(function(){if(ac.current)play();},3800);
        setOn(true);
      }catch(e){}
    }
  }
  return(
    <button onClick={toggle} style={{width:34,height:34,borderRadius:'50%',border:'1px solid rgba(240,192,96,'+(on?'0.5':'0.2')+')',background:on?'rgba(240,192,96,0.1)':'rgba(4,4,10,0.6)',cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      {on?'🎵':'🔇'}
    </button>
  );
}

    <g transform="translate(14,16)"><rect width="76" height="76" rx="14" fill="#fdf8ec" stroke="rgba(201,168,76,.5)" stroke-width="2"/><rect x="4" y="4" width="68" height="68" rx="11" fill="none" stroke="rgba(201,168,76,.2)" stroke-width="1"/>${['16,16','38,16','60,16','16,38','38,38','60,38','16,60','38,60','60,60'].slice(0,6).map(p=>`<circle cx="${p.split(',')[0]}" cy="${p.split(',')[1]}" r="7" fill="#0e0b04"/>`).join('')}</g>
    <g transform="translate(112,12) rotate(12)"><rect width="58" height="58" rx="10" fill="#0a0800" stroke="rgba(201,168,76,.65)" stroke-width="2"/><rect x="3" y="3" width="52" height="52" rx="8" fill="none" stroke="rgba(201,168,76,.2)" stroke-width="1"/>${['15,15','29,29','43,43'].map(p=>`<circle cx="${p.split(',')[0]}" cy="${p.split(',')[1]}" r="6" fill="#c9a84c" style="filter:drop-shadow(0 0 3px rgba(201,168,76,.6))"/>`).join('')}</g>
    <rect x="12" y="104" width="176" height="48" rx="3" fill="rgba(10,8,2,.8)" stroke="rgba(201,168,76,.15)" stroke-width="1"/>
    <text x="100" y="120" text-anchor="middle" font-size="8" fill="rgba(201,168,76,.3)" letter-spacing="4" font-family="serif">REZULTATAS</text>
    <text x="82" y="142" text-anchor="middle" font-size="24" fill="#f0c060" font-family="serif" font-weight="900" style="filter:drop-shadow(0 0 8px rgba(201,168,76,.5))">7</text>
    <text x="140" y="142" font-size="12" fill="rgba(201,168,76,.6)" font-family="serif" font-weight="700">+240</text>
  </svg>`,

  sports:`<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">${G}
    <rect x="10" y="18" width="180" height="118" rx="4" fill="rgba(8,20,10,.95)" stroke="rgba(201,168,76,.2)" stroke-width="1.5"/>
    <rect x="10" y="18" width="180" height="2" fill="rgba(201,168,76,.2)"/>
    <ellipse cx="100" cy="77" rx="32" ry="32" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1.5"/>
    <line x1="100" y1="18" x2="100" y2="136" stroke="rgba(255,255,255,.07)" stroke-width="1.5"/>
    <rect x="10" y="52" width="18" height="50" rx="2" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
    <rect x="172" y="52" width="18" height="50" rx="2" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
    <circle cx="100" cy="77" r="12" fill="#e8d5a0" stroke="rgba(201,168,76,.4)" stroke-width="1.5"/>
    <path d="M93,71 Q100,65 107,71" fill="none" stroke="#4a3728" stroke-width="1.2"/>
    <path d="M93,83 Q100,89 107,83" fill="none" stroke="#4a3728" stroke-width="1.2"/>
    <line x1="100" y1="65" x2="100" y2="89" stroke="#4a3728" stroke-width="1.2"/>
    ${[['NAMAI','1.85',12],['LYGIOS','3.40',74],['SVEČIAI','4.20',136]].map(([l,o,x])=>`<rect x="${x}" y="112" width="54" height="24" rx="2" fill="rgba(201,168,76,.06)" stroke="rgba(201,168,76,.2)" stroke-width="1"/><text x="${x+27}" y="121" text-anchor="middle" font-size="7" fill="rgba(201,168,76,.4)" font-family="serif" letter-spacing="1">${l}</text><text x="${x+27}" y="132" text-anchor="middle" font-size="11" fill="#f0c060" font-weight="700" font-family="serif">${o}</text>`).join('')}
  </svg>`,

  pyramid:`<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">${G}
    ${Array.from({length:30},()=>{const x=(Math.random()*190+5).toFixed(0);const y=(Math.random()*150+5).toFixed(0);return `<circle cx="${x}" cy="${y}" r="${(Math.random()*1.2+0.3).toFixed(1)}" fill="rgba(201,168,76,.${Math.floor(Math.random()*3+1)})"/>`;}).join('')}
    <polygon points="100,14 178,148 22,148" fill="rgba(201,168,76,.07)" stroke="rgba(201,168,76,.35)" stroke-width="1.5"/>
    ${[0.28,0.52,0.72,0.88].map(t=>{const y=(14+t*(148-14)).toFixed(1);const w=(178-22)*t;const x1=(100-w/2).toFixed(1);const x2=(100+w/2).toFixed(1);return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="rgba(201,168,76,.12)" stroke-width="1"/>`;}).join('')}
    <line x1="100" y1="14" x2="178" y2="148" stroke="rgba(201,168,76,.15)" stroke-width="1"/>
    <line x1="100" y1="14" x2="22" y2="148" stroke="rgba(201,168,76,.15)" stroke-width="1"/>
    <circle cx="100" cy="50" r="8" fill="#c9a84c" style="filter:drop-shadow(0 0 10px rgba(201,168,76,.8))"/>
    ${[['100×',46],['25×',73],['5×',96],['1×',119]].map(([m,y])=>`<text x="100" y="${y}" text-anchor="middle" font-size="8" fill="rgba(201,168,76,${y<60?.9:y<80?.65:y<100?.45:.3})" font-family="serif" font-weight="700">${m}</text>`).join('')}
  </svg>`,
};

const THUMB_MAP={poker:'poker',blackjack:'blackjack',roulette:'roulette',baccarat:'baccarat',videopoker:'videopoker',slots:'slots',keno:'keno',krioklis:'krioklis',crash:'crash',mines:'mines',wheel:'wheel',dice:'dice',sports:'sports',pyramid:'pyramid'};
function GameThumb({id,color}){
  const svg=THUMBS[id];
  if(svg) return <div className="gcard-thumb-inner" dangerouslySetInnerHTML={{__html:svg}}/>;
  return <div className="gcard-thumb-inner" style={{background:color,width:'100%',height:'100%'}}/>;
}

const ALL_GAMES=[
  {name:'POKERIS',desc:'Live multiplayer — iki 5 žaidėjų',icon:'♠️',thumb:'poker',badge:'🔴 LIVE',cat:'stalai',page:'poker',color:'linear-gradient(135deg,#1a0533,#3d1166)'},
  {name:'BLACKJACK',desc:'21 — klasikinis kortų žaidimas',icon:'🃏',thumb:'blackjack',badge:'🔥 HOT',cat:'stalai',page:'blackjack',color:'linear-gradient(135deg,#0a2a14,#1a5c30)'},
  {name:'RULETĖ',desc:'Europietiška ruletė su animacija',icon:'🎡',thumb:'roulette',badge:'🔴 LIVE',cat:'stalai',page:'roulette',color:'linear-gradient(135deg,#1a0a00,#5c2a00)'},
  {name:'BACCARAT',desc:'Player, Banker arba Tie',icon:'🎴',thumb:'baccarat',badge:'',cat:'stalai',href:'/baccarat.html',color:'linear-gradient(135deg,#001a2e,#003d6b)'},
  {name:'VIDEO POKER',desc:'Jacks or Better — iki 800×',icon:'🂡',thumb:'videopoker',badge:'✨ NAUJAS',cat:'stalai',href:'/videopoker.html',color:'linear-gradient(135deg,#1a1a00,#4d4d00)'},
  {name:'AUTOMATAI',desc:'Slotas su laimėjimų linijomis',icon:'🎰',thumb:'slots',badge:'🔥 HOT',cat:'automatai',page:'slots',color:'linear-gradient(135deg,#1a0000,#660000)'},
  {name:'KENO',desc:'80 kamuolių loterija',icon:'🎱',thumb:'keno',badge:'',cat:'automatai',href:'/keno.html',color:'linear-gradient(135deg,#00141a,#003d4d)'},
  {name:'KRIOKLIS',desc:'Kamuolys krinta per nagus — iki 999×',icon:'🔮',thumb:'krioklis',badge:'🎬 ANIMACIJA',cat:'automatai',href:'/plinko.html',color:'linear-gradient(135deg,#0d0033,#2d0099)'},
  {name:'CRASH',desc:'Aviator stiliaus — išimkite laiku!',icon:'🚀',thumb:'crash',badge:'🔥 HOT',cat:'kripto',href:'/crash.html',color:'linear-gradient(135deg,#1a0a00,#663300)'},
  {name:'MINES',desc:'5×5 lentelė — deimantai ar minos?',icon:'💣',thumb:'mines',badge:'⭐ POPULIARUS',cat:'kripto',href:'/mines.html',color:'linear-gradient(135deg,#001a00,#004d00)'},
  {name:'LUCKY WHEEL',desc:'Sukite ratą — iki 100×',icon:'🎡',thumb:'wheel',badge:'',cat:'kripto',href:'/wheel.html',color:'linear-gradient(135deg,#1a001a,#660066)'},
  {name:'DICE / LIMBO / HI-LO',desc:'3 žaidimai viename',icon:'🎲',thumb:'dice',badge:'',cat:'kripto',href:'/dice.html',color:'linear-gradient(135deg,#001a1a,#004d4d)'},
  {name:'SPORTAS',desc:'Futbolas, krepšinis ir daugiau',icon:'⚽',thumb:'sports',badge:'🔴 LIVE',cat:'sportas',page:'sports',color:'linear-gradient(135deg,#001a0a,#004d1f)'},
  {name:'PIRAMIDĖ',desc:'Dropo žaidimas — iki 100×',icon:'🏺',thumb:'pyramid',badge:'',cat:'kripto',page:'pyramid',color:'linear-gradient(135deg,#1a1400,#4d3b00)'},
];

function App(){
  const [lang,setLang]=useLang();
  const t=lang;
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('lobby');
  const [roomId,setRoomId]=useState(null);
  const [gameState,setGameState]=useState(null);
  const [showAvatar,setShowAvatar]=useState(false);
  const [showBonus,setShowBonus]=useState(false);
  const [lvUp,setLvUp]=useState(null);
  const [particles,setParticles]=useState([]);
  const [tokenBump,setTokenBump]=useState(false);
  const [gameFilter,setGameFilter]=useState('visi');
  const missions = useMissions(user||{uid:'guest'});
  const aiInsight = useAIPersonalization(user);
  const [pendingReward,setPendingReward]=useState(null);

  useEffect(()=>{
    socket.on('gameState',s=>{setGameState(s);if(!roomId)setRoomId(s.roomId);});
    socket.on('roomCreated',({roomId:id})=>setRoomId(id));
    socket.on('dailyBonusAvailable',()=>setShowBonus(true));
    socket.on('levelUp',lv=>{setLvUp(lv);sfx.lv();setTimeout(()=>setLvUp(null),4000);});
    socket.on('missionProgress',({game,value})=>{ if(missions) missions.update(game,value); });
    socket.on('emojiReaction',({emoji})=>{
      const id=Date.now()+Math.random();
      setParticles(p=>[...p,{id,emoji,x:5+Math.random()*90,y:10+Math.random()*70}]);
      setTimeout(()=>setParticles(p=>p.filter(e=>e.id!==id)),2200);
    });
    return()=>socket.off('gameState').off('roomCreated').off('dailyBonusAvailable').off('levelUp').off('emojiReaction');
  },[]);

  if(!user)return <Auth onLogin={d=>setUser(d)} t={t}/>;

  const lv=user.levelInfo||LEVELS[0];
  const nextLv=user.nextLevel||null;
  const nav=pg=>{ if(pg==='cashier'){window.open('/cashier.html','_self');return;}sfx.click();setPage(pg);if(pg!=='poker'){setRoomId(null);setGameState(null);}};
  const bumpTokens=amt=>{setTokenBump(true);setTimeout(()=>setTokenBump(false),500);setUser(u=>({...u,tokens:u.tokens+amt}));};

  const doLogout=()=>{
    const tok=localStorage.getItem('casino_session');
    if(tok) fetch('/api/auth/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:tok})});
    ['casino_session','casino_uid','casino_name','hrc_uid','hrc_name'].forEach(k=>localStorage.removeItem(k));
    window.location.href='/login.html';
  };

  const SB_ITEMS=[
    {id:'lobby',icon:'🏠',label:'Pagrindinis'},
    {id:'__div1'},
    {id:'__label1',label:'KAZINO'},
    {id:'slots',icon:'🎰',label:'Automatai',badge:'HOT',badgeCls:'hot'},
    {id:'blackjack',icon:'🃏',label:'Blackjack'},
    {id:'roulette',icon:'⭕',label:'Ruletė',badge:'LIVE',badgeCls:'live'},
    {id:'poker',icon:'♠️',label:'Pokeris',badge:'LIVE',badgeCls:'live'},
    {id:'pyramid',icon:'🏺',label:'Piramidė'},
    {id:'__div2'},
    {id:'__label2',label:'ŽAIDIMAI'},
    {id:'__link_crash',icon:'🚀',label:'Crash',href:'/crash.html',badge:'HOT',badgeCls:'hot'},
    {id:'__link_mines',icon:'💣',label:'Mines',href:'/mines.html'},
    {id:'__link_krioklis',icon:'🔮',label:'Krioklis',href:'/plinko.html',badge:'NAUJA',badgeCls:'new'},
    {id:'__link_dice',icon:'🎲',label:'Dice / Limbo',href:'/dice.html'},
    {id:'__link_wheel',icon:'🎡',label:'Lucky Wheel',href:'/wheel.html'},
    {id:'__link_keno',icon:'🎱',label:'Keno',href:'/keno.html'},
    {id:'__link_baccarat',icon:'🎴',label:'Baccarat',href:'/baccarat.html'},
    {id:'__link_vp',icon:'🂡',label:'Video Poker',href:'/videopoker.html'},
    {id:'__div3'},
    {id:'__label3',label:'KITA'},
    {id:'sports',icon:'⚽',label:'Sportas',badge:'LIVE',badgeCls:'live'},
    {id:'leaderboard',icon:'🏆',label:'Lyderiai'},
    {id:'stats',icon:'📊',label:'Statistika'},
    {id:'cashier',icon:'💳',label:'Kasos'},
  ];

  return(
    <div className="app-shell">
      {/* ── TOP BAR ── */}
      <div className="topbar">
        <div className="topbar-logo">⬡ HATHOR<span>ROYAL CASINO</span></div>
        <div className="topbar-nav">
          {[{p:'lobby',l:'🏠 Lobis'},{p:'sports',l:'⚽ Sportas'},{p:'stats',l:'📊 Statistika'},{p:'leaderboard',l:'🏆 Lyderiai'}].map(x=>(
            <button key={x.p} className={`topbar-btn${page===x.p?' active':''}`} onClick={()=>nav(x.p)}>{x.l}</button>
          ))}
        </div>
        <div className="topbar-right">
          <MusicBtn/>
          <LangDrop lang={lang} setLang={setLang}/>
          <LvPill xp={user.xp||0} levelInfo={lv} nextLevel={nextLv}/>
          <div className={`tb-balance${tokenBump?' bump':''}`}>
            <div className="tb-bal-label">Balansas</div>
            <div className="tb-bal-amount">🪙 {fmt(user.tokens)}</div>
          </div>
          <button className="tb-cashier" onClick={()=>window.open('/cashier.html','_self')}>💳 Kasos</button>
          <div className="tb-user-btn" onClick={()=>setShowAvatar(true)}>{user.avatar?<img src={user.avatar} alt="" style={{width:'100%',height:'100%',borderRadius:10,objectFit:'cover'}}/>:'👤'}</div>
          <button className="tb-logout" onClick={doLogout}>⏻</button>
        </div>
      </div>

      {/* ── BODY ── */}
      <div className="app-body">
        {/* ── SIDEBAR ── */}
        <aside className="sidebar">
          {SB_ITEMS.map((item,i)=>{
            if(item.id.startsWith('__div')) return <div key={i} className="sb-divider"/>;
            if(item.id.startsWith('__label')) return <div key={i} className="sb-section-label">{item.label}</div>;
            if(item.href) return (
              <a key={i} href={item.href} className={`sb-item`} style={{textDecoration:'none'}}>
                <span className="sb-item-icon">{item.icon}</span>
                <span>{item.label}</span>
                {item.badge&&<span className={`sb-item-badge ${item.badgeCls||''}`}>{item.badge}</span>}
              </a>
            );
            return (
              <div key={i} className={`sb-item${page===item.id?' active':''}`} onClick={()=>nav(item.id)}>
                <span className="sb-item-icon">{item.icon}</span>
                <span>{item.label}</span>
                {item.badge&&<span className={`sb-item-badge ${item.badgeCls||''}`}>{item.badge}</span>}
              </div>
            );
          })}
        </aside>

        {/* ── MAIN ── */}
        <main className="main-content">

      {page==='lobby'&&(
        <>
          {/* Hero banner */}
          <div className="hero-banner">
            <div>
              <div className="hero-greeting">Sveiki, <span>{user.name}</span> 👋</div>
              <div className="hero-stats">
                <div className="hero-stat"><div className="hero-stat-val">🪙 {fmt(user.tokens)}</div><div className="hero-stat-lbl">Balansas</div></div>
                <div className="hero-stat"><div className="hero-stat-val">{lv.e} {lv.name}</div><div className="hero-stat-lbl">Lygis</div></div>
                <div className="hero-stat"><div className="hero-stat-val">{fmt(user.xp||0)}</div><div className="hero-stat-lbl">XP</div></div>
                <div className="hero-stat"><div className="hero-stat-val">{user.games_played||0}</div><div className="hero-stat-lbl">Žaidimai</div></div>
              </div>
              {aiInsight&&<div className="ai-insight">🤖 {aiInsight}</div>}
            </div>
            <div className="hero-cards-deco">
              <div className="hero-card red" data-rank="A" style={{'--r':'-18deg'}}>♥</div>
              <div className="hero-card black" data-rank="K" style={{'--r':'0deg'}}>♠</div>
              <div className="hero-card red" data-rank="Q" style={{'--r':'18deg'}}>♦</div>
            </div>
          </div>

          {/* Category chips */}
          <div className="cat-chips">
            {[
              {id:'visi',l:'🎮 Visi žaidimai'},
              {id:'stalai',l:'🃏 Stalai'},
              {id:'automatai',l:'🎰 Automatai'},
              {id:'kripto',l:'⚡ Kripto'},
              {id:'sportas',l:'⚽ Sportas'},
            ].map(c=>(
              <button key={c.id} className={`cat-chip${gameFilter===c.id?' active':''}`} onClick={()=>setGameFilter(c.id)}>{c.l}</button>
            ))}
          </div>

          {/* Section header */}
          <div className="sec-hdr">
            <div className="sec-hdr-title">ŽAIDIMAI</div>
            <div className="sec-hdr-line"/>
            <div className="sec-hdr-count">{ALL_GAMES.filter(g=>gameFilter==='visi'||g.cat===gameFilter).length} žaidimų</div>
          </div>

          {/* Games grid */}
          <div className="games-pro">
            {ALL_GAMES.filter(g=>gameFilter==='visi'||g.cat===gameFilter).map((g,i)=>{
              const badgeCls=g.badge?.includes('LIVE')?'live':g.badge?.includes('HOT')||g.badge?.includes('🔥')?'hot':g.badge?.includes('NAU')||g.badge?.includes('✨')?'new':'anim';
              const inner=(
                <>
                  <div className="gcard-thumb">
                    <GameThumb id={g.thumb} color={g.color}/>
                  </div>
                  {g.badge&&<span className={`gcard-badge-pro ${badgeCls}`}>{g.badge}</span>}
                  <div className="gcard-play-btn">▶ ŽAISTI</div>
                  <div className="gcard-info-row">
                    <div className="gcard-name-pro">{g.name}</div>
                    <div className="gcard-desc-pro">{g.desc}</div>
                  </div>
                </>
              );
              return g.href
                ? <a key={i} href={g.href} className="gcard-pro">{inner}</a>
                : <div key={i} className="gcard-pro" onClick={()=>nav(g.page)}>{inner}</div>;
            })}
          </div>

          <p style={{textAlign:'center',marginTop:40,fontSize:10,color:'rgba(232,224,208,.08)',letterSpacing:'3px'}}>{t.disclaimer}</p>
        </>
      )}

      {page==='slots'&&<Slots user={user} setUser={setUser} t={t}/>}
      {page==='roulette'&&<Roulette user={user} setUser={setUser}/>}
      {page==='blackjack'&&<Blackjack user={user} setUser={setUser}/>}
      {page==='leaderboard'&&<Leaderboard user={user}/>}
      {page==='pyramid'&&<PyramidDrop user={user} setUser={setUser}/>}
      {page==='stats'&&<StatsPage user={user}/>}
      {page==='sports'&&<SportsBetting user={user} setUser={setUser} t={t}/>}
      {page==='poker'&&(
        roomId&&gameState?(
          gameState.status==='waiting'
            ?<div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',zIndex:1}}>
               <WaitingRoom state={gameState} user={user} roomId={roomId} onBack={()=>{setRoomId(null);setGameState(null);}}/>
             </div>
            :<PokerTable state={gameState} user={user} roomId={roomId} onLeave={()=>{setRoomId(null);setGameState(null);setPage('poker');}}/>
        ):<PokerLobby user={user} onJoinRoom={id=>setRoomId(id)} onBack={()=>nav('lobby')}/>
      )}

        </main>
      </div>{/* end app-body */}

      <JackpotTicker/>
      <AICroupier user={user} currentPage={page} t={t}/>
      <SocialWins/>
      {user&&<SupportChat user={user}/>}
      {user&&<MissionsPanel user={user} missions={missions}/>}
      {pendingReward&&<AchievementPopup mission={pendingReward} onClaim={()=>{
        setUser(u=>({...u,tokens:u.tokens+pendingReward.reward}));
        sfx.win();
        setPendingReward(null);
      }}/>}
      {showAvatar&&<AvatarModal user={user} onClose={()=>setShowAvatar(false)} onUpdate={url=>setUser(u=>({...u,avatar:url}))}/>}
      {showBonus&&<DailyBonus onClose={()=>setShowBonus(false)} onClaim={amt=>bumpTokens(amt)} t={t}/>}
      {lvUp&&<div className="levelup-banner"><h3>{lvUp.e} LEVEL UP!</h3><p>You reached {lvUp.name}</p></div>}
      {page!=='poker'&&<EmojiParticles particles={particles}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
