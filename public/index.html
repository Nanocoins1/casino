<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="HATHOR Casino"/>
<meta name="theme-color" content="#050508"/>
<link rel="manifest" href="/manifest.json"/>
<title>HATHOR Royal Casino — Las Vegas Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   HATHOR ROYAL — PREMIUM BLACK & GOLD DESIGN SYSTEM
═══════════════════════════════════════════════════ */
:root {
  /* Base blacks */
  --bg:  #050508;
  --bg2: #08080f;
  --bg3: #0d0d18;
  --bg4: #121220;
  /* Gold palette — metallic Las Vegas */
  --gold:      #c9a84c;
  --gold2:     #f0c060;
  --gold3:     #ffd680;
  --gold-dark: #7a5c1e;
  --gold-trim: #c9a84c;
  /* Glass & borders — gold-tinted */
  --glass:   rgba(201,168,76,0.04);
  --glass2:  rgba(201,168,76,0.08);
  --border:  rgba(201,168,76,0.14);
  --border2: rgba(201,168,76,0.28);
  --border3: rgba(201,168,76,0.45);
  /* Status colours — toned down */
  --green: #4caf7c;
  --red:   #c0394c;
  --neon:  #c9a84c;   /* replaced cyan with gold */
  --neon2: #8a6828;
  /* Text */
  --cream:    #e8dcc8;
  --cream-dim: rgba(232,220,200,0.45);
  /* Felt */
  --felt:  #0a2216;
  --felt2: #0e3020;
  /* Card */
  --card-bg: #fdf8f0;
  /* Shadow */
  --shadow: 0 32px 100px rgba(0,0,0,0.9);
  --gold-glow: 0 0 40px rgba(201,168,76,0.25), 0 0 80px rgba(201,168,76,0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  font-family: 'Space Grotesk', sans-serif;
  color: var(--cream);
  min-height: 100vh;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(201,168,76,0.5); }

/* ── Luxury dark background ── */
.mesh-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%,   rgba(201,168,76,0.07),  transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 100%,  rgba(201,168,76,0.05),  transparent 60%),
    radial-gradient(ellipse 100% 80% at 50% 50%,  rgba(8,6,4,0.98),       transparent),
    var(--bg);
}
/* Marble grain overlay */
.mesh-bg::after {
  content: '';
  position: absolute; inset: 0;
  opacity: 0.018;
  background-image:
    repeating-linear-gradient(0deg,   transparent, transparent 2px, rgba(255,255,255,1) 2px, rgba(255,255,255,1) 3px),
    repeating-linear-gradient(90deg,  transparent, transparent 40px, rgba(255,255,255,1) 40px, rgba(255,255,255,1) 41px);
  pointer-events: none;
}

/* ── Particle canvas ── */
#particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.4; }

/* ── Glass panels — gold-tinted ── */
.glass {
  background: rgba(10,8,4,0.7);
  backdrop-filter: blur(24px) saturate(150%);
  -webkit-backdrop-filter: blur(24px) saturate(150%);
  border: 1px solid var(--border);
  border-radius: 16px;
}
.glass-strong {
  background: rgba(8,6,2,0.92);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid var(--border2);
  border-radius: 16px;
}

/* ── Gold glow utilities ── */
.glow-gold  { box-shadow: var(--gold-glow); }
.glow-green { box-shadow: 0 0 20px rgba(76,175,124,0.3); }
.text-gold  {
  background: linear-gradient(135deg, #a07828 0%, #c9a84c 30%, #f0c060 60%, #ffd680 80%, #c9a84c 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.text-gold-solid { color: var(--gold2); }

/* Gold rule divider */
.gold-rule {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent);
  opacity: 0.35; margin: 0;
}

/* ── Buttons — metallic gold premium ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer;
  font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 13px;
  letter-spacing: 0.8px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative; overflow: hidden; text-transform: uppercase;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.2s;
}
.btn:hover::after { opacity: 1; }

/* PRIMARY — full metallic gold */
.btn-primary {
  background: linear-gradient(180deg, #e8c060 0%, #c9a84c 40%, #a07828 100%);
  color: #0a0600; font-weight: 800;
  border: 1px solid rgba(255,220,120,0.4);
  box-shadow: 0 2px 0 rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,240,160,0.3);
  letter-spacing: 1.5px;
}
.btn-primary:hover {
  transform: translateY(-2px);
  background: linear-gradient(180deg, #f0d070 0%, #d4b054 40%, #b08830 100%);
  box-shadow: 0 6px 24px rgba(201,168,76,0.5), 0 2px 0 rgba(0,0,0,0.5);
}
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

/* GHOST — gold bordered */
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border2);
  color: rgba(232,220,200,0.55);
}
.btn-ghost:hover { border-color: var(--border3); color: var(--gold2); background: rgba(201,168,76,0.06); }
.btn-ghost.active { border-color: var(--gold); color: var(--gold2); background: rgba(201,168,76,0.1); }

/* OUTLINE GOLD */
.btn-gold-outline {
  background: transparent; border: 1px solid var(--gold);
  color: var(--gold2); letter-spacing: 1.5px;
}
.btn-gold-outline:hover { background: rgba(201,168,76,0.1); box-shadow: var(--gold-glow); }

/* DANGER */
.btn-danger  { background: rgba(192,57,76,0.14); border: 1px solid rgba(192,57,76,0.3); color: #e07080; }
.btn-danger:hover  { background: rgba(192,57,76,0.28); }
.btn-success { background: rgba(76,175,124,0.12); border: 1px solid rgba(76,175,124,0.3); color: #80e0b0; }
.btn-success:hover { background: rgba(76,175,124,0.24); }
.btn-info    { background: rgba(201,168,76,0.1);  border: 1px solid rgba(201,168,76,0.25); color: var(--gold2); }
.btn-info:hover    { background: rgba(201,168,76,0.2); }
.btn-purple  { background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); color: var(--gold); }
.btn-purple:hover  { background: rgba(201,168,76,0.16); }

.btn-sm  { padding: 7px 14px; font-size: 11px; border-radius: 6px; letter-spacing: 1px; }
.btn-lg  { padding: 16px 40px; font-size: 14px; border-radius: 10px; letter-spacing: 2px; }
.btn-block { width: 100%; }

/* ── Input ── */
.inp {
  width: 100%; padding: 12px 16px;
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: 8px; color: var(--cream);
  font-family: 'Space Grotesk', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.2s;
}
.inp:focus { border-color: rgba(240,192,96,0.5); box-shadow: 0 0 0 3px rgba(240,192,96,0.08); }
.inp-label { font-size: 11px; letter-spacing: 1px; color: rgba(232,224,208,0.4); margin-bottom: 8px; display: block; text-transform: uppercase; }

/* ═══════════════════════════════════════════════════
   HEADER (standalone pages)
═══════════════════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 200;
  height: 64px; padding: 0 28px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(5,5,8,0.96);
  backdrop-filter: blur(30px);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 0 rgba(201,168,76,0.08);
}
.header-logo {
  font-family: 'Cinzel Decorative', 'Orbitron', monospace; font-size: 16px; font-weight: 900;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #a07828 0%, #c9a84c 30%, #f0c060 60%, #c9a84c 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  display: flex; align-items: center; gap: 10px;
}
.header-logo::before { content: '♦'; -webkit-text-fill-color: var(--gold); font-size: 18px; opacity: 0.7; }
.nav-tabs { display: flex; gap: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; }

/* ── Token chip ── */
.token-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; border-radius: 50px;
  background: rgba(201,168,76,0.07); border: 1px solid var(--border2);
  font-family: 'DM Mono', monospace; font-size: 13px; color: var(--gold2);
  transition: all 0.3s;
}
.token-chip.bump { animation: tokenBump 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97); }
@keyframes tokenBump { 0%,100%{transform:scale(1)} 30%{transform:scale(1.15)} 60%{transform:scale(0.97)} }

/* ── Level badge ── */
.lvl-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px; border-radius: 50px;
  background: rgba(201,168,76,0.06); border: 1px solid var(--border);
  font-size: 12px; color: var(--gold);
}
.xp-track { width: 44px; height: 2px; background: rgba(201,168,76,0.12); border-radius: 2px; overflow: hidden; }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold2)); border-radius: 2px; transition: width 0.8s ease; }

/* ── Avatar ── */
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid var(--border2); cursor: pointer;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  background: rgba(201,168,76,0.08); font-size: 16px;
  transition: all 0.2s;
}
.avatar:hover { border-color: var(--gold); box-shadow: 0 0 16px rgba(201,168,76,0.35); }
.avatar img { width: 100%; height: 100%; object-fit: cover; }

/* ═══════════════════════════════════════════════════
   AUTH PAGE — Las Vegas VIP entrance
═══════════════════════════════════════════════════ */
.auth-scene {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  position: relative;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.09), transparent 55%),
    var(--bg);
}
.auth-card {
  width: 440px; padding: 56px 52px; position: relative; z-index: 1;
  background: rgba(8,6,2,0.96);
  border: 1px solid var(--border2);
  border-radius: 4px;
  box-shadow: var(--shadow), 0 0 0 1px rgba(201,168,76,0.06), inset 0 1px 0 rgba(201,168,76,0.08);
}
/* Corner ornaments */
.auth-card::before, .auth-card::after {
  content: '◆'; position: absolute;
  font-size: 10px; color: rgba(201,168,76,0.3);
}
.auth-card::before { top: 14px; left: 18px; }
.auth-card::after  { bottom: 14px; right: 18px; }
.auth-logo { text-align: center; margin-bottom: 44px; }
.auth-logo h1 {
  font-family: 'Cinzel Decorative', 'Orbitron', monospace;
  font-size: 34px; font-weight: 900; letter-spacing: 6px;
  background: linear-gradient(180deg, #ffd680 0%, #c9a84c 40%, #f0c060 70%, #a07828 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: none;
}
@keyframes titlePulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.15)} }
.auth-logo h1 { animation: titlePulse 5s ease infinite; }
.auth-logo p {
  font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 6px;
  color: rgba(201,168,76,0.35); margin-top: 10px; text-transform: uppercase;
}
.auth-card .field { margin-bottom: 16px; }
.new-player-note {
  text-align: center; margin-top: 18px;
  font-size: 10px; color: rgba(201,168,76,0.25); letter-spacing: 2px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-family: 'Cinzel', serif; text-transform: uppercase;
}
.new-player-note::before, .new-player-note::after { content: '◆'; font-size: 6px; }

/* ═══════════════════════════════════════════════════
   LOBBY
═══════════════════════════════════════════════════ */
.lobby { padding: 48px 40px; max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }
.lobby-hero { text-align: center; margin-bottom: 64px; }
.lobby-hero h2 {
  font-family: 'Orbitron', monospace; font-size: 52px; font-weight: 700;
  line-height: 1.1; letter-spacing: 2px;
  background: linear-gradient(135deg, var(--cream) 0%, var(--gold) 50%, var(--cream) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.lobby-hero p { margin-top: 12px; font-size: 12px; letter-spacing: 4px; color: rgba(232,224,208,0.25); }
.lobby-stats {
  display: flex; gap: 24px; justify-content: center; margin-top: 28px; flex-wrap: wrap;
}
.stat-chip {
  display: flex; align-items: center; gap: 8px; padding: 8px 18px;
  background: var(--glass); border: 1px solid var(--border); border-radius: 50px;
  font-size: 12px; color: rgba(232,224,208,0.5);
}
.stat-chip strong { color: var(--gold); font-family: 'DM Mono', monospace; }

.games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

/* ── Game card ── */
.game-card {
  position: relative; overflow: hidden; cursor: pointer;
  padding: 32px 28px; border-radius: 16px;
  background: rgba(8,8,18,0.6);
  border: 1px solid var(--border);
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  group: true;
}
.game-card::before {
  content: ''; position: absolute; inset: 0;
  background: var(--card-glow, linear-gradient(135deg, rgba(240,192,96,0.06), transparent));
  opacity: 0; transition: opacity 0.35s;
}
.game-card:hover { transform: translateY(-6px) scale(1.01); border-color: var(--card-border, rgba(240,192,96,0.35)); }
.game-card:hover::before { opacity: 1; }
.game-card:hover .game-card-glow { opacity: 1; }
.game-card-glow {
  position: absolute; inset: -1px; border-radius: 16px;
  opacity: 0; transition: opacity 0.35s;
  box-shadow: 0 0 40px var(--card-shadow, rgba(240,192,96,0.2));
  pointer-events: none;
}
.game-icon-wrap {
  width: 64px; height: 64px; border-radius: 16px; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: center;
  background: var(--icon-bg, rgba(240,192,96,0.08));
  border: 1px solid var(--icon-border, rgba(240,192,96,0.15));
  font-size: 32px; transition: transform 0.35s;
}
.game-card:hover .game-icon-wrap { transform: scale(1.1) rotate(-5deg); }
.game-card h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--cream); }
.game-card p { font-size: 13px; color: rgba(232,224,208,0.4); line-height: 1.6; }
.game-badge {
  position: absolute; top: 16px; right: 16px;
  font-size: 9px; letter-spacing: 2px; padding: 3px 10px; border-radius: 20px; font-weight: 600;
}
.badge-live { background: rgba(0,230,118,0.12); color: var(--green); border: 1px solid rgba(0,230,118,0.25); }
.badge-hot  { background: rgba(240,192,96,0.12); color: var(--gold); border: 1px solid rgba(240,192,96,0.25); }
.badge-new  { background: rgba(0,229,255,0.12); color: var(--neon); border: 1px solid rgba(0,229,255,0.25); }

/* ═══════════════════════════════════════════════════
   PLAYING CARD — Gold-foil premium Las Vegas design
═══════════════════════════════════════════════════ */
.card-wrap { perspective: 700px; }
.card {
  width: 62px; height: 88px; border-radius: 5px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; font-weight: 700; user-select: none; cursor: default;
  position: relative; transition: transform 0.22s ease;
  transform-style: preserve-3d;
}
.card:hover { transform: translateY(-7px) rotateY(6deg) rotateZ(-1deg); }

/* Front face — ivory with gold-foil edge */
.card-front {
  position: absolute; inset: 0; border-radius: 5px;
  background: linear-gradient(160deg, #fffdf5 0%, #fef8e8 60%, #fdf0cc 100%);
  box-shadow:
    0 6px 20px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.9),
    inset 0 0 0 2px rgba(201,168,76,0.25);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  backface-visibility: hidden;
}
/* Gold foil inner border */
.card-front::before {
  content: ''; position: absolute; inset: 3px; border-radius: 3px;
  border: 1px solid rgba(201,168,76,0.3); pointer-events: none;
}
.card.red  .card-front { color: #a81820; }
.card.black .card-front { color: #0e0e1a; }
.card-rank {
  font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700;
  position: absolute; top: 5px; left: 7px; line-height: 1;
}
.card-rank-br {
  font-family: 'Cinzel', serif; font-size: 11px;
  position: absolute; bottom: 5px; right: 7px; line-height: 1;
  transform: rotate(180deg);
}
.card-suit { font-size: 22px; }

/* Back face — deep black with gold diamond pattern */
.card-back {
  position: absolute; inset: 0; border-radius: 5px;
  background: linear-gradient(135deg, #0a0800 0%, #1a1200 50%, #0a0800 100%);
  border: 1px solid rgba(201,168,76,0.35);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 6px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(201,168,76,0.15);
  overflow: hidden;
}
/* Diamond crosshatch pattern on back */
.card-back::before {
  content: ''; position: absolute; inset: 4px; border-radius: 3px;
  border: 1px solid rgba(201,168,76,0.2);
  background-image:
    repeating-linear-gradient(45deg,  rgba(201,168,76,0.06) 0, rgba(201,168,76,0.06) 1px, transparent 0, transparent 50%),
    repeating-linear-gradient(-45deg, rgba(201,168,76,0.06) 0, rgba(201,168,76,0.06) 1px, transparent 0, transparent 50%);
  background-size: 8px 8px;
}
.card-back::after {
  content: '♦'; font-size: 22px; color: rgba(201,168,76,0.35);
  position: relative; z-index: 1;
  text-shadow: 0 0 12px rgba(201,168,76,0.3);
}

.card.sm { width: 48px; height: 68px; }
.card.sm .card-rank    { font-size: 11px; top: 4px; left: 5px; }
.card.sm .card-rank-br { font-size: 10px; bottom: 4px; right: 5px; }
.card.sm .card-suit    { font-size: 17px; }
.card.sm .card-back::after { font-size: 17px; }

.card.deal-anim { animation: dealCard 0.32s cubic-bezier(0.4, 0, 0.2, 1); }
@keyframes dealCard {
  from { transform: translateY(-44px) rotateY(90deg) scale(0.82); opacity: 0; }
  to   { transform: translateY(0) rotateY(0) scale(1); opacity: 1; }
}

/* ═══════════════════════════════════════════════════
   MODALS & TOASTS
═══════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  width: 400px; padding: 40px;
  background: rgba(8,8,18,0.97);
  border: 1px solid rgba(240,192,96,0.2); border-radius: 20px;
  box-shadow: var(--shadow), 0 0 80px rgba(240,192,96,0.06);
  animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes slideUp { from{transform:translateY(30px) scale(0.97);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
.modal h3 { font-family:'Orbitron',monospace; font-size:22px; color:var(--gold); margin-bottom:8px; letter-spacing:1px; }
.modal p { font-size:13px; color:rgba(232,224,208,0.45); margin-bottom:20px; line-height:1.7; }
.modal-btns { display:flex; gap:10px; margin-top:20px; }

.toast {
  position: fixed; top: 76px; left: 50%; transform: translateX(-50%);
  z-index: 600; min-width: 300px; text-align: center;
  padding: 18px 32px; border-radius: 12px;
  background: rgba(8,8,18,0.97); border: 1px solid rgba(240,192,96,0.3);
  box-shadow: var(--shadow), 0 0 40px rgba(240,192,96,0.15);
  animation: toastIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}
@keyframes toastIn { from{opacity:0;transform:translate(-50%,-20px)} to{opacity:1;transform:translate(-50%,0)} }
.toast h4 { font-family:'Orbitron',monospace; font-size:16px; color:var(--gold); }
.toast p { font-size:11px; color:rgba(232,224,208,0.4); margin-top:4px; letter-spacing:1px; }

/* ── Level up banner ── */
.levelup-banner {
  position: fixed; top: 76px; left: 50%; transform: translateX(-50%);
  z-index: 600; padding: 20px 44px; border-radius: 12px;
  background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(240,192,96,0.2));
  border: 1px solid rgba(240,192,96,0.4);
  box-shadow: 0 0 60px rgba(124,58,237,0.3);
  text-align: center; animation: bannerIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes bannerIn { from{opacity:0;transform:translate(-50%,-30px) scale(0.8)} to{opacity:1;transform:translate(-50%,0) scale(1)} }
.levelup-banner h3 { font-family:'Orbitron',monospace; font-size:20px; color:var(--gold); }
.levelup-banner p { font-size:11px; color:rgba(232,224,208,0.5); margin-top:4px; letter-spacing:2px; }

/* ── Emoji rain ── */
.emoji-particle {
  position: fixed; z-index: 400; pointer-events: none;
  font-size: 32px; animation: emojiRise 2s ease forwards;
}
@keyframes emojiRise {
  0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-140px) scale(1.6) rotate(20deg); }
}

/* ── Daily bonus amount ── */
.bonus-big { font-family:'Orbitron',monospace; font-size:48px; color:var(--gold); text-align:center; margin:20px 0; text-shadow:0 0 40px rgba(240,192,96,0.4); animation:bonusPop .6s cubic-bezier(0.4,0,0.2,1); }
@keyframes bonusPop { from{transform:scale(0) rotate(-10deg)} 70%{transform:scale(1.15) rotate(3deg)} to{transform:scale(1) rotate(0)} }

/* ═══════════════════════════════════════════════════
   SLOTS 5×3
═══════════════════════════════════════════════════ */
.slots-scene {
  min-height: calc(100vh - 64px); display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px;
  position: relative; z-index: 1;
}
.slots-nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
.machine-tab {
  padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px;
  font-weight: 600; transition: all 0.2s; border: 1px solid var(--border);
  background: var(--glass); color: rgba(232,224,208,0.5);
}
.machine-tab.active { background: rgba(240,192,96,0.1); border-color: rgba(240,192,96,0.4); color: var(--gold); box-shadow: 0 0 16px rgba(240,192,96,0.12); }

.slots-cabinet {
  width: 720px; border-radius: 24px; overflow: hidden;
  background: rgba(8,8,14,0.9); border: 1px solid rgba(255,255,255,0.06);
  box-shadow: var(--shadow), 0 0 0 1px rgba(240,192,96,0.05);
}
.slots-top {
  padding: 18px 28px 14px;
  background: linear-gradient(180deg, rgba(240,192,96,0.06), transparent);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.slots-title { font-family:'Orbitron',monospace; font-size:16px; font-weight:700; letter-spacing:2px; }
.slots-balance { font-family:'DM Mono',monospace; font-size:13px; color:rgba(232,224,208,0.4); }
.slots-balance strong { color:var(--gold); }

/* ── Reels ── */
.reels-container {
  padding: 16px 20px;
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid var(--border);
  position: relative;
}
/* Win line scanline effect */
.reels-container::after {
  content:''; position:absolute; left:20px; right:20px;
  top: calc(16px + 68px + 4px + 68px / 2 - 1.5px);
  height:3px; border-radius:2px;
  background: linear-gradient(90deg, transparent, rgba(240,192,96,0.3), transparent);
  pointer-events:none;
}
.reels-grid { display: flex; gap: 6px; }
.reel-strip { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.reel-cell {
  height: 68px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; position: relative;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  transition: background 0.15s, border-color 0.15s;
  overflow: hidden;
}
.reel-cell.spin { animation: reelBlur 0.06s linear infinite; }
@keyframes reelBlur {
  0%   { transform: translateY(0); filter: blur(0); }
  50%  { transform: translateY(-6px); filter: blur(1px); }
  100% { transform: translateY(0); filter: blur(0); }
}
.reel-cell.win-h {
  background: rgba(240,192,96,0.12) !important; border-color: rgba(240,192,96,0.5) !important;
  box-shadow: 0 0 20px rgba(240,192,96,0.3); animation: winPulse 0.5s ease infinite alternate;
}
.reel-cell.win-d {
  background: rgba(0,230,118,0.1) !important; border-color: rgba(0,230,118,0.45) !important;
  box-shadow: 0 0 20px rgba(0,230,118,0.25); animation: winPulse 0.5s ease infinite alternate;
}
.reel-cell.win-v {
  background: rgba(0,229,255,0.08) !important; border-color: rgba(0,229,255,0.4) !important;
  box-shadow: 0 0 20px rgba(0,229,255,0.2); animation: winPulse 0.5s ease infinite alternate;
}
@keyframes winPulse { from{transform:scale(1)} to{transform:scale(1.06)} }

/* ── Slots bottom controls ── */
.slots-controls {
  padding: 16px 20px;
  display: flex; align-items: center; gap: 12px;
}
.slots-info { flex: 1; min-width: 0; }
.slots-result-txt { font-size: 16px; font-weight: 700; min-height: 24px; }
.slots-result-txt.win { color: var(--gold); animation: winText 0.4s ease; }
.slots-result-txt.lose { color: rgba(232,224,208,0.25); }
@keyframes winText { from{transform:scale(0.9);opacity:0} to{transform:scale(1);opacity:1} }
.slots-paylines { font-size: 10px; color: rgba(232,224,208,0.25); letter-spacing: 1px; margin-top: 3px; }
.bet-group { display: flex; align-items: center; gap: 6px; }
.bet-minus, .bet-plus {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--glass); color: var(--gold); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.bet-minus:hover, .bet-plus:hover { background: rgba(240,192,96,0.15); border-color: rgba(240,192,96,0.3); }
.bet-display { font-family:'DM Mono',monospace; font-size: 14px; color: var(--gold); min-width: 70px; text-align: center; }
.spin-btn {
  padding: 0 32px; height: 50px; border-radius: 10px; border: none; cursor: pointer;
  font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; letter-spacing: 2px;
  background: linear-gradient(135deg, #c9a84c, #f0c060, #a07830);
  color: #080600; transition: all 0.2s; white-space: nowrap;
}
.spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(240,192,96,0.4); }
.spin-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.paytable-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; padding: 12px 20px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }
.pay-item { display: flex; justify-content: space-between; font-size: 10px; padding: 4px 8px; border-radius: 5px; background: rgba(255,255,255,0.02); }
.pay-item .pay-mult { color: var(--gold); font-family:'DM Mono',monospace; }

/* ═══════════════════════════════════════════════════
   ROULETTE
═══════════════════════════════════════════════════ */
.roulette-scene {
  min-height: calc(100vh - 64px); display: flex; align-items: center;
  justify-content: center; padding: 32px; gap: 48px; flex-wrap: wrap;
  position: relative; z-index: 1;
}
.wheel-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.wheel-ring {
  position: relative; width: 280px; height: 280px;
}
.wheel-disc {
  width: 280px; height: 280px; border-radius: 50%;
  background: conic-gradient(
    #111 0deg, #b22222 9.7deg, #111 19.4deg, #b22222 29.1deg, #111 38.8deg, #b22222 48.5deg,
    #111 58.2deg, #b22222 67.9deg, #111 77.6deg, #b22222 87.3deg, #111 97deg,  #b22222 106.7deg,
    #111 116.4deg,#b22222 126.1deg,#111 135.8deg,#b22222 145.5deg,#111 155.2deg,#b22222 164.9deg,
    #111 174.6deg,#006600 184.3deg,#111 194deg,  #b22222 203.7deg,#111 213.4deg,#b22222 223.1deg,
    #111 232.8deg,#b22222 242.5deg,#111 252.2deg,#b22222 261.9deg,#111 271.6deg,#b22222 281.3deg,
    #111 291deg,  #b22222 300.7deg,#111 310.4deg,#b22222 320.1deg,#111 329.8deg,#b22222 339.5deg,
    #111 349.2deg,#b22222 360deg
  );
  border: 5px solid #1a1200;
  box-shadow: 0 0 0 2px rgba(240,192,96,0.3), 0 0 60px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.6);
  transition: transform 4.5s cubic-bezier(0.15, 0.6, 0.1, 1.0);
  position: absolute; inset: 0;
}
.wheel-hub {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 60px; height: 60px; border-radius: 50%; z-index: 2;
  background: radial-gradient(circle, var(--gold), var(--gold3));
  border: 3px solid rgba(240,192,96,0.4);
  display: flex; align-items: center; justify-content: center;
  font-family:'Orbitron',monospace; font-size: 7px; color: #080600; font-weight: 700; letter-spacing: 0.5px;
  box-shadow: 0 0 20px rgba(240,192,96,0.4);
}
.wheel-needle {
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0; z-index: 3;
  border-left: 10px solid transparent; border-right: 10px solid transparent;
  border-top: 24px solid var(--gold);
  filter: drop-shadow(0 0 8px rgba(240,192,96,0.6));
}
.wheel-result-display {
  font-family:'Orbitron',monospace; font-size:18px; font-weight:700; min-height:28px; text-align:center;
}

.r-board {
  background: rgba(10,42,20,0.8); border: 1px solid rgba(240,192,96,0.15);
  border-radius: 12px; padding: 12px; min-width: 360px;
  backdrop-filter: blur(10px);
}
.r-zero { margin-bottom: 4px; }
.r-zero .r-cell { background: rgba(0,120,40,0.6); margin: 0 auto; width: 48px; }
.r-number-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 3px; margin-bottom: 5px; }
.r-cell {
  padding: 9px 4px; text-align: center; cursor: pointer; border-radius: 6px;
  font-size: 12px; font-weight: 700; font-family:'DM Mono',monospace;
  border: 1px solid transparent; transition: all 0.15s;
}
.r-cell.is-red  { background: rgba(178,34,34,0.5); }
.r-cell.is-black{ background: rgba(20,20,20,0.7); }
.r-cell:hover   { border-color: rgba(240,192,96,0.5); transform: scale(1.08); box-shadow:0 0 12px rgba(240,192,96,0.25); }
.r-cell.sel     { border-color: var(--gold); background: rgba(240,192,96,0.2) !important; }
.r-outside { display: grid; grid-template-columns: repeat(3,1fr); gap: 3px; margin-top: 5px; }
.r-out-btn {
  padding: 9px; text-align: center; cursor: pointer; border-radius: 6px;
  background: rgba(10,40,20,0.8); border: 1px solid rgba(240,192,96,0.1);
  font-size: 11px; font-weight: 600; transition: all 0.15s;
}
.r-out-btn:hover { border-color:rgba(240,192,96,0.4); background:rgba(240,192,96,0.08); }
.r-out-btn.sel  { border-color:var(--gold); background:rgba(240,192,96,0.15); color:var(--gold); }
.r-bet-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.r-spin-btn {
  flex: 1; padding: 11px; border-radius: 8px; border: none; cursor: pointer;
  font-family:'Orbitron',monospace; font-size:12px; font-weight:700; letter-spacing:2px;
  background: linear-gradient(135deg,#c9a84c,#f0c060,#a07830); color:#080600;
  transition: all 0.2s;
}
.r-spin-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 24px rgba(240,192,96,0.4); }
.r-spin-btn:disabled { opacity:.4; cursor:not-allowed; }

/* ═══════════════════════════════════════════════════
   BLACKJACK
═══════════════════════════════════════════════════ */
.bj-scene {
  min-height: calc(100vh - 64px); display: flex; align-items: center;
  justify-content: center; padding: 32px; position: relative; z-index: 1;
}
.bj-table {
  background: radial-gradient(ellipse at 50% 50%, var(--felt2), var(--felt) 70%, #040d06);
  border-radius: 50% 50% 12px 12px / 30% 30% 12px 12px;
  border: 10px solid #1a1000; width: 800px; min-height: 480px;
  padding: 44px 80px;
  box-shadow: 0 0 0 3px rgba(240,192,96,0.2), var(--shadow);
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}
.bj-label {
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: rgba(232,224,208,0.35);
}
.bj-cards-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.bj-score-pill {
  font-family:'Orbitron',monospace; font-size:16px; font-weight:700;
  background: rgba(0,0,0,0.5); padding: 4px 16px; border-radius: 20px;
  border: 1px solid rgba(240,192,96,0.15); color: var(--gold);
}
.bj-status {
  font-family:'Orbitron',monospace; font-size:24px; font-weight:700;
  min-height: 36px; text-align: center; letter-spacing: 1px;
}
.bj-status.win  { color: var(--green); text-shadow:0 0 20px rgba(0,230,118,0.5); }
.bj-status.lose { color: var(--red); }
.bj-status.push { color: var(--gold); }
.bj-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }

/* ═══════════════════════════════════════════════════
   POKER — PREMIUM TABLE REDESIGN
═══════════════════════════════════════════════════ */
.ptable-wrap {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, #0d1a2e 0%, #060b14 60%, #020508 100%);
  display: flex; flex-direction: column; z-index: 200; overflow: hidden;
}
/* HUD top bar */
.ptable-hud {
  position: absolute; top: 0; left: 0; right: 0; height: 56px;
  background: linear-gradient(180deg, rgba(0,0,0,0.75) 0%, transparent 100%);
  display: flex; align-items: center; padding: 0 20px; gap: 14px; z-index: 50; pointer-events: none;
}
.ptable-hud > * { pointer-events: auto; }
.ptable-phase-badge {
  font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 2.5px;
  padding: 5px 13px; border-radius: 20px; font-weight: 700; text-transform: uppercase;
}
.phase-waiting  { background:rgba(255,255,255,0.05); color:rgba(232,224,208,0.35); border:1px solid rgba(255,255,255,0.07); }
.phase-preflop  { background:rgba(0,229,255,0.1); color:var(--neon); border:1px solid rgba(0,229,255,0.22); }
.phase-flop     { background:rgba(240,192,96,0.1); color:var(--gold); border:1px solid rgba(240,192,96,0.28); }
.phase-turn     { background:rgba(124,58,237,0.15); color:#c084fc; border:1px solid rgba(124,58,237,0.32); }
.phase-river    { background:rgba(255,61,113,0.1); color:#ff8ca0; border:1px solid rgba(255,61,113,0.22); }
.phase-showdown { background:rgba(0,230,118,0.1); color:var(--green); border:1px solid rgba(0,230,118,0.28); }
.ptable-pot-pill {
  display: flex; align-items: center; gap: 7px;
  background: rgba(240,192,96,0.07); border: 1px solid rgba(240,192,96,0.18);
  padding: 5px 14px; border-radius: 20px;
  font-family: 'DM Mono', monospace; font-size: 13px; color: var(--gold);
}
.ptable-room-tag { font-family:'Orbitron',monospace; font-size:10px; color:rgba(232,224,208,0.28); letter-spacing:2.5px; }
.ptable-mytokens { font-family:'DM Mono',monospace; font-size:12px; color:rgba(232,224,208,0.5); }
.ptable-leave-btn {
  margin-left: auto; background: rgba(255,61,113,0.08); border: 1px solid rgba(255,61,113,0.22);
  color: #ff8ca0; padding: 7px 16px; border-radius: 8px; font-size: 11px;
  letter-spacing: 1px; cursor: pointer; transition: all .2s; font-weight: 600;
}
.ptable-leave-btn:hover { background: rgba(255,61,113,0.2); }

/* Arena: fills screen */
.ptable-arena { position: absolute; inset: 0; }

/* Oval felt table */
.ptable-felt {
  position: absolute; width: 58%; height: 50%; min-width: 400px; min-height: 240px;
  top: 50%; left: 50%; transform: translate(-50%, -52%);
  background: radial-gradient(ellipse at 50% 40%, #206040 0%, #0e3a22 55%, #071910 100%);
  border-radius: 50%;
  border: 16px solid #1c0f00;
  box-shadow:
    0 0 0 2px rgba(240,192,96,0.22),
    0 0 0 5px rgba(240,192,96,0.05),
    inset 0 0 100px rgba(0,0,0,0.4),
    0 40px 100px rgba(0,0,0,0.8);
  z-index: 2;
}
.ptable-felt::before {
  content: ''; position: absolute; inset: 14px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.035);
}
.ptable-felt::after {
  content: 'HATHOR CASINO'; position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%); font-family:'Orbitron',monospace;
  font-size: 10px; letter-spacing: 9px; color: rgba(240,192,96,0.045);
  white-space: nowrap; pointer-events: none;
}
/* Community cards + pot — centered on felt */
.ptable-community {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -58%);
  display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 15;
}
.ptable-comm-cards { display: flex; gap: 7px; }
.ptable-comm-pot {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,0.55); border: 1px solid rgba(240,192,96,0.18);
  padding: 5px 18px; border-radius: 20px;
  font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gold);
}
.ptable-call-info {
  font-size: 10px; color: rgba(232,224,208,0.3); letter-spacing: 1px;
}

/* Seat positions around oval */
.pseat { position: absolute; z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: transform .3s; }
.pseat-0 { bottom: 3%; left: 50%; transform: translateX(-50%); }
.pseat-1 { bottom: 16%; left: 9%; }
.pseat-2 { top: 32%; left: 2%; transform: translateY(-50%); }
.pseat-3 { top: 3%; left: 50%; transform: translateX(-50%); }
.pseat-4 { top: 32%; right: 2%; transform: translateY(-50%); }
.pseat-5 { bottom: 16%; right: 9%; }

/* Player bubble */
.pseat-bubble {
  background: rgba(6,9,20,0.92); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px; padding: 9px 14px; min-width: 108px; text-align: center;
  backdrop-filter: blur(14px); transition: border-color .25s, box-shadow .25s; position: relative;
}
.pseat-bubble.active {
  border-color: var(--gold); animation: seatPulse 1.8s ease infinite;
}
@keyframes seatPulse {
  0%,100% { box-shadow: 0 0 0 1px var(--gold), 0 0 18px rgba(240,192,96,0.28); }
  50%      { box-shadow: 0 0 0 1px var(--gold), 0 0 38px rgba(240,192,96,0.56); }
}
.pseat-bubble.is-me { border-color: rgba(0,229,255,0.32); box-shadow: 0 0 0 1px rgba(0,229,255,0.12); }
.pseat-bubble.folded { opacity: 0.25; filter: grayscale(1); }
.pseat-bubble.winner { border-color: var(--green); animation: winnerFlash 0.55s ease infinite alternate; }
/* Timer bar along bottom of active bubble */
.pseat-timer {
  position: absolute; bottom: 0; left: 0; height: 3px; border-radius: 0 0 14px 14px;
  background: var(--gold); animation: timerDrain 30s linear 1 forwards;
}
@keyframes timerDrain { from { width: 100%; } to { width: 0%; } }

.pseat-avatar {
  width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 5px;
  background: rgba(240,192,96,0.08); border: 2px solid rgba(240,192,96,0.18);
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  overflow: hidden; position: relative;
}
.pseat-avatar img { width:100%; height:100%; object-fit:cover; }
.pseat-dealer {
  position: absolute; top: -5px; right: -5px; width: 15px; height: 15px;
  border-radius: 50%; background: var(--gold); color: #030200;
  font-size: 6px; font-weight: 900; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 8px rgba(240,192,96,0.65);
}
.pseat-name { font-size: 10px; font-weight: 700; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
.pseat-chips { font-family:'DM Mono',monospace; font-size: 10px; color: var(--gold); display:flex; align-items:center; justify-content:center; gap:3px; margin-top:2px; }
.pseat-bet {
  font-size: 9px; color: rgba(240,192,96,0.55); background: rgba(240,192,96,0.06);
  border-radius: 6px; padding: 1px 7px; margin-top: 2px; display: inline-block;
}
.pseat-status {
  position: absolute; top: -9px; left: 50%; transform: translateX(-50%);
  font-size: 7px; letter-spacing: 1px; padding: 2px 7px; border-radius: 8px;
  white-space: nowrap; font-weight: 700;
}
.pseat-fold-badge { background:rgba(255,61,113,0.2); color:#ff8ca0; border:1px solid rgba(255,61,113,0.3); }
.pseat-allin-badge { background:rgba(255,140,0,0.15); color:orange; border:1px solid rgba(255,140,0,0.3); }
.pseat-hand-name { font-size: 8px; color: var(--green); margin-top: 2px; font-weight: 600; }
.pseat-hole-cards { display: flex; gap: 3px; justify-content: center; margin-top: 4px; }

/* ── Bottom area: my cards + actions ── */
.ptable-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 40;
  padding: 16px 28px 18px;
  background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 70%, transparent 100%);
  display: flex; align-items: flex-end; gap: 22px;
}
.ptable-my-cards { display: flex; gap: 8px; }
.ptable-my-cards .card { width: 66px; height: 94px; }
.ptable-my-cards .card .card-rank { font-size: 14px; }
.ptable-my-cards .card .card-suit { font-size: 24px; }
.ptable-hand-label {
  font-size: 10px; color: var(--green); font-weight: 700; letter-spacing: 1px;
  text-align: center; margin-top: 5px; text-shadow: 0 0 12px rgba(0,230,118,0.5);
}

.ptable-actions-wrap { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.ptable-waiting-txt { text-align:center; padding:10px; font-size:12px; color:rgba(232,224,208,0.25); letter-spacing:2px; }
.ptable-actions-row { display: flex; gap: 8px; justify-content: center; align-items: stretch; }

/* Raise area */
.ptable-raise-area {
  background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; padding: 10px 14px; display: flex; flex-direction: column; gap: 7px;
}
.ptable-raise-top { display: flex; align-items: center; gap: 10px; }
.ptable-raise-val {
  font-family: 'DM Mono', monospace; font-size: 18px; color: var(--gold);
  background: rgba(0,0,0,0.4); border: 1px solid rgba(240,192,96,0.25);
  border-radius: 8px; padding: 6px 12px; min-width: 100px; text-align: center; outline: none;
  transition: border-color .2s;
}
.ptable-raise-val:focus { border-color: rgba(240,192,96,0.5); }
.ptable-raise-slider {
  flex: 1; -webkit-appearance: none; height: 5px; border-radius: 5px;
  background: rgba(240,192,96,0.12); cursor: pointer; outline: none;
}
.ptable-raise-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: var(--gold); cursor: pointer; box-shadow: 0 0 8px rgba(240,192,96,0.55);
}
.ptable-presets { display: flex; gap: 5px; justify-content: center; }
.ptable-preset {
  background: rgba(240,192,96,0.07); border: 1px solid rgba(240,192,96,0.16);
  color: rgba(240,192,96,0.65); padding: 4px 10px; border-radius: 6px;
  font-size: 9px; letter-spacing: .5px; cursor: pointer; transition: all .15s; font-weight: 600;
}
.ptable-preset:hover { background: rgba(240,192,96,0.16); color: var(--gold); }

/* Action buttons */
.pact-fold  { background:rgba(255,61,113,0.1);  border:1px solid rgba(255,61,113,0.28);  color:#ff8ca0;  padding:13px 22px; border-radius:10px; font-size:12px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all .18s; }
.pact-fold:hover  { background:rgba(255,61,113,0.22); transform:translateY(-1px); }
.pact-check { background:rgba(0,230,118,0.1);   border:1px solid rgba(0,230,118,0.28);   color:var(--green); padding:13px 22px; border-radius:10px; font-size:12px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all .18s; }
.pact-check:hover { background:rgba(0,230,118,0.22); transform:translateY(-1px); }
.pact-call  { background:rgba(0,229,255,0.1);   border:1px solid rgba(0,229,255,0.28);   color:var(--neon); padding:13px 22px; border-radius:10px; font-size:12px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all .18s; }
.pact-call:hover  { background:rgba(0,229,255,0.22); transform:translateY(-1px); }
.pact-raise { background:rgba(240,192,96,0.1);  border:1px solid rgba(240,192,96,0.28);  color:var(--gold); padding:13px 22px; border-radius:10px; font-size:12px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all .18s; }
.pact-raise:hover { background:rgba(240,192,96,0.22); transform:translateY(-1px); }
.pact-allin { background:linear-gradient(135deg,rgba(255,61,113,0.18),rgba(124,58,237,0.18)); border:1px solid rgba(255,61,113,0.38); color:#ff8ca0; padding:13px 22px; border-radius:10px; font-size:12px; font-weight:700; letter-spacing:1px; cursor:pointer; transition:all .18s; }
.pact-allin:hover { background:linear-gradient(135deg,rgba(255,61,113,0.32),rgba(124,58,237,0.32)); transform:translateY(-1px); }

/* Chat toggle + overlay */
.ptable-chat-btn {
  position: absolute; right: 22px; bottom: 110px; z-index: 45;
  background: rgba(8,10,24,0.8); border: 1px solid rgba(255,255,255,0.1);
  color: rgba(232,224,208,0.55); padding: 9px 14px; border-radius: 10px;
  font-size: 11px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 5px;
}
.ptable-chat-btn:hover { border-color: rgba(240,192,96,0.25); color: var(--gold); }
.ptable-chat-overlay {
  position: absolute; right: 22px; bottom: 162px; z-index: 45;
  width: 276px; background: rgba(6,8,20,0.96); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; backdrop-filter: blur(20px);
  display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
.chat-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; max-height:300px; }
.chat-msgs { flex:1; overflow-y:auto; padding:10px 14px; display:flex; flex-direction:column; gap:5px; min-height:80px; }
.chat-msg { font-size:12px; line-height:1.4; }
.chat-author { font-weight:700; margin-right:5px; font-size:11px; }
.chat-text { color:rgba(232,224,208,0.65); }
.chat-system { font-size:10px; color:rgba(240,192,96,0.3); font-style:italic; text-align:center; }
.chat-emoji-bar { display:flex; gap:4px; padding:6px 12px; }
.emoji-quick { background:none; border:none; font-size:18px; cursor:pointer; opacity:0.45; padding:2px; transition:opacity .15s; border-radius:4px; }
.emoji-quick:hover { opacity:1; background:rgba(255,255,255,0.06); }
.chat-input-row { display:flex; gap:6px; padding:8px 12px; border-top:1px solid var(--border); }
.chat-inp {
  flex:1; padding:8px 12px; border-radius:7px;
  background:rgba(0,0,0,0.3); border:1px solid var(--border);
  color:var(--cream); font-size:12px; outline:none;
  font-family:'Space Grotesk',sans-serif; transition:border-color .2s;
}
.chat-inp:focus { border-color:rgba(240,192,96,0.3); }

/* ── Poker lobby ── */
.poker-lobby { padding: 32px 40px; max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }
.lobby-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.panel { padding: 24px; background: rgba(8,8,18,0.7); border: 1px solid var(--border); border-radius: 16px; backdrop-filter: blur(16px); }
.panel-title { font-size: 9px; letter-spacing: 3px; color: rgba(232,224,208,0.3); text-transform: uppercase; margin-bottom: 16px; }
.room-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; border-radius: 10px;
  background: rgba(0,0,0,0.25); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.2s; margin-bottom: 7px;
}
.room-row:hover { border-color: rgba(240,192,96,0.3); background: rgba(240,192,96,0.04); }
.room-row strong { color: var(--gold); font-family:'Orbitron',monospace; font-size:12px; display:block; }
.room-row span { font-size:11px; color:rgba(232,224,208,0.3); }
.empty-rooms { text-align:center; padding:24px 0; font-size:12px; color:rgba(232,224,208,0.2); letter-spacing:1px; }
.lobby-select {
  width: 100%; padding: 11px 14px; border-radius: 8px; appearance: none;
  background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  color: var(--cream); font-size: 13px; outline: none; margin-bottom: 12px; cursor: pointer;
}
.lobby-select:focus { border-color: rgba(240,192,96,0.4); }
.cb-row { display:flex; align-items:center; gap:9px; margin-bottom:14px; cursor:pointer; }
.cb-row input { accent-color:var(--gold); width:15px; height:15px; }
.cb-row span { font-size:13px; color:rgba(232,224,208,0.5); }
.join-code-inp {
  padding: 10px 14px; border-radius: 8px; flex: 1;
  background: rgba(0,0,0,0.4); border: 1px solid var(--border);
  color: var(--cream); font-family:'Orbitron',monospace; font-size:13px; letter-spacing:2px;
  outline: none; text-transform: uppercase;
}
.join-code-inp:focus { border-color: rgba(240,192,96,0.4); }

/* ── Waiting room ── */
.waiting-scene { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:40px; position:relative; z-index:1; }
.room-code-big {
  font-family:'Orbitron',monospace; font-size:36px; font-weight:900; letter-spacing:12px;
  color: var(--gold); padding: 16px 32px; border-radius: 12px;
  background: rgba(240,192,96,0.06); border: 1px solid rgba(240,192,96,0.2);
  text-shadow: 0 0 30px rgba(240,192,96,0.3);
}
.waiting-players { display:flex; flex-direction:column; gap:7px; width:320px; }
.w-player-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px; border-radius:10px;
  background: rgba(8,8,18,0.7); border: 1px solid var(--border);
}
.w-tag { font-size:9px; letter-spacing:1px; padding:2px 8px; border-radius:8px; background:rgba(240,192,96,0.1); color:var(--gold); border:1px solid rgba(240,192,96,0.2); }

/* ═══════════════════════════════════════════════════
   SPORTS BETTING
═══════════════════════════════════════════════════ */
.sports-scene { padding: 28px 36px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 1; }
.sports-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.sports-hdr h2 { font-family:'Orbitron',monospace; font-size:28px; font-weight:700; color:var(--gold); letter-spacing:2px; }
.api-row { display:flex; gap:8px; align-items:center; }
.api-inp { padding:9px 13px; background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:8px; color:var(--cream); font-size:12px; outline:none; width:220px; font-family:'DM Mono',monospace; transition:border-color .2s; }
.api-inp:focus { border-color:rgba(240,192,96,0.5); }
.sport-tabs-row { display:flex; gap:7px; margin-bottom:20px; flex-wrap:wrap; }
.s-tab { padding:7px 14px; border-radius:8px; cursor:pointer; font-size:11px; font-weight:600; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:rgba(232,224,208,0.4); transition:all .2s; }
.s-tab:hover { border-color:rgba(240,192,96,0.3); }
.s-tab.active { border-color:rgba(240,192,96,0.5); color:var(--gold); background:rgba(240,192,96,0.07); }
.sports-body { display:grid; grid-template-columns:1fr 300px; gap:20px; }
.match-list { display:flex; flex-direction:column; gap:9px; }
.match-card {
  padding: 16px 18px; border-radius: 12px;
  background: rgba(8,8,18,0.75); border: 1px solid var(--border);
  transition: all 0.2s; backdrop-filter: blur(10px);
}
.match-card:hover { border-color: rgba(240,192,96,0.2); }
.match-meta { font-size:9px; letter-spacing:2px; color:rgba(232,224,208,0.25); margin-bottom:8px; text-transform:uppercase; }
.match-teams { display:flex; align-items:center; margin-bottom:12px; }
.team { flex:1; font-size:14px; font-weight:700; }
.team.right { text-align:right; }
.vs { padding:0 12px; font-size:10px; color:rgba(232,224,208,0.2); letter-spacing:2px; }
.odds-btns { display:flex; gap:5px; }
.odd-btn {
  flex:1; padding:8px; border-radius:8px; cursor:pointer;
  background:rgba(0,0,0,0.35); border:1px solid var(--border); text-align:center;
  transition:all .18s;
}
.odd-btn:hover { border-color:rgba(240,192,96,0.35); background:rgba(240,192,96,0.06); }
.odd-btn.sel { border-color:var(--gold); background:rgba(240,192,96,0.12); }
.odd-lbl { font-size:8px; letter-spacing:1px; color:rgba(232,224,208,0.28); display:block; margin-bottom:2px; }
.odd-num { font-family:'DM Mono',monospace; font-size:14px; font-weight:700; color:var(--gold); }
.bet-slip-panel {
  padding:18px; border-radius:12px; background:rgba(8,8,18,0.85);
  border:1px solid var(--border); position:sticky; top:80px;
  max-height:calc(100vh-120px); overflow-y:auto; backdrop-filter:blur(16px);
}
.bet-slip-panel h3 { font-family:'Orbitron',monospace; font-size:16px; color:var(--gold); margin-bottom:14px; letter-spacing:1px; }
.slip-entry { position:relative; padding:9px 28px 9px 11px; border-radius:8px; background:rgba(0,0,0,0.3); border:1px solid var(--border); margin-bottom:7px; }
.slip-match { font-size:10px; color:rgba(232,224,208,0.3); margin-bottom:3px; }
.slip-pick { font-size:12px; font-weight:700; }
.slip-odd { font-family:'DM Mono',monospace; font-size:12px; color:var(--gold); }
.slip-del { position:absolute; top:8px; right:9px; background:none; border:none; color:rgba(232,224,208,0.2); cursor:pointer; font-size:15px; line-height:1; }
.slip-del:hover { color:var(--red); }
.slip-stake-row { display:flex; gap:7px; align-items:center; margin:12px 0; }
.slip-stake-inp { flex:1; padding:9px 12px; border-radius:8px; background:rgba(0,0,0,0.4); border:1px solid var(--border); color:var(--cream); font-family:'DM Mono',monospace; font-size:13px; outline:none; transition:border-color .2s; }
.slip-stake-inp:focus { border-color:rgba(240,192,96,0.4); }
.slip-summary { font-size:12px; color:rgba(232,224,208,0.4); margin-bottom:12px; line-height:1.7; }
.slip-summary strong { color:var(--gold); font-family:'DM Mono',monospace; }
.slip-empty { text-align:center; padding:24px 0; font-size:11px; color:rgba(232,224,208,0.18); letter-spacing:1px; }
.my-bets { margin-top:16px; border-top:1px solid var(--border); padding-top:14px; }
.my-bet-item { padding:9px 11px; border-radius:8px; background:rgba(0,0,0,0.25); border:1px solid var(--border); margin-bottom:6px; font-size:11px; }
.my-bet-pick { font-weight:700; color:var(--cream); }
.my-bet-info { color:rgba(232,224,208,0.3); margin-top:2px; }
.tag-won  { color:var(--green); background:rgba(0,230,118,0.12); border:1px solid rgba(0,230,118,0.25); padding:1px 7px; border-radius:6px; font-size:9px; letter-spacing:1px; margin-left:6px; }
.tag-lost { color:var(--red);   background:rgba(255,61,113,0.12); border:1px solid rgba(255,61,113,0.25); padding:1px 7px; border-radius:6px; font-size:9px; letter-spacing:1px; margin-left:6px; }
.tag-pend { color:var(--gold);  background:rgba(240,192,96,0.1);  border:1px solid rgba(240,192,96,0.2);  padding:1px 7px; border-radius:6px; font-size:9px; letter-spacing:1px; margin-left:6px; }
.no-api-box { text-align:center; padding:48px; background:rgba(8,8,18,0.7); border:1px solid var(--border); border-radius:16px; backdrop-filter:blur(16px); }
.no-api-box h3 { font-family:'Orbitron',monospace; font-size:22px; color:var(--gold); margin-bottom:12px; }
.no-api-box p { font-size:13px; color:rgba(232,224,208,0.35); line-height:1.8; }
.no-api-box a { color:var(--gold); }

/* ═══════════════════════════════════════════════════
   LEADERBOARD
═══════════════════════════════════════════════════ */
.lb-scene { padding:40px; max-width:760px; margin:0 auto; position:relative; z-index:1; }
.lb-scene h2 { font-family:'Orbitron',monospace; font-size:32px; color:var(--gold); text-align:center; margin-bottom:32px; letter-spacing:2px; }
.lb-row {
  display:flex; align-items:center; gap:14px; padding:13px 20px; margin-bottom:7px;
  background:rgba(8,8,18,0.7); border:1px solid var(--border); border-radius:12px;
  transition:all .2s; backdrop-filter:blur(10px);
}
.lb-row:hover { border-color:rgba(240,192,96,0.2); }
.lb-row.top3 { background:rgba(240,192,96,0.04); border-color:rgba(240,192,96,0.2); }
.lb-rank { font-family:'Orbitron',monospace; font-size:20px; font-weight:900; min-width:30px; text-align:center; color:rgba(232,224,208,0.15); }
.lb-rank.r1 { color:var(--gold); }
.lb-rank.r2 { color:#aaa; }
.lb-rank.r3 { color:#c87941; }
.lb-av { width:38px; height:38px; border-radius:50%; background:rgba(240,192,96,0.08); border:1px solid rgba(240,192,96,0.2); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:17px; }

.lb-name { flex:1; font-size:14px; font-weight:600; }
.lb-lv { font-size:16px; }
.lb-tokens { font-family:'DM Mono',monospace; font-size:13px; color:var(--gold); }

/* ═══════════════════════════════════════════════════
   AI CROUPIER
═══════════════════════════════════════════════════ */
.croupier-btn {
  position: fixed; bottom: 28px; right: 28px; z-index: 300;
  width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer;
  background: linear-gradient(135deg, #1a0a2e, #2d1060);
  border: 2px solid rgba(124,58,237,0.5);
  box-shadow: 0 0 30px rgba(124,58,237,0.4), 0 8px 32px rgba(0,0,0,0.6);
  font-size: 26px; transition: all 0.3s; animation: croupierPulse 3s ease infinite;
}
.croupier-btn:hover { transform: scale(1.1); box-shadow: 0 0 50px rgba(124,58,237,0.6); }
@keyframes croupierPulse { 0%,100%{box-shadow:0 0 30px rgba(124,58,237,.4),0 8px 32px rgba(0,0,0,.6)} 50%{box-shadow:0 0 50px rgba(124,58,237,.7),0 8px 32px rgba(0,0,0,.6)} }
.croupier-badge { position:absolute; top:-4px; right:-4px; width:16px; height:16px; border-radius:50%; background:var(--neon); border:2px solid var(--bg); animation:badgePop .3s ease; }
@keyframes badgePop { from{transform:scale(0)} to{transform:scale(1)} }

.croupier-panel {
  position: fixed; bottom: 100px; right: 28px; z-index: 300;
  width: 340px; border-radius: 16px;
  background: rgba(10,6,22,0.97);
  border: 1px solid rgba(124,58,237,0.35);
  box-shadow: 0 0 60px rgba(124,58,237,0.2), var(--shadow);
  backdrop-filter: blur(30px);
  animation: panelSlide .3s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; overflow: hidden;
}
@keyframes panelSlide { from{opacity:0;transform:translateY(20px) scale(.96)} to{opacity:1;transform:translateY(0) scale(1)} }
.croupier-header {
  padding: 14px 18px; border-bottom: 1px solid rgba(124,58,237,0.2);
  background: linear-gradient(135deg,rgba(124,58,237,0.15),transparent);
  display: flex; align-items: center; gap: 10px;
}
.croupier-avatar {
  width: 40px; height: 40px; border-radius: 50%; font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg,#2d1060,#1a0a2e);
  border: 2px solid rgba(124,58,237,0.4); flex-shrink: 0;
}
.croupier-name { font-weight: 700; font-size: 14px; color: var(--cream); }
.croupier-status { font-size: 10px; color: rgba(0,229,255,0.7); letter-spacing: 1px; }
.croupier-messages { flex: 1; max-height: 280px; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.croupier-msg { max-width: 85%; }
.croupier-msg.from-viktor { align-self: flex-start; }
.croupier-msg.from-player { align-self: flex-end; }
.croupier-bubble {
  padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5;
}
.from-viktor .croupier-bubble {
  background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.25); color: var(--cream);
  border-radius: 12px 12px 12px 4px;
}
.from-player .croupier-bubble {
  background: rgba(240,192,96,0.12); border: 1px solid rgba(240,192,96,0.2); color: var(--cream);
  border-radius: 12px 12px 4px 12px;
}
.croupier-typing { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
.typing-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(124,58,237,0.6); animation: typingBounce 1.2s ease infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
.croupier-input-row { display: flex; gap: 7px; padding: 10px 14px; border-top: 1px solid rgba(124,58,237,0.15); }
.croupier-inp {
  flex: 1; padding: 9px 12px; border-radius: 8px;
  background: rgba(0,0,0,0.4); border: 1px solid rgba(124,58,237,0.2);
  color: var(--cream); font-size: 12px; outline: none;
  font-family: 'Space Grotesk', sans-serif; transition: border-color .2s;
}
.croupier-inp:focus { border-color: rgba(124,58,237,0.5); }
.croupier-send { padding: 9px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; background: rgba(124,58,237,0.25); transition: all .2s; }
.croupier-send:hover { background: rgba(124,58,237,0.45); }
.quick-asks { display: flex; gap: 5px; padding: 8px 14px 0; flex-wrap: wrap; }
.quick-ask { font-size: 10px; padding: 4px 9px; border-radius: 20px; border: 1px solid rgba(124,58,237,0.2); background: rgba(124,58,237,0.08); color: rgba(232,224,208,0.5); cursor: pointer; transition: all .15s; white-space: nowrap; }
.quick-ask:hover { border-color: rgba(124,58,237,0.45); color: var(--cream); }

/* ═══════════════════════════════════════════════════
   JACKPOT TICKER
═══════════════════════════════════════════════════ */
.jackpot-ticker {
  position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
  z-index: 150; pointer-events: none;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 18px; border-radius: 0 0 12px 12px;
  background: rgba(10,6,22,0.9);
  border: 1px solid rgba(240,192,96,0.2); border-top: none;
  backdrop-filter: blur(20px);
}
.jackpot-ticker-label { font-size: 9px; letter-spacing: 2px; color: rgba(232,224,208,0.3); text-transform: uppercase; }
.jackpot-ticker-val { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; color: var(--gold); letter-spacing: 1px; transition: all .5s; }
.jackpot-ticker-val.bump { animation: jackpotBump .4s ease; color: var(--gold2); }
@keyframes jackpotBump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
.jackpot-won-banner {
  position: fixed; inset: 0; z-index: 700; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  animation: fadeIn .3s ease;
}
.jackpot-won-card {
  text-align: center; padding: 48px 64px; border-radius: 20px;
  background: rgba(10,6,22,0.98); border: 2px solid var(--gold);
  box-shadow: 0 0 100px rgba(240,192,96,0.4);
  animation: jackpotBig .6s cubic-bezier(0.4,0,0.2,1);
}
@keyframes jackpotBig { from{transform:scale(.5) rotate(-5deg);opacity:0} 70%{transform:scale(1.05) rotate(1deg)} to{transform:scale(1) rotate(0);opacity:1} }
.jackpot-won-card h2 { font-family:'Orbitron',monospace; font-size:36px; color:var(--gold); margin-bottom:8px; }
.jackpot-won-card .amount { font-family:'Orbitron',monospace; font-size:52px; font-weight:900; background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
.jackpot-won-card p { font-size:13px; color:rgba(232,224,208,.4); margin-top:8px; letter-spacing:2px; }

/* ═══════════════════════════════════════════════════
   STATS PAGE
═══════════════════════════════════════════════════ */
.stats-scene { padding: 32px 40px; max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
.stats-scene h2 { font-family:'Orbitron',monospace; font-size:28px; color:var(--gold); margin-bottom:28px; letter-spacing:2px; }
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
.stat-card {
  padding: 20px 18px; border-radius: 14px;
  background: rgba(8,8,18,0.7); border: 1px solid var(--border);
  backdrop-filter: blur(16px); text-align: center;
  transition: all .2s;
}
.stat-card:hover { border-color: rgba(240,192,96,0.25); }
.stat-card-icon { font-size: 28px; margin-bottom: 10px; }
.stat-card-val { font-family:'Orbitron',monospace; font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 5px; }
.stat-card-lbl { font-size: 10px; letter-spacing: 2px; color: rgba(232,224,208,0.3); text-transform: uppercase; }
.stats-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.stats-panel { padding: 22px; border-radius: 14px; background: rgba(8,8,18,0.7); border: 1px solid var(--border); backdrop-filter: blur(16px); }
.stats-panel h3 { font-size: 11px; letter-spacing: 3px; color: rgba(232,224,208,0.3); text-transform: uppercase; margin-bottom: 16px; }
/* Mini chart */
.mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; margin-top: 8px; }
.chart-bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 4px; transition: height .6s ease; }
.chart-bar.won { background: linear-gradient(180deg,var(--green),rgba(0,230,118,.3)); }
.chart-bar.lost { background: linear-gradient(180deg,var(--red),rgba(255,61,113,.3)); }
.game-stat-row { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.game-stat-row:last-child { border-bottom: none; }
.game-stat-name { font-size:13px; font-weight:600; }
.game-stat-nums { font-family:'DM Mono',monospace; font-size:11px; color:rgba(232,224,208,.4); text-align:right; }
.game-stat-wr { font-size:12px; font-weight:700; }
.wr-high { color:var(--green); }
.wr-mid  { color:var(--gold); }
.wr-low  { color:var(--red); }


/* ═══════════════════════════════════════════════════
   LUXURY VIP UPGRADES
═══════════════════════════════════════════════════ */

/* VIP lobby hero */

}

  /* Add bottom padding so content isn't hidden by nav */
