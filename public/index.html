/* ═══════════════════════════════════════════════════
   PREMIUM POKER — MOBILE-FIRST REDESIGN
   Circular table · floating chat · Vegas atmosphere
═══════════════════════════════════════════════════ */

/* Arena wrapper */
/* ═══════════════════════════════════════════════════
   PREMIUM POKER — ULTRA VIP REDESIGN
═══════════════════════════════════════════════════ */
.pp-arena {
  display: flex;
  flex-direction: column;
  width: 100%;
  min-height: calc(100svh - 62px);
  background:
    linear-gradient(180deg, rgba(2,3,6,0.82) 0%, rgba(2,3,6,0.70) 40%, rgba(2,3,6,0.88) 100%),
    url('/img/pp-room-bg.jpg?v=3') center center / cover no-repeat;
  position: relative;
  overflow: visible;
  user-select: none;
  -webkit-user-select: none;
}
.pp-arena::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 38%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 100%);
  pointer-events: none; z-index: 0;
}

/* ── BACK BUTTON ── */
.pp-back-btn {
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.3);
  color: #f0c060; font-size: 22px; font-weight: 300;
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; line-height: 1;
  transition: background 0.2s, transform 0.15s;
  padding: 0 0 2px 0;
}
.pp-back-btn:hover { background: rgba(201,168,76,0.22); transform: scale(1.08); }
.pp-back-btn:active { transform: scale(0.93); }

/* ── TOP BAR ── */
.pp-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  background: linear-gradient(180deg, rgba(4,4,12,0.96) 0%, rgba(2,2,8,0.92) 100%);
  border-bottom: 1px solid rgba(201,168,76,0.22);
  box-shadow: 0 1px 0 rgba(201,168,76,0.06), 0 4px 20px rgba(0,0,0,0.4);
  flex-shrink: 0;
  gap: 8px;
}
.pp-phase-pill {
  font-size: 10px; letter-spacing: 2.5px; color: rgba(201,168,76,0.6);
  text-transform: uppercase; font-family: 'Cinzel',serif;
  background: rgba(201,168,76,0.06); border: 1px solid rgba(201,168,76,0.2);
  padding: 4px 12px; border-radius: 20px; white-space: nowrap;
  box-shadow: inset 0 0 8px rgba(201,168,76,0.04);
}
.pp-pot-chip {
  display: flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, rgba(201,168,76,0.14), rgba(201,168,76,0.07));
  border: 1px solid rgba(201,168,76,0.38);
  padding: 6px 16px; border-radius: 22px;
  box-shadow: 0 0 16px rgba(201,168,76,0.16), inset 0 1px 0 rgba(255,255,255,0.05);
}
.pp-pot-label { font-size: 9px; letter-spacing: 2px; color: rgba(201,168,76,0.5); font-weight: 700; }
.pp-pot-val { font-size: 16px; font-weight: 900; color: #f0c060; font-family: 'Cinzel',serif; text-shadow: 0 0 12px rgba(240,192,96,0.4); }
.pp-hand-pill {
  font-size: 11px; font-weight: 700; color: #c9a84c;
  min-width: 80px; text-align: right; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  text-shadow: 0 0 8px rgba(201,168,76,0.3);
}

/* ── TABLE ZONE ── */
.pp-table-zone {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 380px;
  padding: 0 0 80px 0; /* bottom space for player cards below table */
}

/* ── THE OVAL TABLE ── */
.pp-table {
  width: min(420px, 74vw);
  height: min(230px, 46vw);
  border-radius: 50%;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.55) 100%),
    url('/img/pp-felt.jpg?v=3') center center / cover no-repeat;
  border: 3px solid rgba(201,168,76,0.75);
  box-shadow:
    0 0 0 1px rgba(201,168,76,0.1),
    0 0 0 7px rgba(3,3,8,0.96),
    0 0 0 9px rgba(201,168,76,0.14),
    0 0 55px rgba(201,168,76,0.25),
    0 0 110px rgba(0,0,0,0.9),
    inset 0 0 30px rgba(0,0,0,0.3),
    inset 0 3px 0 rgba(255,255,255,0.06);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 7px;
  z-index: 5;
  overflow: visible;
  transition: box-shadow 0.4s;
}
/* Felt inner ring */
.pp-felt-ring {
  position: absolute;
  inset: 10px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.05);
  pointer-events: none;
}
/* Community cards on table */
.pp-comm-row {
  display: flex;
  gap: 5px;
  align-items: center;
  flex-wrap: nowrap;
}
/* Win message */
.pp-win-msg {
  font-size: 12px; font-weight: 900; color: #ffd700;
  text-shadow: 0 0 14px rgba(255,215,0,0.7);
  text-align: center; font-family: 'Cinzel',serif;
  padding: 0 8px;
  animation: ppWinPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes ppWinPop {
  from { transform: scale(0.5); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.pp-table-idle {
  font-size: 11px; color: rgba(201,168,76,0.38); letter-spacing: 2px;
  font-family: 'Cinzel',serif; text-shadow: 0 0 10px rgba(201,168,76,0.15);
}

/* Dealer button */
.pp-dealer-btn {
  position: absolute;
  z-index: 20;
  top: calc(50% - min(23vw, 115px) + 10px);
  right: calc(50% - min(37vw, 210px) + 18px);
  width: 22px; height: 22px; border-radius: 50%;
  background: #fff; color: #000; font-size: 9px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #c9a84c;
  box-shadow: 0 0 10px rgba(201,168,76,0.55);
}

/* ── BOT SEATS ── */
.pp-seat {
  position: absolute;
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 8px 10px; border-radius: 13px;
  background: linear-gradient(160deg, rgba(8,10,24,0.93) 0%, rgba(4,5,14,0.88) 100%);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(14px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: border-color 0.3s, background 0.3s, box-shadow 0.3s, opacity 0.3s;
  min-width: 68px; z-index: 10;
}
.pp-seat-active {
  border-color: rgba(201,168,76,0.7) !important;
  background: linear-gradient(160deg, rgba(201,168,76,0.13), rgba(201,168,76,0.06)) !important;
  box-shadow: 0 0 24px rgba(201,168,76,0.32), 0 4px 20px rgba(0,0,0,0.6) !important;
}
.pp-seat-folded { opacity: 0.28; }

.pp-seat-top { display: flex; align-items: center; gap: 5px; }
.pp-seat-emoji { font-size: 18px; line-height: 1; }
.pp-seat-av {
  width: 38px; height: 38px; border-radius: 50%;
  object-fit: cover; object-position: center top;
  border: 2px solid rgba(201,168,76,0.45);
  box-shadow: 0 0 10px rgba(0,0,0,0.7), 0 0 8px rgba(201,168,76,0.2);
  flex-shrink: 0;
  display: block;
}
.pp-seat-info { display: flex; flex-direction: column; gap: 1px; }
.pp-seat-name { font-size: 10px; font-weight: 700; max-width: 68px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pp-seat-chips { font-size: 9px; color: rgba(201,168,76,0.65); }
.pp-seat-cards { display: flex; gap: 2px; }
.pp-seat-bet {
  font-size: 9px; color: #f0c060;
  background: rgba(201,168,76,0.15); padding: 1px 6px; border-radius: 8px;
}
.pp-seat-crown { position: absolute; top: -14px; font-size: 14px; }
.pp-fold-tag { font-size: 8px; color: #888; letter-spacing: 1px; }
.pp-allin-tag { font-size: 8px; color: #ff7755; letter-spacing: 1px; font-weight: 700; }

/* Pulse ring on active seat */
.pp-pulse-ring {
  position: absolute; inset: -4px; border-radius: 14px;
  border: 2px solid rgba(201,168,76,0.75);
  animation: ppPulse 1.1s ease-in-out infinite;
}
@keyframes ppPulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 10px rgba(201,168,76,0.5); }
  50%       { opacity: 0.35; box-shadow: none; }
}

/* ═══════════════════════════════════════════
   Seat positions — around the oval table
   Table: 74vw × 46vw, centered in zone
   Half-W = 37vw,  Half-H = 23vw
   Seats overlap the table edge slightly — looks like sitting at table

   Diamond Ray  (seat-1): LEFT  side  — 9 o'clock
   The Phantom  (seat-2): TOP-LEFT    — 10:30 o'clock
   Crown Vic    (seat-3): TOP-CENTER  — 12 o'clock
   Lady Noir    (seat-4): RIGHT side  — 3 o'clock
   YOU (human)           : BOTTOM     — 6 o'clock (in human-strip)
═══════════════════════════════════════════ */

/* LEFT — Diamond Ray */
.pp-seat-1 {
  top: 50%;
  left: calc(50% - min(37vw, 210px) - 56px);
  transform: translateY(-50%);
}
/* TOP-LEFT — The Phantom */
.pp-seat-2 {
  top: calc(50% - min(23vw, 115px) - 70px);
  left: calc(50% - min(30vw, 168px));
}
/* TOP-CENTER — Crown Vic */
.pp-seat-3 {
  top: calc(50% - min(23vw, 115px) - 70px);
  left: 50%;
  transform: translateX(-50%);
}
/* RIGHT — Lady Noir */
.pp-seat-4 {
  top: 50%;
  right: calc(50% - min(37vw, 210px) - 56px);
  transform: translateY(-50%);
}

/* ── PLAYER CARDS ON TABLE ── */
.pp-on-table-player {
  position: absolute;
  bottom: -68px;
  left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  z-index: 20;
  pointer-events: none;
}
.pp-on-table-label {
  font-size: 9px; font-weight: 700; color: rgba(201,168,76,0.8);
  letter-spacing: 1.5px; text-transform: uppercase;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  white-space: nowrap;
}
.pp-on-table-bet { color: #f0c060; }
.pp-on-table-cards {
  display: flex; gap: 8px;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7)) drop-shadow(0 0 8px rgba(201,168,76,0.25));
}
.pp-on-table-hand {
  font-size: 9px; color: #f0c060; font-weight: 700;
  letter-spacing: 1px; text-shadow: 0 0 8px rgba(240,192,96,0.5);
}
.pp-on-table-folded {
  font-size: 9px; color: rgba(255,100,100,0.7); letter-spacing: 2px;
}

/* ── HUMAN STRIP ── */
.pp-human-strip {
  display: flex; align-items: center;
  padding: 11px 18px; gap: 12px;
  background: linear-gradient(180deg, rgba(5,5,14,0.96) 0%, rgba(3,3,10,0.98) 100%);
  border-top: 1px solid rgba(201,168,76,0.15);
  box-shadow: 0 -2px 20px rgba(0,0,0,0.5);
  transition: border-color 0.3s, background 0.3s;
  flex-shrink: 0;
}
.pp-human-active {
  border-top-color: rgba(201,168,76,0.5) !important;
  background: linear-gradient(180deg, rgba(201,168,76,0.07), rgba(201,168,76,0.03)) !important;
}
.pp-human-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.pp-human-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.06));
  border: 1px solid rgba(201,168,76,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 21px; flex-shrink: 0;
  transition: box-shadow 0.3s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.pp-human-glow {
  box-shadow: 0 0 20px rgba(201,168,76,0.55), 0 0 40px rgba(201,168,76,0.22) !important;
  border-color: rgba(201,168,76,0.7) !important;
}
.pp-human-meta { display: flex; flex-direction: column; gap: 2px; }
.pp-human-name { font-size: 12px; font-weight: 700; color: #c9a84c; }
.pp-human-chips { font-size: 11px; color: rgba(201,168,76,0.6); }
.pp-human-bet {
  font-size: 10px; color: #f0c060; font-weight: 700;
  background: rgba(201,168,76,0.15); padding: 3px 9px; border-radius: 10px;
  border: 1px solid rgba(201,168,76,0.25); white-space: nowrap;
}
.pp-human-cards { display: flex; gap: 7px; flex-shrink: 0; }

/* ── ACTION BAR ── */
.pp-action-bar {
  display: flex; flex-direction: column; gap: 8px;
  padding: 11px 14px 16px;
  background: linear-gradient(180deg, rgba(3,3,10,0.98) 0%, rgba(2,2,7,1) 100%);
  border-top: 1px solid rgba(201,168,76,0.12);
  box-shadow: 0 -4px 30px rgba(0,0,0,0.7);
  flex-shrink: 0;
}
.pp-btn-row { display: flex; gap: 7px; }
.pp-btn {
  flex: 1; padding: 13px 6px;
  border: none; border-radius: 10px;
  font-weight: 700; font-size: 12px; letter-spacing: 0.3px;
  cursor: pointer; font-family: 'Space Grotesk',sans-serif;
  line-height: 1.2; text-align: center;
  position: relative;
  /* 3D effect */
  transform: translateY(0px);
  transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
}
.pp-btn:active {
  transform: translateY(3px) !important;
  filter: brightness(0.88);
}
.pp-btn:hover { filter: brightness(1.12); }

/* DEAL — gold 3D */
.pp-btn-deal {
  background: linear-gradient(180deg, #f0d060 0%, #c9a030 40%, #a07820 100%);
  color: #2a1800; font-size: 15px; padding: 15px;
  font-family: 'Cinzel',serif; letter-spacing: 2.5px; font-weight: 900;
  border-top: 1px solid rgba(255,240,120,0.6);
  border-bottom: 4px solid #7a5810;
  box-shadow: 0 6px 24px rgba(201,168,76,0.5), 0 2px 0 rgba(255,220,80,0.3);
  text-shadow: 0 1px 0 rgba(255,255,255,0.3);
}
.pp-btn-deal:active { border-bottom-width: 1px; }

/* FOLD — red 3D */
.pp-btn-fold {
  background: linear-gradient(180deg, #d94058 0%, #9e2035 100%);
  color: #fff;
  border-top: 1px solid rgba(255,120,140,0.4);
  border-bottom: 4px solid #5c1020;
  box-shadow: 0 4px 16px rgba(176,48,68,0.4);
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.pp-btn-fold:active { border-bottom-width: 1px; }

/* CHECK — green 3D */
.pp-btn-check {
  background: linear-gradient(180deg, #30a060 0%, #1a6a3a 100%);
  color: #fff;
  border-top: 1px solid rgba(80,220,120,0.35);
  border-bottom: 4px solid #0e3d20;
  box-shadow: 0 4px 16px rgba(39,120,74,0.4);
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.pp-btn-check:active { border-bottom-width: 1px; }

/* CALL — blue 3D */
.pp-btn-call {
  background: linear-gradient(180deg, #1e72cc 0%, #0c4490 100%);
  color: #fff;
  border-top: 1px solid rgba(80,160,255,0.35);
  border-bottom: 4px solid #062855;
  box-shadow: 0 4px 16px rgba(18,88,170,0.4);
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.pp-btn-call:active { border-bottom-width: 1px; }

/* RAISE — orange 3D */
.pp-btn-raise {
  background: linear-gradient(180deg, #d46000 0%, #8a3800 100%);
  color: #fff;
  border-top: 1px solid rgba(255,160,60,0.35);
  border-bottom: 4px solid #4e2000;
  box-shadow: 0 4px 16px rgba(184,72,0,0.4);
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.pp-btn-raise:active { border-bottom-width: 1px; }

/* ALL IN — purple 3D */
.pp-btn-allin {
  background: linear-gradient(180deg, #8030c0 0%, #4e1080 100%);
  color: #fff;
  border-top: 1px solid rgba(180,80,255,0.35);
  border-bottom: 4px solid #2c0850;
  box-shadow: 0 4px 16px rgba(106,27,154,0.45);
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

.pp-raise-row {
  display: flex; align-items: center; gap: 9px; padding: 0 2px;
}
.pp-raise-label {
  font-size: 9px; color: rgba(201,168,76,0.55); letter-spacing: 1.5px;
  font-weight: 700; flex-shrink: 0; min-width: 38px; text-transform: uppercase;
}
.pp-slider {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 5px; border-radius: 3px;
  background: linear-gradient(to right, rgba(201,168,76,0.55), rgba(201,168,76,0.12));
  outline: none; cursor: pointer;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
}
.pp-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
  background: linear-gradient(135deg, #ffe080, #c9a84c);
  cursor: pointer; box-shadow: 0 0 12px rgba(201,168,76,0.7), 0 2px 6px rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.2);
}
.pp-slider::-moz-range-thumb {
  width: 22px; height: 22px; border-radius: 50%;
  background: linear-gradient(135deg, #ffe080, #c9a84c);
  cursor: pointer; border: 2px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 10px rgba(201,168,76,0.65);
}
.pp-raise-val {
  font-size: 13px; color: #f0c060; font-weight: 700;
  min-width: 54px; text-align: right;
  text-shadow: 0 0 8px rgba(240,192,96,0.4);
}

/* ── QUICK RAISE PRESETS ── */
.pp-preset-row {
  display: flex; align-items: center; gap: 5px; padding: 0 2px;
}
.pp-preset-btn {
  padding: 5px 10px; border: 1px solid rgba(201,168,76,0.3);
  border-radius: 7px; background: rgba(201,168,76,0.07);
  color: #d4a840; font-size: 10px; font-weight: 700; cursor: pointer;
  font-family: 'Space Grotesk',sans-serif; letter-spacing: 0.5px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  white-space: nowrap;
}
.pp-preset-btn:hover, .pp-preset-btn:active {
  background: rgba(201,168,76,0.2); border-color: rgba(201,168,76,0.6);
  color: #f0c060;
}

.pp-waiting-txt {
  display: flex; align-items: center; justify-content: center;
  color: rgba(201,168,76,0.35); font-size: 12px; letter-spacing: 1px;
  padding: 10px; gap: 0;
}
.pp-waiting-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: rgba(201,168,76,0.5); margin: 0 3px;
  animation: ppDotBounce 1.2s ease-in-out infinite;
}
@keyframes ppDotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
  40%            { transform: scale(1);   opacity: 1;   }
}

/* ── CHAT FAB (floating action button) ── */
.pp-chat-fab {
  position: fixed; bottom: 88px; right: 16px;
  width: 50px; height: 50px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(201,168,76,0.35), rgba(201,168,76,0.12));
  border: 1px solid rgba(201,168,76,0.45);
  color: #fff; font-size: 20px; font-family: 'Space Grotesk',sans-serif;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 200;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 16px rgba(201,168,76,0.15);
  transition: transform 0.2s, background 0.2s;
}
.pp-chat-fab:hover, .pp-chat-fab:active { transform: scale(1.08); }
.pp-chat-fab-open {
  background: rgba(201,168,76,0.3) !important;
  font-size: 16px; font-weight: 700; color: rgba(232,224,208,0.8);
}
.pp-chat-badge {
  position: absolute; top: -3px; right: -3px;
  background: #e53935; color: #fff; font-size: 10px; font-weight: 700;
  min-width: 18px; height: 18px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 3px; border: 1px solid rgba(0,0,0,0.3);
}

/* ── CHAT PANEL ── */
.pp-chat-panel {
  position: fixed;
  bottom: 148px; right: 16px;
  width: 290px; max-height: 370px;
  background: rgba(6,7,16,0.97);
  border: 1px solid rgba(201,168,76,0.22);
  border-radius: 16px;
  display: flex; flex-direction: column; overflow: hidden;
  z-index: 199;
  box-shadow: 0 12px 50px rgba(0,0,0,0.75), 0 0 0 1px rgba(201,168,76,0.08);
  animation: ppChatSlideIn 0.28s cubic-bezier(0.22,1,0.36,1) both;
  backdrop-filter: blur(24px);
}
@keyframes ppChatSlideIn {
  from { opacity: 0; transform: translateY(18px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0)   scale(1);    }
}
.pp-chat-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(201,168,76,0.12);
  color: #c9a84c; font-size: 12px; font-weight: 700;
  letter-spacing: 1px; font-family: 'Cinzel',serif; flex-shrink: 0;
}
.pp-chat-close {
  background: none; border: none;
  color: rgba(232,224,208,0.4); cursor: pointer; font-size: 15px;
  padding: 0 4px; transition: color 0.2s; line-height: 1;
}
.pp-chat-close:hover { color: rgba(232,224,208,0.9); }
.pp-chat-msgs {
  flex: 1; overflow-y: auto; padding: 8px 12px;
  display: flex; flex-direction: column; gap: 5px;
  scrollbar-width: thin; scrollbar-color: rgba(201,168,76,0.2) transparent;
}
.pp-chat-msg {
  font-size: 11px; line-height: 1.45;
  animation: ppMsgIn 0.3s ease both;
}
@keyframes ppMsgIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0);   }
}
.pp-chat-author { font-weight: 700; margin-right: 4px; }
.pp-chat-text { color: rgba(232,220,200,0.7); }
.pp-chat-sys .pp-chat-author { color: rgba(201,168,76,0.55) !important; }
.pp-chat-sys .pp-chat-text { color: rgba(201,168,76,0.45); font-style: italic; }
.pp-chat-emojis {
  display: flex; gap: 3px; padding: 5px 10px;
  border-top: 1px solid rgba(255,255,255,0.04); flex-shrink: 0;
}
.pp-emoji-btn {
  background: none; border: none; font-size: 18px; cursor: pointer;
  opacity: 0.45; transition: opacity 0.15s; padding: 2px; border-radius: 4px;
}
.pp-emoji-btn:hover { opacity: 1; background: rgba(255,255,255,0.06); }
.pp-chat-inp-row {
  display: flex; gap: 6px; padding: 8px 10px;
  border-top: 1px solid rgba(201,168,76,0.1); flex-shrink: 0;
}
.pp-chat-inp {
  flex: 1; background: rgba(0,0,0,0.35);
  border: 1px solid rgba(201,168,76,0.2); border-radius: 7px;
  color: #e8dcc8; padding: 7px 10px; font-size: 11px; outline: none;
  font-family: 'Space Grotesk',sans-serif; transition: border-color 0.2s;
}
.pp-chat-inp:focus { border-color: rgba(201,168,76,0.45); }
.pp-chat-send {
  background: rgba(201,168,76,0.18); border: 1px solid rgba(201,168,76,0.3);
  border-radius: 7px; color: #f0c060; padding: 7px 11px;
  cursor: pointer; font-size: 11px; font-weight: 700; transition: background 0.15s;
  font-family: 'Space Grotesk',sans-serif;
}
.pp-chat-send:hover { background: rgba(201,168,76,0.32); }

/* ── MOBILE OVERRIDES (≤ 600px) ── */
@media (max-width: 600px) {
  .pp-table-zone { min-height: 340px; padding: 0 0 72px 0; }
  .pp-on-table-player { bottom: -62px; }
  .pp-on-table-cards { gap: 6px; }
  .pp-table { width: 72vw !important; height: 46vw !important; }
  .pp-seat { min-width: 62px; padding: 5px 7px; border-radius: 10px; }
  /* LEFT — Diamond Ray */
  .pp-seat-1 { top: 50%; left: calc(50% - 36vw - 50px); transform: translateY(-50%); }
  /* TOP-LEFT — The Phantom */
  .pp-seat-2 { top: calc(50% - 23vw - 64px); left: calc(50% - 28vw); }
  /* TOP-CENTER — Crown Vic */
  .pp-seat-3 { top: calc(50% - 23vw - 64px); left: 50%; transform: translateX(-50%); }
  /* RIGHT — Lady Noir */
  .pp-seat-4 { top: 50%; right: calc(50% - 36vw - 50px); transform: translateY(-50%); }
  .pp-seat-emoji { font-size: 14px; }
  .pp-seat-av { width: 28px; height: 28px; }
  .pp-seat-name { font-size: 9px; max-width: 54px; }
  .pp-seat-chips { font-size: 8px; }
  .pp-btn { font-size: 11px; padding: 11px 4px; }
  .pp-btn-deal { font-size: 14px; padding: 13px; }
  .pp-human-strip { padding: 8px 12px; gap: 8px; }
  .pp-human-avatar { width: 36px; height: 36px; font-size: 18px; }
  .pp-action-bar { padding: 8px 10px 12px; gap: 6px; }
  .pp-preset-btn { font-size: 9px; padding: 4px 7px; }
  .pp-preset-row { gap: 4px; }
  .pp-chat-fab { bottom: 76px; right: 12px; width: 44px; height: 44px; font-size: 18px; }
  .pp-chat-panel { width: calc(100vw - 24px); right: 12px; bottom: 130px; }
  .pp-pot-val { font-size: 13px; }
  .pp-comm-row { gap: 3px; }
  .pp-dealer-btn { top: calc(50% - 23vw - 10px); right: calc(50% - 36vw - 10px); }
}

/* ── VERY SMALL (≤ 380px) ── */
@media (max-width: 380px) {
  .pp-table { width: 70vw !important; height: 46vw !important; }
  .pp-table-zone { min-height: 300px; }
  .pp-seat { min-width: 56px; padding: 4px 5px; }
  .pp-seat-1 { left: calc(50% - 35vw - 48px); }
  .pp-seat-4 { right: calc(50% - 35vw - 48px); }
  .pp-seat-name { max-width: 44px; font-size: 8px; }
  .pp-btn-row { gap: 4px; }
  .pp-btn { font-size: 10px; padding: 10px 2px; }
}

/* ════════════════════════════════════════════
   GLOBAL MOBILE IMPROVEMENTS
════════════════════════════════════════════ */

/* Reduce main-content padding on mobile so games fill screen */
@media (max-width: 600px) {
  .main-content { padding: 0 !important; }
  .gcard-pro { border-radius: 10px !important; }
  .promo-row { grid-template-columns:1fr; gap:10px; }
  .winners-ticker { display:none; }
}
@media (max-width: 900px) and (min-width: 601px) {
  .promo-row { grid-template-columns:repeat(2,1fr); }
}
@media (max-width: 900px) {
  /* Slots full-width */
  .slots-scene, .slots-cabinet { max-width: 100% !important; }
  /* Roulette */
  .roulette-scene { padding: 10px !important; }
  /* Blackjack */
  .bj-scene { padding: 10px !important; }
  /* Leaderboard */
  .lb-scene { padding: 12px !important; }
  /* Stats */
  .stats-scene { padding: 12px !important; }
}

/* Lobby game grid — 2 cols on small phones */
@media (max-width: 480px) {
  .games-pro { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
  .gcard-pro { min-height: 100px !important; }
  .gc-title { font-size: 11px !important; }
  .gc-desc { display: none !important; }
  .hero-banner { padding: 0 !important; min-height: unset !important; }
  .hero-mascot { display: none !important; }
  .hero-left { padding: 16px 14px 18px !important; }
  .hero-greeting { font-size: 14px !important; }
  .hero-tagline { font-size: 11px !important; }
  .hero-stats { gap: 8px !important; }
  .hero-stat-val { font-size: 18px !important; }
  .hero-stat-lbl { font-size: 8px !important; }
}

/* ── VIP Card ── */
.vip-card { transition: box-shadow 0.3s ease; }
.vip-card:hover { box-shadow: 0 8px 40px rgba(201,168,76,0.15) !important; }

/* ═══════════════════════════════════════════════════
   GOLDEN ROBOT HERO
═══════════════════════════════════════════════════ */
.robot-stage {
  position: relative;
  width: 180px;
  height: 280px;
  flex-shrink: 0;
  perspective: 600px;
}
.robot-coins-canvas {
  position: absolute;
  inset: -70px;
  width: calc(100% + 140px);
  height: calc(100% + 140px);
  pointer-events: none;
  z-index: 1;
}
.robot-spin-wrap {
  position: relative;
  z-index: 2;
  transform-style: preserve-3d;
  animation: robotSpinFloat 10s linear infinite;
  transform-origin: center 85%;
}
.gold-robot {
  width: 180px;
  height: 280px;
  filter: drop-shadow(0 0 18px rgba(255,215,0,0.45)) drop-shadow(0 0 40px rgba(255,180,0,0.2));
  animation: robotGlow 4s ease-in-out infinite;
}
.robot-base-reflection {
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 110px;
  height: 18px;
  background: radial-gradient(ellipse, rgba(255,215,0,0.35) 0%, transparent 75%);
  border-radius: 50%;
  animation: reflGlow 4s ease-in-out infinite;
}
@keyframes robotSpinFloat {
  0%   { transform: rotateY(0deg)   translateY(0px);  }
  12%  { transform: rotateY(43deg)  translateY(-5px);  }
  25%  { transform: rotateY(90deg)  translateY(-9px);  }
  37%  { transform: rotateY(133deg) translateY(-5px);  }
  50%  { transform: rotateY(180deg) translateY(0px);   }
  62%  { transform: rotateY(223deg) translateY(-5px);  }
  75%  { transform: rotateY(270deg) translateY(-9px);  }
  87%  { transform: rotateY(313deg) translateY(-5px);  }
  100% { transform: rotateY(360deg) translateY(0px);   }
}
@keyframes robotGlow {
  0%,100% { filter: drop-shadow(0 0 18px rgba(255,215,0,.45)) drop-shadow(0 0 40px rgba(255,180,0,.2)); }
  33%     { filter: drop-shadow(0 0 22px rgba(0,212,255,.55)) drop-shadow(0 0 50px rgba(0,180,255,.25)); }
  66%     { filter: drop-shadow(0 0 22px rgba(180,0,255,.55)) drop-shadow(0 0 50px rgba(150,0,255,.25)); }
}
@keyframes reflGlow {
  0%,100% { opacity:.8; transform: translateX(-50%) scaleX(1); }
  50%     { opacity:.4; transform: translateX(-50%) scaleX(.7); }
}
@media (max-width: 600px) {
  .robot-stage { width: 130px; height: 200px; }
  .gold-robot  { width: 130px; height: 200px; }
}

/* ═══════════════════════════════════════════════════
   FEATURE 2: ANIMATED GAME CARD OVERLAYS
═══════════════════════════════════════════════════ */
.game-card-overlay {
  position: absolute; inset: 0; background: rgba(201,168,76,0.08);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s; border-radius: 16px;
}
.game-card:hover .game-card-overlay { opacity: 1; }
.game-card-play-btn-overlay {
  padding: 10px 24px; background: linear-gradient(135deg,#c9a84c,#ffd680);
  color: #0a0806; border: none; border-radius: 100px; font-weight: 700;
  font-size: 13px; cursor: pointer; letter-spacing: 1px;
}
.game-card-badge {
  position: absolute; top: 10px; right: 10px;
  padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 700;
  letter-spacing: 1px; pointer-events: none; z-index: 2;
}
.game-card-badge.hot { background: rgba(255,80,80,0.9); color: white; }
.game-card-badge.new { background: rgba(0,229,130,0.9); color: #0a1a12; }
.game-card-badge.live { background: rgba(255,61,113,0.9); color: white; }

/* ═══════════════════════════════════════════════════
   FEATURE 3: FEATURED CAROUSEL
═══════════════════════════════════════════════════ */
.featured-section { margin-bottom: 28px; }
.featured-section-title {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 4px;
  color: rgba(201,168,76,0.45); text-transform: uppercase; margin-bottom: 12px;
}
.featured-carousel {
  display: flex; gap: 16px; overflow-x: auto; padding: 4px 0 16px;
  scrollbar-width: none; scroll-snap-type: x mandatory;
}
.featured-carousel::-webkit-scrollbar { display: none; }
.featured-card {
  flex-shrink: 0; width: 280px; height: 160px; border-radius: 16px;
  position: relative; overflow: hidden; cursor: pointer;
  scroll-snap-align: start; transition: transform 0.2s, box-shadow 0.2s;
  border: 1px solid rgba(201,168,76,0.15);
}
.featured-card:hover {
  transform: scale(1.02);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 30px rgba(201,168,76,0.15);
  border-color: rgba(201,168,76,0.35);
}
.featured-card-bg {
  position: absolute; inset: 0;
  transition: transform 0.3s;
}
.featured-card:hover .featured-card-bg { transform: scale(1.04); }
.featured-card-content {
  position: absolute; inset: 0; padding: 20px;
  display: flex; flex-direction: column; justify-content: flex-end;
  background: linear-gradient(transparent 20%, rgba(0,0,0,0.75) 100%);
}
.featured-card-icon { font-size: 36px; margin-bottom: 6px; width:52px; height:52px; display:flex; align-items:center; justify-content:center; }
.featured-card-icon img { width:52px; height:52px; object-fit:cover; border-radius:12px; border:1px solid rgba(201,168,76,0.25); box-shadow:0 4px 16px rgba(0,0,0,0.5); }
.featured-card-title {
  font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 700;
  color: #ffd680; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}
.featured-card-sub {
  font-size: 11px; color: rgba(232,220,200,0.6); margin-top: 3px; letter-spacing: 0.5px;
}
.featured-card-play {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  padding: 10px 22px; background: linear-gradient(135deg,#c9a84c,#ffd680);
  color: #0a0806; border: none; border-radius: 100px; font-weight: 700;
  font-size: 12px; cursor: pointer; letter-spacing: 1px; white-space: nowrap;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.featured-card:hover .featured-card-play { opacity: 1; pointer-events: auto; }

/* ═══════════════════════════════════════════════════
   FEATURE 4: SKELETON LOADING
═══════════════════════════════════════════════════ */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.skeleton {
  background: linear-gradient(90deg, rgba(201,168,76,0.04) 25%, rgba(201,168,76,0.1) 50%, rgba(201,168,76,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}
.skeleton-card { height: 120px; border-radius: 16px; }
.skeleton-text { height: 14px; margin-bottom: 8px; }
.skeleton-text.short { width: 60%; }

/* ═══════════════════════════════════════════════════
   FEATURE 5: PROFILE MODAL TABS
═══════════════════════════════════════════════════ */
.modal-tabs {
  display: flex; border-bottom: 1px solid rgba(201,168,76,0.1);
  margin-bottom: 20px; gap: 0; overflow-x: auto;
  scrollbar-width: none;
}
.modal-tabs::-webkit-scrollbar { display: none; }
.modal-tab {
  padding: 10px 14px; background: none; border: none;
  color: rgba(232,226,212,0.4); cursor: pointer; font-size: 12px;
  transition: color 0.2s; border-bottom: 2px solid transparent;
  margin-bottom: -1px; white-space: nowrap; font-family: 'Space Grotesk', sans-serif;
  font-weight: 600; letter-spacing: 0.3px;
}
.modal-tab.active { color: #c9a84c; border-bottom-color: #c9a84c; }
.modal-tab:hover:not(.active) { color: rgba(232,226,212,0.7); }
.profile-avatar-big {
  width: 80px; height: 80px; border-radius: 50%; border: 3px solid rgba(201,168,76,0.3);
  display: flex; align-items: center; justify-content: center; font-size: 36px;
  background: rgba(201,168,76,0.06); margin: 0 auto 12px; overflow: hidden;
}
.profile-avatar-big img { width: 100%; height: 100%; object-fit: cover; }
.avatar-picker-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 12px 0;
}
.avatar-emoji-btn {
  width: 100%; aspect-ratio: 1; border-radius: 12px; border: 1.5px solid rgba(201,168,76,0.12);
  background: rgba(201,168,76,0.04); font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.avatar-emoji-btn:hover { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.1); transform: scale(1.08); }
.avatar-emoji-btn.selected { border-color: #c9a84c; background: rgba(201,168,76,0.18); }
.stat-mini-card {
  background: rgba(201,168,76,0.05); border: 1px solid rgba(201,168,76,0.12);
  border-radius: 12px; padding: 12px; text-align: center;
}
.stat-mini-card-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700; color: var(--gold2); }
.stat-mini-card-lbl { font-size: 10px; color: rgba(232,226,212,0.4); margin-top: 3px; letter-spacing: 1px; }
.history-row {
  display: flex; align-items: center; gap: 10px; padding: 9px 0;
  border-bottom: 1px solid rgba(201,168,76,0.06);
}
.history-row:last-child { border-bottom: none; }
.history-game-icon { font-size: 20px; flex-shrink: 0; }
.history-result { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700; }
.history-result.win { color: #4caf7c; }
.history-result.loss { color: #c0394c; }

/* ═══════════════════════════════════════════════════
   FEATURE 6: PAGE TRANSITION ANIMATION
═══════════════════════════════════════════════════ */
@keyframes pageIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.page-enter {
  animation: pageIn 0.25s ease forwards;
}

/* ═══════════════════════════════════════════════════
   FEATURE 1: STATS CHARTS
═══════════════════════════════════════════════════ */
.stats-charts-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;
}
.stats-chart-panel {
  background: rgba(8,8,18,0.7); border: 1px solid rgba(201,168,76,0.1);
  border-radius: 16px; padding: 20px;
}
.stats-chart-title {
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 3px;
  color: rgba(201,168,76,0.5); text-transform: uppercase; margin-bottom: 16px;
}
.stats-chart-full {
  background: rgba(8,8,18,0.7); border: 1px solid rgba(201,168,76,0.1);
  border-radius: 16px; padding: 20px; margin-bottom: 20px;
}
.recent-games-list { display: flex; flex-direction: column; gap: 8px; }
.recent-game-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  background: rgba(201,168,76,0.03); border: 1px solid rgba(201,168,76,0.07);
  border-radius: 10px; font-size: 13px;
}
.recent-game-win { color: #4caf7c; font-family: 'DM Mono', monospace; font-weight: 700; margin-left: auto; }
.recent-game-loss { color: #c0394c; font-family: 'DM Mono', monospace; font-weight: 700; margin-left: auto; }
@media (max-width: 700px) {
  .stats-charts-grid { grid-template-columns: 1fr; }
  .featured-card { width: 240px; height: 140px; }
}

/* ═══════════════════════════════════════════════════
   PREMIUM OVERHAUL — DEEP SPACE CASINO
   Stake.com / BC.Game / Rollbit aesthetic
═══════════════════════════════════════════════════ */

/* 1. NEW COLOR SYSTEM */
:root {
  --bg-base:    #080b14;
  --bg-card:    #0d1117;
  --bg-panel:   #111827;
  --bg-glass:   rgba(255,255,255,0.03);
  --border:     rgba(255,255,255,0.07);
  --border-glow:rgba(245,158,11,0.25);
  --gold:       #f59e0b;
  --gold2:      #fbbf24;
  --gold-dim:   rgba(245,158,11,0.15);
  --purple:     #f59e0b;
  --purple-dim: rgba(245,158,11,0.08);
  --text-primary:   #f1f5f9;
  --text-secondary: rgba(241,245,249,0.5);
  --text-muted:     rgba(241,245,249,0.25);
  --green:  #10b981;
  --red:    #ef4444;
  --live-red: #ff3d71;
}

/* 2. GLOBAL BASE */
body {
  background: var(--bg-base) !important;
  color: var(--text-primary) !important;
  font-family: 'Inter', 'SF Pro Display', -apple-system, 'Space Grotesk', sans-serif !important;
}

.app-shell {
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(245,158,11,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(245,158,11,0.03) 0%, transparent 50%),
    var(--bg-base) !important;
  min-height: 100vh !important;
}

/* Override mesh-bg to be invisible — new bg takes over */
.mesh-bg {
  background: none !important;
}
.mesh-bg::after { display: none !important; }

/* 3. TOPBAR */
.topbar {
  background:
    linear-gradient(180deg, rgba(4,3,8,.52) 0%, rgba(5,4,10,.60) 100%),
    url('/img/topbar-bg.jpg') center/cover no-repeat !important;
  backdrop-filter: blur(4px) !important;
  -webkit-backdrop-filter: blur(4px) !important;
  border-bottom: 1px solid rgba(201,168,76,.28) !important;
  box-shadow: 0 1px 0 rgba(201,168,76,.18), 0 8px 32px rgba(0,0,0,.6) !important;
  height: 64px !important;
}

.topbar-logo {
  font-family: 'Cinzel', serif !important;
  background: linear-gradient(135deg, #f59e0b, #fbbf24, #d97706) !important;
  -webkit-background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  background-clip: text !important;
  font-size: 16px !important;
  letter-spacing: 3px !important;
  flex-direction: row !important;
  align-items: center !important;
}
.topbar-logo span {
  -webkit-text-fill-color: rgba(245,158,11,0.4) !important;
  color: rgba(245,158,11,0.4) !important;
  font-size: 7px !important;
  letter-spacing: 4px !important;
}

.tb-balance {
  background: rgba(245,158,11,0.08) !important;
  border: 1px solid rgba(245,158,11,0.2) !important;
  border-radius: 10px !important;
  padding: 6px 14px !important;
}
.tb-bal-label { color: rgba(245,158,11,0.4) !important; }
.tb-bal-amount {
  color: #fbbf24 !important;
  font-weight: 700 !important;
  font-size: 15px !important;
}

.tb-cashier {
  background-image: url('/img/btn-primary.png') !important;
  background-size: cover !important;
  background-position: center !important;
  border: none !important;
  border-top: 1px solid rgba(255,245,150,0.5) !important;
  border-bottom: 1px solid rgba(80,40,0,0.8) !important;
  border-radius: 10px !important;
  color: #1a0800 !important;
  font-weight: 900 !important;
  padding: 8px 18px !important;
  box-shadow: 0 5px 0 #5a3a08, 0 7px 16px rgba(0,0,0,0.6), 0 0 20px rgba(201,168,76,0.2) !important;
}
.tb-cashier:hover {
  filter: brightness(1.08) saturate(1.1) !important;
  transform: translateY(-2px) !important;
  box-shadow: 0 7px 0 #5a3a08, 0 12px 24px rgba(201,168,76,0.5), 0 0 32px rgba(240,192,96,0.3) !important;
}

.ham-btn {
  background: rgba(255,255,255,0.04) !important;
  border-color: rgba(255,255,255,0.08) !important;
}
.ham-btn:hover { background: rgba(255,255,255,0.08) !important; border-color: rgba(245,158,11,0.4) !important; }
.ham-btn span { background: rgba(241,245,249,0.5) !important; }
.ham-btn.open span:nth-child(1), .ham-btn.open span:nth-child(3) { background: #fbbf24 !important; }

/* 4. SIDEBAR */
.sidebar {
  background: var(--bg-panel) !important;
  border-right: 1px solid var(--border) !important;
}
.sidebar::after { display: none !important; }

.sb-section-label {
  color: var(--text-muted) !important;
  letter-spacing: 2px !important;
}

.sb-item {
  border-radius: 10px !important;
  margin: 2px 8px !important;
  border-left: none !important;
  color: var(--text-secondary) !important;
  transition: background 0.15s, color 0.15s !important;
}
.sb-item:hover {
  background: rgba(255,255,255,0.05) !important;
  color: var(--text-primary) !important;
  border-left: none !important;
}
.sb-item.active {
  background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.06)) !important;
  color: #fbbf24 !important;
  border-left: none !important;
  border: 1px solid rgba(245,158,11,0.2) !important;
}
.sb-item-icon { filter: none !important; opacity: 0.7; }
.sb-item:hover .sb-item-icon, .sb-item.active .sb-item-icon { opacity: 1 !important; }

.sb-divider { border-color: var(--border) !important; }

/* 5. GAME CARDS — PREMIUM REDESIGN */
.games-pro {
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)) !important;
  gap: 16px !important;
}
@media(max-width:900px) {
  .games-pro { grid-template-columns: repeat(4, 1fr) !important; gap: 10px !important; }
}
@media(max-width:600px) {
  .games-pro { grid-template-columns: repeat(3, 1fr) !important; gap: 8px !important; }
}
@media(max-width:400px) {
  .games-pro { grid-template-columns: repeat(2, 1fr) !important; gap: 6px !important; }
}

.gcard-pro {
  position: relative !important;
  border-radius: 16px !important;
  overflow: hidden !important;
  cursor: pointer !important;
  aspect-ratio: 3/4 !important;
  background: var(--bg-card) !important;
  border: 1px solid var(--border) !important;
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s !important;
  padding: 0 !important;
  min-height: unset !important;
  text-decoration: none !important;
  display: block !important;
}
.gcard-pro::before { display: none !important; }
.gcard-pro:hover {
  transform: translateY(-6px) scale(1.02) !important;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(245,158,11,0.3) !important;
}

/* Re-skin the thumb to act as full-bleed background */
.gcard-thumb {
  position: absolute !important;
  inset: 0 !important;
  height: 100% !important;
  min-height: unset !important;
  flex: unset !important;
  border-radius: 0 !important;
  overflow: hidden !important;
}
/* Remove old bottom gradient from thumb — gcard-info-row has its own gradient */
.gcard-thumb::after { display: none !important; }
.gcard-thumb-inner {
  width: 100% !important;
  height: 100% !important;
  border-radius: 0 !important;
  position: relative !important;
  overflow: hidden !important;
}
.gcard-thumb-inner svg {
  width: 100% !important;
  height: 100% !important;
  position: absolute !important;
  top: 0 !important;
  left: 0 !important;
  object-fit: cover !important;
}
.gcard-pro:hover .gcard-thumb-inner { transform: scale(1.1) !important; }

/* Hide old play btn text — the game-card-overlay handles it */
.gcard-play-btn {
  display: none !important;
}

.gcard-info-row {
  position: absolute !important;
  bottom: 0 !important; left: 0 !important; right: 0 !important;
  padding: 32px 14px 14px !important;
  background: linear-gradient(transparent, rgba(0,0,0,0.9)) !important;
  z-index: 3 !important;
}
.gcard-pro:hover .gcard-info-row { background: linear-gradient(transparent, rgba(0,0,0,0.95)) !important; }

.gcard-name-pro {
  font-size: 13px !important; font-weight: 700 !important;
  color: #fff !important; letter-spacing: 0.3px !important;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5) !important;
}
.gcard-desc-pro {
  font-size: 11px !important;
  color: rgba(255,255,255,0.4) !important;
  margin-top: 2px !important;
}

.gcard-badge-pro {
  position: absolute !important; top: 10px !important; left: 10px !important; z-index: 4 !important;
  padding: 3px 9px !important; border-radius: 20px !important;
  font-size: 10px !important; font-weight: 800 !important; letter-spacing: 1.5px !important;

}
.gcard-hover-overlay {
  position: absolute; inset: 0; z-index: 4;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.2s;
  background: rgba(0,0,0,0.25);
}
.gcard:hover .gcard-hover-overlay { opacity: 1; }
.gcard-play {
  padding: 10px 24px;
  background: linear-gradient(135deg, #d97706, #f59e0b);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,220,120,0.3);
  color: #0a0600; border-radius: 100px;
  font-size: 12px; font-weight: 700;
  letter-spacing: 2px; cursor: pointer;
  transform: translateY(6px);
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 8px 24px rgba(245,158,11,0.4);
}
.gcard:hover .gcard-play { transform: translateY(0); }

/* Game grid */
.games-grid-v3 {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 12px;
}
@media(max-width: 768px) {
  .games-grid-v3 { grid-template-columns: repeat(3,1fr); gap: 8px; }
}
@media(max-width: 480px) {
  .games-grid-v3 { grid-template-columns: repeat(2,1fr); gap: 8px; }
}

/* ═══ AURORA HERO ═══ */
.aurora-hero {
  position: relative; border-radius: 20px; overflow: hidden;
  min-height: 280px; margin-bottom: 32px; display: flex; align-items: center;
  border: 1px solid rgba(255,255,255,0.06);
}
.aurora-hero canvas {
  position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none;
}
.aurora-hero-overlay {
  position: absolute; inset: 0; background: rgba(5,7,15,0.55);
}
.aurora-hero-content {
  position: relative; z-index: 1; padding: 48px; width: 100%;
}

/* ═══ GAME SEARCH ═══ */
.game-search-wrap {
  position: relative; margin-bottom: 16px;
}
.game-search-input {
  width: 100%; padding: 10px 16px 10px 38px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; color: rgba(232,226,212,0.9);
  font-size: 13px; font-family: 'Space Grotesk',sans-serif;
  outline: none; box-sizing: border-box;
  transition: border-color 0.2s, background 0.2s;
}
.game-search-input:focus {
  border-color: rgba(245,158,11,0.4);
  background: rgba(245,158,11,0.04);
}
.game-search-input::placeholder { color: rgba(232,226,212,0.3); }
.game-search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  font-size: 14px; opacity: 0.4; pointer-events: none;
}
.game-search-clear {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.08); border: none;
  border-radius: 50%; width: 20px; height: 20px;
  color: rgba(232,226,212,0.5); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.game-search-clear:hover { background: rgba(255,255,255,0.15); }

/* ═══ ONBOARDING TOUR ═══ */
.tour-overlay {
  position: fixed; inset: 0; z-index: 10010;
  pointer-events: none;
}
.tour-tooltip {
  position: fixed; z-index: 10011;
  background: rgba(8,8,18,0.98); border: 1px solid rgba(201,168,76,0.45);
  border-radius: 16px; padding: 18px 20px; max-width: 280px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(201,168,76,0.1);
  animation: tourPop 0.35s cubic-bezier(.34,1.4,.64,1) forwards;
  pointer-events: all;
}
@keyframes tourPop { from { opacity:0; transform:scale(0.85); } to { opacity:1; transform:scale(1); } }
.tour-step { font-size:9px; letter-spacing:2px; color:rgba(201,168,76,0.45); margin-bottom:6px; font-weight:700; }
.tour-title { font-family:'Cinzel',serif; font-size:14px; color:#f0c060; font-weight:700; margin-bottom:6px; }
.tour-body { font-size:12px; color:rgba(232,220,200,0.55); line-height:1.6; margin-bottom:14px; }
.tour-actions { display:flex; gap:8px; justify-content:flex-end; }
.tour-skip { font-size:11px; color:rgba(232,220,200,0.3); background:none; border:none; cursor:pointer; padding:6px; }
.tour-skip:hover { color:rgba(232,220,200,0.6); }
.tour-next { padding:8px 18px; background:linear-gradient(135deg,#c9a84c,#ffd680); border:none; border-radius:8px; font-family:'Cinzel',serif; font-size:11px; font-weight:700; color:#080600; cursor:pointer; }
.tour-dots { display:flex; gap:5px; align-items:center; margin-right:auto; }
.tour-dot { width:6px; height:6px; border-radius:50%; background:rgba(201,168,76,0.25); transition:background 0.2s; }
.tour-dot.active { background:#f0c060; }

/* ═══ CONFETTI CANVAS ═══ */
#confetti-canvas {
  position: fixed; inset: 0; z-index: 9997;
  pointer-events: none; width: 100%; height: 100%;
}

/* ═══ LAST PLAYED ═══ */
.last-played-row {
  display: flex; gap: 10px; overflow-x: auto;
  padding-bottom: 4px; scrollbar-width: none; margin-bottom: 20px;
}
.last-played-row::-webkit-scrollbar { display: none; }
.last-played-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 12px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  cursor: pointer; transition: all 0.2s; min-width: 0;
}
.last-played-chip:hover {
  background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.25);
}
.last-played-chip img { width: 28px; height: 28px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
.last-played-chip-name { font-size: 11px; font-weight: 700; color: rgba(232,220,200,0.75); white-space: nowrap; }

/* ═══ LIVE ACTIVITY TOAST ═══ */
.live-toast {
  position: fixed; bottom: 80px; left: 16px; z-index: 9990;
  display: flex; align-items: center; gap: 10px;
  background: rgba(8,8,18,0.97);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 14px; padding: 10px 14px;
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.08);
  max-width: 240px;
  animation: toastSlideIn 0.4s cubic-bezier(.34,1.4,.64,1) forwards,
             toastFadeOut 0.5s ease 3.3s forwards;
}
@keyframes toastSlideIn {
  from { transform: translateX(-110%); opacity: 0; }
  to   { transform: translateX(0);     opacity: 1; }
}
@keyframes toastFadeOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-20px); }
}
.live-toast-av {
  width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
  border: 1px solid rgba(201,168,76,0.3); flex-shrink: 0;
}
.live-toast-body { flex: 1; min-width: 0; }
.live-toast-name { font-size: 11px; font-weight: 700; color: rgba(232,220,200,0.9); }
.live-toast-msg  { font-size: 10px; color: rgba(232,220,200,0.5); margin-top: 1px; }
.live-toast-amt  { color: #fbbf24; font-weight: 700; font-family: 'DM Mono',monospace; }
.live-toast-game { font-size: 9px; color: rgba(201,168,76,0.45); letter-spacing: 0.5px; margin-top: 1px; }
.live-toast-icon { font-size: 18px; flex-shrink: 0; }

/* ═══ FAV BUTTON ═══ */
.ucard-fav-btn {
  position: absolute; top: 8px; right: 8px; z-index: 5;
  background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%; width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; cursor: pointer; transition: all 0.15s;
  color: rgba(255,255,255,0.4);
}
.ucard-fav-btn:hover { background: rgba(255,50,80,0.25); border-color: rgba(255,80,100,0.5); color: #ff6b7a; }
.ucard-fav-btn.active { background: rgba(255,30,60,0.3); border-color: rgba(255,80,100,0.6); color: #ff4466; }

/* ═══ CATEGORY TABS ═══ */
.cat-tabs {
  display: flex; gap: 8px; overflow-x: auto;
  padding-bottom: 18px; scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0; padding: 7px 16px; border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.38); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  font-family: 'Space Grotesk', sans-serif;
  letter-spacing: 0.5px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.04);
  display: flex; align-items: center; gap: 6px;
}
.cat-tab-icon {
  width: 18px; height: 18px; object-fit: cover;
  border-radius: 4px; opacity: 0.75;
  transition: opacity 0.15s;
}
.cat-tab:hover .cat-tab-icon { opacity: 1; }
.cat-tab.active .cat-tab-icon { opacity: 1; filter: drop-shadow(0 0 4px rgba(245,158,11,0.6)); }
.cat-tab:hover {
  border-color: rgba(245,158,11,0.28);
  color: rgba(255,255,255,0.65);
  background: rgba(245,158,11,0.05);
}
.cat-tab.active {
  background: linear-gradient(180deg, rgba(245,158,11,0.18) 0%, rgba(201,130,11,0.12) 100%);
  border-color: rgba(245,158,11,0.5);
  color: #fbbf24; font-weight: 700;
  box-shadow: 0 3px 0 rgba(120,70,0,0.5), 0 5px 14px rgba(0,0,0,0.4), 0 0 16px rgba(245,158,11,0.15), inset 0 1px 0 rgba(255,220,80,0.2);
  text-shadow: 0 0 14px rgba(245,158,11,0.5);
}

/* Section title v3 */
.sec-title-v3 {
  display:flex; align-items:center; gap:12; margin-bottom:20px;
}
.sec-title-v3-bar {
  width:3px; height:20px;
  background:linear-gradient(180deg,#fbbf24,#d97706);
  border-radius:2px; flex-shrink:0;
}
.sec-title-v3-text {
  font-size:16px; font-weight:700; color:#f1f5f9;
}
.sec-title-v3-view {
  font-size:12px; color:rgba(255,255,255,0.25); margin-left:auto; cursor:pointer;
}

/* ═══════════════════════════════════════════════
   FINAL DESIGN SYSTEM — overrides everything above
═══════════════════════════════════════════════ */

/* Base */
:root {
  --ds-bg:      #080b14;
  --ds-surface: #0e1219;
  --ds-card:    #111826;
  --ds-border:  rgba(255,255,255,0.07);
  --ds-purple:  #f59e0b;
  --ds-gold:    #f59e0b;
  --ds-gold2:   #fbbf24;
  --ds-text:    #f1f5f9;
  --ds-text2:   rgba(241,245,249,0.5);
  --ds-text3:   rgba(241,245,249,0.25);
  --ds-green:   #10b981;
  --ds-red:     #ef4444;
  --ds-radius:  14px;
}

/* Reset body to our system */
body { background: var(--ds-bg) !important; color: var(--ds-text) !important; }
.app-shell { background: var(--ds-bg) !important; }

/* ── TOPBAR ── */
.topbar {
  background:
    linear-gradient(180deg, rgba(4,3,8,.52) 0%, rgba(5,4,10,.60) 100%),
    url('/img/topbar-bg.jpg') center/cover no-repeat !important;
  backdrop-filter: blur(4px) !important;
  border-bottom: 1px solid rgba(201,168,76,.28) !important;
  height: 60px !important;
  box-shadow: 0 1px 0 rgba(201,168,76,.18) !important;
}
.topbar-logo {
  font-family: 'Cinzel', serif !important;
  font-size: 16px !important;
  letter-spacing: 4px !important;
  background: linear-gradient(90deg, #fbbf24, #f59e0b) !important;
  -webkit-background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  background-clip: text !important;
  font-weight: 700 !important;
  flex-direction: row !important;
  align-items: center !important;
}
.topbar-logo span {
  display: none !important;
}
.tb-balance {
  background: rgba(245,158,11,0.07) !important;
  border: 1px solid rgba(245,158,11,0.18) !important;
  border-radius: 10px !important; padding: 5px 12px !important;
}
.tb-bal-amount { color: #fbbf24 !important; font-size: 14px !important; font-weight: 700 !important; }
.tb-cashier {
  background-image: url('/img/btn-primary.png') !important;
  background-size: cover !important;
  background-position: center !important;
  border: none !important;
  border-top: 1px solid rgba(255,245,150,0.5) !important;
  border-bottom: 1px solid rgba(80,40,0,0.8) !important;
  border-radius: 10px !important;
  color: #1a0800 !important; font-weight: 900 !important;
  font-size: 12px !important; padding: 9px 22px !important;
  letter-spacing: 1px !important; text-transform: uppercase !important;
  text-shadow: 0 1px 0 rgba(255,245,140,0.6) !important;
  box-shadow:
    0 5px 0 #4a2e04,
    0 7px 18px rgba(0,0,0,0.65),
    0 0 24px rgba(201,168,76,0.22),
    inset 0 1px 0 rgba(255,255,180,0.55) !important;
  transition: transform 0.1s, box-shadow 0.1s, filter 0.15s !important;
  position: relative !important; overflow: hidden !important;
}
.tb-cashier:hover {
  transform: translateY(-2px) !important;
  filter: brightness(1.08) !important;
  box-shadow:
    0 7px 0 #4a2e04,
    0 12px 28px rgba(201,168,76,0.55),
    0 0 36px rgba(240,192,96,0.3),
    inset 0 1px 0 rgba(255,255,200,0.65) !important;
}
.tb-cashier:active {
  transform: translateY(3px) !important;
  box-shadow: 0 2px 0 #4a2e04, 0 2px 8px rgba(0,0,0,0.5) !important;
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--ds-surface) !important;
  border-right: 1px solid var(--ds-border) !important;
}
.sb-item {
  border-radius: 10px !important;
  margin: 1px 10px !important;
  padding: 9px 12px !important;
  color: var(--ds-text2) !important;
  font-size: 13px !important;
  transition: background 0.12s, color 0.12s !important;
  border: 1px solid transparent !important;
}
.sb-item:hover {
  background: rgba(255,255,255,0.05) !important;
  color: var(--ds-text) !important;
}
.sb-item.active {
  background: rgba(245,158,11,0.08) !important;
  border-color: rgba(245,158,11,0.25) !important;
  color: #fbbf24 !important;
}
.sb-item .sb-icon { font-size: 16px !important; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  background: rgba(8,11,20,0.97) !important;
  backdrop-filter: blur(20px) !important;
  border-top: 1px solid rgba(255,255,255,0.05) !important;
  box-shadow: 0 -1px 0 rgba(245,158,11,0.08) !important;
}
.bn-item { color: var(--ds-text3) !important; }
.bn-item.active { color: var(--ds-gold2) !important; }
.bn-item.active .bn-icon {
  filter: drop-shadow(0 0 8px rgba(245,158,11,0.5)) !important;
}

/* Deposit button in mobile nav — special golden */
.bn-deposit-btn {
  background: linear-gradient(180deg,
    #ffe980 0%, #f0d058 15%, #d4aa38 50%, #b08828 78%, #8a6610 100%
  ) !important;
  color: #150800 !important;
  border-radius: 14px !important;
  margin: -4px 2px !important;
  padding: 6px 8px !important;
  min-width: 60px !important;
  border: none !important;
  border-top: 1px solid rgba(255,252,160,0.6) !important;
  box-shadow:
    0 4px 0 #4a2e04,
    0 6px 16px rgba(0,0,0,0.65),
    0 0 20px rgba(201,168,76,0.25),
    inset 0 1px 0 rgba(255,255,180,0.5) !important;
  font-weight: 900 !important;
  text-shadow: 0 1px 0 rgba(255,245,120,0.5) !important;
  transition: transform 0.1s, box-shadow 0.1s !important;
}
.bn-deposit-btn:active {
  transform: translateY(3px) !important;
  box-shadow: 0 1px 0 #4a2e04, 0 2px 6px rgba(0,0,0,0.5) !important;
}
.bn-deposit-btn .bn-icon { filter: none !important; }

/* ── LIVE TICKER ── */
.live-ticker {
  background: rgba(0,0,0,0.5) !important;
  border-bottom: 1px solid rgba(255,255,255,0.03) !important;
  font-size: 12px !important;
}

/* ── GAME CARDS — THE KEY ELEMENT ── */
.ds-gcard {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  aspect-ratio: 3/4;
  background: var(--ds-card);
  border: 1px solid var(--ds-border);
  transition: transform 0.22s cubic-bezier(.34,1.4,.64,1), box-shadow 0.22s;
  -webkit-font-smoothing: antialiased;
}
.ds-gcard:hover {
  transform: translateY(-5px) scale(1.015);
  box-shadow:
    0 20px 40px rgba(0,0,0,0.6),
    0 0 0 1px rgba(245,158,11,0.35),
    0 0 30px rgba(245,158,11,0.06);
}
.ds-gcard canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: block;
}
.ds-gcard-badge {
  position: absolute; top: 9px; left: 9px; z-index: 3;
  padding: 3px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 800; letter-spacing: 1px;
  text-transform: uppercase;
  backdrop-filter: blur(8px);
}
.ds-gcard-badge.hot  { background: rgba(245,158,11,0.9);  color:#0a0600; font-weight:800; }
.ds-gcard-badge.new  { background: rgba(251,191,36,0.85); color:#0a0600; font-weight:800; }
.ds-gcard-badge.live { background: rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.6); color:#fbbf24; font-weight:800; }
.ds-gcard-footer {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
  padding: 28px 12px 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.92));
}
.ds-gcard-name { font-size: 13px; font-weight: 700; color: #fff; }
.ds-gcard-sub  { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.ds-gcard-play {
  position: absolute; inset: 0; z-index: 4;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0);
  opacity: 0; transition: opacity 0.18s, background 0.18s;
}
.ds-gcard:hover .ds-gcard-play {
  opacity: 1; background: rgba(0,0,0,0.3);
}
.ds-gcard-play-btn {
  padding: 10px 26px;
  background: linear-gradient(180deg, #ffe980 0%, #f0d058 15%, #d4aa38 50%, #b08828 78%, #8a6610 100%);
  border: none;
  border-top: 1px solid rgba(255,252,160,0.7);
  border-bottom: 1px solid rgba(60,30,0,0.8);
  color: #150800; border-radius: 100px;
  font-size: 11px; font-weight: 900;
  letter-spacing: 2.5px; cursor: pointer;
  text-shadow: 0 1px 0 rgba(255,245,140,0.6);
  transform: translateY(10px) scale(0.92);
  opacity: 0;
  transition: transform 0.3s cubic-bezier(.34,1.5,.64,1), opacity 0.22s;
  box-shadow:
    0 5px 0 #4a2e04,
    0 7px 20px rgba(0,0,0,0.7),
    0 0 26px rgba(201,168,76,0.3),
    inset 0 1px 0 rgba(255,255,180,0.6);
  white-space: nowrap; overflow: hidden; position: relative;
}
.ds-gcard:hover .ds-gcard-play-btn { transform: translateY(0) scale(1); opacity: 1; }

/* Game grid */
.ds-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 12px;
}
@media(max-width:900px)  { .ds-grid { grid-template-columns: repeat(4,1fr); } }
@media(max-width:640px)  { .ds-grid { grid-template-columns: repeat(3,1fr); gap: 8px; } }
@media(max-width:400px)  { .ds-grid { grid-template-columns: repeat(2,1fr); } }

/* Category tabs */
.ds-tabs { display:flex; gap:6px; overflow-x:auto; padding-bottom:14px; scrollbar-width:none; }
.ds-tabs::-webkit-scrollbar { display:none; }
.ds-tab {
  flex-shrink:0; padding:7px 16px; border-radius:8px;
  border:1px solid rgba(255,255,255,0.07);
  background:transparent; color:rgba(255,255,255,0.35);
  font-size:13px; font-weight:500; cursor:pointer;
  transition:all 0.15s; white-space:nowrap;
}
.ds-tab:hover { border-color:rgba(245,158,11,0.3); color:rgba(255,255,255,0.65); }
.ds-tab.active {
  background:rgba(245,158,11,0.1);
  border-color:rgba(245,158,11,0.45);
  color:#fbbf24; font-weight:600;
}

/* Section header */
.ds-sh {
  display:flex; align-items:center; gap:10px;
  margin-bottom:16px;
}
.ds-sh-bar { width:3px; height:18px; background:linear-gradient(180deg,#fbbf24,#d97706); border-radius:2px; flex-shrink:0; }
.ds-sh-title { font-size:15px; font-weight:700; color:var(--ds-text); }
.ds-sh-count { font-size:12px; color:var(--ds-text3); margin-left:auto; }

/* Aurora hero */
.ds-hero {
  position: relative; border-radius: 18px; overflow: hidden;
  min-height: 260px; margin-bottom: 28px;
  display: flex; align-items: center;
  border: 1px solid rgba(255,255,255,0.05);
}
.ds-hero-canvas { position:absolute; inset:0; width:100%; height:100%; }
.ds-hero-overlay { position:absolute; inset:0; background:rgba(6,8,16,0.55); }
.ds-hero-content { position:relative; z-index:2; padding:40px 44px; }
.ds-hero-eyebrow {

/* ═══════════════════════════════════════════════
   UNIFIED CARD SYSTEM — Dark Luxury Theme
═══════════════════════════════════════════════ */

.ucard-wrap {
  perspective: 1000px;
  border-radius: 16px;
  cursor: pointer;
  aspect-ratio: 2/3;
}

.ucard {
  position: relative;
  width: 100%; height: 100%;
  border-radius: 16px;
  overflow: hidden;
  transform-style: preserve-3d;
  transition: transform 0.08s linear, box-shadow 0.3s;
  background: #080a12;
  border: 1px solid rgba(255,255,255,0.06);
  will-change: transform;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.04) inset;
}

/* Base gradient — subtle, dark */
.ucard-base {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 120% 80% at 110% 110%, var(--card-color-dim) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at -10% -10%, rgba(255,255,255,0.02) 0%, transparent 50%),
    #0c0f1a;
}

/* Noise texture for depth */
.ucard-noise {
  position: absolute; inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  mix-blend-mode: overlay;
}

/* ── DALL-E game thumbnail image — FULL BLEED ── */
.ucard-img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center center;
  border-radius: 14px;
  opacity: 1;
  transition: transform 0.45s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.25s;
  will-change: transform;
}
.ucard-wrap:hover .ucard-img { transform: scale(1.08); opacity: 1; }
.ucard-img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.0)  0%,
    rgba(0,0,0,0.04) 25%,
    rgba(0,0,0,0.18) 50%,
    rgba(0,0,0,0.62) 75%,
    rgba(0,0,0,0.92) 100%
  );
  border-radius: 14px;
}

/* ── Per-game spalvų tonai — subtilus spalvinis akcentas apačioje ── */
.ucard-g-prempoker .ucard-img-overlay {
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.0)  0%,
    rgba(0,0,0,0.05) 40%,
    rgba(30,5,70,0.55) 72%,
    rgba(12,2,32,0.94) 100%
  ) !important;
}
.ucard-g-videopoker .ucard-img-overlay {
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.0)  0%,
    rgba(0,0,0,0.05) 40%,
    rgba(5,20,80,0.55) 72%,
    rgba(2,8,30,0.94) 100%
  ) !important;
}
.ucard-g-krioklis .ucard-img-overlay {
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.0)  0%,
    rgba(0,0,0,0.05) 40%,
    rgba(5,50,25,0.55) 72%,
    rgba(2,20,10,0.94) 100%
  ) !important;
}
.ucard-g-dragon .ucard-img-overlay {
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.0)  0%,
    rgba(0,0,0,0.05) 40%,
    rgba(80,10,10,0.55) 72%,
    rgba(30,4,4,0.94) 100%
  ) !important;
}
.ucard-g-crash .ucard-img-overlay {
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.0)  0%,
    rgba(0,0,0,0.05) 40%,
    rgba(50,35,5,0.55) 72%,
    rgba(20,14,2,0.94) 100%
  ) !important;
}

/* When image present — symbol becomes small glass badge top-left */
.ucard.has-img .ucard-symbol {
  top: 10px !important;
  left: 10px !important;
  transform: none !important;
  font-size: 16px !important;
  font-weight: 700 !important;
  opacity: 1 !important;
  color: var(--card-color) !important;
  background: rgba(5,5,15,0.78) !important;
  border: 1px solid rgba(201,168,76,0.32) !important;
  border-radius: 8px !important;
  padding: 5px 8px !important;
  line-height: 1 !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
  z-index: 6 !important;
  width: auto !important;
  height: auto !important;
  font-family: 'Segoe UI Symbol','Apple Symbols','DM Mono',system-ui,sans-serif !important;

.ucard.has-img .ucard-orb    { opacity: 0 !important; }
.ucard.has-img .ucard-base   { opacity: 0.18; }
/* ── DALL-E icon badge — viršuje kairėje ── */
.ucard-icon-badge {
  position: absolute;
  top: 10px; left: 10px;
  width: 44px; height: 44px;
  border-radius: 12px;
  background: rgba(5,5,15,0.72);
  border: 1px solid rgba(201,168,76,0.32);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  overflow: hidden;
  z-index: 6;
  box-shadow:
    0 2px 8px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.08);
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.ucard-icon-badge img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 11px;
  opacity: 0.92;
}
.ucard-wrap:hover .ucard-icon-badge {
  border-color: rgba(201,168,76,0.65);
  box-shadow:
    0 4px 14px rgba(0,0,0,0.7),
    0 0 12px var(--card-color),
    inset 0 1px 0 rgba(255,255,255,0.1);
  transform: scale(1.05);
}

/* Slots badge — specialus stilius "7" skaičiui */
.ucard-g-slots.has-img .ucard-symbol {
  font-family: 'Orbitron','DM Mono',monospace !important;
  font-size: 18px !important;
  font-weight: 900 !important;
  letter-spacing: -1px !important;
  padding: 4px 9px !important;
}

/* hover: badge brighter (must override !important base) */
.ucard-wrap:hover .ucard.has-img .ucard-symbol {
  background: rgba(201,168,76,0.22) !important;
  border-color: rgba(201,168,76,0.65) !important;
  filter: drop-shadow(0 0 10px var(--card-color)) !important;
}

/* The big symbol */
.ucard-symbol {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -58%);
  font-size: clamp(52px, 7vw, 72px);
  color: var(--card-color);
  opacity: 0.22;
  line-height: 1;
  font-weight: 100;
  transition: opacity 0.3s, transform 0.3s;
  user-select: none;
  filter: blur(0px);
  font-family: 'Cinzel', serif;
}

/* Glow orb behind symbol */
.ucard-orb {
  position: absolute;
  top: 30%; left: 50%;
  transform: translate(-50%, -50%);
  width: 55%; aspect-ratio: 1;
  border-radius: 50%;
  background: radial-gradient(circle, var(--card-color-dim) 0%, transparent 70%);
  opacity: 0.6;
  transition: opacity 0.3s, transform 0.3s;
}

/* Bottom info — premium */
.ucard-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 60px 12px 13px;
  background: transparent;
}
.ucard-name {
  font-size: 12px; font-weight: 800;
  color: #ffffff;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  text-shadow: 0 1px 10px rgba(0,0,0,1), 0 0 24px rgba(0,0,0,0.8);
  line-height: 1.2;
}
.ucard-sub {
  font-size: 9px;
  color: rgba(255,255,255,0.48);
  margin-top: 2px;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  letter-spacing: 0.5px;
}

/* Gold bottom accent line */
.ucard-info::after {
  content: '';
  display: block;
  margin-top: 8px;
  height: 1px;
  background: linear-gradient(90deg, var(--card-color), rgba(255,255,255,0.1), transparent);
  opacity: 0.6;
  border-radius: 1px;
}

/* Top-left accent line */
.ucard-accent {
  position: absolute;
  top: 0; left: 0;
  width: 40%; height: 2px;
  background: linear-gradient(90deg, var(--card-color), transparent);
  opacity: 0.8;
}
/* Left accent line */
.ucard-accent-v {
  position: absolute;
  top: 0; left: 0;
  width: 2px; height: 30%;
  background: linear-gradient(180deg, var(--card-color), transparent);
  opacity: 0.6;
}

/* Badge — premium 3D pill */
.ucard-badge {
  position: absolute; top: 10px; right: 10px; z-index: 7;
  padding: 4px 10px; border-radius: 100px;
  font-size: 9px; font-weight: 900;
  letter-spacing: 1.5px; text-transform: uppercase;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
}
.ucard-badge.hot {
  background: linear-gradient(180deg, #ff8c00, #d96000);
  color: #fff8e0; font-weight: 900;
  box-shadow: 0 3px 0 #8a3000, 0 4px 12px rgba(0,0,0,0.6), 0 0 16px rgba(255,120,0,0.3), inset 0 1px 0 rgba(255,200,100,0.4);
  text-shadow: 0 1px 0 rgba(0,0,0,0.3);
}
.ucard-badge.new {
  background: linear-gradient(180deg, #60e080, #28b048);
  color: #001808; font-weight: 900;
  box-shadow: 0 3px 0 #0a5020, 0 4px 12px rgba(0,0,0,0.6), 0 0 16px rgba(40,180,80,0.3), inset 0 1px 0 rgba(160,255,180,0.4);
  text-shadow: 0 1px 0 rgba(0,0,0,0.2);
}
.ucard-badge.live {
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(245,80,80,0.7);
  color: #ff8080; font-weight: 900;
  box-shadow: 0 0 12px rgba(245,80,80,0.25), inset 0 1px 0 rgba(255,150,150,0.1);
  animation: livePulse 2s infinite;
}
@keyframes livePulse {
  0%,100% {
    box-shadow: 0 0 12px rgba(245,80,80,0.25), inset 0 1px 0 rgba(255,150,150,0.1);
    border-color: rgba(245,80,80,0.7);
  }
  50% {
    box-shadow: 0 0 24px rgba(245,80,80,0.45), inset 0 1px 0 rgba(255,150,150,0.1);
    border-color: rgba(255,120,120,0.9);
  }
}

/* Glass sheen sweep on hover — bright premium */
.ucard-sheen {
  position: absolute; inset: 0;
  background: linear-gradient(
    110deg,
    transparent 30%,
    rgba(255,255,255,0.04) 42%,
    rgba(255,255,255,0.12) 50%,
    rgba(255,255,255,0.04) 58%,
    transparent 70%
  );
  transform: translateX(-120%) skewX(-10deg);
  transition: transform 0s;
  pointer-events: none;
  z-index: 8;
}
.ucard-wrap:hover .ucard-sheen {
  transform: translateX(120%) skewX(-10deg);
  transition: transform 0.65s ease;
}

/* Hover states */
.ucard-wrap:hover .ucard {
  border-color: var(--card-color-mid);
  box-shadow:
    0 24px 64px rgba(0,0,0,0.8),
    0 0 0 1px var(--card-color-mid),
    0 0 50px var(--card-color-dim),
    inset 0 1px 0 rgba(255,255,255,0.08);
}
.ucard-wrap:hover .ucard-symbol {
  opacity: 0.55;
  transform: translate(-50%, -62%) scale(1.08);
}
.ucard-wrap:hover .ucard-orb {
  opacity: 1;
  transform: translate(-50%, -55%) scale(1.15);
}

/* Play CTA overlay — premium */
.ucard-play {
  position: absolute; inset: 0; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  padding-bottom: 20%;
  opacity: 0;
  transition: opacity 0.22s, background 0.22s;
  background: rgba(0,0,0,0.0);
}
.ucard-wrap:hover .ucard-play {
  opacity: 1;
  background: rgba(0,0,0,0.12);
}
.ucard-play-btn {
  padding: 10px 28px;
  /* 3D aukso mygtukas — ŽAISTI */
  background: linear-gradient(180deg,
    #ffe980 0%,
    #f0d058 12%,
    #d4aa38 45%,
    #b08828 75%,
    #8a6610 100%
  );
  border: none;
  border-top: 1px solid rgba(255,252,160,0.75);
  border-bottom: 1px solid rgba(60,30,0,0.9);
  color: #150800;
  border-radius: 100px;
  font-size: 11px; font-weight: 900;
  letter-spacing: 3px; cursor: pointer;
  text-transform: uppercase;
  text-shadow: 0 1px 0 rgba(255,245,160,0.7);
  transform: translateY(10px) scale(0.92);
  opacity: 0;
  transition: transform 0.3s cubic-bezier(.34,1.5,.64,1),
              opacity 0.22s,
              box-shadow 0.15s;
  box-shadow:
    0 6px 0 #4a2e04,
    0 8px 20px rgba(0,0,0,0.75),
    0 0 30px rgba(201,168,76,0.25),
    inset 0 1px 0 rgba(255,255,180,0.6),
    inset 0 -2px 4px rgba(0,0,0,0.2);
  position: relative; overflow: hidden;
  white-space: nowrap;
}
.ucard-play-btn::before {
  content:'';
  position:absolute; top:0; left:-80%; width:50%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.28),transparent);
  transform:skewX(-20deg);
  transition:left 0.5s ease;
}
.ucard-wrap:hover .ucard-play-btn {
  transform: translateY(0) scale(1);
  opacity: 1;
  box-shadow:
    0 6px 0 #4a2e04,
    0 10px 28px rgba(201,168,76,0.6),
    0 0 40px rgba(240,192,96,0.35),
    inset 0 1px 0 rgba(255,255,200,0.7),
    inset 0 -2px 4px rgba(0,0,0,0.15);
}
.ucard-wrap:hover .ucard-play-btn::before { left: 140%; }
.ucard-play-btn:active {
  transform: translateY(5px) scale(0.97) !important;
  box-shadow: 0 1px 0 #4a2e04, 0 2px 8px rgba(0,0,0,0.6) !important;
}

/* Game grid — premium spacing */
.ugrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(156px, 1fr));
  gap: 16px;
}
@media(max-width:900px) { .ugrid { grid-template-columns: repeat(4,1fr); gap: 10px; } }
@media(max-width:640px) { .ugrid { grid-template-columns: repeat(3,1fr); gap: 8px; } }
@media(max-width:400px) { .ugrid { grid-template-columns: repeat(2,1fr); gap: 8px; } }

    /* ── Theme: NEON ── */

    @keyframes n-shift { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    @keyframes n-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

    @keyframes n-marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    .n-grid-bg { position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35; background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px); background-size:48px 48px; mask-image:radial-gradient(ellipse at 50% 30%,black 20%,transparent 70%); }
    .n-noise { position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.05; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.5'/></svg>"); }
    .n-glass { background:rgba(16,18,32,0.45); backdrop-filter:blur(24px) saturate(1.2); -webkit-backdrop-filter:blur(24px) saturate(1.2); border:1px solid rgba(255,255,255,0.08); border-radius:18px; }
    .n-glass-hi { background:linear-gradient(135deg,rgba(124,240,194,0.08) 0%,rgba(200,156,255,0.06) 100%); backdrop-filter:blur(28px) saturate(1.3); -webkit-backdrop-filter:blur(28px) saturate(1.3); border:1px solid rgba(124,240,194,0.22); border-radius:18px; }
    .n-grad-text { background:linear-gradient(135deg,#7cf0c2 0%,#6be1ff 40%,#c89cff 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent; background-size:200% 200%; animation:n-shift 8s ease infinite; }
    .n-btn-primary { position:relative; background:linear-gradient(135deg,#7cf0c2 0%,#6be1ff 100%); color:#030309; border:none; font-weight:600; border-radius:999px; cursor:pointer; transition:transform .2s cubic-bezier(.2,.8,.2,1),box-shadow .2s; box-shadow:0 8px 32px -8px rgba(124,240,194,0.5); }
    .n-btn-primary:hover { transform:translateY(-2px); box-shadow:0 0 24px 0 rgba(124,240,194,0.35),0 12px 40px -8px rgba(124,240,194,0.6); }
    .n-btn-ghost { background:rgba(255,255,255,0.04); color:#e8ecf5; border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(12px); border-radius:999px; cursor:pointer; transition:background .18s,border-color .18s; }
    .n-btn-ghost:hover { background:rgba(255,255,255,0.08); border-color:rgba(124,240,194,0.4); }
    .n-tilt { transform-style:preserve-3d; transition:transform .3s cubic-bezier(.2,.8,.2,1),box-shadow .3s; will-change:transform; }
    .n-scan-host { position:relative; overflow:hidden; }
    .n-scan-host::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg,transparent 0%,rgba(124,240,194,0.15) 50%,transparent 100%); height:40%; transform:translateY(-100%); animation:n-scan 6s cubic-bezier(.6,0,.4,1) infinite; pointer-events:none; }
    .n-pulse-ring { animation:n-pulse-glow 2s ease-in-out infinite; }
    .n-float { animation:n-float 6s ease-in-out infinite; }
    .n-marquee-track { animation:n-marquee 50s linear infinite; }
    .n-marquee-track:hover { animation-play-state:paused; }
    .n-scroll::-webkit-scrollbar { width:6px; height:6px; }
    .n-scroll::-webkit-scrollbar-thumb { background:rgba(124,240,194,0.3); border-radius:3px; }

    .n-link { position:relative; color:#e8ecf5; }

  React.useEffect(() => {
    if (userPicked) return;
    const id = setInterval(() => { setVariant(v => (v + 1) % CLEO_VARIANTS.length); }, 8000);
    return () => clearInterval(id);
  }, [userPicked]);

  // Mouse parallax → subtle camera orbit
  React.useEffect(() => {
    const mv = ref.current; if (!mv) return;
    let raf;
    const onMove = (e) => {
      const r = mv.getBoundingClientRect();
      const x = ((e.clientX - r.left) / r.width - 0.5) * 2;
      const y = ((e.clientY - r.top) / r.height - 0.5) * 2;
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => { mv.cameraOrbit = `${90 + x * 6}deg ${88 + y * 4}deg 2.6m`; });
    };
    window.addEventListener('mousemove', onMove);
    return () => { window.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); };
  }, []);

  const cv = CLEO_VARIANTS[variant];

  return (
    <div style={{ position:'relative', height, width:'100%', display:'flex', alignItems:'flex-end', justifyContent:'center' }}>

              {i%4===3&&<path d="M-5 2 Q -5 -4, 0 -4 Q 5 -4, 5 2 Z"/>}
            </g>

        </g>
        <g stroke="#c9a84c" strokeOpacity="0.25" fill="#c9a84c" fillOpacity="0.12" strokeWidth="0.8">
          <rect x="323" y="200" width="22" height="320"/>

              {i%4===2&&<path d="M-5 2 Q -5 -4, 0 -4 Q 5 -4, 5 2 Z"/>}
              {i%4===3&&<path d="M-6 0 H 6 M 0 -5 V 5" fill="none"/>}

        </g>
        <g transform="translate(200,130)">

          <path d="M 22 0 Q 70 -12, 120 -4 Q 80 0, 22 4 Z" fill="url(#goldG2)" opacity="0.7"/>
