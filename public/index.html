.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
.croupier-input-row { display: flex; gap: 7px; padding: 10px 14px; border-top: 1px solid rgba(245,158,11,0.12); }
.croupier-inp {
  flex: 1; padding: 9px 12px; border-radius: 8px;
  background: rgba(0,0,0,0.4); border: 1px solid rgba(245,158,11,0.15);
  color: var(--cream); font-size: 12px; outline: none;
  font-family: 'Space Grotesk', sans-serif; transition: border-color .2s;
}
.croupier-inp:focus { border-color: rgba(245,158,11,0.45); }
.croupier-send { padding: 9px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; background: rgba(245,158,11,0.2); transition: all .2s; }
.croupier-send:hover { background: rgba(245,158,11,0.4); }
.quick-asks { display: flex; gap: 5px; padding: 8px 14px 0; flex-wrap: wrap; }
.quick-ask { font-size: 10px; padding: 4px 9px; border-radius: 20px; border: 1px solid rgba(245,158,11,0.18); background: rgba(245,158,11,0.06); color: rgba(232,224,208,0.5); cursor: pointer; transition: all .15s; white-space: nowrap; }
.quick-ask:hover { border-color: rgba(245,158,11,0.4); color: var(--cream); }

/* ═══════════════════════════════════════════════════
   JACKPOT TICKER
═══════════════════════════════════════════════════ */
.jackpot-ticker {
  position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
  z-index: 150; pointer-events: auto;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 20px 7px; border-radius: 0 0 14px 14px;
  background: rgba(8,5,18,0.97);
  border: 1px solid rgba(240,192,96,0.28); border-top: none;
  backdrop-filter: blur(24px);
  transition: transform 0.45s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
  cursor: pointer;
}
.jackpot-ticker-label { font-size: 9px; letter-spacing: 2px; color: rgba(232,224,208,0.3); text-transform: uppercase; }
.jackpot-ticker-val { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; color: var(--gold); letter-spacing: 1px; transition: all .5s; }
.jackpot-ticker-val.bump { animation: jackpotBump .4s ease; color: var(--gold2); }
@keyframes jackpotBump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
.jackpot-ticker-hidden { transform: translateX(-50%) translateY(-120%) !important; opacity: 0 !important; pointer-events: none !important; }
.jackpot-won-banner {
  position: fixed; inset: 0; z-index: 700; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  animation: fadeIn .3s ease;
}
.jackpot-won-card {
  text-align: center; padding: 48px 64px; border-radius: 20px;
  background: rgba(10,6,22,0.98); border: 2px solid var(--gold);
  box-shadow: 0 0 100px rgba(240,192,96,0.4);
  animation: jackpotBig .6s cubic-bezier(0.4,0,0.2,1);
}
@keyframes jackpotBig { from{transform:scale(.5) rotate(-5deg);opacity:0} 70%{transform:scale(1.05) rotate(1deg)} to{transform:scale(1) rotate(0);opacity:1} }
.jackpot-won-card h2 { font-family:'Orbitron',monospace; font-size:36px; color:var(--gold); margin-bottom:8px; }
.jackpot-won-card .amount { font-family:'Orbitron',monospace; font-size:52px; font-weight:900; background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
.jackpot-won-card p { font-size:13px; color:rgba(232,224,208,.4); margin-top:8px; letter-spacing:2px; }

/* ═══════════════════════════════════════════════════
   STATS PAGE
═══════════════════════════════════════════════════ */
.stats-scene { padding: 32px 40px; max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
.stats-scene h2 { font-family:'Orbitron',monospace; font-size:28px; color:var(--gold); margin-bottom:28px; letter-spacing:2px; }
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
.stat-card {
  padding: 20px 18px; border-radius: 14px;
  background: rgba(8,8,18,0.7); border: 1px solid var(--border);
  backdrop-filter: blur(16px); text-align: center;
  transition: all .2s;
}
.stat-card:hover { border-color: rgba(240,192,96,0.25); }
.stat-card-icon { font-size: 28px; margin-bottom: 10px; }
.stat-card-val { font-family:'Orbitron',monospace; font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 5px; }
.stat-card-lbl { font-size: 10px; letter-spacing: 2px; color: rgba(232,224,208,0.3); text-transform: uppercase; }
.stats-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.stats-panel { padding: 22px; border-radius: 14px; background: rgba(8,8,18,0.7); border: 1px solid var(--border); backdrop-filter: blur(16px); }
.stats-panel h3 { font-size: 11px; letter-spacing: 3px; color: rgba(232,224,208,0.3); text-transform: uppercase; margin-bottom: 16px; }
/* Mini chart */
.mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; margin-top: 8px; }
.chart-bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 4px; transition: height .6s ease; }
.chart-bar.won { background: linear-gradient(180deg,var(--green),rgba(0,230,118,.3)); }
.chart-bar.lost { background: linear-gradient(180deg,var(--red),rgba(255,61,113,.3)); }
.game-stat-row { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.game-stat-row:last-child { border-bottom: none; }
.game-stat-name { font-size:13px; font-weight:600; }
.game-stat-nums { font-family:'DM Mono',monospace; font-size:11px; color:rgba(232,224,208,.4); text-align:right; }
.game-stat-wr { font-size:12px; font-weight:700; }
.wr-high { color:var(--green); }
.wr-mid  { color:var(--gold); }
.wr-low  { color:var(--red); }

/* ═══════════════════════════════════════════════════
   VISUAL UPGRADE — NEON TEXT + ANIMATIONS
═══════════════════════════════════════════════════ */

/* ── Better text readability ── */
body { color: #e8e2d4 !important; }

/* Brighter small text */
.game-card p { color: rgba(232,224,208,0.65) !important; }
.stat-chip { color: rgba(232,224,208,0.7) !important; }
.slots-paylines { color: rgba(232,224,208,0.5) !important; }
.chat-text { color: rgba(232,224,208,0.8) !important; }
.p-name-txt { color: #e8e2d4 !important; }
.match-meta { color: rgba(232,224,208,0.55) !important; }
.card-label { color: rgba(232,224,208,0.55) !important; }
.inp-label { color: rgba(232,224,208,0.55) !important; }
.bj-label { color: rgba(232,224,208,0.6) !important; }
.slip-match { color: rgba(232,224,208,0.55) !important; }
.tx-meta { color: rgba(232,224,208,0.55) !important; }
.lb-tokens { color: var(--gold) !important; text-shadow: 0 0 10px rgba(240,192,96,0.3); }

/* ── Neon glow on active/important text ── */
.game-card h3 {
  color: #f0e8d8 !important;
  text-shadow: 0 0 20px rgba(240,192,96,0.15);
}
.game-card:hover h3 {
  text-shadow: 0 0 30px rgba(240,192,96,0.4), 0 0 60px rgba(240,192,96,0.15) !important;
  color: var(--gold2) !important;
}
.slots-title {
  text-shadow: 0 0 20px currentColor;
}
.bj-status.win {
  text-shadow: 0 0 30px rgba(0,230,118,0.8), 0 0 60px rgba(0,230,118,0.4) !important;
}
.bj-status.lose {
  text-shadow: 0 0 30px rgba(255,61,113,0.6) !important;
}
.pot-display {
  text-shadow: 0 0 15px rgba(240,192,96,0.4);
}
.jackpot-ticker-val {
  text-shadow: 0 0 20px rgba(240,192,96,0.6) !important;
  animation: jackpotGlow 2s ease infinite alternate !important;
}
@keyframes jackpotGlow {
  from { text-shadow: 0 0 10px rgba(240,192,96,0.4); }
  to   { text-shadow: 0 0 30px rgba(240,192,96,0.9), 0 0 60px rgba(240,192,96,0.3); }
}
.token-chip {
  text-shadow: 0 0 12px rgba(240,192,96,0.4);
}
.phase-badge {
  text-shadow: 0 0 10px currentColor;
}
.odd-num {
  text-shadow: 0 0 10px rgba(240,192,96,0.3);
}
.room-code-big {
  text-shadow: 0 0 40px rgba(240,192,96,0.5) !important;
  letter-spacing: 14px !important;
}

/* ── Lobby hero upgrade ── */
.lobby-hero h2 {
  text-shadow: 0 0 60px rgba(240,192,96,0.2), 0 4px 20px rgba(0,0,0,0.8) !important;
}
.lobby-hero p {
  color: rgba(232,224,208,0.45) !important;
}

/* ── Floating cards animation ── */
.hero-cards {
  position: relative; height: 120px; margin: 20px auto -10px;
  width: 320px; pointer-events: none;
}
.hero-card {
  position: absolute; width: 58px; height: 82px;
  border-radius: 8px;
  background: linear-gradient(160deg, #fffcf5, #fdf5e0);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; animation: cardFloat 6s ease-in-out infinite;
  transform-origin: bottom center;
}
.hero-card::before {
  content: attr(data-rank);
  position: absolute; top: 5px; left: 7px;
  font-size: 12px; font-weight: 900; line-height: 1;
}
.hero-card.red { color: #c0392b; }
.hero-card.black { color: #1a1a2e; }

.hero-card:nth-child(1) { left: 20px;  top: 20px; transform: rotate(-25deg); animation-delay: 0s;    animation-duration: 5.5s; }
.hero-card:nth-child(2) { left: 70px;  top: 10px; transform: rotate(-12deg); animation-delay: 0.4s;  animation-duration: 6s;   }
.hero-card:nth-child(3) { left: 124px; top: 5px;  transform: rotate(0deg);   animation-delay: 0.8s;  animation-duration: 5s;   }
.hero-card:nth-child(4) { left: 178px; top: 10px; transform: rotate(12deg);  animation-delay: 1.2s;  animation-duration: 6.5s; }
.hero-card:nth-child(5) { left: 228px; top: 20px; transform: rotate(25deg);  animation-delay: 1.6s;  animation-duration: 5.8s; }

@keyframes cardFloat {
  0%,100% { transform: translateY(0) rotate(var(--r,0deg)); filter: brightness(1); }
  25%      { transform: translateY(-12px) rotate(calc(var(--r,0deg) - 3deg)); filter: brightness(1.1); }
  50%      { transform: translateY(-20px) rotate(var(--r,0deg)); filter: brightness(1.15); }
  75%      { transform: translateY(-10px) rotate(calc(var(--r,0deg) + 3deg)); filter: brightness(1.05); }
}

/* ── Entrance animation for game cards ── */
.games-grid .game-card {
  animation: cardEntrance 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
}
.games-grid .game-card:nth-child(1) { animation-delay: 0.05s; }
.games-grid .game-card:nth-child(2) { animation-delay: 0.1s; }
.games-grid .game-card:nth-child(3) { animation-delay: 0.15s; }
.games-grid .game-card:nth-child(4) { animation-delay: 0.2s; }
.games-grid .game-card:nth-child(5) { animation-delay: 0.25s; }
.games-grid .game-card:nth-child(6) { animation-delay: 0.3s; }
.games-grid .game-card:nth-child(7) { animation-delay: 0.35s; }
.games-grid .game-card:nth-child(8) { animation-delay: 0.4s; }

@keyframes cardEntrance {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Chip scatter animation on win ── */
@keyframes chipScatter {
  0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx,40px), var(--dy,-80px)) rotate(360deg) scale(0.5); opacity: 0; }
}

/* ── Pulsing border on auth card ── */
.auth-card::after {
  content: ''; position: absolute; inset: -2px; border-radius: 22px;
  background: linear-gradient(135deg, rgba(240,192,96,0.3), transparent, rgba(201,168,76,0.15), transparent, rgba(240,192,96,0.3));
  background-size: 300% 300%;
  animation: borderRotate 4s linear infinite;
  z-index: -1; border-radius: 22px;
}
@keyframes borderRotate {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ── Neon line under game icon ── */
.game-icon-wrap::after {
  content: ''; display: block; width: 0; height: 2px;
  background: var(--card-accent, var(--gold));
  border-radius: 1px; margin: 6px auto 0;
  transition: width 0.35s ease;
  box-shadow: 0 0 8px var(--card-accent, var(--gold));
}
.game-card:hover .game-icon-wrap::after { width: 80%; }

/* ── Spinning roulette wheel glow ── */
.wheel-disc {
  box-shadow: 0 0 0 4px rgba(240,192,96,0.2), 0 0 40px rgba(0,0,0,0.8), 
              0 0 80px rgba(178,34,34,0.1), inset 0 0 40px rgba(0,0,0,0.6) !important;
}

/* ── Better nav tabs ── */
.btn-ghost.active {
  text-shadow: 0 0 12px rgba(240,192,96,0.5);
}

/* ── Winner flash ── */
.player-card.is-winner {
  animation: winnerFlash 0.5s ease infinite alternate !important;
}
@keyframes winnerFlash {
  from { box-shadow: 0 0 20px rgba(0,230,118,0.4); }
  to   { box-shadow: 0 0 50px rgba(0,230,118,0.8), 0 0 100px rgba(0,230,118,0.3); }
}

/* ── Smooth page transitions ── */
.lobby, .slots-scene, .roulette-scene, .bj-scene, .poker-screen,
.sports-scene, .lb-scene, .stats-scene {
  animation: pageIn 0.3s ease;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}


/* ═══════════════════════════════════════════════════
   UNIQUE FEATURES CSS
═══════════════════════════════════════════════════ */

/* ── Viktor Animated Face ── */
.viktor-face {
  width: 56px; height: 56px; border-radius: 50%; position: relative;
  background: linear-gradient(135deg, #1a1204, #2a1e08);
  border: 2px solid rgba(245,158,11,0.45);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}
.viktor-canvas { position: absolute; inset: 0; border-radius: 50%; }
.viktor-face.talking .viktor-mouth { animation: mouthTalk 0.15s ease infinite alternate; }
.viktor-face.happy   .viktor-eyebrow { transform: translateY(-2px) rotate(-5deg); }
.viktor-face.sad     .viktor-eyebrow { transform: translateY(2px) rotate(5deg); }

/* ── Missions / Achievements ── */
.missions-bar {
  position: fixed; top: 64px; right: 0; z-index: 190;
  width: 280px; transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  background: rgba(8,8,18,0.95); border-left: 1px solid var(--border);
  border-bottom: 1px solid var(--border); border-radius: 0 0 0 16px;
  backdrop-filter: blur(20px); padding: 16px;
  box-shadow: -8px 8px 32px rgba(0,0,0,0.5);
}
.missions-bar.open { transform: translateX(0); }
.missions-toggle {
  position: fixed; top: 76px; right: 0; z-index: 191;
  padding: 8px 10px 8px 14px; border-radius: 20px 0 0 20px;
  background: rgba(240,192,96,0.1); border: 1px solid rgba(240,192,96,0.25);
  border-right: none; cursor: pointer; font-size: 11px;
  color: var(--gold); letter-spacing: 1px; font-weight: 700;
  transition: all 0.2s; white-space: nowrap;
  font-family: 'Space Grotesk', sans-serif;
}
.missions-toggle:hover { background: rgba(240,192,96,0.2); }
.missions-title { font-family:'Orbitron',monospace; font-size:13px; color:var(--gold); margin-bottom:12px; letter-spacing:1px; }
.mission-item {
  padding: 10px 12px; border-radius: 10px; margin-bottom: 8px;
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  transition: all 0.2s;
}
.mission-item.done { border-color: rgba(0,230,118,0.3); background: rgba(0,230,118,0.05); }
.mission-item.active { border-color: rgba(240,192,96,0.25); }
.mission-name { font-size: 12px; font-weight: 700; color: var(--cream); margin-bottom: 4px; }
.mission-desc { font-size: 10px; color: rgba(232,224,208,0.4); margin-bottom: 6px; }
.mission-progress { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
.mission-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
.mission-fill.gold { background: linear-gradient(90deg,var(--gold3),var(--gold)); }
.mission-fill.green { background: linear-gradient(90deg,#00a854,var(--green)); }
.mission-fill.neon { background: linear-gradient(90deg,#0088aa,var(--neon)); }
.mission-reward { font-size: 10px; color: var(--gold); margin-top: 4px; font-family:'DM Mono',monospace; }
.mission-check { float: right; color: var(--green); font-size: 16px; }

/* ── Achievement popup ── */
.achievement-popup {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  z-index: 600; min-width: 320px; text-align: center;
  padding: 20px 32px; border-radius: 16px;
  background: rgba(8,8,18,0.97);
  border: 1px solid rgba(240,192,96,0.4);
  box-shadow: 0 0 60px rgba(240,192,96,0.2), var(--shadow);
  animation: achieveIn 0.5s cubic-bezier(0.4,0,0.2,1);
}
@keyframes achieveIn {
  from { opacity:0; transform:translate(-50%,40px) scale(0.85); }
  70%  { transform:translate(-50%,-8px) scale(1.03); }
  to   { opacity:1; transform:translate(-50%,0) scale(1); }
}
.achievement-popup .ach-icon { font-size: 40px; margin-bottom: 8px; }
.achievement-popup h4 { font-family:'Orbitron',monospace; font-size:14px; color:var(--gold); letter-spacing:2px; }
.achievement-popup p { font-size:11px; color:rgba(232,224,208,.4); margin-top:4px; letter-spacing:1px; }
.achievement-popup .ach-reward { font-family:'DM Mono',monospace; font-size:18px; color:var(--green); margin-top:8px; }

.gchat-panel{position:fixed;bottom:150px;right:24px;width:320px;height:440px;

.gchat-hdr{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;
  align-items:center;justify-content:space-between;flex-shrink:0;}
.gchat-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;letter-spacing:1px;
  color:rgba(232,224,208,.8);}
.gchat-online{font-size:10px;color:rgba(0,230,118,.6);display:flex;align-items:center;gap:4px;}
.gchat-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:gcPulse 1.5s infinite;}

.gchat-close{cursor:pointer;color:rgba(232,224,208,.3);font-size:18px;line-height:1;transition:color .15s;}

.gchat-msgs{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:5px;}

.gchat-msg{display:flex;gap:7px;align-items:flex-start;}

.gchat-name{font-size:11px;font-weight:700;color:var(--gold);}
.gchat-lv{font-size:11px;}

.gchat-text{font-size:12px;color:rgba(232,224,208,.7);line-height:1.45;word-break:break-word;}

/* ═══════════════════════════════════════════════════
   HATHOR PYRAMID DROP
═══════════════════════════════════════════════════ */
.pyramid-scene {
  min-height: calc(100vh - 64px);
  display: flex; gap: 24px; padding: 24px;
  position: relative; z-index: 1;
  background: radial-gradient(ellipse at 50% 0%, rgba(240,192,96,0.04), transparent 60%);
}
.pyramid-left { flex: 1; display: flex; flex-direction: column; align-items: center; }
.pyramid-right { width: 280px; display: flex; flex-direction: column; gap: 14px; }

.pyramid-title {
  font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900;
  letter-spacing: 3px; margin-bottom: 4px; text-align: center;
  background: linear-gradient(135deg, var(--gold), var(--gold2), #c88030);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  text-shadow: none;
}
.pyramid-sub {
  font-size: 10px; letter-spacing: 3px; color: rgba(232,224,208,0.25);
  margin-bottom: 16px; text-align: center;
}

/* Canvas */
.pyramid-canvas-wrap {
  position: relative; border-radius: 16px; overflow: hidden;
  background: rgba(4,4,10,0.8); border: 1px solid rgba(240,192,96,0.1);
  box-shadow: 0 0 60px rgba(240,192,96,0.05), inset 0 0 40px rgba(0,0,0,0.5);
}
#pyramidCanvas { display: block; }

/* Drop button */
.drop-btn {
  margin-top: 16px; padding: 14px 48px; border-radius: 12px; border: none;
  cursor: pointer; font-family: 'Orbitron', monospace; font-size: 16px;
  font-weight: 700; letter-spacing: 3px;
  background: linear-gradient(135deg, #c9a84c, #f0c060, #a07830);
  color: #080600; transition: all 0.2s;
  box-shadow: 0 0 30px rgba(240,192,96,0.3);
}
.drop-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 40px rgba(240,192,96,0.5); }
.drop-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Multipliers row */
.multipliers-row {
  display: flex; gap: 3px; margin-top: 8px; justify-content: center;
}
.mult-cell {
  flex: 1; padding: 6px 2px; text-align: center; border-radius: 6px;
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 700;
  transition: all 0.3s;
}
.mult-cell.hit {
  animation: multHit 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes multHit {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.4); }
  60%  { transform: scale(0.9); }
  100% { transform: scale(1); }
}

/* Result display */
.pyramid-result {
  min-height: 52px; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 4px; margin-top: 8px;
}
.pyramid-result-big {
  font-family: 'Orbitron', monospace; font-size: 32px; font-weight: 700;
  animation: resultPop 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes resultPop { from{transform:scale(0.5);opacity:0} 70%{transform:scale(1.1)} to{transform:scale(1);opacity:1} }
.pyramid-result-big.win { color: var(--gold); text-shadow: 0 0 30px rgba(240,192,96,0.6); }
.pyramid-result-big.lose { color: rgba(232,224,208,0.3); }
.pyramid-result-mult { font-size: 13px; color: rgba(232,224,208,0.4); }

/* Right panel */
.pyr-panel {
  background: rgba(8,8,18,0.7); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px; backdrop-filter: blur(16px);
}
.pyr-panel-title {
  font-size: 9px; letter-spacing: 3px; color: rgba(232,224,208,0.3);
  text-transform: uppercase; margin-bottom: 12px;
}
.risk-tabs { display: flex; gap: 5px; margin-bottom: 14px; }
.risk-tab {
  flex: 1; padding: 7px; border-radius: 7px; border: 1px solid var(--border);
  background: rgba(0,0,0,0.3); cursor: pointer; font-size: 10px; font-weight: 700;
  text-align: center; transition: all 0.2s; color: rgba(232,224,208,0.4);
  font-family: 'Space Grotesk', sans-serif;
}
.risk-tab.active { border-color: var(--gold); color: var(--gold); background: rgba(240,192,96,0.08); }
.risk-tab.low    { }
.risk-tab.medium { }
.risk-tab.high   { }

.auto-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.auto-toggle {
  width: 40px; height: 22px; border-radius: 11px; border: 1px solid var(--border);
  background: rgba(0,0,0,0.4); cursor: pointer; position: relative; transition: all 0.2s;
}
.auto-toggle.on { background: rgba(240,192,96,0.2); border-color: rgba(240,192,96,0.4); }
.auto-dot {
  position: absolute; width: 16px; height: 16px; border-radius: 50%;
  background: rgba(232,224,208,0.3); top: 2px; left: 2px; transition: all 0.2s;
}
.auto-toggle.on .auto-dot { left: 20px; background: var(--gold); }

.history-list { display: flex; flex-direction: column; gap: 4px; max-height: 200px; overflow-y: auto; }
.history-item {
  display: flex; justify-content: space-between; padding: 6px 10px;
  border-radius: 7px; font-size: 11px; background: rgba(0,0,0,0.2);
  font-family: 'DM Mono', monospace;
}
.history-item.win { border-left: 2px solid rgba(240,192,96,0.4); color: var(--gold); }
.history-item.lose { border-left: 2px solid rgba(255,61,113,0.3); color: rgba(232,224,208,0.4); }

.stats-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; }
.stats-row:last-child { border-bottom: none; }
.stats-row span { color: rgba(232,224,208,0.4); }
.stats-row strong { color: var(--gold); font-family: 'DM Mono', monospace; }

@media (max-width: 768px) {
  .pyramid-scene { flex-direction: column !important; padding: 12px !important; }
  .pyramid-right { width: 100% !important; }
  #pyramidCanvas { width: 100% !important; height: auto !important; }
}


/* ═══════════════════════════════════════════════════
   SUPPORT CHAT

/* ═══ LOBBY UPGRADE ═══ */

/* Animated gradient background */
.lobby {
  background:
    radial-gradient(ellipse at 20% 50%, rgba(245,158,11,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(245,158,11,0.03) 0%, transparent 50%);
}

/* Hero title bigger and more impressive */
.lobby-hero h2 {
  font-size: 52px !important;
  letter-spacing: 4px !important;
  background: linear-gradient(135deg, #f0c060, #fff8e0, #e8b840, #f0c060) !important;
  background-size: 300% 300% !important;
  -webkit-background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  background-clip: text !important;
  animation: goldShimmer 4s ease infinite !important;
}
@keyframes goldShimmer {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}

/* Game cards — bigger hover effect */
.game-card {
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), box-shadow 0.25s ease !important;
}
.game-card:hover {
  transform: translateY(-8px) scale(1.03) !important;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(240,192,96,0.15) !important;
}

/* Jackpot ticker — more prominent */
.jackpot-ticker {
  background: linear-gradient(90deg, rgba(240,192,96,0.15), rgba(240,192,96,0.25), rgba(240,192,96,0.15)) !important;
  border: 1px solid rgba(240,192,96,0.4) !important;
  box-shadow: 0 0 20px rgba(240,192,96,0.15) !important;
}
.jackpot-ticker-val {
  font-size: 18px !important;
  animation: jackpotPulse 1.5s ease infinite alternate !important;
}
@keyframes jackpotPulse {
  from { text-shadow: 0 0 10px rgba(240,192,96,0.5); }
  to   { text-shadow: 0 0 30px rgba(240,192,96,1), 0 0 60px rgba(240,192,96,0.4); }
}

/* Level pill shine */
.lvl-pill {
  background: linear-gradient(135deg, rgba(240,192,96,0.2), rgba(240,192,96,0.08)) !important;
  border-color: rgba(240,192,96,0.4) !important;
}

/* Token chip glow */
.token-chip {
  box-shadow: 0 0 15px rgba(240,192,96,0.2) !important;
}

/* Game badge pop */
.game-badge {
  animation: badgeBounce 2s ease infinite !important;
}
@keyframes badgeBounce {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.1); }
}

/* Header logo bigger */
.header-logo {
  font-size: 18px !important;
  letter-spacing: 4px !important;
  text-shadow: 0 0 20px rgba(240,192,96,0.4) !important;
}

/* Floating particles in lobby */
@keyframes floatUp {
  0%   { transform: translateY(0) rotate(0deg); opacity: 0.6; }
  100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
}

@keyframes cReelBlur {
  0%   { transform:translateY(0);   filter:blur(0px) brightness(0.8); }
  50%  { transform:translateY(-6px);filter:blur(2.5px) brightness(1.2); }
  100% { transform:translateY(0);   filter:blur(0px) brightness(0.8); }
}
@keyframes cWinPulse { from{transform:scale(1)} to{transform:scale(1.07);filter:brightness(1.3)} }
@keyframes winTextIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }

/* Stats chips more visible */
.stat-chip {
  background: rgba(240,192,96,0.08) !important;
  border: 1px solid rgba(240,192,96,0.2) !important;
  color: rgba(232,224,208,0.8) !important;
}
.stat-chip strong {
  color: var(--gold) !important;
}

/* VIP divider golden glow */
.vip-divider {
  box-shadow: 0 0 20px rgba(240,192,96,0.4) !important;
}

/* Subtitle text more visible */
.lobby-hero p {
  color: rgba(232,224,208,0.45) !important;
  font-size: 12px !important;
  letter-spacing: 6px !important;
}

/* Game icon wrap glow on hover */
.game-card:hover .game-icon-wrap {
  background: rgba(240,192,96,0.12) !important;
  box-shadow: 0 0 20px rgba(240,192,96,0.2) !important;
}

/* AI insight chip */
.ai-insight {
  background: rgba(245,158,11,0.06) !important;
  border-color: rgba(245,158,11,0.18) !important;
  color: rgba(251,191,36,0.7) !important;
  font-size: 11px !important;
}

/* Mobile nav active tab gold */
.mobile-nav-btn.active {
  color: #f0c060 !important;
  text-shadow: 0 0 10px rgba(240,192,96,0.5) !important;
}

/* Hero cards bigger */
.hero-cards {
  height: 140px !important;
  margin: 24px auto -10px !important;
}
.hero-card {
  width: 66px !important;
  height: 94px !important;
  font-size: 32px !important;
  box-shadow: 0 12px 40px rgba(0,0,0,0.7), 0 0 20px rgba(240,192,96,0.1) !important;
}


/* ═══════════════════════════════════════════════════
   PROFESSIONAL PLATFORM LAYOUT (topsport level)
═══════════════════════════════════════════════════ */

/* ── App shell ── */
.app-shell { display:flex; flex-direction:column; min-height:100vh; position:relative; z-index:1; }

/* ══════════════════════════════════════════
   TOPBAR — Las Vegas black/gold crown bar
══════════════════════════════════════════ */
/* ══════════════════════════════════════════
   TOP NAV — mint-level premium gold
══════════════════════════════════════════ */
.topbar {
  height:72px; display:flex; align-items:center;
  /* Gold coins background — lighter overlay so coins are clearly visible */
  background:
    linear-gradient(180deg, rgba(4,3,8,.52) 0%, rgba(5,4,10,.60) 100%),
    url('/img/topbar-bg.jpg') center/cover no-repeat;
  border-bottom:1px solid rgba(201,168,76,.28);
  box-shadow:0 1px 0 rgba(201,168,76,.18), 0 8px 32px rgba(0,0,0,.6);
  position:sticky; top:0; z-index:200;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  padding:0 28px; flex-shrink:0;
}
.topbar-logo {
  flex-shrink:0; cursor:pointer;
  display:flex; align-items:center; gap:10px;
}
/* Hathor goddess icon */
.topbar-logo-img {
  width:44px; height:44px; border-radius:12px; flex-shrink:0;
  object-fit:cover;
  filter:drop-shadow(0 0 12px rgba(201,168,76,.7));
  transition:filter .3s, transform .25s;
}
/* HATHOR text — CSS gold gradient (correct proportions, always readable) */
.topbar-logo-wordmark {
  font-family:'Cinzel Decorative',serif;
  font-size:20px; font-weight:900; letter-spacing:3px;
  background:linear-gradient(180deg, #ffd680 0%, #f0c060 35%, #c9a84c 65%, #b8920e 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  white-space:nowrap;
  filter:drop-shadow(0 1px 6px rgba(201,168,76,.4));
  transition:filter .3s;
}
.topbar-logo-sub {
  font-family:'Cinzel',serif; font-size:7px; letter-spacing:5px;
  color:rgba(201,168,76,.4); -webkit-text-fill-color:rgba(201,168,76,.4);
  white-space:nowrap; display:block; margin-top:2px;
}
.topbar-logo:hover .topbar-logo-img { filter:drop-shadow(0 0 20px rgba(201,168,76,.9)); transform:scale(1.05); }
.topbar-logo:hover .topbar-logo-wordmark { filter:drop-shadow(0 1px 12px rgba(201,168,76,.65)); }
/* compat — hide old image-based text */
.topbar-text-img { display:none; }
.topbar-logo-full-img { display:none; }
.topbar-logo-text { display:none; }
.topbar-logo span { display:none; }
/* CENTER nav — absolute center of topbar */
.topbar-nav {
  position:absolute; left:50%; transform:translateX(-50%);
  display:flex; gap:2px; background:rgba(0,0,0,.3);
  border:1px solid rgba(201,168,76,.1); border-radius:100px;
  padding:4px;
}
.topbar-btn {
  padding:8px 20px; border-radius:100px; border:none;
  background:transparent; color:rgba(201,168,76,.4);
  font-family:'Space Grotesk',sans-serif;
  font-size:12px; font-weight:600; letter-spacing:.5px; cursor:pointer;
  transition:all .2s cubic-bezier(.4,0,.2,1); white-space:nowrap;
  display:flex; align-items:center; gap:6px;
}
.topbar-btn:hover { color:rgba(201,168,76,.75); background:rgba(201,168,76,.06); }
.topbar-btn.active {
  color:#0a0600; font-weight:700;
  background:linear-gradient(135deg,#e8c060 0%,#c9a84c 50%,#a07828 100%);
  box-shadow:0 2px 12px rgba(201,168,76,.35);
}
.topbar-right { display:flex; align-items:center; gap:10px; flex-shrink:0; margin-left:auto; }
.tb-balance {
  display:flex; align-items:center; gap:10px;
  background:rgba(201,168,76,.06); border:1px solid rgba(201,168,76,.15);
  border-radius:100px; padding:8px 18px;
  transition:all .2s;
}
.tb-balance:hover { border-color:rgba(201,168,76,.3); background:rgba(201,168,76,.1); }
.tb-bal-label { font-family:'Space Grotesk',sans-serif; font-size:9px; letter-spacing:2px; color:rgba(201,168,76,.4); text-transform:uppercase; }
.tb-bal-amount { font-family:'DM Mono',monospace; font-size:15px; font-weight:700; color:var(--gold2); }
.tb-user-btn {
  width:40px; height:40px; border-radius:50%;
  background:rgba(201,168,76,.08); border:1.5px solid rgba(201,168,76,.2);
  cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
  transition:all .2s; overflow:hidden;
}
.tb-user-btn:hover { border-color:var(--gold); box-shadow:0 0 16px rgba(201,168,76,.3); }
.tb-cashier {
  padding: 9px 22px; border-radius: 10px;
  background-image: url('/img/btn-primary.png');
  background-size: cover;
  background-position: center;
  color: #150800;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px; font-weight: 900;
  cursor: pointer; letter-spacing: 1px;
  white-space: nowrap;
  text-transform: uppercase;
  text-shadow: 0 1px 0 rgba(255,245,140,0.6);
  border: none;
  border-top: 1px solid rgba(255,252,160,0.7);
  border-bottom: 1px solid rgba(60,30,0,0.8);
  transition: transform 0.1s, box-shadow 0.1s, filter 0.15s;
  box-shadow:
    0 5px 0 #4a2e04,
    0 7px 18px rgba(0,0,0,0.65),
    0 0 24px rgba(201,168,76,0.22),
    inset 0 1px 0 rgba(255,255,180,0.55),
    inset 0 -2px 3px rgba(0,0,0,0.2);
  position: relative; overflow: hidden;
}
.tb-cashier::before {
  content: '';
  position: absolute; top: 0; left: -80%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
  transform: skewX(-20deg);
  transition: left 0.5s ease;
  pointer-events: none;
}
.tb-cashier:hover {
  transform: translateY(-2px);
  filter: brightness(1.08);
  box-shadow:
    0 7px 0 #4a2e04,
    0 12px 28px rgba(201,168,76,0.55),
    0 0 36px rgba(240,192,96,0.3),
    inset 0 1px 0 rgba(255,255,200,0.65);
}
.tb-cashier:hover::before { left: 140%; }
.tb-cashier:active {
  transform: translateY(3px);
  box-shadow: 0 2px 0 #4a2e04, 0 2px 8px rgba(0,0,0,0.5) !important;
}
.tb-logout {
  width:36px; height:36px; border-radius:50%; border:1px solid rgba(192,57,76,.2);
  background:transparent; color:rgba(192,100,110,.4); font-size:14px;
  cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center;
}
.tb-logout:hover { background:rgba(192,57,76,.1); color:#e07080; border-color:rgba(192,57,76,.4); }

/* ── Menu button — ALWAYS visible ── */
.ham-btn {
  display:flex; flex-direction:column; justify-content:center; gap:5px;
  width:40px; height:40px; background:rgba(201,168,76,0.05);
  border:1px solid rgba(201,168,76,0.12); border-radius:10px;
  cursor:pointer; padding:8px; margin-right:12px; flex-shrink:0;
  transition:all .2s;
}
.ham-btn:hover { background:rgba(201,168,76,0.1); border-color:rgba(201,168,76,0.3); }
.ham-btn.open { background:rgba(201,168,76,0.12); border-color:rgba(201,168,76,0.4); }
.ham-btn span { display:block; height:2px; background:rgba(201,168,76,.55); border-radius:2px; transition:all .22s cubic-bezier(.4,0,.2,1); }
.ham-btn.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); background:rgba(240,192,96,.9); }
.ham-btn.open span:nth-child(2) { opacity:0; }
.ham-btn.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); background:rgba(240,192,96,.9); }

/* ══════════════════════════════════════════
   MOBILE BOTTOM NAV
══════════════════════════════════════════ */
.bottom-nav {
  display:none;
  position:fixed; bottom:0; left:0; right:0; z-index:300;
  height:68px;
  background:rgba(6,5,3,.97);
  border-top:1px solid rgba(201,168,76,.12);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  padding:0 8px env(safe-area-inset-bottom,0);
  justify-content:space-around; align-items:center;
}
.bn-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  gap:3px; padding:6px 4px; border:none; background:transparent;
  cursor:pointer; transition:all .2s; border-radius:12px;
}
.bn-icon { font-size:22px; transition:transform .2s; line-height:1; }
.bn-label {
  font-family:'Space Grotesk',sans-serif; font-size:9px; font-weight:600;
  letter-spacing:.5px; color:rgba(201,168,76,.35); transition:color .2s;
}
.bn-item.active .bn-icon { transform:scale(1.15); }
.bn-item.active .bn-label { color:var(--gold2); }
.bn-item:hover .bn-label { color:rgba(201,168,76,.7); }
.bn-item.active { background:rgba(201,168,76,.07); }

/* ══════════════════════════════════════════
   LIVE WINNERS TICKER
══════════════════════════════════════════ */
.winners-ticker {
  display:flex; align-items:center;
  height:38px; overflow:hidden;
  background:rgba(4,3,1,0.98);
  border-bottom:1px solid rgba(201,168,76,0.07);
  flex-shrink:0; position:relative;
}
.winners-ticker::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:140px; z-index:2;
  background:linear-gradient(90deg,rgba(4,3,1,1) 60%,rgba(4,3,1,0));
  pointer-events:none;
}
.winners-ticker::after {
  content:''; position:absolute; right:0; top:0; bottom:0; width:60px; z-index:2;
  background:linear-gradient(270deg,rgba(4,3,1,1) 40%,rgba(4,3,1,0));
  pointer-events:none;
}
.wt-label {
  position:absolute; left:16px; z-index:3;
  font-family:'Space Grotesk',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:2px; color:rgba(201,168,76,0.45); white-space:nowrap;
  display:flex; align-items:center; gap:6px;
}
.wt-label::before {
  content:''; width:6px; height:6px; border-radius:50%;
  background:#4caf7c; animation:liveDot 1.2s ease-in-out infinite;
}
@keyframes liveDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(0.7)} }
.wt-track-wrap { flex:1; overflow:hidden; margin-left:130px; }
.wt-track { display:flex; gap:0; animation:tickerScroll 40s linear infinite; white-space:nowrap; }
.wt-track:hover { animation-play-state:paused; }
@keyframes tickerScroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.wt-item {
  display:inline-flex; align-items:center; gap:8px;
  padding:0 28px; border-right:1px solid rgba(201,168,76,0.07);
  flex-shrink:0;
}
.wt-av { display:inline-flex; align-items:center; }
.wt-av-img { width:20px; height:20px; border-radius:50%; object-fit:cover; border:1px solid rgba(201,168,76,0.3); vertical-align:middle; }
.wt-name { font-family:'Space Grotesk',sans-serif; font-size:11px; color:rgba(201,168,76,0.55); font-weight:600; }
.wt-game { font-size:10px; color:rgba(201,168,76,0.28); }
.wt-sep { color:rgba(201,168,76,0.15); font-size:10px; }
.wt-amt { font-family:'DM Mono',monospace; font-size:12px; color:#4caf7c; font-weight:700; letter-spacing:0.5px; }

/* ══════════════════════════════════════════
   PROMO CARDS ROW
══════════════════════════════════════════ */
.promo-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:32px; }
.promo-card {
  border-radius: 20px; padding: 22px 24px 20px; position: relative; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
  transition: transform .3s cubic-bezier(.22,1,.36,1), box-shadow .3s;
  display: flex; flex-direction: column; gap: 6px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.07);
}
.promo-card:hover {
  transform: translateY(-6px) scale(1.012);
}
/* Top shimmer line */
.promo-card::before {
  content: '';
  position: absolute; top: 0; left: -100%; width: 60%; height: 1px;
  z-index: 3;
  transition: left 0.6s ease;
}
.promo-card:hover::before { left: 140%; }
/* Bottom fade */
.promo-card::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0) 20%, rgba(0,0,0,0.7) 100%);
  z-index: 1; pointer-events: none; border-radius: 20px;
}
.promo-card > * { position: relative; z-index: 2; }

.pc-welcome {

    linear-gradient(135deg,rgba(20,14,4,.82) 0%,rgba(12,8,1,.78) 55%,rgba(18,10,4,.88) 100%),

/* DAILY — žalias */

.pc-daily:hover { box-shadow: 0 20px 50px rgba(0,0,0,.75), 0 0 40px rgba(76,200,140,.2); }

.pc-badge {
  font-family: 'Space Grotesk', sans-serif; font-size: 9px; font-weight: 800;

.pc-vip .pc-badge { color: rgba(200,160,255,0.75); }

.pc-title {
  font-family: 'Cinzel', serif; font-size: 22px; font-weight: 900;

/* ══════════════════════════════════════════
   MINT-STYLE ANIMATED HERO
══════════════════════════════════════════ */
@keyframes heroGradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
@keyframes floatUp {
  0%   { transform: translateY(0px) rotate(0deg); opacity:.7; }
  50%  { transform: translateY(-18px) rotate(6deg); opacity:1; }
  100% { transform: translateY(0px) rotate(0deg); opacity:.7; }
}
@keyframes floatUpB {
  0%   { transform: translateY(0px) rotate(-4deg); opacity:.5; }
  50%  { transform: translateY(-22px) rotate(4deg); opacity:.9; }
  100% { transform: translateY(0px) rotate(-4deg); opacity:.5; }
}
@keyframes floatUpC {
  0%   { transform: translateY(0px) rotate(8deg) scale(1); opacity:.6; }
  50%  { transform: translateY(-14px) rotate(-2deg) scale(1.05); opacity:.95; }
  100% { transform: translateY(0px) rotate(8deg) scale(1); opacity:.6; }
}
@keyframes coinSpin {
  0%   { transform: rotateY(0deg) translateY(0px); }
  50%  { transform: rotateY(180deg) translateY(-10px); }
  100% { transform: rotateY(360deg) translateY(0px); }
}
@keyframes tickerScroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes pulseGlow {
  0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
  50%      { box-shadow: 0 0 20px 4px rgba(201,168,76,0.2); }
}
@keyframes countUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.mint-hero {
  position:relative; border-radius:24px; overflow:visible;
  margin-bottom:28px; min-height:360px;
  background: url('/img/hero-casino.webp?v=2') center/cover no-repeat;
  border:1px solid rgba(201,168,76,0.22);
  box-shadow: 0 0 0 1px rgba(201,168,76,0.08) inset, 0 32px 80px rgba(0,0,0,0.9), 0 0 60px rgba(201,168,76,0.05) inset;
  display:flex; align-items:stretch;
}
.mint-hero::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(201,168,76,.5) 30%,rgba(240,192,96,.8) 50%,rgba(201,168,76,.5) 70%,transparent 100%);

}
.mint-hero-bg {

    linear-gradient(to right, rgba(4,3,10,0.88) 0%, rgba(4,3,10,0.72) 45%, rgba(4,3,10,0.35) 75%, rgba(4,3,10,0.15) 100%),

.mint-hero-grid {

  background-image: linear-gradient(rgba(201,168,76,0.06) 1px, transparent 1px),

}
/* floating deco elements */
.mint-float-el {

  letter-spacing:3px; white-space:nowrap;
  box-shadow:0 4px 20px rgba(201,168,76,.5), inset 0 1px 0 rgba(255,240,160,.3);
  text-transform:uppercase;
}

/* ── Jackpot bar ── */
.jackpot-bar {
  display:flex; align-items:center; gap:14px;
  background:linear-gradient(90deg,rgba(201,168,76,.1),rgba(201,168,76,.04),rgba(201,168,76,.1));
  border:1px solid rgba(201,168,76,.18); border-radius:2px;
  padding:12px 22px; margin-bottom:22px;
  box-shadow:inset 0 1px 0 rgba(201,168,76,.1);
}
.jackpot-bar-label { font-family:'Cinzel',serif; font-size:9px; letter-spacing:4px; color:rgba(201,168,76,.5); text-transform:uppercase; }
.jackpot-bar-amount { font-family:'Orbitron',monospace; font-size:20px; font-weight:900; color:var(--gold); }
.jackpot-bar-pulse { width:8px; height:8px; border-radius:50%; background:var(--gold); animation:pulse 1.5s infinite; margin-left:auto; }

/* ── AI insight in lobby ── */
.ai-insight { display:inline-flex; align-items:flex-start; gap:8px; padding:8px 14px; background:rgba(245,158,11,.06); border:1px solid rgba(245,158,11,.15); border-radius:10px; font-size:11px; color:rgba(251,191,36,.7); line-height:1.5; margin-top:10px; }

/* ── Lobby card entrance animation ── */
@keyframes cardIn {
  from { opacity:0; transform:translateY(22px) scale(0.96); }
  to   { opacity:1; transform:translateY(0)    scale(1); }
}
.gcard-pro { animation:cardIn 0.42s cubic-bezier(0.22,1,0.36,1) both; }

/* ── Hero stats count-up pulse ── */
@keyframes statPop {
  0%   { transform:scale(1); }
  50%  { transform:scale(1.12); color:#f0c060; }
  100% { transform:scale(1); }
}
.hero-stat-val { transition:all 0.3s; }
.hero-stat-val.pop { animation:statPop 0.4s ease; }

/* ── Leaderboard live pulse ── */
@keyframes lbIn {
  from { opacity:0; transform:translateX(-12px); }
  to   { opacity:1; transform:translateX(0); }
}
.lb-row { animation:lbIn 0.35s ease both; }
.lb-live-dot { width:7px; height:7px; border-radius:50%; background:#4cff88;
  box-shadow:0 0 8px #4cff88; animation:pulse 1.4s ease infinite; display:inline-block; margin-right:6px; }

/* ── Mobile sidebar overlay ── */
