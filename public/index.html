          ctx.beginPath(); ctx.arc(peg.x,peg.y,12,0,Math.PI*2);
          ctx.fillStyle=g; ctx.fill();
        }
        ctx.beginPath(); ctx.arc(peg.x,peg.y,peg.r,0,Math.PI*2);
        ctx.fillStyle=pegColor; ctx.fill();
        ctx.beginPath(); ctx.arc(peg.x-1,peg.y-1,1.5,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
      });

      // Draw bucket dividers
      for(let i=0; i<=17; i++) {
        ctx.strokeStyle='rgba(240,192,96,0.08)';
        ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(i*bucketW,H-45); ctx.lineTo(i*bucketW,H);
        ctx.stroke();
      }

      // Draw multiplier buckets
      profile.mults.forEach((m,i)=>{
        const x=i*bucketW, bw=bucketW;
        const isHit = stateRef.current.hitBucket===i && stateRef.current.hitTimer>0;
        if(isHit) stateRef.current.hitTimer--;
        // Color based on value
        let bg, glow;
        if(m>=10)      {bg='rgba(255,61,113,0.25)'; glow='rgba(255,61,113,0.6)';}
        else if(m>=5)  {bg='rgba(245,158,11,0.15)'; glow='rgba(245,158,11,0.5)';}
        else if(m>=2)  {bg='rgba(240,192,96,0.15)'; glow='rgba(240,192,96,0.4)';}
        else if(m>=1)  {bg='rgba(201,168,76,0.08)'; glow='rgba(201,168,76,0.3)';}
        else           {bg='rgba(255,255,255,0.03)'; glow='rgba(255,255,255,0.1)';}
        if(isHit) {
          ctx.fillStyle=glow.replace('0.','0.5'); ctx.fillRect(x+1,H-44,bw-2,43);
        } else {
          ctx.fillStyle=bg; ctx.fillRect(x+1,H-44,bw-2,43);
        }
        // Text
        ctx.fillStyle=isHit?'#fff':(m>=2?'#f0c060':'rgba(232,224,208,0.5)');
        ctx.font=`bold ${m>=10?11:10}px 'DM Mono'`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(m>=1?`×${m}`:m===0?'💀':`×${m}`, x+bw/2, H-22);
      });

      // Update & draw balls
      const doneBalls = [];
      stateRef.current.balls.forEach(ball=>{
        ball.update(stateRef.current.pegs, W, H);
        ball.draw(ctx);
        if(ball.landed) doneBalls.push(ball);
      });
      // Remove landed balls after delay
      doneBalls.forEach(ball=>{
        setTimeout(()=>{
          stateRef.current.balls = stateRef.current.balls.filter(b=>b!==ball);
        }, 1200);
      });

      rafRef.current = requestAnimationFrame(draw);
    };
    draw();
    return()=>cancelAnimationFrame(rafRef.current);
  }, [risk]);

  const drop = useCallback(()=>{
    if(droppingRef.current || user.tokens < bet) return;
    droppingRef.current = true;
    setDropping(true);
    setResult(null);

    setUser(u=>({...u,tokens:u.tokens-bet}));
    sfx.chip();

    const tgt = pickPyramidBucket(); // binomial — centre most likely, edges rare
    const ball = new PyramidBall(W, ROWS, tgt);
    stateRef.current.balls.push(ball);

    // Wait for ball to land
    const check = setInterval(()=>{
      if(ball.landed) {
        clearInterval(check);
        const profile = RISK_PROFILES[risk];
        const mult = profile.mults[ball.bucket];
        const won = Math.floor(bet * mult);
        stateRef.current.hitBucket = ball.bucket;
        stateRef.current.hitTimer = 40;

        if(won > 0) {
          setUser(u=>({...u,tokens:u.tokens+won}));
          sfx.win();
          if(mult >= 10) sfx.jackpot();
        } else {
          sfx.lose();
        }

        const res = {mult, won, bet};
        setResult(res);
        setHistory(h=>[{mult,won,bet,ts:Date.now()},...h].slice(0,20));
        setStats(s=>({
          plays: s.plays+1,
          wins: s.wins+(won>bet?1:0),
          totalWon: s.totalWon+won,
          totalBet: s.totalBet+bet,
          biggestMult: Math.max(s.biggestMult,mult),
        }));

        droppingRef.current = false;
        setDropping(false);

        // Auto drop
        if(autoRef.current) {
          setTimeout(()=>{ if(autoRef.current) drop(); }, 800);
        }
      }
    }, 50);
  }, [bet, risk, user.tokens]);

  const toggleAuto = ()=>{
    const next=!auto;
    setAuto(next); autoRef.current=next;
    if(next) drop();
  };

  const profile = RISK_PROFILES[risk];

  return(
    <div className="pyramid-scene">
      <div className="pyramid-left">
        <div className="pyramid-title">PYRAMID DROP</div>
        <div className="pyramid-sub">HATHOR ROYAL CASINO · ORIGINAL GAME</div>
        <div className="pyramid-canvas-wrap">
          <canvas ref={canvasRef} id="pyramidCanvas" width={W} height={H}/>
        </div>
        <div className="pyramid-result">
          {result ? (
            <>
              <div className={`pyramid-result-big ${result.won>0?'win':'lose'}`}>
                {result.won>0?`+${fmt(result.won)} 🪙`:'MISS'}
              </div>
              <div className="pyramid-result-mult">
                ×{result.mult} · Bet: {fmt(result.bet)}
              </div>
            </>
          ) : <div style={{color:'rgba(232,224,208,.2)',fontSize:13,letterSpacing:'2px'}}>DROP THE BALL</div>}
        </div>
        <button className="drop-btn" onClick={drop} disabled={dropping||user.tokens<bet||auto}>
          {dropping?'FALLING...':'⬇ DROP'}
        </button>
      </div>

      <div className="pyramid-right">
        {/* Risk */}
        <div className="pyr-panel">
          <div className="pyr-panel-title">Risk Level</div>
          <div className="risk-tabs">
            {['low','medium','high'].map(r=>(
              <button key={r} className={`risk-tab${risk===r?' active':''}`}
                style={risk===r?{borderColor:RISK_PROFILES[r].color,color:RISK_PROFILES[r].color,background:`${RISK_PROFILES[r].color}15`}:{}}
                onClick={()=>{sfx.click();setRisk(r);}}>
                {r.toUpperCase()}
              </button>
            ))}
          </div>
          {/* Bet */}
          <div className="pyr-panel-title">Bet Amount</div>
          <div className="bet-group" style={{marginBottom:8}}>
            <button className="bet-minus" onClick={()=>setBet(b=>Math.max(10,b-10))}>−</button>
            <div className="bet-display">🪙{fmt(bet)}</div>
            <button className="bet-plus" onClick={()=>setBet(b=>Math.min(user.tokens,b+50))}>+</button>
          </div>
          <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>
            {[50,100,500,1000,5000].map(v=>(
              <button key={v} className="preset" onClick={()=>setBet(Math.min(v,user.tokens))}>{fmt(v)}</button>
            ))}
          </div>
          {/* Auto */}
          <div className="auto-row">
            <span style={{fontSize:12,color:'rgba(232,224,208,.5)'}}>Auto Drop</span>
            <div className={`auto-toggle${auto?' on':''}`} onClick={toggleAuto}>
              <div className="auto-dot"/>
            </div>
          </div>
          <div style={{fontSize:10,color:'rgba(232,224,208,.2)',letterSpacing:'1px'}}>
            Max win: ×{Math.max(...profile.mults)} · House edge: ~3%
          </div>
        </div>

        {/* Stats */}
        <div className="pyr-panel">
          <div className="pyr-panel-title">Session Stats</div>
          <div className="stats-row"><span>Plays</span><strong>{stats.plays}</strong></div>
          <div className="stats-row"><span>Win rate</span><strong>{stats.plays>0?Math.round(stats.wins/stats.plays*100):0}%</strong></div>
          <div className="stats-row"><span>Best mult</span><strong>×{stats.biggestMult}</strong></div>
          <div className="stats-row"><span>Net</span><strong style={{color:stats.totalWon>=stats.totalBet?'var(--green)':'var(--red)'}}>
            {stats.totalWon>=stats.totalBet?'+':''}{fmt(stats.totalWon-stats.totalBet)}
          </strong></div>
        </div>

        {/* History */}
        <div className="pyr-panel" style={{flex:1}}>
          <div className="pyr-panel-title">Drop History</div>
          <div className="history-list">
            {history.length===0?<div style={{fontSize:11,color:'rgba(232,224,208,.2)',textAlign:'center',padding:'12px'}}>No drops yet</div>
              :history.map((h,i)=>(
                <div key={h.ts} className={`history-item ${h.won>h.bet?'win':'lose'}`}>
                  <span>×{h.mult}</span>
                  <span>{h.won>h.bet?'+':''}{fmt(h.won-h.bet)}</span>
                </div>
              ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function useMissions(user) {
  const [progress, setProgress] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('hrc_missions_'+user.uid)||'{}'); } catch{return {};}
  });
  const [newAchiev, setNewAchiev] = React.useState(null);

  const save = (p) => {
    localStorage.setItem('hrc_missions_'+user.uid, JSON.stringify(p));
    setProgress(p);
  };

  const update = (game, value=1) => {
    const p = {...progress};
    let changed = false;
    MISSIONS_DEF.forEach(m => {
      if(m.game !== game) return;
      if(p[m.id]?.done) return;
      const prev = p[m.id]?.count || 0;
      const next = game === 'balance' ? value : Math.min(prev + value, m.goal);
      if(next !== prev) {
        p[m.id] = {count: next, done: next >= m.goal};
        if(next >= m.goal && !progress[m.id]?.done) {
          changed = true;
          setNewAchiev(m);
          setTimeout(() => setNewAchiev(null), 4000);
          sfx.lv();
        }
      }
    });
    if(changed || JSON.stringify(p) !== JSON.stringify(progress)) save(p);
  };

  const getProgress = (m) => {
    const p = progress[m.id];
    if(!p) return 0;
    return Math.min(100, Math.round((p.count||0) / m.goal * 100));
  };

  return { progress, update, getProgress, newAchiev };
}

function SocialWins({t={}}) {
  const [wins, setWins] = React.useState([]);
  const FAKE_NAMES = ['CryptoKing','VikingX','NightRider','GoldPanda','RoyalFlush','AceHunter','SkyWalker','DiamondX'];
  const FAKE_GAMES = ['🎰 Slots','♠ Casino Hold\'em','🐉 Dragon Tower','🎲 Plinko','🎡 Roulette'];

  // Gold coin shower — premium, no birthday confetti
  const spawnGoldShower = () => {
    const c = document.createElement('canvas');
    c.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:450;';
    c.width=window.innerWidth; c.height=window.innerHeight;
    document.body.appendChild(c);
    const ctx=c.getContext('2d');
    const cols=['#ffd700','#f0c060','#ffa500','#ffe566','#fff4b0','#ffffff'];
    const coins=Array.from({length:80},()=>({
      x:Math.random()*c.width, y:-15-Math.random()*120,
      vx:(Math.random()-0.5)*2.5, vy:1.8+Math.random()*4,
      r:3+Math.random()*6, color:cols[Math.floor(Math.random()*cols.length)],
      sq:Math.random(), sqV:0.025+Math.random()*0.04
    }));
    const t0=Date.now();
    function draw(){
      ctx.clearRect(0,0,c.width,c.height);
      const age=Date.now()-t0;
      const fade=age>2200?Math.max(0,1-(age-2200)/900):1;
      if(fade<=0){c.remove();return;}
      for(const p of coins){
        p.x+=p.vx; p.y+=p.vy; p.sq=(p.sq+p.sqV)%1;
        if(p.y>c.height+20)continue;
        const cw=Math.max(0.5,p.r*Math.abs(Math.cos(p.sq*Math.PI)));
        ctx.save();
        ctx.globalAlpha=fade;
        ctx.fillStyle=p.color;
        ctx.shadowColor=p.color; ctx.shadowBlur=7;
        ctx.beginPath();
        ctx.ellipse(p.x,p.y,cw,p.r,0,0,Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
      requestAnimationFrame(draw);
    }
    draw();
  };

  React.useEffect(()=>{
    socket.on('bigWin',({name,amount,game})=>{
      const id=Date.now();
      setWins(w=>[...w,{id,name,amount,game}]);
      if(amount>=50000) spawnGoldShower();
      setTimeout(()=>setWins(w=>w.filter(x=>x.id!==id)),5000);
    });
    // Big wins only, every ~5 minutes
    const sim=()=>{
      const name=FAKE_NAMES[Math.floor(Math.random()*FAKE_NAMES.length)];
      const amount=(Math.floor(Math.random()*450)+50)*1000; // 50k – 500k
      const game=FAKE_GAMES[Math.floor(Math.random()*FAKE_GAMES.length)];
      const id=Date.now();
      setWins(w=>[...w,{id,name,amount,game}]);
      spawnGoldShower();
      setTimeout(()=>setWins(w=>w.filter(x=>x.id!==id)),5000);
    };
    const iv=setInterval(sim, 270000+Math.random()*60000); // 4.5 – 5.5 min
    const first=setTimeout(sim, 90000); // first after 1.5 min
    return()=>{ socket.off('bigWin'); clearInterval(iv); clearTimeout(first); };
  },[]);

  return(
    <div style={{position:'fixed',bottom:90,left:24,zIndex:400,display:'flex',flexDirection:'column',gap:8}}>
      {wins.slice(-2).map(w=>(
        <div className="social-win" key={w.id}>
          <div className="sw-name">🏆 {w.name}</div>
          <div className="sw-msg">{w.game} {t.won||'won'}</div>
          <div className="sw-amount">+{w.amount.toLocaleString()} 🪙</div>
        </div>
      ))}
    </div>
  );
}

function useAIPersonalization(user) {
  const [insight, setInsight] = React.useState(null);

  React.useEffect(()=>{
    if(!user) return;
    // Analyze user patterns
    const now = new Date();
    const hour = now.getHours();
    const stored = JSON.parse(localStorage.getItem('hrc_ai_data_'+user.uid)||'{"sessions":[],"favGame":null,"bestHour":null}');

    // Track session
    stored.sessions.push({hour, ts: Date.now()});
    if(stored.sessions.length > 50) stored.sessions = stored.sessions.slice(-50);

    // Find best hour
    const hourCounts = {};
    stored.sessions.forEach(s=>{ hourCounts[s.hour]=(hourCounts[s.hour]||0)+1; });
    const bestHour = Object.entries(hourCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
    stored.bestHour = bestHour;

    localStorage.setItem('hrc_ai_data_'+user.uid, JSON.stringify(stored));

    // Generate insight
    if(bestHour && stored.sessions.length >= 3) {
      const h = parseInt(bestHour);
      const timeLabel = h < 12 ? 'morning' : h < 18 ? 'afternoon' : 'evening';
      const insights = [
        `🕐 Best hour: ${h}:00`,
        user.tokens > 50000 ? `💎 Great balance! Try VIP slots` : `🎯 ${(10000-user.tokens%10000).toLocaleString()} tokens to next level`,
        `🎰 ${stored.sessions.length} sessions played — keep it up!`,
      ];
      setInsight(insights[Math.floor(Math.random()*insights.length)]);
    }
  }, [user?.uid]);

  return insight;
}

function MusicBtn({sidebar=false}){
  const [on,setOn]=useState(false);
  const [track,setTrack]=useState(0);
  const ac=useRef(null);
  const iv=useRef(null);

  // 3 "ambient casino" tracks using Web Audio API
  const TRACKS=[

  ];

  function stopAudio(){
    if(ac.current){try{ac.current.close();}catch(e){}ac.current=null;}
    if(iv.current){clearInterval(iv.current);iv.current=null;}
  }

  function startAudio(trackIdx){
    stopAudio();
    try{
      var ctx=new(window.AudioContext||window.webkitAudioContext)();
      ac.current=ctx;
      var tr=TRACKS[trackIdx];
      var ci=0;
      function play(){
        if(!ac.current)return;
        var t=ctx.currentTime;
        tr.chords[ci%tr.chords.length].forEach(function(f,j){
          var o=ctx.createOscillator(),g=ctx.createGain(),rev=ctx.createGain();
          o.connect(g);g.connect(rev);rev.connect(ctx.destination);
          o.type=tr.type[j]||'sine';o.frequency.value=f;
          var vol=j===0?0.045:j===1?0.02:j===2?0.015:0.01;
          g.gain.setValueAtTime(0,t);
          g.gain.linearRampToValueAtTime(vol,t+0.4);
          g.gain.linearRampToValueAtTime(vol*0.7,t+2);
          g.gain.linearRampToValueAtTime(0,t+(tr.interval/1000)*0.95);
          rev.gain.value=0.85;
          o.start(t);o.stop(t+(tr.interval/1000)+0.2);
        });ci++;
      }
      play();
      iv.current=setInterval(function(){if(ac.current)play();},tr.interval);
      setOn(true);
    }catch(e){}
  }

  function toggle(){
    if(on){stopAudio();setOn(false);}
    else{startAudio(track);}
  }

  function nextTrack(){
    var next=(track+1)%TRACKS.length;
    setTrack(next);
    if(on){startAudio(next);}
  }

  useEffect(()=>()=>stopAudio(),[]);

  if(sidebar){
    return(
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button onClick={toggle} style={{
          display:'flex',alignItems:'center',gap:8,padding:'8px 14px',borderRadius:10,

// roundRect stub — kept for any remaining internal use
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

    bg.addColorStop(0,'#1a1a1a'); bg.addColorStop(1,'#0a0a0a');
    ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
    const l=ctx.createRadialGradient(w/2,h*0.35,0,w/2,h*0.35,w*0.6);
    l.addColorStop(0,'rgba(255,220,100,0.07)'); l.addColorStop(1,'transparent');
    ctx.fillStyle=l; ctx.fillRect(0,0,w,h);
    function drawCard(x,y,rota,isAce) {
      ctx.save(); ctx.translate(x,y); ctx.rotate(rota);
      const cw=w*0.52,ch=h*0.48;
      ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=16; ctx.shadowOffsetX=4; ctx.shadowOffsetY=6;
      ctx.beginPath(); roundRect(ctx,-cw/2,-ch/2,cw,ch,8);
      ctx.fillStyle=isAce?'#fafafa':'#f1f5f9'; ctx.fill();
      ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
      ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=1; ctx.stroke();
      if(isAce){
        ctx.font=`bold ${cw*0.62}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.save(); ctx.shadowColor='#111'; ctx.shadowBlur=4;
        ctx.fillStyle='#111'; ctx.fillText('\u2660',0,4); ctx.restore();
        ctx.font=`bold ${cw*0.22}px Arial`; ctx.fillStyle='#111';
        ctx.fillText('A',-cw*0.35,-ch*0.37);
      } else {
        ctx.font=`bold ${cw*0.55}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillStyle='#dc2626'; ctx.fillText('\u2665',0,4);
        ctx.font=`bold ${cw*0.22}px Arial`; ctx.fillStyle='#dc2626';
        ctx.fillText('K',-cw*0.35,-ch*0.37);
      }
      ctx.restore();
    }
    drawCard(w*0.42,h*0.38,-0.15,false);
    drawCard(w*0.58,h*0.4, 0.1, true);
    const gl=ctx.createRadialGradient(w/2,h*0.62,0,w/2,h*0.62,w*0.4);
    gl.addColorStop(0,'rgba(245,158,11,0.08)'); gl.addColorStop(1,'transparent');
    ctx.fillStyle=gl; ctx.fillRect(0,0,w,h);
    ctx.font=`bold ${w*0.09}px Arial`; ctx.textAlign='center';
    ctx.fillStyle='rgba(245,158,11,0.6)'; ctx.fillText('21',w/2,h*0.82);
  },

  poker(ctx, w, h) {
    const bg=ctx.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,'#1c0505'); bg.addColorStop(1,'#0a0202');
    ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
    const chipColors=['#dc2626','#1e3a8a','#166534','#92400e','#4c1d95'];
    for(let i=4;i>=0;i--){
      const cy2=h*0.72-i*h*0.045;
      ctx.save(); ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
      ctx.beginPath(); ctx.ellipse(w/2,cy2,w*0.32,w*0.1,0,0,Math.PI*2);
      ctx.fillStyle=chipColors[i]; ctx.fill();
      ctx.restore();
      for(let j=0;j<8;j++){
        const a=j/8*Math.PI*2;
        ctx.beginPath(); ctx.arc(w/2+Math.cos(a)*w*0.28,cy2+Math.sin(a)*w*0.085,w*0.022,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fill();
      }
      ctx.beginPath(); ctx.ellipse(w/2,cy2-w*0.01,w*0.2,w*0.065,0,0,Math.PI*2);
      ctx.fillStyle=chipColors[i]; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.stroke();
    }
    function miniCard(x,y,rot,suit,rank,col){
      ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
      const cw=w*0.32,ch=h*0.3;
      ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=10; ctx.shadowOffsetX=2; ctx.shadowOffsetY=4;
      ctx.beginPath(); roundRect(ctx,-cw/2,-ch/2,cw,ch,6);
      ctx.fillStyle='white'; ctx.fill();
      ctx.shadowBlur=0;
      ctx.font=`bold ${cw*0.28}px Arial`; ctx.textAlign='center';
      ctx.fillStyle=col; ctx.fillText(rank,-cw*0.28,-ch*0.3);
      ctx.font=`${cw*0.45}px serif`; ctx.textBaseline='middle';
      ctx.fillText(suit,0,ch*0.05);
      ctx.restore();
    }
    miniCard(w*0.35,h*0.33,-0.25,'\u2660','A','#111');
    miniCard(w*0.5, h*0.31, 0,   '\u2665','K','#dc2626');
    miniCard(w*0.65,h*0.33, 0.25,'\u2663','Q','#111');
    const gg=ctx.createRadialGradient(w/2,h*0.5,0,w/2,h*0.5,w*0.5);
    gg.addColorStop(0,'rgba(245,158,11,0.05)'); gg.addColorStop(1,'transparent');
    ctx.fillStyle=gg; ctx.fillRect(0,0,w,h);
  },

  sports(ctx, w, h) {
    const bg=ctx.createLinearGradient(0,0,0,h);
    bg.addColorStop(0,'#030d1a'); bg.addColorStop(0.5,'#051428'); bg.addColorStop(1,'#031008');
    ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
    for(let i=0;i<40;i++){
      const sx=Math.sin(i*137.5)*w*0.5+w/2, sy=Math.cos(i*97)*h*0.25+h*0.05;
      const sr=0.5+((i*0.31415)%1)*1.2;
      ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${0.3+((i*0.27)%1)*0.5})`; ctx.fill();
    }
    [[w*0.2,h*0.12],[w*0.8,h*0.12]].forEach(([lx,ly])=>{
      ctx.save(); ctx.globalAlpha=0.08;
      ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx-w*0.3,h*0.65); ctx.lineTo(lx+w*0.3,h*0.65); ctx.closePath();
      ctx.fillStyle='rgba(255,255,200,1)'; ctx.fill(); ctx.restore();
      ctx.save(); ctx.shadowColor='rgba(255,255,200,0.8)'; ctx.shadowBlur=15;
      ctx.beginPath(); ctx.arc(lx,ly,5,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,200,0.95)'; ctx.fill(); ctx.restore();
    });
    ctx.save();
    ctx.beginPath(); ctx.ellipse(w/2,h*0.78,w*0.48,h*0.22,0,0,Math.PI*2);
    const pitch=ctx.createRadialGradient(w/2,h*0.75,0,w/2,h*0.78,w*0.48);
    pitch.addColorStop(0,'#166534'); pitch.addColorStop(1,'#14532d');
    ctx.fillStyle=pitch; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.ellipse(w/2,h*0.78,w*0.38,h*0.17,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(w/2,h*0.78,w*0.18,h*0.08,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(w/2,h*0.78,w*0.04,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fill();
    ctx.restore();
    ctx.save(); ctx.shadowColor='rgba(255,255,255,0.4)'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(w/2,h*0.48,w*0.13,0,Math.PI*2);
    ctx.fillStyle='white'; ctx.fill();
    ctx.strokeStyle='#ccc'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.strokeStyle='#333'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(w/2,h*0.48-w*0.06,w*0.045,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  },

  crash(ctx, w, h) {
    const bg=ctx.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,'#0a0a1a'); bg.addColorStop(1,'#050508');
    ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
    for(let i=0;i<50;i++){
      const sx=(i*137.508)%w, sy=(i*97.3)%(h*0.65);
      ctx.beginPath(); ctx.arc(sx,sy,0.5+((i*0.31)%1),0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${0.2+((i*0.17)%1)*0.6})`; ctx.fill();
    }
    const pts=[[0,h*0.9],[w*0.15,h*0.78],[w*0.3,h*0.62],[w*0.48,h*0.44],[w*0.65,h*0.28],[w*0.82,h*0.14]];
    ctx.beginPath(); ctx.moveTo(pts[0][0],h);
    pts.forEach(([x,y])=>ctx.lineTo(x,y)); ctx.lineTo(pts[pts.length-1][0],h); ctx.closePath();
    const areaG=ctx.createLinearGradient(0,0,0,h);
    areaG.addColorStop(0,'rgba(16,185,129,0.15)'); areaG.addColorStop(1,'rgba(16,185,129,0.01)');
    ctx.fillStyle=areaG; ctx.fill();
    ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(([x,y])=>ctx.lineTo(x,y));
    ctx.save(); ctx.shadowColor='#10b981'; ctx.shadowBlur=10;
    ctx.strokeStyle='#10b981'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke(); ctx.restore();
    ctx.save(); ctx.shadowColor='rgba(16,185,129,0.8)'; ctx.shadowBlur=20;
    ctx.font=`bold ${w*0.12}px Arial`; ctx.fillStyle='#10b981';
    ctx.textAlign='center'; ctx.fillText('3.2\u00d7',w*0.5,h*0.15);
    ctx.restore();
    ctx.save(); ctx.translate(w*0.73,h*0.22); ctx.rotate(-Math.PI/4);
    const rocketG=ctx.createLinearGradient(-w*0.06,-h*0.1,w*0.06,h*0.1);
    rocketG.addColorStop(0,'#e2e8f0'); rocketG.addColorStop(1,'#94a3b8');
    ctx.beginPath();
    ctx.ellipse(0,0,w*0.055,h*0.1,0,0,Math.PI*2);
    ctx.fillStyle=rocketG; ctx.fill();
    ctx.beginPath(); ctx.moveTo(-w*0.04,-h*0.1);
    ctx.quadraticCurveTo(0,-h*0.17,w*0.04,-h*0.1); ctx.fillStyle='#64748b'; ctx.fill();
    const flame=ctx.createLinearGradient(0,h*0.1,0,h*0.22);
    flame.addColorStop(0,'#fbbf24'); flame.addColorStop(0.5,'#f97316'); flame.addColorStop(1,'rgba(239,68,68,0)');
    ctx.beginPath();
    ctx.moveTo(-w*0.03,h*0.09); ctx.quadraticCurveTo(0,h*0.22,w*0.03,h*0.09);
    ctx.fillStyle=flame; ctx.fill();
    ctx.restore();
  },

  mines(ctx, w, h) {
    const bg=ctx.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,'#031a0d'); bg.addColorStop(1,'#010d07');
    ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
    const cols=4, rows=4;
    const gpad=w*0.08, gcw=(w-gpad*2)/cols, gch=(h-gpad*1.5)/(rows+1);
    const MINES=[2,6,9,14], REVEALED=[0,1,3,4,7,8,10,11];
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      const idx=r*cols+c;
      const cx2=gpad+c*gcw+gcw/2, cy2=gpad*0.8+r*gch+gch/2;
      const isMine=MINES.includes(idx), isRev=REVEALED.includes(idx);
      ctx.save();
      if(isMine&&isRev){
        ctx.shadowColor='rgba(239,68,68,0.6)'; ctx.shadowBlur=12;
        ctx.beginPath(); roundRect(ctx,cx2-gcw*0.42,cy2-gch*0.42,gcw*0.84,gch*0.84,6);
        ctx.fillStyle='rgba(127,29,29,0.9)'; ctx.fill();
        ctx.strokeStyle='rgba(239,68,68,0.6)'; ctx.lineWidth=1; ctx.stroke();
        ctx.fillStyle='#dc2626'; ctx.beginPath();
        ctx.arc(cx2,cy2,gcw*0.18,0,Math.PI*2); ctx.fill();
        for(let s=0;s<8;s++){
          const a=s/8*Math.PI*2;
          ctx.beginPath(); ctx.moveTo(cx2,cy2);
          ctx.lineTo(cx2+Math.cos(a)*gcw*0.26,cy2+Math.sin(a)*gcw*0.26);
          ctx.strokeStyle='#dc2626'; ctx.lineWidth=2; ctx.stroke();
        }
      } else if(isRev){
        ctx.shadowColor='rgba(16,185,129,0.4)'; ctx.shadowBlur=8;
        ctx.beginPath(); roundRect(ctx,cx2-gcw*0.42,cy2-gch*0.42,gcw*0.84,gch*0.84,6);
        ctx.fillStyle='rgba(16,185,129,0.15)'; ctx.fill();
        ctx.strokeStyle='rgba(16,185,129,0.5)'; ctx.lineWidth=1; ctx.stroke();
        ctx.font=`${gcw*0.45}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillStyle='#f59e0b'; ctx.fillText('\u25c6',cx2,cy2+1);
      } else {
        ctx.beginPath(); roundRect(ctx,cx2-gcw*0.42,cy2-gch*0.42,gcw*0.84,gch*0.84,6);
        ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1; ctx.stroke();
        ctx.font=`bold ${gcw*0.35}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillText('?',cx2,cy2);
      }
      ctx.restore();
    }
  },

  dice(ctx, w, h) {
    const bg=ctx.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,'#0d0a2e'); bg.addColorStop(1,'#06051a');
    ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
    const gl=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*0.6);
    gl.addColorStop(0,'rgba(99,102,241,0.08)'); gl.addColorStop(1,'transparent');
    ctx.fillStyle=gl; ctx.fillRect(0,0,w,h);
    function drawDie(x,y,size,rot,dots,col1,col2){
      ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
      ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=16; ctx.shadowOffsetX=3; ctx.shadowOffsetY=5;
      const dg=ctx.createLinearGradient(-size/2,-size/2,size/2,size/2);
      dg.addColorStop(0,col1); dg.addColorStop(1,col2);
      ctx.beginPath(); roundRect(ctx,-size/2,-size/2,size,size,size*0.18);
      ctx.fillStyle=dg; ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1; ctx.stroke();
      const dp=size*0.28;
      const dotPositions={
        1:[[0,0]],
        3:[[-dp,-dp],[0,0],[dp,dp]],
        5:[[-dp,-dp],[dp,-dp],[0,0],[-dp,dp],[dp,dp]],
      };
      (dotPositions[dots]||dotPositions[1]).forEach(([dx,dy])=>{
        ctx.save(); ctx.shadowColor='rgba(255,255,255,0.3)'; ctx.shadowBlur=4;
        ctx.beginPath(); ctx.arc(dx,dy,size*0.1,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.fill(); ctx.restore();
      });
      ctx.restore();
    }
    drawDie(w*0.36,h*0.4,w*0.42,-0.2,5,'#e2e8f0','#94a3b8');
    drawDie(w*0.68,h*0.6,w*0.32,0.15,3,'#f1f5f9','#cbd5e1');
  },

  coinflip(ctx, w, h) {
    const bg=ctx.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,'#1c1200'); bg.addColorStop(1,'#0a0800');
    ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
    const gl=ctx.createRadialGradient(w/2,h*0.45,0,w/2,h*0.45,w*0.6);
    gl.addColorStop(0,'rgba(245,158,11,0.12)'); gl.addColorStop(1,'transparent');
    ctx.fillStyle=gl; ctx.fillRect(0,0,w,h);
    const cr=w*0.33,cx2=w/2,cy2=h*0.43;
    for(let i=0;i<48;i++){
      const a=i/48*Math.PI*2;
      ctx.beginPath(); ctx.arc(cx2+Math.cos(a)*(cr-1),cy2+Math.sin(a)*(cr-1),1.5,0,Math.PI*2);
      ctx.fillStyle='rgba(180,120,0,0.4)'; ctx.fill();
    }
    const coinG=ctx.createRadialGradient(cx2-cr*0.3,cy2-cr*0.3,0,cx2,cy2,cr);
    coinG.addColorStop(0,'#fde68a'); coinG.addColorStop(0.4,'#f59e0b');
    coinG.addColorStop(0.8,'#d97706'); coinG.addColorStop(1,'#92400e');
    ctx.save(); ctx.shadowColor='rgba(245,158,11,0.4)'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.arc(cx2,cy2,cr,0,Math.PI*2);
    ctx.fillStyle=coinG; ctx.fill(); ctx.restore();
    ctx.beginPath(); ctx.arc(cx2,cy2,cr*0.8,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.save(); ctx.shadowColor='rgba(100,60,0,0.8)'; ctx.shadowBlur=6;
    ctx.font=`bold ${cr*1.0}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(120,70,0,0.7)'; ctx.fillText('\u20bf',cx2,cy2+2); ctx.restore();
    const sr=w*0.14,sx=w*0.72,sy=h*0.73;
    const silverG=ctx.createRadialGradient(sx-sr*0.3,sy-sr*0.3,0,sx,sy,sr);
    silverG.addColorStop(0,'#f1f5f9'); silverG.addColorStop(1,'#475569');
    ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fillStyle=silverG; ctx.fill();
    ctx.font=`bold ${sr*1.1}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(51,65,85,0.7)'; ctx.fillText('\u039e',sx,sy+1);
  },

  hilo(ctx, w, h) {
    const bg=ctx.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,'#0c0a1e'); bg.addColorStop(1,'#050414');
    ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
    const pts2=[[w*0.05,h*0.82],[w*0.2,h*0.7],[w*0.38,h*0.55],[w*0.58,h*0.38],[w*0.78,h*0.22],[w*0.95,h*0.1]];
    ctx.beginPath(); ctx.moveTo(pts2[0][0],h);
    pts2.forEach(([x,y])=>ctx.lineTo(x,y)); ctx.lineTo(w,h); ctx.closePath();
    const ag=ctx.createLinearGradient(0,0,0,h);
    ag.addColorStop(0,'rgba(245,158,11,0.18)'); ag.addColorStop(1,'rgba(245,158,11,0.01)');
    ctx.fillStyle=ag; ctx.fill();
    ctx.beginPath(); ctx.moveTo(pts2[0][0],pts2[0][1]);
    pts2.slice(1).forEach(([x,y])=>ctx.lineTo(x,y));
    ctx.save(); ctx.shadowColor='#f59e0b'; ctx.shadowBlur=8;
    ctx.strokeStyle='#f59e0b'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke(); ctx.restore();
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.5)'; ctx.shadowBlur=16; ctx.shadowOffsetX=3; ctx.shadowOffsetY=4;
    ctx.beginPath(); roundRect(ctx,w*0.25,h*0.2,w*0.5,h*0.38,10);
    ctx.fillStyle='white'; ctx.fill(); ctx.restore();
    ctx.font=`${w*0.28}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#c9a84c'; ctx.fillText('\u2666',w/2,h*0.4);
    ctx.font=`bold ${w*0.14}px Arial`; ctx.fillStyle='#c9a84c'; ctx.fillText('Q',w*0.32,h*0.27);
    ctx.save(); ctx.shadowColor='#10b981'; ctx.shadowBlur=10;
    ctx.font=`bold ${w*0.2}px Arial`; ctx.textAlign='center';
    ctx.fillStyle='#10b981'; ctx.fillText('\u25b2',w*0.3,h*0.76); ctx.restore();
    ctx.save(); ctx.shadowColor='#ef4444'; ctx.shadowBlur=10;
    ctx.fillStyle='#ef4444'; ctx.fillText('\u25bc',w*0.7,h*0.76); ctx.restore();
  },

  default(ctx, w, h) {
    const bg=ctx.createLinearGradient(0,0,w,h);
    bg.addColorStop(0,'#111827'); bg.addColorStop(1,'#0a0f1a');
    ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
    const gl=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*0.5);
    gl.addColorStop(0,'rgba(245,158,11,0.07)'); gl.addColorStop(1,'transparent');
    ctx.fillStyle=gl; ctx.fillRect(0,0,w,h);
  }
};

function UCard({id, badge, badgeCls, href, onClick, name:nameProp, sub:subProp, t:tProp, isFav, onToggleFav}) {
  const meta = GAME_META[id] || {
    color:'#f59e0b', glow:'rgba(245,158,11,0.25)',
    symbol:'◈', label: id ? id.toUpperCase() : 'GAME', sub:'Play now'
  };
  // Use translated name/sub from getGames(t) if provided, else fallback to GAME_META
  const displayLabel = nameProp || meta.label;
  const displaySub   = subProp  || meta.sub;
  // Theme-aware thumbnail
  const { theme: _cardTheme } = (typeof useTheme === 'function') ? useTheme() : { theme: 'royal' };
  const imgSrc = getThumbMap(_cardTheme)[id] || null;
  const iconSrc = ICON_MAP[id] || null;
  const wrapRef = React.useRef();
  const cardRef = React.useRef();

  const onMouseMove = React.useCallback((e) => {
    const el = wrapRef.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width  - 0.5;
    const y = (e.clientY - r.top)  / r.height - 0.5;
    const tiltX = y * -18;
    const tiltY = x *  18;
    if (cardRef.current) {
      cardRef.current.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale3d(1.02,1.02,1.02)`;
    }
  }, []);

  const onMouseLeave = React.useCallback(() => {
    if (cardRef.current) {
      cardRef.current.style.transform = 'rotateX(0deg) rotateY(0deg) scale3d(1,1,1)';
      cardRef.current.style.transition = 'transform 0.4s cubic-bezier(.34,1.4,.64,1), box-shadow 0.3s';
    }
  }, []);

  const onMouseEnter = React.useCallback(() => {
    if (cardRef.current) {
      cardRef.current.style.transition = 'transform 0.08s linear, box-shadow 0.3s';
    }
  }, []);

  const handleClick = () => { if(href) window.location.href=href; else if(onClick) onClick(); };

  const colorMid = meta.color + '60';
  const cardStyle = {
    '--card-color': meta.color,
    '--card-color-dim': meta.glow,
    '--card-color-mid': colorMid,
  };

  return (
    <div
      ref={wrapRef}
      className="ucard-wrap"
      style={cardStyle}
      onMouseMove={onMouseMove}
      onMouseLeave={onMouseLeave}
      onMouseEnter={onMouseEnter}
      onClick={handleClick}
    >
      <div ref={cardRef} className={`ucard${imgSrc?' has-img':''} ucard-g-${id}`}>
        <div className="ucard-base"/>
        {imgSrc && <img className="ucard-img" src={imgSrc} alt={meta.label} loading="lazy" decoding="async"/>}
        {imgSrc && <div className="ucard-img-overlay"/>}
        <div className="ucard-noise"/>
        <div className="ucard-orb"/>
        <div className="ucard-accent"/>
        <div className="ucard-accent-v"/>
        {/* Ikona badge — DALL-E nuotrauka arba Unicode simbolis */}
        {iconSrc && imgSrc ? (
          <div className="ucard-icon-badge">
            <img src={iconSrc} alt="" draggable="false"/>
          </div>
        ) : (
          <div className="ucard-symbol">{meta.symbol}</div>
        )}
        <div className="ucard-sheen"/>
        {badge && <span className={`ucard-badge ${badgeCls||''}`}>{badge}</span>}
        <div className="ucard-info">
          <div className="ucard-name">{displayLabel}</div>
          <div className="ucard-sub">{displaySub}</div>
        </div>
        {onToggleFav&&(
          <button className={`ucard-fav-btn${isFav?' active':''}`}
            onClick={function(e){e.stopPropagation();onToggleFav(id);}}
            title={isFav?'Remove from favorites':'Add to favorites'}>
            {isFav?'♥':'♡'}
          </button>
        )}
        <div className="ucard-play">
          <button className="ucard-play-btn">▶ {(tProp&&tProp.playNow)||'PLAY'}</button>
        </div>
      </div>
    </div>
  );
}

// GCard now delegates to UCard for the lobby grid
function GCard({id, name, sub, badge, badgeCls, href, onClick}) {
  return <UCard id={id} badge={badge} badgeCls={badgeCls} href={href} onClick={onClick}/>;
}

function GameCanvas({gameId}) {
  const ref = useRef();
  useEffect(()=>{
    const canvas = ref.current;
    if(!canvas) return;
    const dpr = window.devicePixelRatio||1;
    const w = canvas.offsetWidth*dpr, h = canvas.offsetHeight*dpr;
    canvas.width=w; canvas.height=h;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr,dpr);
    const W=canvas.offsetWidth, H=canvas.offsetHeight;
    const drawFn = CANVAS_THUMBS[THUMB_DRAW[gameId]]||CANVAS_THUMBS.default;
    drawFn(ctx, W, H);
  },[gameId]);
  return React.createElement('canvas',{ref,style:{position:'absolute',inset:0,width:'100%',height:'100%'}});
}

// ─────────────────────────────────────────────────
//  GOLD PARTICLES — elegant rising gold dust
// ─────────────────────────────────────────────────
function GoldParticles() {
  const ref = React.useRef();
  React.useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    const resize = () => {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    };
    resize();
    window.addEventListener('resize', resize);

    const N = 60;
    const particles = Array.from({length: N}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: 0.5 + Math.random() * 1.5,
      speed: 0.15 + Math.random() * 0.35,
      opacity: 0.1 + Math.random() * 0.4,
      drift: (Math.random() - 0.5) * 0.3,
    }));

    let frame;
    const draw = () => {
      frame = requestAnimationFrame(draw);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      particles.forEach(p => {
        p.y -= p.speed;
        p.x += p.drift;
        if (p.y < -5) {
          p.y = canvas.height + 5;
          p.x = Math.random() * canvas.width;
        }
        if (p.x < -5) p.x = canvas.width + 5;
        if (p.x > canvas.width + 5) p.x = -5;

        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = '#f59e0b';
        ctx.shadowColor = '#fbbf24';
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    };
    draw();

    return () => {
      cancelAnimationFrame(frame);
      window.removeEventListener('resize', resize);
    };
  }, []);

  return (
    <canvas
      ref={ref}
      style={{
        position: 'absolute', inset: 0,
        width: '100%', height: '100%',
        pointerEvents: 'none', opacity: 0.7,
      }}
    />
  );
}

// ─────────────────────────────────────────────────
//  AURORA BACKGROUND — WebGL GLSL shader (gold-only)
// ─────────────────────────────────────────────────
function AuroraBackground() {
  const ref = useRef();
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (!gl) return;

    const resize = () => {
      canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
      canvas.height = canvas.offsetHeight * (window.devicePixelRatio || 1);
      gl.viewport(0, 0, canvas.width, canvas.height);
    };
    resize();
    window.addEventListener('resize', resize);

    const vert = `
      attribute vec2 a_pos;
      void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
    `;
    const frag = `
      precision highp float;
      uniform float u_time;
      uniform vec2 u_res;
      float noise(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
      float smoothNoise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        f = f*f*(3.0-2.0*f);
        float a=noise(i), b=noise(i+vec2(1,0)), c=noise(i+vec2(0,1)), d=noise(i+vec2(1,1));
        return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
      }
      float fbm(vec2 p) {
        float v=0., a=0.5;
        for(int i=0;i<5;i++){ v+=a*smoothNoise(p); p*=2.1; a*=0.5; }
        return v;
      }
      void main() {
        vec2 uv = gl_FragCoord.xy / u_res;
        float t = u_time * 0.25;
        vec2 warp = vec2(fbm(uv + t*0.3), fbm(uv + vec2(1.7,9.2) + t*0.2));
        vec2 q = uv + 0.4*warp;
        float band1 = smoothstep(0.15, 0.0, abs(q.y - 0.45 + 0.12*sin(q.x*4.0+t)));
        float band2 = smoothstep(0.12, 0.0, abs(q.y - 0.55 + 0.08*cos(q.x*3.0-t*0.7)));
        float band3 = smoothstep(0.08, 0.0, abs(q.y - 0.38 + 0.1*sin(q.x*6.0+t*1.3)));
        vec3 bg   = vec3(0.03, 0.04, 0.08);
        vec3 aur1 = vec3(0.6,  0.35, 0.0);
        vec3 aur2 = vec3(0.9,  0.65, 0.05);
        vec3 aur3 = vec3(0.4,  0.25, 0.0);
        vec3 col = bg;
        col = mix(col, aur1, band1 * 0.55);
        col = mix(col, aur2, band2 * 0.4);
        col = mix(col, aur3, band3 * 0.3);
        float vig = 1.0 - length((uv - 0.5) * 1.4);
        col *= smoothstep(0.0, 0.6, vig);
        gl_FragColor = vec4(col, 1.0);
      }
    `;

    const compile = (type, src) => {
      const s = gl.createShader(type);
      gl.shaderSource(s, src); gl.compileShader(s);
      return s;
    };
    const prog = gl.createProgram();
    gl.attachShader(prog, compile(gl.VERTEX_SHADER, vert));
    gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, frag));
    gl.linkProgram(prog); gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const loc = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes  = gl.getUniformLocation(prog, 'u_res');

    let start = Date.now(), frame;
    const draw = () => {
      frame = requestAnimationFrame(draw);
      gl.uniform1f(uTime, (Date.now()-start)/1000);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    };
    draw();
    return () => {
      cancelAnimationFrame(frame);
      window.removeEventListener('resize', resize);
      const ext = gl.getExtension('WEBGL_lose_context');
      if (ext) ext.loseContext();
    };
  }, []);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}/>;
}

// ─────────────────────────────────────────────────
//  CURSOR TRAIL — gold dots following mouse
// ─────────────────────────────────────────────────
function CursorTrail() {
  useEffect(() => {
    const dots = [];
    const N = 12;
    for(let i = 0; i < N; i++) {
      const d = document.createElement('div');
      const sz = 6 - i*0.4;
      d.style.cssText = `position:fixed;pointer-events:none;z-index:99999;width:${sz}px;height:${sz}px;border-radius:50%;background:rgba(245,158,11,${0.6 - i*0.05});transform:translate(-50%,-50%);will-change:left,top;`;
      document.body.appendChild(d);
      dots.push({el: d, x: -100, y: -100});
    }
    let mx = -100, my = -100;
    const onMove = e => { mx = e.clientX; my = e.clientY; };
    window.addEventListener('mousemove', onMove);
    let frame;
    const tick = () => {
      frame = requestAnimationFrame(tick);
      let x = mx, y = my;
      dots.forEach((d, i) => {
        d.el.style.left = x + 'px';
        d.el.style.top  = y + 'px';
        d.el.style.opacity = mx < 0 ? '0' : String(0.7 - i * 0.055);
        const nx = d.x + (x - d.x) * (0.25 - i * 0.015);
        const ny = d.y + (y - d.y) * (0.25 - i * 0.015);
        d.x = nx; d.y = ny;
        x = nx; y = ny;
      });
    };
    tick();
    return () => {
      cancelAnimationFrame(frame);
      window.removeEventListener('mousemove', onMove);
      dots.forEach(d => d.el.remove());
    };
  }, []);
  return null;
}

// ─────────────────────────────────────────────────
//  HATHOR ROBOT — canvas-drawn golden robot face
// ─────────────────────────────────────────────────
// ═══════════════════════════════════════════════════
//  HATHOR — FULL BODY EGYPTIAN ROBOT MASCOT
//  Canvas 2D, gold palette, no external images
// ═══════════════════════════════════════════════════
function RobotHero() {
  const cvRef = React.useRef(null);
  React.useEffect(()=>{
    const cv = cvRef.current; if(!cv) return;
    const ctx = cv.getContext('2d');
    let W, H, raf, t=0;

    function rr(x,y,w,h,r){
      if(w<2*r)r=w/2; if(h<2*r)r=h/2;
      ctx.beginPath();
      ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
      ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
      ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
      ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
      ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
    }
    function glow(c,b){ctx.shadowColor=c;ctx.shadowBlur=b;}
    function noGlow(){ctx.shadowBlur=0;ctx.shadowColor='transparent';}

    function resize() {
      const dpr=Math.min(window.devicePixelRatio||1,2);
      W=cv.offsetWidth; H=cv.offsetHeight;
      cv.width=W*dpr; cv.height=H*dpr;
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    resize();

    // Gold orbit particles
    const parts = Array.from({length:55},()=>({
      angle:Math.random()*Math.PI*2,
      radius:145+Math.random()*55,
      speed:(Math.random()-.5)*0.005,
      size:.4+Math.random()*1.5,
      alpha:.12+Math.random()*.42,
      pulse:Math.random()*Math.PI*2,
    }));

    // ── Full body mascot ──
    function drawMascot(cx, floatY){
      // ── geometry anchors ──
      const headCy = H*0.24+floatY;
      const hw=52, hh=62;
      const neckBot = headCy+hh+36;
      const torsoW=102, torsoH=108;
      const torsoBot = neckBot+torsoH;
      const legTopY = torsoBot+20;
      const legW=25, legH1=62, legH2=50;

      // ── ambient aura ──
      const aura=ctx.createRadialGradient(cx,H*.46+floatY*.2,0,cx,H*.46+floatY*.2,195);
      aura.addColorStop(0,'rgba(201,168,76,.065)');
      aura.addColorStop(.55,'rgba(201,168,76,.015)');
      aura.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(cx,H*.46+floatY*.2,195,0,Math.PI*2);
      ctx.fillStyle=aura;ctx.fill();

      // ── ground shadow ──
      const shY=legTopY+legH1+4+legH2+13;
      const shg=ctx.createRadialGradient(cx,shY,0,cx,shY,52);
      shg.addColorStop(0,'rgba(201,168,76,.16)');shg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.ellipse(cx,shY,52,9,0,0,Math.PI*2);
      ctx.fillStyle=shg;ctx.fill();

      // ── LEGS ──
      [-1,1].forEach(s=>{
        const lx=cx+s*24;
        // upper leg
        rr(lx-legW/2,legTopY,legW,legH1,7);
        const ulg=ctx.createLinearGradient(lx-legW/2,legTopY,lx+legW/2,legTopY);
        ulg.addColorStop(0,'#161008');ulg.addColorStop(.5,'#221808');ulg.addColorStop(1,'#161008');
        ctx.fillStyle=ulg;ctx.fill();
        ctx.strokeStyle='rgba(201,168,76,.5)';ctx.lineWidth=1.2;ctx.stroke();
        for(let i=0;i<3;i++){
          const dy=legTopY+14+i*16;
          ctx.beginPath();ctx.moveTo(lx-legW/2+4,dy);ctx.lineTo(lx+legW/2-4,dy);
          ctx.strokeStyle=`rgba(201,168,76,${.12+i*.02})`;ctx.lineWidth=.7;ctx.stroke();
        }
        // knee joint
        const kY=legTopY+legH1;
        ctx.beginPath();ctx.arc(lx,kY,8,0,Math.PI*2);
        const kg=ctx.createRadialGradient(lx-2,kY-2,0,lx,kY,8);
        kg.addColorStop(0,'rgba(255,225,120,.52)');kg.addColorStop(1,'rgba(120,80,10,.28)');
        ctx.fillStyle=kg;ctx.fill();
        ctx.strokeStyle='rgba(201,168,76,.6)';ctx.lineWidth=1.2;ctx.stroke();
        // lower leg
        const llY=kY+4;
        rr(lx-legW/2+2,llY,legW-4,legH2,6);
        ctx.fillStyle=ulg;ctx.fill();
        ctx.strokeStyle='rgba(201,168,76,.45)';ctx.lineWidth=1.2;ctx.stroke();
        // foot
        const fY=llY+legH2-2;
        rr(lx-legW/2-5,fY,legW+10,16,6);
        const fg=ctx.createLinearGradient(lx,fY,lx,fY+16);
        fg.addColorStop(0,'rgba(201,168,76,.52)');fg.addColorStop(1,'rgba(80,50,8,.28)');
        ctx.fillStyle=fg;ctx.fill();
        ctx.strokeStyle='rgba(201,168,76,.55)';ctx.lineWidth=1;ctx.stroke();
        // foot shine
        ctx.beginPath();ctx.moveTo(lx-legW/2-3,fY+3);ctx.lineTo(lx+2,fY+3);
        ctx.strokeStyle='rgba(255,240,160,.06)';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();ctx.lineCap='butt';
      });

      // ── HIP PLATE ──
      rr(cx-46,torsoBot-2,92,23,8);
      const hpg=ctx.createLinearGradient(cx-46,torsoBot,cx+46,torsoBot+23);
      hpg.addColorStop(0,'rgba(201,168,76,.38)');hpg.addColorStop(1,'rgba(80,50,10,.18)');
      ctx.fillStyle=hpg;ctx.fill();
      ctx.strokeStyle='rgba(201,168,76,.52)';ctx.lineWidth=1.2;ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,torsoBot+1);ctx.lineTo(cx+8,torsoBot+11);ctx.lineTo(cx,torsoBot+22);ctx.lineTo(cx-8,torsoBot+11);ctx.closePath();
      ctx.fillStyle='rgba(201,168,76,.28)';ctx.fill();

      // ── ARMS ──
      const shY2=neckBot+10;
      const armW=20;
      [-1,1].forEach(s=>{
        const shX=cx+s*(torsoW/2+13);
        // shoulder ball
        ctx.beginPath();ctx.arc(shX,shY2,12,0,Math.PI*2);
        const sg=ctx.createRadialGradient(shX-3,shY2-3,0,shX,shY2,12);
        sg.addColorStop(0,'rgba(255,225,120,.52)');sg.addColorStop(.5,'rgba(201,168,76,.36)');sg.addColorStop(1,'rgba(80,50,10,.28)');
        ctx.fillStyle=sg;ctx.fill();

        // elbow

        // upper arm border + fill

        ctx.fillStyle=eg3;ctx.fill();ctx.strokeStyle='rgba(201,168,76,.55)';ctx.lineWidth=1;ctx.stroke();
        // forearm + hand
        if(s===1){
          // right arm: raised, holding glowing coin
          const rise=Math.sin(t*.92)*5;
          const hx=elbX+22+Math.sin(t*.76)*3;
          const hy=elbY-45+rise;
          ctx.beginPath();ctx.moveTo(elbX,elbY+4);ctx.lineTo(hx,hy);
          ctx.strokeStyle='rgba(201,168,76,.2)';ctx.lineWidth=armW;ctx.lineCap='round';ctx.stroke();
          ctx.beginPath();ctx.moveTo(elbX,elbY+4);ctx.lineTo(hx,hy);
          ctx.strokeStyle=ug;ctx.lineWidth=armW-4;ctx.stroke();ctx.lineCap='butt';
          // COIN
          const cp=.82+Math.sin(t*1.9)*.18;
          const cr=14+Math.sin(t*1.4)*.8;
          glow('rgba(255,215,60,.82)',22);
          ctx.beginPath();ctx.arc(hx,hy,cr,0,Math.PI*2);
          const cg=ctx.createRadialGradient(hx-4,hy-4,0,hx,hy,cr);
          cg.addColorStop(0,`rgba(255,248,170,${cp})`);
          cg.addColorStop(.4,`rgba(240,190,60,.9)`);
          cg.addColorStop(.85,`rgba(155,95,15,.75)`);
          cg.addColorStop(1,`rgba(80,45,5,.5)`);
          ctx.fillStyle=cg;ctx.fill();noGlow();
          ctx.strokeStyle='rgba(255,228,88,.7)';ctx.lineWidth=1.8;ctx.stroke();
          ctx.beginPath();ctx.arc(hx,hy,cr+5,0,Math.PI*2);
          ctx.strokeStyle=`rgba(255,215,50,${.14*cp})`;ctx.lineWidth=2;ctx.stroke();
          ctx.save();ctx.font=`bold 11px Orbitron,monospace`;
          ctx.fillStyle=`rgba(110,65,5,${cp*.9})`;
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText('⬡',hx,hy+1);ctx.restore();
        } else {
          // left arm: relaxed
          const hx2=elbX-10, hy2=elbY+50;
          ctx.beginPath();ctx.moveTo(elbX,elbY+4);ctx.lineTo(hx2,hy2);
          ctx.strokeStyle='rgba(201,168,76,.18)';ctx.lineWidth=armW;ctx.lineCap='round';ctx.stroke();

      });

      // ── TORSO ──
      rr(cx-torsoW/2,neckBot,torsoW,torsoH,13);

      tg.addColorStop(0,'#1e1608');tg.addColorStop(.35,'#261c0c');tg.addColorStop(.7,'#1e1608');tg.addColorStop(1,'#130f04');

      ctx.strokeStyle='rgba(201,168,76,.62)';ctx.lineWidth=1.5;ctx.stroke();
      // left highlight strip

      // chest plate
      const cpW2=63,cpH2=50,cpX2=cx-cpW2/2,cpY2=neckBot+13;
      rr(cpX2,cpY2,cpW2,cpH2,9);
      const cpg3=ctx.createLinearGradient(cpX2,cpY2,cpX2+cpW2,cpY2+cpH2);
      cpg3.addColorStop(0,'rgba(255,235,120,.2)');cpg3.addColorStop(.4,'rgba(201,168,76,.12)');cpg3.addColorStop(1,'rgba(80,50,10,.06)');
      ctx.fillStyle=cpg3;ctx.fill();ctx.strokeStyle='rgba(201,168,76,.44)';ctx.lineWidth=1.1;ctx.stroke();
      // power core
      const pcX2=cx,pcY3=cpY2+21;
      const pcP=Math.sin(t*1.85);
      const pcR2=13+pcP*1.4;
      glow('rgba(255,195,50,.72)',22);
      ctx.beginPath();ctx.arc(pcX2,pcY3,pcR2,0,Math.PI*2);
      const pcg4=ctx.createRadialGradient(pcX2-3,pcY3-3,0,pcX2,pcY3,pcR2);
      pcg4.addColorStop(0,`rgba(255,248,170,${.88+pcP*.12})`);
      pcg4.addColorStop(.5,`rgba(240,190,60,.82)`);
      pcg4.addColorStop(1,`rgba(100,60,10,.4)`);
      ctx.fillStyle=pcg4;ctx.fill();noGlow();
      [18,25,33].forEach((r,i)=>{

          ctx.beginPath();ctx.arc(lx4,ly3,1.5,0,Math.PI*2);

        }
      });
      // abdomen panel
      const abdY2=cpY2+cpH2+5;
      rr(cpX2+5,abdY2,cpW2-10,22,6);
      const abdg2=ctx.createLinearGradient(cx,abdY2,cx,abdY2+22);
      abdg2.addColorStop(0,'rgba(201,168,76,.14)');abdg2.addColorStop(1,'rgba(80,50,10,.06)');
      ctx.fillStyle=abdg2;ctx.fill();ctx.strokeStyle='rgba(201,168,76,.24)';ctx.lineWidth=.8;ctx.stroke();
      for(let i=0;i<5;i++){
        ctx.beginPath();ctx.arc(cx-13+i*6.5,abdY2+11,1.6,0,Math.PI*2);
        ctx.fillStyle=`rgba(201,168,76,${.18+i*.04})`;ctx.fill();
      }

      // ── NECK ──
      for(let s=0;s<3;s++){
        const ny=headCy+hh+2+s*11,nw=38-s*7;
        rr(cx-nw/2,ny,nw,9,3);
        const ng=ctx.createLinearGradient(cx-nw/2,ny,cx+nw/2,ny);
        ng.addColorStop(0,'rgba(201,168,76,.42)');ng.addColorStop(.5,'rgba(240,192,96,.6)');ng.addColorStop(1,'rgba(201,168,76,.38)');
        ctx.fillStyle=ng;ctx.fill();
        if(s<2){ctx.beginPath();ctx.moveTo(cx-nw/2,ny+9);ctx.lineTo(cx+nw/2,ny+9);ctx.strokeStyle='rgba(0,0,0,.45)';ctx.lineWidth=1.3;ctx.stroke();}
      }

      // ── HEAD ──
      // Outer soft glow ring
      ctx.beginPath();
      ctx.moveTo(cx-hw*.5,headCy-hh);ctx.lineTo(cx+hw*.5,headCy-hh);
      ctx.lineTo(cx+hw,headCy-hh*.32);ctx.lineTo(cx+hw,headCy+hh*.32);
      ctx.lineTo(cx+hw*.5,headCy+hh);ctx.lineTo(cx-hw*.5,headCy+hh);
      ctx.lineTo(cx-hw,headCy+hh*.32);ctx.lineTo(cx-hw,headCy-hh*.32);ctx.closePath();
      ctx.strokeStyle='rgba(201,168,76,.07)';ctx.lineWidth=10;ctx.stroke();
      // Head fill
      ctx.beginPath();
      ctx.moveTo(cx-hw*.5,headCy-hh);ctx.lineTo(cx+hw*.5,headCy-hh);
      ctx.lineTo(cx+hw,headCy-hh*.32);ctx.lineTo(cx+hw,headCy+hh*.32);
      ctx.lineTo(cx+hw*.5,headCy+hh);ctx.lineTo(cx-hw*.5,headCy+hh);
      ctx.lineTo(cx-hw,headCy+hh*.32);ctx.lineTo(cx-hw,headCy-hh*.32);ctx.closePath();
      const face=ctx.createLinearGradient(cx-hw,headCy-hh,cx+hw,headCy+hh);
      face.addColorStop(0,'#201808');face.addColorStop(.3,'#281c0c');
      face.addColorStop(.65,'#1e1608');face.addColorStop(1,'#100a04');
      ctx.fillStyle=face;ctx.fill();
      ctx.strokeStyle='rgba(201,168,76,.65)';ctx.lineWidth=1.8;ctx.stroke();
      // left highlight
      ctx.beginPath();
      ctx.moveTo(cx-hw*.5,headCy-hh);ctx.lineTo(cx-hw,headCy-hh*.32);
      ctx.lineTo(cx-hw*.7,headCy+hh*.1);ctx.lineTo(cx-hw*.15,headCy-hh*.5);ctx.closePath();
      const hl=ctx.createLinearGradient(cx-hw,headCy,cx-hw*.1,headCy);
      hl.addColorStop(0,'rgba(255,230,140,.08)');hl.addColorStop(1,'rgba(255,230,140,0)');
      ctx.fillStyle=hl;ctx.fill();

      // Pharaoh NEMES headdress (striped side panels)
      [-1,1].forEach(s=>{
        ctx.save();ctx.translate(cx+s*(hw+1),headCy);if(s===-1)ctx.scale(-1,1);
        ctx.beginPath();ctx.moveTo(0,-hh*.52);ctx.lineTo(24,-hh*.32);ctx.lineTo(24,hh*.32);ctx.lineTo(0,hh*.62);ctx.closePath();
        const np=ctx.createLinearGradient(0,-hh*.52,24,0);
        np.addColorStop(0,'rgba(201,168,76,.38)');np.addColorStop(1,'rgba(100,68,16,.1)');
        ctx.fillStyle=np;ctx.fill();ctx.strokeStyle='rgba(201,168,76,.42)';ctx.lineWidth=.8;ctx.stroke();
        for(let i=0;i<7;i++){
          const sy2=(-hh*.42)+i*(hh*.82/6);
          ctx.beginPath();ctx.moveTo(1,sy2);ctx.lineTo(22,sy2+4);
          ctx.strokeStyle=i%2===0?'rgba(201,168,76,.22)':'rgba(150,100,20,.11)';
          ctx.lineWidth=5.5;ctx.lineCap='round';ctx.stroke();ctx.lineCap='butt';
        }
        // pendant bead
        ctx.beginPath();ctx.arc(12,hh*.6,4,0,Math.PI*2);
        ctx.fillStyle='rgba(201,168,76,.44)';ctx.fill();
        ctx.strokeStyle='rgba(201,168,76,.6)';ctx.lineWidth=.8;ctx.stroke();
        ctx.restore();
      });

      // Forehead band
      ctx.beginPath();
      ctx.moveTo(cx-hw*.48,headCy-hh);ctx.lineTo(cx+hw*.48,headCy-hh);
      ctx.lineTo(cx+hw*.34,headCy-hh+18);ctx.lineTo(cx-hw*.34,headCy-hh+18);ctx.closePath();
      const fpg2=ctx.createLinearGradient(cx,headCy-hh,cx,headCy-hh+18);
      fpg2.addColorStop(0,'rgba(201,168,76,.52)');fpg2.addColorStop(1,'rgba(201,168,76,.1)');
      ctx.fillStyle=fpg2;ctx.fill();
      ctx.beginPath();ctx.moveTo(cx-hw*.34,headCy-hh+18);ctx.lineTo(cx+hw*.34,headCy-hh+18);
      ctx.strokeStyle='rgba(201,168,76,.22)';ctx.lineWidth=.7;ctx.stroke();

      // URaeus crown diamond
      const gp=.72+Math.sin(t*2)*.28;
      glow('rgba(255,200,60,.55)',10);
      ctx.beginPath();ctx.moveTo(cx,headCy-hh+2);ctx.lineTo(cx+7,headCy-hh+12);ctx.lineTo(cx,headCy-hh+22);ctx.lineTo(cx-7,headCy-hh+12);ctx.closePath();
      const gg=ctx.createRadialGradient(cx,headCy-hh+12,0,cx,headCy-hh+12,7);
      gg.addColorStop(0,`rgba(255,245,180,${gp})`);gg.addColorStop(.5,`rgba(240,192,96,${gp*.85})`);gg.addColorStop(1,`rgba(120,80,20,${gp*.3})`);
      ctx.fillStyle=gg;ctx.fill();noGlow();

      // Antenna
      const antL=34+Math.sin(t*1.1)*4;
      ctx.beginPath();ctx.moveTo(cx,headCy-hh+2);ctx.lineTo(cx,headCy-hh-antL);
      ctx.strokeStyle='rgba(201,168,76,.55)';ctx.lineWidth=2.2;ctx.stroke();
      [-1,1].forEach(s=>{
        ctx.beginPath();ctx.moveTo(cx+s*8,headCy-hh-antL*.55);ctx.lineTo(cx+s*22,headCy-hh-antL*.3);
        ctx.strokeStyle='rgba(201,168,76,.32)';ctx.lineWidth=1.5;ctx.stroke();
        ctx.beginPath();ctx.arc(cx+s*22,headCy-hh-antL*.3,2.5,0,Math.PI*2);

        eg4.addColorStop(.5,`rgba(255,240,155,${ep})`);eg4.addColorStop(.7,`rgba(255,215,90,${ep})`);
        eg4.addColorStop(1,`rgba(255,170,30,${ep*.45})`);
        ctx.fillStyle=eg4;ctx.fill();noGlow();
        // scanner
        const sx=(ex-eyeW/2)+((t*32)%(eyeW+4));

      });

    function draw(){
      raf=requestAnimationFrame(draw);
      t+=0.013;
      ctx.clearRect(0,0,W,H);
      const floatY=Math.sin(t*.5)*8;
      const cx=W/2;
      drawMascot(cx,floatY);

        p.angle+=p.speed;p.pulse+=.022;
        const px=cx+Math.cos(p.angle)*p.radius;

        ctx.beginPath();ctx.arc(px,py,p.size,0,Math.PI*2);
        ctx.fillStyle=`rgba(240,192,96,${al})`;ctx.fill();
      });
    }

    draw();
    window.addEventListener('resize',resize);
    return ()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);

function GameIframeModal({ game, onClose }) {
  React.useEffect(() => {
    const esc = e => { if(e.key==='Escape') onClose(); };
    document.addEventListener('keydown', esc);
    return () => document.removeEventListener('keydown', esc);
  }, [onClose]);
  if(!game) return null;
  return (
    <div style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.96)',display:'flex',flexDirection:'column'}}>
      {/* Header bar */}
      <div style={{height:52,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 12px',background:'rgba(0,0,0,0.92)',borderBottom:'1px solid rgba(201,168,76,0.15)',flexShrink:0,gap:10}}>

          onMouseEnter={e=>{e.currentTarget.style.background='rgba(201,168,76,0.2)';e.currentTarget.style.borderColor='rgba(201,168,76,0.6)';}}
          onMouseLeave={e=>{e.currentTarget.style.background='rgba(201,168,76,0.1)';e.currentTarget.style.borderColor='rgba(201,168,76,0.3)';}}>
          ← Lobby
        </button>
        {/* Game title */}
        <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0,overflow:'hidden'}}>
          <span style={{fontSize:13,fontWeight:600,color:'#e8e0d0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{game.n}</span>
          <span style={{fontSize:9,padding:'2px 6px',background:'rgba(201,168,76,0.12)',border:'1px solid rgba(201,168,76,0.2)',borderRadius:3,color:'rgba(201,168,76,0.7)',letterSpacing:'1px',fontFamily:"'Space Grotesk',sans-serif",flexShrink:0}}>{(game.provider||'pp').toUpperCase()} · DEMO</span>
        </div>
        {/* ✕ close (smaller, secondary) */}
        <button onClick={onClose} aria-label="Close game" title="Close (ESC)" style={{background:'none',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,color:'rgba(255,255,255,0.35)',cursor:'pointer',padding:'6px 10px',fontSize:12,fontFamily:"'Space Grotesk',sans-serif",flexShrink:0}}
          onMouseEnter={e=>{e.currentTarget.style.color='rgba(255,255,255,0.7)';e.currentTarget.style.borderColor='rgba(255,255,255,0.2)';}}
          onMouseLeave={e=>{e.currentTarget.style.color='rgba(255,255,255,0.35)';e.currentTarget.style.borderColor='rgba(255,255,255,0.08)';}}>
          ✕
        </button>
      </div>
      {/* iframe */}
      <iframe
        src={getGameUrl(game)}
        style={{flex:1,border:'none',width:'100%',background:'#000'}}
        allow="fullscreen"
        title={game.n}
      />
    </div>
  );
}

    const canvas=document.getElementById('confetti-canvas');
    if(!canvas) return;
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const pieces=Array.from({length:120},function(){return{
      x:Math.random()*canvas.width, y:-10,
      vx:(Math.random()-0.5)*6, vy:Math.random()*4+2,
      r:Math.random()*6+3,
      color:['#f0c060','#ffd680','#4ade80','#60a5fa','#f87171','#c084fc','#fff'][Math.floor(Math.random()*7)],
      rot:Math.random()*360, rotV:(Math.random()-0.5)*8,
      shape:Math.random()>0.5?'rect':'circle'
    };});
    let frame=0;
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(function(p){
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.rot+=p.rotV;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(0,1-(p.y/canvas.height));
        if(p.shape==='rect'){ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);}
        else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
        ctx.restore();
      });
      frame++;
      if(frame<180) requestAnimationFrame(draw);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    }

// ── Error Boundary — prevents full black screen on crash ─────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) {
    console.error('HATHOR ErrorBoundary caught:', error, info);
    if(window.trackEvent) window.trackEvent('app_error', 'errors', error.message);
  }
  render() {
    if (!this.state.hasError) return this.props.children;
    return React.createElement('div', {
      style: {
        minHeight: '100vh', display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        background: '#050508', color: '#e8e0d0', fontFamily: "'Space Grotesk',sans-serif",
        padding: 32, textAlign: 'center', gap: 16
      }
    },
      React.createElement('div', {style:{fontSize:48, marginBottom:8}}, '⚠️'),
      React.createElement('div', {style:{fontFamily:"'Cinzel',serif", fontSize:18, letterSpacing:'3px', color:'#c9a84c', marginBottom:8}}, 'HATHOR'),
      React.createElement('div', {style:{fontSize:15, fontWeight:600, marginBottom:6}}, 'Something went wrong'),
      React.createElement('div', {style:{fontSize:12, color:'rgba(232,224,208,0.45)', marginBottom:24, maxWidth:320}},
        'An unexpected error occurred. Your balance and progress are safe.'),
      React.createElement('button', {
        onClick: () => { this.setState({hasError:false,error:null}); window.location.reload(); },
        style: {
          padding:'12px 28px', background:'linear-gradient(135deg,#c9a84c,#f0c060)',
          border:'none', borderRadius:8, color:'#0a0806', fontWeight:700,
          fontSize:13, cursor:'pointer', letterSpacing:'0.05em'
        }
      }, '↺ Reload Casino')
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ErrorBoundary, null,
    React.createElement(ThemeProvider, null, React.createElement(App, null))
  )
);

          '<button onclick="document.getElementById(\'hrc-update-bar\').remove()" ',
            'style="padding:8px;background:none;border:none;color:rgba(232,224,208,.3);',
            'font-size:18px;cursor:pointer;line-height:1;">✕</button>',
        ].join('');
        bar.__sw = newWorker;
        document.body.appendChild(bar);
      }

      // New SW waiting → show banner
      if(reg.waiting) showUpdateBanner(reg.waiting);
      reg.addEventListener('updatefound', function() {
        var newWorker = reg.installing;
        newWorker.addEventListener('statechange', function() {
          if(newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner(newWorker);
          }
        });
      });

      // When SW takes control → reload for fresh content
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if(!refreshing) { refreshing = true; window.location.reload(); }
      });

      // Check for updates every 30 minutes
      setInterval(function(){ reg.update(); }, 1800000);

    }).catch(function(err) {
      console.log('[PWA] SW registration failed:', err);
    });
  });
}

var pwaPrompt = null;

    document.head.appendChild(st);

function hideInstallBanner() {
  var b = document.getElementById('pwa-banner');
  if(b) {
    b.style.transform = 'translateY(100%)';
    b.style.transition = 'transform .3s ease-in';
    setTimeout(function(){ if(b.parentNode) b.parentNode.removeChild(b); }, 300);
  }
  localStorage.setItem('pwa_install_dismissed', Date.now());
}

function doInstallPWA() {
  if(!pwaPrompt) return;
  pwaPrompt.prompt();
  pwaPrompt.userChoice.then(function(result) {
    if(result.outcome === 'accepted') {
      localStorage.setItem('pwa_installed', '1');
      hideInstallBanner();
    }
    pwaPrompt = null;
  });
}

// iOS Safari: show manual instructions (no beforeinstallprompt on iOS)
function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}
function isInStandaloneMode() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
}

if(isIOS() && !isInStandaloneMode() && !pwaInstalled) {
  setTimeout(function() {
    if(document.getElementById('pwa-banner')) return;
    var dismissed = localStorage.getItem('pwa_install_dismissed');
    if(dismissed && Date.now() - parseInt(dismissed) < 86400000 * 3) return; // 3 days
    var banner = document.createElement('div');

    if(!document.getElementById('pwa-style')) {
      var st = document.createElement('style');
