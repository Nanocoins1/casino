<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>HATHOR — Slots</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Orbitron:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#04040a;--gold:#f0c060;--gold2:#ffd980;--green:#00e676;--red:#ff3d71;
  --neon:#00e5ff;--cream:#e8e0d0;--border:rgba(255,255,255,0.08);--glass:rgba(255,255,255,0.04);
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);font-family:'Space Grotesk',sans-serif;color:var(--cream);display:flex;flex-direction:column;}

/* HEADER */
.hdr{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(4,4,10,.98);border-bottom:1px solid var(--border);flex-shrink:0;z-index:20;}
.logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}
.game-lbl{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;letter-spacing:2px;}
.bal-row{font-family:'DM Mono',monospace;font-size:14px;color:var(--gold);display:flex;align-items:center;gap:6px;}
.back-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:var(--glass);
  color:rgba(232,224,208,.5);font-size:11px;cursor:pointer;text-decoration:none;transition:all .2s;}
.back-btn:hover{color:var(--cream);}

/* LAYOUT */
.main{flex:1;display:grid;grid-template-columns:1fr 310px;overflow:hidden;}

/* GAME AREA */
.game-area{display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#020209;padding:20px;overflow:auto;gap:18px;}

/* PAYLINES LEGEND */
.paylines-legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.pl-tag{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:rgba(232,224,208,.45);}
.pl-tag.pl-active{background:rgba(0,229,255,.12);border-color:rgba(0,229,255,.4);color:var(--neon);
  box-shadow:0 0 10px rgba(0,229,255,.2);}

/* MACHINE FRAME */
.machine-frame{position:relative;padding:4px;border-radius:20px;
  background:linear-gradient(135deg,rgba(240,192,96,.25),rgba(0,229,255,.15),rgba(240,192,96,.2));
  box-shadow:0 0 40px rgba(0,229,255,.12),0 0 80px rgba(240,192,96,.06);}
.machine-inner{background:rgba(4,4,14,.98);border-radius:17px;padding:18px;
  border:1px solid rgba(255,255,255,.06);}

/* REELS CONTAINER */
.reels-row{display:flex;gap:10px;position:relative;}

/* WIN LINE OVERLAYS */
.winline-ov{position:absolute;pointer-events:none;z-index:10;}

/* REEL */
.reel-wrap{display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;}
.reel-cell{width:80px;height:80px;border-radius:12px;border:2px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;font-size:40px;
  position:relative;transition:border-color .2s;user-select:none;
  background:linear-gradient(135deg,rgba(10,8,24,.9),rgba(6,4,16,.95));}
.reel-cell::before{content:'';position:absolute;inset:0;border-radius:10px;
  background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 55%);pointer-events:none;}

/* Symbol color themes */
.sym-cherry .reel-cell-bg{background:linear-gradient(135deg,rgba(120,10,30,.6),rgba(60,4,12,.8))!important;}
.sym-lemon  .reel-cell-bg{background:linear-gradient(135deg,rgba(100,90,0,.6),rgba(60,55,0,.8))!important;}
.sym-orange .reel-cell-bg{background:linear-gradient(135deg,rgba(120,55,0,.6),rgba(70,30,0,.8))!important;}
.sym-grapes .reel-cell-bg{background:linear-gradient(135deg,rgba(60,0,100,.6),rgba(30,0,60,.8))!important;}
.sym-diamond .reel-cell-bg{background:linear-gradient(135deg,rgba(0,60,100,.6),rgba(0,30,70,.8))!important;}
.sym-seven .reel-cell-bg{background:linear-gradient(135deg,rgba(140,10,10,.6),rgba(80,5,5,.8))!important;}
.sym-star .reel-cell-bg{background:linear-gradient(135deg,rgba(100,80,0,.6),rgba(70,55,0,.8))!important;}

.reel-cell.spinning{animation:reelSpin var(--spin-dur,0.9s) linear infinite;}
@keyframes reelSpin{
  0%{transform:translateY(0);filter:blur(0px);}
  20%{filter:blur(4px);}
  50%{transform:translateY(-20px);filter:blur(6px);}
  80%{filter:blur(4px);}
  100%{transform:translateY(0);filter:blur(0px);}
}
.reel-cell.bounce-in{animation:bounceIn .35s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes bounceIn{
  from{transform:translateY(-12px) scale(.92);opacity:.5;}
  to{transform:translateY(0) scale(1);opacity:1;}
}

/* WIN HIGHLIGHT */
.reel-cell.win-cell{
  border-color:var(--neon)!important;
  box-shadow:0 0 18px rgba(0,229,255,.5),inset 0 0 10px rgba(0,229,255,.1)!important;
  animation:winPulse 0.7s ease-in-out infinite alternate;}
@keyframes winPulse{
  from{box-shadow:0 0 12px rgba(0,229,255,.4),inset 0 0 6px rgba(0,229,255,.08);}
  to{box-shadow:0 0 28px rgba(0,229,255,.8),inset 0 0 16px rgba(0,229,255,.18);}
}
.reel-cell.win-cell-gold{
  border-color:var(--gold)!important;
  box-shadow:0 0 18px rgba(240,192,96,.6),inset 0 0 10px rgba(240,192,96,.12)!important;
  animation:winPulseGold 0.7s ease-in-out infinite alternate;}
@keyframes winPulseGold{
  from{box-shadow:0 0 12px rgba(240,192,96,.4);}
  to{box-shadow:0 0 30px rgba(240,192,96,.9);}
}

/* PANEL */
.bet-panel{background:rgba(8,8,18,.96);border-left:1px solid var(--border);
  padding:16px;display:flex;flex-direction:column;gap:11px;overflow-y:auto;}
.panel-title{font-family:'Orbitron',monospace;font-size:12px;color:rgba(232,224,208,.3);letter-spacing:2px;}
.inp-lbl{font-size:10px;letter-spacing:2px;color:rgba(232,224,208,.3);text-transform:uppercase;margin-bottom:5px;}
.bet-inp{width:100%;padding:10px 12px;background:rgba(0,0,0,.5);border:1px solid var(--border);
  border-radius:9px;color:var(--gold);font-family:'DM Mono',monospace;font-size:15px;font-weight:700;
  outline:none;transition:border-color .2s;}
.bet-inp:focus{border-color:rgba(240,192,96,.4);}
.qgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:5px;}
.qb{padding:6px 4px;border-radius:6px;border:1px solid var(--border);background:var(--glass);
  color:rgba(232,224,208,.5);font-size:10px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;}
.qb:hover{border-color:rgba(240,192,96,.3);color:var(--gold);}
.qb.qb-max{border-color:rgba(240,192,96,.2);color:rgba(240,192,96,.6);}
.qb.qb-max:hover{background:rgba(240,192,96,.1);color:var(--gold);}

/* AUTO-SPIN */
.auto-row{display:flex;gap:5px;align-items:center;}
.auto-tog{padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:var(--glass);
  color:rgba(232,224,208,.4);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;flex-shrink:0;}
.auto-tog.on{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.4);color:var(--neon);}
.auto-sel{flex:1;padding:7px 8px;border-radius:7px;border:1px solid var(--border);background:rgba(0,0,0,.5);
  color:rgba(232,224,208,.5);font-size:11px;font-weight:700;outline:none;cursor:pointer;
  font-family:'DM Mono',monospace;}
.auto-sel option{background:#0a0a18;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.stat-box{padding:9px 6px;border-radius:9px;background:rgba(0,0,0,.3);border:1px solid var(--border);text-align:center;}
.sv{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--gold);}
.sl{font-size:8px;letter-spacing:1px;color:rgba(232,224,208,.25);margin-top:2px;}

/* SPIN BUTTON */
.spin-btn{width:100%;padding:15px;border-radius:12px;border:none;cursor:pointer;
  font-family:'Orbitron',monospace;font-size:14px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,#c9a84c,#f0c060,#a07830);color:#050300;
  transition:all .2s;position:relative;overflow:hidden;}
.spin-btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2),transparent 50%);pointer-events:none;}
.spin-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px rgba(240,192,96,.45);}
.spin-btn:active:not(:disabled){transform:translateY(0);}
.spin-btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.spin-btn.spinning-state{background:linear-gradient(135deg,#004060,#00e5ff,#003050);color:#001824;
  animation:spinBtnPulse 0.6s ease-in-out infinite alternate;}
@keyframes spinBtnPulse{from{box-shadow:0 0 15px rgba(0,229,255,.3);}to{box-shadow:0 0 35px rgba(0,229,255,.7);}}

/* LAST WIN DISPLAY */
.last-win-row{text-align:center;}
.lw-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;
  color:var(--green);text-shadow:0 0 20px var(--green);transition:all .3s;}
.lw-val.neutral{color:rgba(232,224,208,.18);text-shadow:none;}
.lw-sub{font-size:10px;letter-spacing:2px;color:rgba(232,224,208,.25);margin-top:3px;}

/* PF BOX */
.pf-box{padding:8px 10px;background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:8px;}
.pf-lbl{font-size:10px;letter-spacing:1px;color:rgba(232,224,208,.3);margin-bottom:3px;}
.pf-hash{font-family:'DM Mono',monospace;font-size:9px;color:rgba(0,229,255,.45);word-break:break-all;line-height:1.4;}

/* PAYOUT TABLE */
.pay-table{padding:8px 10px;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:10px;}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;
  border-bottom:1px solid rgba(255,255,255,.04);}
.pay-row:last-child{border-bottom:none;}
.pay-sym{font-size:16px;}
.pay-mult{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);font-weight:700;}
.pay-label{font-size:10px;color:rgba(232,224,208,.3);}

/* WIN OVERLAY */
.win-overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  z-index:100;background:rgba(0,0,0,.55);}
.win-overlay.show{display:flex;}
.win-box{background:rgba(4,4,14,.98);border:2px solid rgba(240,192,96,.5);border-radius:22px;
  padding:36px 56px;text-align:center;animation:winPop .4s cubic-bezier(.34,1.56,.64,1) forwards;
  transform:scale(.7);position:relative;overflow:hidden;max-width:90vw;}
.win-box::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(240,192,96,.08),transparent 70%);pointer-events:none;}
@keyframes winPop{to{transform:scale(1);}}
.win-label{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;
  color:rgba(232,224,208,.4);margin-bottom:10px;}
.win-amount{font-family:'Orbitron',monospace;font-size:58px;font-weight:900;
  background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-shadow:none;line-height:1;}
.win-tokens{font-size:16px;color:rgba(232,224,208,.55);margin-top:10px;}
.win-lines-txt{font-size:12px;color:var(--neon);margin-top:6px;letter-spacing:1px;}
.win-dismiss{margin-top:22px;padding:10px 32px;border-radius:10px;border:1px solid rgba(240,192,96,.35);
  background:rgba(240,192,96,.08);color:var(--gold);font-family:'Orbitron',monospace;font-size:11px;
  font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .2s;}
.win-dismiss:hover{background:rgba(240,192,96,.18);border-color:rgba(240,192,96,.6);}

/* CONFETTI */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden;}
.confetto{position:absolute;width:8px;height:8px;opacity:0;
  animation:confettiFall var(--dur,2.5s) var(--delay,0s) ease-in forwards;}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(var(--rot,720deg));opacity:0;}
}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-18px);
  padding:11px 22px;border-radius:11px;font-size:13px;font-weight:600;z-index:999;
  opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.win{background:rgba(0,230,118,.18);border:1px solid rgba(0,230,118,.4);color:var(--green);}
.toast.loss{background:rgba(255,61,113,.15);border:1px solid rgba(255,61,113,.3);color:#ff8ca0;}
.toast.info{background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.3);color:var(--neon);}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:2px 0;}

/* MOBILE */
@media(max-width:600px){
  html,body{height:auto;overflow:auto;}
  .main{grid-template-columns:1fr;grid-template-rows:auto auto;overflow:visible;}
  .game-area{padding:12px;min-height:auto;}
  .bet-panel{border-left:none;border-top:1px solid var(--border);max-height:45vh;overflow-y:auto;}
  .reel-cell{width:60px!important;height:60px!important;font-size:28px!important;}
  .machine-inner{padding:12px;}
  .reels-row{gap:7px;}
  .panel-title{font-size:10px;}
  .inp-lbl{font-size:9px;}
  .bet-inp{padding:7px 10px;font-size:13px;}
  .qb{padding:4px 2px;font-size:9px;}
  .stat-box{padding:7px 4px;}
  .sv{font-size:12px;}
  .sl{font-size:8px;}
  .spin-btn{padding:12px;font-size:12px;}
  .win-amount{font-size:40px;}
  .win-box{padding:24px 28px;}
  .paylines-legend{gap:6px;}
  .pl-tag{font-size:9px;padding:2px 7px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <a class="logo" href="/">&#11042; HATHOR</a>
  <div class="game-lbl">&#127920; SLOTS</div>
  <div class="bal-row">&#129689; <span id="bal">-</span></div>
</div>

<div class="main">

  <!-- GAME AREA -->
  <div class="game-area">

    <!-- PAYLINES LEGEND -->
    <div class="paylines-legend" id="plLegend">
      <div class="pl-tag" id="pl0">TOP ROW</div>
      <div class="pl-tag" id="pl1">MID ROW</div>
      <div class="pl-tag" id="pl2">BOT ROW</div>
      <div class="pl-tag" id="pl3">DIAG &#x2198;</div>
      <div class="pl-tag" id="pl4">DIAG &#x2197;</div>
    </div>

    <!-- SLOT MACHINE -->
    <div class="machine-frame">
      <div class="machine-inner">
        <div class="reels-row" id="reelsRow">
          <!-- Reel 0 -->
          <div class="reel-wrap" id="reel0">
            <div class="reel-cell" id="r0c0">?</div>
            <div class="reel-cell" id="r0c1">?</div>
            <div class="reel-cell" id="r0c2">?</div>
          </div>
          <!-- Reel 1 -->
          <div class="reel-wrap" id="reel1">
            <div class="reel-cell" id="r1c0">?</div>
            <div class="reel-cell" id="r1c1">?</div>
            <div class="reel-cell" id="r1c2">?</div>
          </div>
          <!-- Reel 2 -->
          <div class="reel-wrap" id="reel2">
            <div class="reel-cell" id="r2c0">?</div>
            <div class="reel-cell" id="r2c1">?</div>
            <div class="reel-cell" id="r2c2">?</div>
          </div>
        </div>
      </div>
    </div>

    <!-- LAST WIN -->
    <div class="last-win-row">
      <div class="lw-val neutral" id="lastWin">0</div>
      <div class="lw-sub">LAST WIN</div>
    </div>

  </div>

  <!-- BET PANEL -->
  <div class="bet-panel">
    <div class="panel-title">&#127920; SLOTS</div>

    <!-- BET AMOUNT -->
    <div>
      <div class="inp-lbl">Bet Amount</div>
      <input class="bet-inp" id="betInp" type="number" value="100" min="10" max="50000"/>
      <div class="qgrid">
        <button class="qb" onclick="qset(10)">10</button>
        <button class="qb" onclick="qset(25)">25</button>
        <button class="qb" onclick="qset(50)">50</button>
        <button class="qb" onclick="qset(100)">100</button>
        <button class="qb" onclick="qset(500)">500</button>
        <button class="qb qb-max" onclick="qmax()">MAX</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- AUTO SPIN -->
    <div>
      <div class="inp-lbl">Auto Spin</div>
      <div class="auto-row">
        <button class="auto-tog" id="autoTog" onclick="toggleAuto()">AUTO</button>
        <select class="auto-sel" id="autoSel">
          <option value="10">10 spins</option>
          <option value="25">25 spins</option>
          <option value="50">50 spins</option>
          <option value="100">100 spins</option>
        </select>
        <span id="autoCount" style="font-family:'DM Mono',monospace;font-size:11px;color:rgba(0,229,255,.5);min-width:28px;text-align:right;"></span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- STATS -->
    <div>
      <div class="inp-lbl">Session</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="sv" id="statSpins">0</div>
          <div class="sl">SPINS</div>
        </div>
        <div class="stat-box">
          <div class="sv" id="statWins">0</div>
          <div class="sl">WINS</div>
        </div>
        <div class="stat-box">
          <div class="sv" id="statProfit" style="color:rgba(232,224,208,.4)">0</div>
          <div class="sl">PROFIT</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- PAYOUT TABLE -->
    <div>
      <div class="inp-lbl">Payouts (3x match)</div>
      <div class="pay-table">
        <div class="pay-row">
          <span class="pay-sym">&#127826;</span>
          <span class="pay-label">Cherry</span>
          <span class="pay-mult">1.9x</span>
        </div>
        <div class="pay-row">
          <span class="pay-sym">&#127819;</span>
          <span class="pay-label">Lemon</span>
          <span class="pay-mult">2.85x</span>
        </div>
        <div class="pay-row">
          <span class="pay-sym">&#127818;</span>
          <span class="pay-label">Orange</span>
          <span class="pay-mult">3.8x</span>
        </div>
        <div class="pay-row">
          <span class="pay-sym">&#127815;</span>
          <span class="pay-label">Grapes</span>
          <span class="pay-mult">5.7x</span>
        </div>
        <div class="pay-row">
          <span class="pay-sym">&#128142;</span>
          <span class="pay-label">Diamond</span>
          <span class="pay-mult">14.25x</span>
        </div>
        <div class="pay-row">
          <span class="pay-sym">&#11088;</span>
          <span class="pay-label">Star</span>
          <span class="pay-mult">19x</span>
        </div>
        <div class="pay-row">
          <span class="pay-sym">7&#65039;&#8419;</span>
          <span class="pay-label">Seven</span>
          <span class="pay-mult">47.5x</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- SPIN BUTTON -->
    <button class="spin-btn" id="spinBtn" onclick="doSpin()">SPIN</button>

    <!-- PROVABLY FAIR -->
    <div class="pf-box">
      <div class="pf-lbl">PROVABLY FAIR</div>
      <div class="pf-hash" id="pfHash">-</div>
    </div>

  </div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <div class="win-label">YOU WIN</div>
    <div class="win-amount" id="winAmount">0</div>
    <div class="win-tokens" id="winTokens"></div>
    <div class="win-lines-txt" id="winLinesTxt"></div>
    <button class="win-dismiss" onclick="dismissWin()">COLLECT</button>
  </div>
</div>

<!-- CONFETTI -->
<div class="confetti-container" id="confettiContainer"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
var SYMBOLS = [
  {id:'cherry',  emoji:'\u{1F352}', cls:'sym-cherry',  weight:15, pay3:2,   pay2:1.2},
  {id:'lemon',   emoji:'\u{1F34B}', cls:'sym-lemon',   weight:12, pay3:3,   pay2:0},
  {id:'orange',  emoji:'\u{1F34A}', cls:'sym-orange',  weight:10, pay3:4,   pay2:0},
  {id:'grapes',  emoji:'\u{1F347}', cls:'sym-grapes',  weight:8,  pay3:6,   pay2:0},
  {id:'diamond', emoji:'\u{1F48E}', cls:'sym-diamond', weight:5,  pay3:15,  pay2:0},
  {id:'star',    emoji:'\u2B50',    cls:'sym-star',    weight:4,  pay3:20,  pay2:0},
  {id:'seven',   emoji:'7\uFE0F\u20E3', cls:'sym-seven', weight:3, pay3:50, pay2:0}
];
var HOUSE_EDGE = 0.95;
var MAX_BET = 50000;
var MAX_WIN = 500000;

// 5 paylines: each is [row indices per reel]
// reel = column 0,1,2; row = row 0(top),1(mid),2(bot)
// payline[i] = [rowForReel0, rowForReel1, rowForReel2]
var PAYLINES = [
  [0,0,0],  // top row
  [1,1,1],  // middle row
  [2,2,2],  // bottom row
  [0,1,2],  // diagonal down-right
  [2,1,0]   // diagonal up-right
];
var PAYLINE_NAMES = ['TOP ROW','MID ROW','BOT ROW','DIAG \u2198','\u2197 DIAG'];
var PAYLINE_COLORS = ['pl-active'];

// ===== STATE =====
var tokens = 10000;
var spinning = false;
var autoOn = false;
var autoRemaining = 0;
var autoTimer = null;
var sessionSpins = 0;
var sessionWins = 0;
var sessionProfit = 0;
// grid[reel][row] = symbol index
var grid = [[0,0,0],[0,0,0],[0,0,0]];
var pendingWin = 0;

// ===== INIT =====
function init() {
  var stored = localStorage.getItem('casino_tokens');
  if (stored !== null) {
    tokens = parseInt(stored, 10);
    if (isNaN(tokens)) { tokens = 10000; }
  }
  updateBal();
  buildInitialGrid();
  renderGrid();
  genHash();
}

function buildInitialGrid() {
  var r, c;
  for (r = 0; r < 3; r++) {
    grid[r] = [];
    for (c = 0; c < 3; c++) {
      grid[r][c] = weightedRandom();
    }
  }
}

function weightedRandom() {
  var total = 0;
  var i;
  for (i = 0; i < SYMBOLS.length; i++) {
    total += SYMBOLS[i].weight;
  }
  var rnd = Math.random() * total;
  var cum = 0;
  for (i = 0; i < SYMBOLS.length; i++) {
    cum += SYMBOLS[i].weight;
    if (rnd < cum) { return i; }
  }
  return 0;
}

// ===== BALANCE =====
function updateBal() {
  var el = document.getElementById('bal');
  el.textContent = formatNum(tokens);
  localStorage.setItem('casino_tokens', tokens);
}

function formatNum(n) {
  if (n >= 1000000) { return (n/1000000).toFixed(2) + 'M'; }
  if (n >= 1000) { return (n/1000).toFixed(1) + 'K'; }
  return Math.floor(n).toString();
}

// ===== GRID RENDER =====
function renderGrid() {
  var r, c, cell, sym, cellEl;
  for (r = 0; r < 3; r++) {
    for (c = 0; c < 3; c++) {
      sym = SYMBOLS[grid[r][c]];
      cellEl = document.getElementById('r' + r + 'c' + c);
      cellEl.textContent = sym.emoji;
      cellEl.className = 'reel-cell';
      var bg = document.createElement('div');
      // just use inline background via class on the cell itself
      cellEl.style.background = symBg(grid[r][c]);
    }
  }
}

function symBg(idx) {
  var bgs = [
    'linear-gradient(135deg,rgba(120,10,30,.7),rgba(60,4,12,.9))',   // cherry
    'linear-gradient(135deg,rgba(100,90,0,.7),rgba(60,55,0,.9))',    // lemon
    'linear-gradient(135deg,rgba(120,55,0,.7),rgba(70,30,0,.9))',    // orange
    'linear-gradient(135deg,rgba(60,0,100,.7),rgba(30,0,60,.9))',    // grapes
    'linear-gradient(135deg,rgba(0,60,100,.7),rgba(0,30,70,.9))',    // diamond
    'linear-gradient(135deg,rgba(90,80,0,.7),rgba(60,55,0,.9))',     // star
    'linear-gradient(135deg,rgba(140,10,10,.7),rgba(80,5,5,.9))'     // seven
  ];
  return bgs[idx] || bgs[0];
}

// ===== BET QUICK BUTTONS =====
function qset(v) {
  var inp = document.getElementById('betInp');
  inp.value = v;
}

function qmax() {
  var inp = document.getElementById('betInp');
  inp.value = Math.min(tokens, MAX_BET);
}

// ===== AUTO SPIN =====
function toggleAuto() {
  autoOn = !autoOn;
  var tog = document.getElementById('autoTog');
  if (autoOn) {
    tog.className = 'auto-tog on';
    var sel = document.getElementById('autoSel');
    autoRemaining = parseInt(sel.value, 10);
    document.getElementById('autoCount').textContent = autoRemaining;
  } else {
    tog.className = 'auto-tog';
    autoRemaining = 0;
    document.getElementById('autoCount').textContent = '';
    if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  }
}

// ===== HASH =====
function genHash() {
  var chars = '0123456789abcdef';
  var h = '';
  var i;
  for (i = 0; i < 64; i++) {
    h += chars[Math.floor(Math.random() * 16)];
  }
  document.getElementById('pfHash').textContent = h;
}

// ===== SPIN =====
function doSpin() {
  if (spinning) { return; }

  var bet = parseInt(document.getElementById('betInp').value, 10);
  if (isNaN(bet) || bet < 10) { showToast('Minimum bet is 10', 'info'); return; }
  bet = Math.min(bet, MAX_BET);
  if (bet > tokens) { showToast('Insufficient balance', 'loss'); return; }

  spinning = true;
  tokens -= bet;
  updateBal();
  clearWinHighlights();
  clearPaylineHints();

  var spinBtn = document.getElementById('spinBtn');
  spinBtn.disabled = true;
  spinBtn.className = 'spin-btn spinning-state';
  spinBtn.textContent = 'SPINNING...';

  // Generate result BEFORE animation
  var result = generateResult();
  // Calculate win
  var winData = calculateWin(bet, result);
  var totalWin = winData.total;
  if (totalWin > MAX_WIN) { totalWin = MAX_WIN; }

  // Animate reels
  startSpinAnimation(result, function() {
    // Animation done — show results
    spinning = false;
    spinBtn.disabled = false;
    spinBtn.className = 'spin-btn';
    spinBtn.textContent = 'SPIN';

    // Apply win
    tokens += totalWin;
    updateBal();

    sessionSpins++;
    sessionProfit += (totalWin - bet);
    if (totalWin > 0) {
      sessionWins++;
    }
    updateStats();

    // Update last win display
    updateLastWin(totalWin);

    // Highlight winning lines
    if (winData.lines.length > 0) {
      highlightWinLines(winData.lines);
      highlightPaylines(winData.lines);
    }

    genHash();
    pendingWin = totalWin;

    if (totalWin >= bet * 3) {
      showWinOverlay(totalWin, winData.lines);
      if (totalWin >= bet * 10) { launchConfetti(); }
    } else if (totalWin > 0) {
      showToast('+' + formatNum(totalWin) + ' tokens', 'win');
    }

    // Auto spin continue
    if (autoOn && autoRemaining > 0) {
      autoRemaining--;
      document.getElementById('autoCount').textContent = autoRemaining > 0 ? autoRemaining : '';
      if (autoRemaining <= 0) {
        autoOn = false;
        document.getElementById('autoTog').className = 'auto-tog';
        document.getElementById('autoCount').textContent = '';
      } else {
        autoTimer = setTimeout(doSpin, 800);
      }
    }
  });
}

// ===== RESULT GENERATION =====
function generateResult() {
  var res = [];
  var r, c;
  for (r = 0; r < 3; r++) {
    res[r] = [];
    for (c = 0; c < 3; c++) {
      res[r][c] = weightedRandom();
    }
  }
  return res;
}

// ===== WIN CALCULATION =====
function calculateWin(bet, result) {
  var lines = [];
  var total = 0;
  var p, pl, s0, s1, s2, sym, payout, lineWin;

  for (p = 0; p < PAYLINES.length; p++) {
    pl = PAYLINES[p];
    // pl = [rowForReel0, rowForReel1, rowForReel2]
    s0 = result[0][pl[0]];
    s1 = result[1][pl[1]];
    s2 = result[2][pl[2]];

    lineWin = 0;

    if (s0 === s1 && s1 === s2) {
      // 3 of a kind
      sym = SYMBOLS[s0];
      payout = sym.pay3 * HOUSE_EDGE;
      lineWin = Math.floor(bet * payout);
      if (lineWin > 0) {
        lines.push({payline: p, type: '3x', symIdx: s0, win: lineWin, cells: [
          {r: 0, c: pl[0]},
          {r: 1, c: pl[1]},
          {r: 2, c: pl[2]}
        ]});
        total += lineWin;
      }
    } else if (s0 === s1) {
      // 2 of a kind (first two reels, only on middle row for cherry)
      if (p === 1 && s0 === 0) {
        sym = SYMBOLS[s0];
        payout = sym.pay2 * HOUSE_EDGE;
        lineWin = Math.floor(bet * payout);
        if (lineWin > 0) {
          lines.push({payline: p, type: '2x', symIdx: s0, win: lineWin, cells: [
            {r: 0, c: pl[0]},
            {r: 1, c: pl[1]}
          ]});
          total += lineWin;
        }
      }
    }
  }

  return {total: total, lines: lines};
}

// ===== SPIN ANIMATION =====
function startSpinAnimation(result, cb) {
  // Spin durations per reel (left to right)
  var durations = [800, 1000, 1200];
  var doneCount = 0;
  var r;

  for (r = 0; r < 3; r++) {
    (function(reel) {
      var dur = durations[reel];
      var cells = [
        document.getElementById('r' + reel + 'c0'),
        document.getElementById('r' + reel + 'c1'),
        document.getElementById('r' + reel + 'c2')
      ];
      var c;
      // Start spin animation on cells
      for (c = 0; c < 3; c++) {
        cells[c].classList.add('spinning');
        cells[c].style.setProperty('--spin-dur', (dur / 1000) + 's');
        cells[c].textContent = '?';
        cells[c].style.background = 'rgba(10,8,24,.9)';
      }

      setTimeout(function() {
        // Stop: apply result
        var c2;
        for (c2 = 0; c2 < 3; c2++) {
          cells[c2].classList.remove('spinning');
          var symIdx = result[reel][c2];
          var sym = SYMBOLS[symIdx];
          cells[c2].textContent = sym.emoji;
          cells[c2].style.background = symBg(symIdx);
          cells[c2].classList.add('bounce-in');
          // Remove bounce-in after anim
          (function(cell) {
            setTimeout(function() {
              cell.classList.remove('bounce-in');
            }, 400);
          })(cells[c2]);
        }
        // Update internal grid
        grid[reel] = [result[reel][0], result[reel][1], result[reel][2]];

        doneCount++;
        if (doneCount === 3) {
          setTimeout(cb, 100);
        }
      }, dur);
    })(r);
  }
}

// ===== WIN HIGHLIGHT =====
function clearWinHighlights() {
  var r, c, cell;
  for (r = 0; r < 3; r++) {
    for (c = 0; c < 3; c++) {
      cell = document.getElementById('r' + r + 'c' + c);
      cell.classList.remove('win-cell');
      cell.classList.remove('win-cell-gold');
    }
  }
}

function highlightWinLines(lines) {
  var i, line, j, cellInfo, cell;
  for (i = 0; i < lines.length; i++) {
    line = lines[i];
    for (j = 0; j < line.cells.length; j++) {
      cellInfo = line.cells[j];
      cell = document.getElementById('r' + cellInfo.r + 'c' + cellInfo.c);
      if (line.type === '3x' && SYMBOLS[line.symIdx].pay3 >= 15) {
        cell.classList.add('win-cell-gold');
      } else {
        cell.classList.add('win-cell');
      }
    }
  }
}

function clearPaylineHints() {
  var i, el;
  for (i = 0; i < 5; i++) {
    el = document.getElementById('pl' + i);
    if (el) { el.className = 'pl-tag'; }
  }
}

function highlightPaylines(lines) {
  var i, line, el;
  for (i = 0; i < lines.length; i++) {
    line = lines[i];
    el = document.getElementById('pl' + line.payline);
    if (el) { el.className = 'pl-tag pl-active'; }
  }
}

// ===== LAST WIN =====
function updateLastWin(amount) {
  var el = document.getElementById('lastWin');
  if (amount > 0) {
    el.textContent = '+' + formatNum(amount);
    el.className = 'lw-val';
    el.style.color = 'var(--green)';
    el.style.textShadow = '0 0 20px var(--green)';
  } else {
    el.textContent = '0';
    el.className = 'lw-val neutral';
    el.style.color = '';
    el.style.textShadow = '';
  }
}

// ===== STATS =====
function updateStats() {
  document.getElementById('statSpins').textContent = sessionSpins;
  document.getElementById('statWins').textContent = sessionWins;
  var profitEl = document.getElementById('statProfit');
  profitEl.textContent = (sessionProfit >= 0 ? '+' : '') + formatNum(sessionProfit);
  if (sessionProfit > 0) {
    profitEl.style.color = 'var(--green)';
  } else if (sessionProfit < 0) {
    profitEl.style.color = 'var(--red)';
  } else {
    profitEl.style.color = 'rgba(232,224,208,.4)';
  }
}

// ===== WIN OVERLAY =====
function showWinOverlay(amount, lines) {
  document.getElementById('winAmount').textContent = formatNum(amount);
  document.getElementById('winTokens').textContent = amount + ' tokens';
  var lineNames = [];
  var i;
  for (i = 0; i < lines.length; i++) {
    lineNames.push(PAYLINE_NAMES[lines[i].payline]);
  }
  document.getElementById('winLinesTxt').textContent = lineNames.length > 0 ? lineNames.join(' + ') : '';
  var ov = document.getElementById('winOverlay');
  ov.className = 'win-overlay show';
}

function dismissWin() {
  var ov = document.getElementById('winOverlay');
  ov.className = 'win-overlay';
  stopConfetti();
}

// ===== CONFETTI =====
function launchConfetti() {
  var container = document.getElementById('confettiContainer');
  container.innerHTML = '';
  var colors = ['#f0c060','#00e676','#00e5ff','#ff3d71','#ffd980','#ffffff'];
  var shapes = ['border-radius:50%', 'border-radius:2px', 'clip-path:polygon(50% 0%,0% 100%,100% 100%)'];
  var i, el, x, color, shape;
  for (i = 0; i < 90; i++) {
    el = document.createElement('div');
    el.className = 'confetto';
    x = Math.random() * 100;
    color = colors[Math.floor(Math.random() * colors.length)];
    shape = shapes[Math.floor(Math.random() * shapes.length)];
    el.style.left = x + '%';
    el.style.background = color;
    el.style.cssText += ';' + shape;
    el.style.setProperty('--dur', (1.8 + Math.random() * 1.8) + 's');
    el.style.setProperty('--delay', (Math.random() * 0.8) + 's');
    el.style.setProperty('--rot', (Math.random() > 0.5 ? '' : '-') + (360 + Math.floor(Math.random() * 720)) + 'deg');
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(el);
  }
}

function stopConfetti() {
  var container = document.getElementById('confettiContainer');
  container.innerHTML = '';
}

// ===== TOAST =====
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(function() {
    t.className = 'toast ' + type;
  }, 2200);
}

// ===== BOOT =====
init();
</script>
