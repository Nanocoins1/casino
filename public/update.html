<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HATHOR — Update</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#04040a;font-family:'Space Grotesk',system-ui,sans-serif;
  color:#e8e0d0;min-height:100vh;display:flex;align-items:center;
  justify-content:center;text-align:center;padding:24px;
}
.card{
  background:rgba(8,8,18,.8);border:1px solid rgba(240,192,96,.2);
  border-radius:20px;padding:40px 32px;max-width:400px;width:100%;
}
.logo{font-family:Orbitron,monospace;font-size:22px;font-weight:900;
  background:linear-gradient(135deg,#c9a84c,#f0c060);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;letter-spacing:3px;margin-bottom:24px;}
.icon{font-size:56px;margin-bottom:16px;display:block;}
h1{font-family:Orbitron,monospace;font-size:18px;color:#f0c060;
  letter-spacing:1px;margin-bottom:10px;}
p{font-size:13px;color:rgba(232,224,208,.45);line-height:1.7;margin-bottom:24px;}
.btn{
  display:block;width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#c9a84c,#f0c060);color:#080600;
  font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
  letter-spacing:.5px;transition:all .2s;margin-bottom:10px;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(240,192,96,.35);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-ghost{
  display:block;width:100%;padding:12px;border-radius:12px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  color:rgba(232,224,208,.5);font-family:inherit;font-size:13px;cursor:pointer;
}
.status{font-size:12px;color:rgba(240,192,96,.6);margin-top:16px;min-height:20px;
  font-family:'DM Mono',monospace;}
.step{display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;text-align:left;}
.step:last-child{border-bottom:none;}
.step-icon{font-size:16px;flex-shrink:0;}
.step-text{color:rgba(232,224,208,.5);}
.step-text.done{color:#00e676;}
.step-text.active{color:#f0c060;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">⬡ HATHOR</div>
  <span class="icon" id="mainIcon">🔄</span>
  <h1 id="title">Force Update</h1>
  <p id="desc">Clears cached files and installs the latest version. Use this if the app shows outdated content.</p>

  <div id="steps" style="margin-bottom:24px;display:none;">
    <div class="step"><span class="step-icon">🗑</span><span class="step-text" id="s1">Deleting old cache...</span></div>
    <div class="step"><span class="step-icon">🔓</span><span class="step-text" id="s2">Unregistering service worker...</span></div>
    <div class="step"><span class="step-icon">⬇️</span><span class="step-text" id="s3">Loading fresh version...</span></div>
  </div>

  <button class="btn" id="updateBtn" onclick="doUpdate()">🚀 Update Now</button>
  <a href="/" class="btn-ghost" style="text-decoration:none;display:block;text-align:center;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(232,224,208,.5);font-size:13px;">← Back to Casino</a>
  <div class="status" id="status"></div>
</div>

<script>
async function doUpdate() {
  const btn  = document.getElementById('updateBtn');
  const stat = document.getElementById('status');
  const steps = document.getElementById('steps');
  btn.disabled = true;
  btn.textContent = 'Working...';
  steps.style.display = 'block';

  function setStep(id, state, text) {
    const el = document.getElementById(id);
    el.className = 'step-text ' + state;
    if(text) el.textContent = text;
  }

  // Step 1: Nuke all caches
  setStep('s1','active');
  try {
    if('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      setStep('s1','done','✅ Cache deleted (' + keys.length + ' entries)');
    } else {
      setStep('s1','done','✅ No cache API (skip)');
    }
  } catch(e) { setStep('s1','done','⚠️ Cache delete error (continuing)'); }

  // Step 2: Unregister SW and send NUKE message
  setStep('s2','active');
  try {
    if('serviceWorker' in navigator) {
      // Send NUKE to active SW
      const reg = await navigator.serviceWorker.getRegistration();
      if(reg) {
        const sw = reg.active || reg.waiting || reg.installing;
        if(sw) sw.postMessage({ type: 'NUKE_CACHE' });
        await reg.unregister();
      }
      setStep('s2','done','✅ Service worker unregistered');
    } else {
      setStep('s2','done','✅ No SW (skip)');
    }
  } catch(e) { setStep('s2','done','⚠️ SW error (continuing)'); }

  // Step 3: Hard reload to /
  setStep('s3','active');
  stat.textContent = 'Reloading in 2 seconds...';
  document.getElementById('mainIcon').textContent = '✅';
  document.getElementById('title').textContent = 'Done!';
  document.getElementById('desc').textContent = 'Cache cleared. Loading fresh version now...';

  await new Promise(r => setTimeout(r, 2000));

  // Hard reload bypassing cache
  window.location.replace('/?nocache=' + Date.now());
}
</script>
</body>
</html>
