<script>

}
let balance = parseInt(localStorage.getItem('casino_tokens') || '10000');
let _plinkoRTP = 95;
window._gameName = 'plinko';
window._onBalanceSync = function(bal){ balance = bal; updateBalance(); };
fetch('/api/rtp-config').then(function(r){return r.json();}).then(function(d){_plinkoRTP=d.plinko||95;}).catch(function(){});

// ─────────────────────────────────────────────────────────────────────

let socket;
try {
  socket = io();
  socket.emit('register', { name: localStorage.getItem('casino_name') || 'Player', uid });
  socket.on('registered', d => { balance = d.tokens; updateBalance(); });
} catch(e) { /* no socket */ }

// ─────────────────────────────────────────────────────────────────────
//  GARSO VARIKLIS (Web Audio API — be išorinių failų)
// ─────────────────────────────────────────────────────────────────────
let _ac = null;
function ac() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

const sfx = {
  // Trumpas "tik" kai kamuolys atsimuša į nagą
  tick(row = 0) {
    try {
      const c = ac(), o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      const freq = 400 + row * 30 + Math.random() * 80;
      o.frequency.setValueAtTime(freq, c.currentTime);
      o.type = 'triangle';
      g.gain.setValueAtTime(0.18, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.06);
      o.start(c.currentTime);
      o.stop(c.currentTime + 0.06);
    } catch(e) {}
  },

  // Kritimas — trumpas "whoosh"
  drop() {
    try {
      const c = ac(), o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(600, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(120, c.currentTime + 0.18);
      g.gain.setValueAtTime(0.12, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.18);
      o.start(c.currentTime);
      o.stop(c.currentTime + 0.2);
    } catch(e) {}
  },

  // Nusileidimas į kaušą — "thud"
  land() {
    try {
      const c = ac(), o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(140, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(60, c.currentTime + 0.12);
      g.gain.setValueAtTime(0.35, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.18);
      o.start(c.currentTime);
      o.stop(c.currentTime + 0.2);
    } catch(e) {}
  },

  // Didelis laimėjimas — kylantis arpegio
  bigWin(mult) {
    try {
      const c = ac();
      const notes = mult >= 50
        ? [523, 659, 784, 1047, 1319]  // C5 E5 G5 C6 E6
        : [523, 659, 784, 1047];        // C5 E5 G5 C6
      notes.forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(freq, c.currentTime + i * 0.1);
        g.gain.setValueAtTime(0, c.currentTime + i * 0.1);
        g.gain.linearRampToValueAtTime(0.22, c.currentTime + i * 0.1 + 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.1 + 0.28);
        o.start(c.currentTime + i * 0.1);
        o.stop(c.currentTime + i * 0.1 + 0.3);
      });
    } catch(e) {}
  },

  // Pralaimėjimas — žemyn einantis tonas
  lose() {
    try {
      const c = ac(), o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(330, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(180, c.currentTime + 0.25);
      g.gain.setValueAtTime(0.18, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.28);
      o.start(c.currentTime);
      o.stop(c.currentTime + 0.3);
    } catch(e) {}
  }
};

// ─────────────────────────────────────────────────────────────────────
//  STARS BACKGROUND
// ─────────────────────────────────────────────────────────────────────
(function initStars() {
  const sc = document.getElementById('stars-canvas');
  const sx = sc.getContext('2d');
  let W, H;
  const stars = [];
  function resize() {
    W = sc.width = window.innerWidth;
    H = sc.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  for (let i = 0; i < 220; i++) {
    stars.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.5 + .3,
      speed: Math.random() * .0002 + .00005,
      phase: Math.random() * Math.PI * 2,
      color: ['#ffd700','#f0c060','#ffe566','#ffffff'][Math.floor(Math.random()*4)]
    });
  }
  function drawStars(t) {
    sx.clearRect(0, 0, W, H);
    for (const s of stars) {
      const alpha = .4 + .6 * Math.abs(Math.sin(s.phase + t * s.speed * 1000));
      sx.beginPath();
      sx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      sx.fillStyle = s.color;
      sx.globalAlpha = alpha;
      sx.fill();
    }
    sx.globalAlpha = 1;
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);
})();

// ─────────────────────────────────────────────────────────────────────
//  CONSTANTS & CONFIG
// ─────────────────────────────────────────────────────────────────────
const ROWS = 14;
const BUCKETS = 15;
const CW = 560, CH = 680;
const TOP_PAD = 40, BOTTOM_PAD = 70;
const BOARD_H = CH - TOP_PAD - BOTTOM_PAD;
const PEG_R = 5;
const BALL_R = 9;
const PEG_SPACING_Y = BOARD_H / (ROWS + 1);

// ─── MULTIPLIER DESIGN — 14 rows, 15 buckets, TRUE binomial distribution ───────
// Bucket probability: P(k) = C(14,k) / 2^14  (C values: 1,14,91,364,1001,2002,3003,3432,…)
// Win formula: bet × mult × (_plinkoRTP / 100)
// E_raw = Σ P(k) × mult[k]  — must stay near 1.0 so _plinkoRTP is the true house-edge lever
//
// Mode     E_raw   _plinkoRTP=95   House edge   Max win (500 bet)
// LOW      1.026      97.4 %          2.6 %       5 700
// MEDIUM   0.995      94.5 %          5.5 %      23 750
// HIGH     0.945      89.8 %         10.2 %      47 500
//
// Per-mode max-bet limits (enforced in drop handler):
//   LOW → 5 000  |  MEDIUM → 1 000  |  HIGH → 500
const MULTIPLIERS = {
  low:    [ 12,   6,   3,  1.8,  1.4,  1.1,  0.8, 0.8, 0.8,  1.1,  1.4,  1.8,   3,   6,  12],
  medium: [ 50,  14,   6,  2.8,  1.7,  1.0, 0.65, 0.4, 0.65, 1.0,  1.7,  2.8,   6,  14,  50],
  high:   [100,  25,   8,  3.5,  1.5,  0.8,  0.5, 0.4, 0.5,  0.8,  1.5,  3.5,   8,  25, 100]
};

// Per-mode maximum bet — caps single-ball exposure
const MODE_MAX_BET = { low: 5000, medium: 1000, high: 500 };

let riskMode = 'low';
let currentBet = 50;
let isDropping = false;
let ballQueue = [];
let activeBall = null;
let totalDropped = 0;
let bestMultiplier = 0;
let recentResults = [];
let shakeFrames = 0;
let shakeX = 0, shakeY = 0;

// ─────────────────────────────────────────────────────────────────────
//  PEG POSITIONS
// ─────────────────────────────────────────────────────────────────────
const pegs = [];
for (let r = 0; r < ROWS; r++) {
  const numPegs = r + 3;
  const totalWidth = (numPegs - 1) * (CW / (numPegs + 1));
  const startX = (CW - totalWidth) / 2;
  const y = TOP_PAD + (r + 1) * PEG_SPACING_Y;
  for (let p = 0; p < numPegs; p++) {
    pegs.push({
      x: startX + p * (totalWidth / (numPegs - 1)),
      y,
      row: r, col: p,
      flashTimer: 0
    });
  }
}

// ─────────────────────────────────────────────────────────────────────
//  BUCKET POSITIONS
// ─────────────────────────────────────────────────────────────────────
const bucketW = CW / BUCKETS;
const buckets = [];
for (let i = 0; i < BUCKETS; i++) {
  buckets.push({
    x: i * bucketW,
    y: CH - BOTTOM_PAD,
    w: bucketW,
    h: BOTTOM_PAD,
    bounceY: 0,
    glowAlpha: 0
  });
}

function getBucketColor(i) {
  // gradient: red(0) → orange → yellow(7) → orange → red(14)
  const mid = (BUCKETS - 1) / 2;
  const dist = Math.abs(i - mid) / mid; // 0=center, 1=edge
  const r = Math.round(dist > 0.6 ? 255 : dist * 255 / 0.6);
  const g = Math.round((1 - Math.abs(dist - 0.5) * 2) * 220);
  const b = Math.round((1 - dist) * 80);
  return `rgb(${r},${g},${b})`;
}

// ─────────────────────────────────────────────────────────────────────
//  PATH PRECOMPUTATION (Fisher-Yates)
// ─────────────────────────────────────────────────────────────────────
function computePath(bucketIndex) {
  // bucket k = number of rights in 14 bounces
  const rights = bucketIndex;
  const lefts  = ROWS - bucketIndex;
  const moves  = [];
  for (let i = 0; i < rights; i++) moves.push(1);
  for (let i = 0; i < lefts;  i++) moves.push(-1);
  // Fisher-Yates shuffle
  for (let i = moves.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [moves[i], moves[j]] = [moves[j], moves[i]];
  }
  return moves;
}

// ─────────────────────────────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────────────────────────────
const particles = [];

function spawnPegHit(x, y) {
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI * 2 / 6) * i + Math.random() * .4;
    const speed = 1.5 + Math.random() * 2;
    particles.push({
      type: 'peg',
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 2 + Math.random() * 2,
      alpha: 1,
      color: `hsl(${40 + Math.random()*20},100%,${70+Math.random()*20}%)`,
      life: 0.9
    });
  }
}

function spawnLandingExplosion(x, y) {
  const colors = ['#ffd700','#f0c060','#ffe566','#fff4b0','#ffa500','#ffffff'];
  for (let i = 0; i < 36; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    particles.push({
      type: 'land',
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      r: 3 + Math.random() * 4,
      alpha: 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      gravity: 0.18,
      shape: Math.random() > 0.5 ? 'circle' : 'star'
    });
  }
}

// ─────────────────────────────────────────────────────────────────────
//  FLOATING TEXT
// ─────────────────────────────────────────────────────────────────────
const floatingTexts = [];

function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, alpha: 1, vy: -1.5, life: 1.5, age: 0 });
}

// ─────────────────────────────────────────────────────────────────────
//  BALL
// ─────────────────────────────────────────────────────────────────────
function createBall(bucketTarget, bet) {
  const path = computePath(bucketTarget);
  return {
    x: CW / 2 + (Math.random() - .5) * 40,
    y: TOP_PAD - 20,
    vx: 0,
    vy: 0,
    trail: [],
    path,
    pathStep: 0,
    currentRow: 0,
    nextPegHitRow: 0,
    phase: 'falling',  // falling | exploded
    bucketTarget,
    bet,
    done: false,
    // guided physics
    targetPegIdx: null,
  };
}

// Find pegs in row r
function getPegsInRow(r) {
  return pegs.filter(p => p.row === r);
}

// ─────────────────────────────────────────────────────────────────────
//  CANVAS SETUP
// ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('krioklis-canvas');
const ctx = canvas.getContext('2d');

// ─── DALL-E BACKGROUND ──────────────────────────────────────────
var _bgImg = null;
(function(){
  var img = new Image();
  img.onload = function(){ _bgImg = img; };
  img.src = '/img/plinko-bg.webp';
})();

// ─────────────────────────────────────────────────────────────────────
//  DRAW HELPERS
// ─────────────────────────────────────────────────────────────────────
function drawStar(ctx, cx, cy, r, spikes, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  let rot = (Math.PI / 2) * 3;
  const step = Math.PI / spikes;
  ctx.moveTo(cx, cy - r);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * r, cy + Math.sin(rot) * r);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * (r * .4), cy + Math.sin(rot) * (r * .4));
    rot += step;
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function lerp(a, b, t) { return a + (b - a) * t; }

// ─────────────────────────────────────────────────────────────────────
//  MAIN DRAW LOOP
// ─────────────────────────────────────────────────────────────────────
let lastTime = 0;
let idleGlowT = 0;

function draw(ts) {
  requestAnimationFrame(draw);
  const dt = Math.min(ts - lastTime, 32);
  lastTime = ts;
  idleGlowT += dt * 0.001;

  ctx.clearRect(0, 0, CW, CH);

  // Screen shake
  let sx = 0, sy = 0;
  if (shakeFrames > 0) {
    shakeFrames--;
    sx = (Math.random() - .5) * 8 * (shakeFrames / 10);
    sy = (Math.random() - .5) * 8 * (shakeFrames / 10);
  }
  ctx.save();
  ctx.translate(sx, sy);

  // 1. Background
  if(_bgImg){
    ctx.drawImage(_bgImg, 0, 0, CW, CH);
    // Darken overlay for readability
    ctx.fillStyle = 'rgba(4,4,18,0.58)';
    ctx.fillRect(0, 0, CW, CH);
  } else {
    const bgGrad = ctx.createLinearGradient(0, 0, 0, CH);
    bgGrad.addColorStop(0, '#04060e');
    bgGrad.addColorStop(1, '#04040e');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, CW, CH);
  }
  // subtle grid overlay
  ctx.strokeStyle = 'rgba(201,168,76,0.06)';
  ctx.lineWidth = 1;
  for (let x = 0; x < CW; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CH); ctx.stroke();
  }
  for (let y = 0; y < CH; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke();
  }

  // 2. Buckets
  const mults = MULTIPLIERS[riskMode];
  for (let i = 0; i < BUCKETS; i++) {
    const b = buckets[i];
    const bx = b.x;
    const by = b.y + b.bounceY;
    const col = getBucketColor(i);

    // Glow pulse
    if (b.glowAlpha > 0) {
      ctx.save();
      ctx.shadowColor = col;
      ctx.shadowBlur = 30 * b.glowAlpha;
      ctx.globalAlpha = b.glowAlpha;
      ctx.fillStyle = col;
      ctx.fillRect(bx + 1, by, b.w - 2, b.h);
      ctx.restore();
      b.glowAlpha -= 0.025;
      if (b.glowAlpha < 0) b.glowAlpha = 0;
    }

    // Bounce settle
    if (b.bounceY < 0) {
      b.bounceY += 0.8;
      if (b.bounceY > 0) b.bounceY = 0;
    }

    // bucket body
    const grad = ctx.createLinearGradient(bx, by, bx, by + b.h);
    grad.addColorStop(0, col);
    grad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = grad;
    ctx.fillRect(bx + 1, by + 2, b.w - 2, b.h - 2);

    // border
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx + 1, by + 2, b.w - 2, b.h - 2);

    // multiplier text
    const mult = mults[i];
    const label = mult >= 100 ? mult + 'x' : mult + 'x';
    ctx.font = `bold ${mult >= 10 ? '9' : '10'}px Orbitron,monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 4;
    ctx.fillText(label, bx + b.w / 2, by + b.h / 2 + 4);
    ctx.shadowBlur = 0;
  }

  // 3. Pegs
  for (const peg of pegs) {
    const flashing = peg.flashTimer > 0;
    if (flashing) peg.flashTimer--;

    const glowPulse = 0.5 + 0.5 * Math.sin(idleGlowT * 2 + peg.col * 0.5);

    ctx.save();
    ctx.shadowBlur = flashing ? 30 : 8 + glowPulse * 8;
    ctx.shadowColor = flashing ? '#ffffff' : '#c9a84c';
    ctx.beginPath();
    ctx.arc(peg.x, peg.y, flashing ? PEG_R + 2 : PEG_R, 0, Math.PI * 2);

    if (flashing) {
      ctx.fillStyle = '#ffffff';
    } else {
      const pg = ctx.createRadialGradient(peg.x - 1, peg.y - 1, 0, peg.x, peg.y, PEG_R);
      pg.addColorStop(0, '#e0f0ff');
      pg.addColorStop(1, '#5599cc');
      ctx.fillStyle = pg;
    }
    ctx.fill();
    ctx.restore();
  }

  // 4. Peg hit particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.gravity) p.vy += p.gravity;
    p.vx *= 0.96;
    p.alpha -= 0.03;
    if (p.alpha <= 0) { particles.splice(i, 1); continue; }

    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    if (p.shape === 'star') {
      drawStar(ctx, p.x, p.y, p.r, 4, p.color, p.alpha);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.restore();
  }

  // 5. Ball physics + drawing
  if (activeBall && !activeBall.done) {
    const ball = activeBall;
    updateBall(ball, dt);

    // Trail
    ball.trail.push({ x: ball.x, y: ball.y });
    if (ball.trail.length > 10) ball.trail.shift();
    for (let i = 0; i < ball.trail.length - 1; i++) {
      const t = ball.trail[i];
      const alpha = (i / ball.trail.length) * 0.55;
      const r = BALL_R * (i / ball.trail.length) * 0.8;
      ctx.save();
      ctx.globalAlpha = alpha;
      const tg = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r);
      tg.addColorStop(0, '#ff9900');
      tg.addColorStop(1, 'transparent');
      ctx.fillStyle = tg;
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Ball
    if (!ball.done) {
      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#ff9900';
      const bg = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 0, ball.x, ball.y, BALL_R);
      bg.addColorStop(0, '#ffe066');
      bg.addColorStop(0.6, '#ff8800');
      bg.addColorStop(1, '#cc4400');
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();
      // Shine
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ball.x - 3, ball.y - 3, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  } else if (activeBall && activeBall.done) {
    activeBall = null;
    processQueue();
  }

  // 6. Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.age += dt * 0.001;
    ft.alpha = Math.max(0, 1 - ft.age / ft.life);
    if (ft.alpha <= 0) { floatingTexts.splice(i, 1); continue; }

    ctx.save();
    ctx.globalAlpha = ft.alpha;
    ctx.font = 'bold 18px Orbitron,monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = ft.color;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 12;
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }

  ctx.restore(); // end shake
}

// ─────────────────────────────────────────────────────────────────────
//  BALL PHYSICS (guided)
// ─────────────────────────────────────────────────────────────────────
function updateBall(ball, dt) {
  if (ball.phase === 'falling') {
    ball.vy += 0.35;
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Clamp to canvas
    if (ball.x < BALL_R) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
    if (ball.x > CW - BALL_R) { ball.x = CW - BALL_R; ball.vx = -Math.abs(ball.vx); }

    // Check peg collisions
    for (const peg of pegs) {
      const dx = ball.x - peg.x;
      const dy = ball.y - peg.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = BALL_R + PEG_R + 1;
      if (dist < minDist && dist > 0) {
        // Push out
        const nx = dx / dist;
        const ny = dy / dist;
        ball.x = peg.x + nx * minDist;
        ball.y = peg.y + ny * minDist;

        // Reflect velocity
        const dot = ball.vx * nx + ball.vy * ny;
        ball.vx = (ball.vx - 2 * dot * nx) * 0.6;
        ball.vy = (ball.vy - 2 * dot * ny) * 0.6;

        // If this is the targeted bounce for this row, apply guided nudge
        if (peg.row === ball.currentRow && ball.pathStep < ball.path.length) {
          const dir = ball.path[ball.pathStep];
          ball.vx += dir * (1.5 + Math.random() * 0.5);
          ball.pathStep++;
          ball.currentRow++;
        }

        peg.flashTimer = 8;
        spawnPegHit(peg.x, peg.y);
        sfx.tick(peg.row);

        // Ensure downward movement
        if (ball.vy < 1) ball.vy = 1.5;
        break;
      }
    }

    // Bucket detection
    const bucketFloor = CH - BOTTOM_PAD + 10;
    if (ball.y >= bucketFloor) {
      const idx = Math.floor(ball.x / bucketW);
      const safeIdx = Math.max(0, Math.min(BUCKETS - 1, idx));
      landBall(ball, safeIdx);
    }

    // Safety: out of bounds
    if (ball.y > CH + 50) {
      ball.done = true;
    }
  }
}

function landBall(ball, bucketIdx) {
  ball.phase = 'exploded';
  ball.done = true;

  const bx = buckets[bucketIdx].x + bucketW / 2;
  const by = CH - BOTTOM_PAD;
  spawnLandingExplosion(bx, by - 10);
  buckets[bucketIdx].bounceY = -14;
  buckets[bucketIdx].glowAlpha = 1;
  shakeFrames = 12;

  const mult = MULTIPLIERS[riskMode][bucketIdx];
  const win = Math.min(Math.round(ball.bet * mult * (_plinkoRTP / 100)), 500000);
  sfx.land();
  const profit = win - ball.bet;
  if(mult >= 2){ sfx.bigWin(mult); if(navigator.vibrate) navigator.vibrate([40,20,100]); }
  else if(profit < 0){ sfx.lose(); if(navigator.vibrate) navigator.vibrate(25); }

  const textColor = profit >= 0 ? '#4caf7c' : '#c0394c';
  const textStr = profit >= 0 ? `+${profit} 🪙` : `${profit} 🪙`;
  spawnFloatingText(bx, by - 30, textStr, textColor);

  // Settle balance via server
  gameSettle(ball.betId||null, win, 'plinko').then(function(d){ if(d&&d.ok){ balance=d.balance; saveTokens(); updateBalance(); } }).catch(function(){ balance+=win; saveTokens(); updateBalance(); });

  // Update stats
  totalDropped++;
  if (mult > bestMultiplier) bestMultiplier = mult;
  document.getElementById('stat-total').textContent = totalDropped;
  document.getElementById('stat-best').textContent = bestMultiplier + 'x';

  // Recent results
  recentResults.unshift({ mult, bet: ball.bet, win });
  if (recentResults.length > 20) recentResults.pop();
  renderResults();

  // Toast
  if (mult >= 5) {
    showToast(`🎉 ${mult}x – ${profit >= 0 ? '+' + profit : profit} chips!`, profit >= 0 ? '#4caf7c' : '#c0394c');
  }

  updateQueueInfo();
}

// ─────────────────────────────────────────────────────────────────────
//  QUEUE
// ─────────────────────────────────────────────────────────────────────
function processQueue() {
  if (ballQueue.length > 0) {
    activeBall = ballQueue.shift();
    updateQueueInfo();
  } else {
    isDropping = false;
    document.getElementById('drop-btn').disabled = false;
    updateQueueInfo();
  }
}

function updateQueueInfo() {
  const q = ballQueue.length;
  document.getElementById('queue-info').textContent = `Queue: ${q} / 3`;
}

// ─────────────────────────────────────────────────────────────────────
//  UI INTERACTIONS
// ─────────────────────────────────────────────────────────────────────
function updateBalance() {
  const el = document.getElementById('balance-display');
  el.textContent = balance.toLocaleString('lt-LT');
}
updateBalance();

// Risk buttons
function applyModeMaxBet() {
  const maxBet = MODE_MAX_BET[riskMode];
  const inp = document.getElementById('bet-input');
  inp.max = maxBet;
  if (currentBet > maxBet) {
    currentBet = maxBet;
    inp.value = maxBet;
    document.querySelectorAll('.preset-btn').forEach(b =>
      b.classList.toggle('active', parseInt(b.dataset.amount) === maxBet)
    );
  }
}

document.querySelectorAll('.risk-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.risk-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    riskMode = btn.dataset.risk;
    applyModeMaxBet();
    renderMultLegend();
  });
});

// Preset bet buttons
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentBet = parseInt(btn.dataset.amount);
    document.getElementById('bet-input').value = currentBet;
  });
});

document.getElementById('bet-input').addEventListener('input', e => {
  const val = parseInt(e.target.value);
  if (!isNaN(val) && val >= 10) {
    currentBet = val;
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.toggle('active', parseInt(b.dataset.amount) === val);
    });
  }
});

// ─────────────────────────────────────────────────────────────────────
//  BINOMIAL BUCKET SELECTION — matches real peg physics (14 rows)
//  C(14,k) weights so centre slots are ~20x more likely than edges.
//  This makes multiplier tables work as designed → proper house edge.
// ─────────────────────────────────────────────────────────────────────
const BINOM_WEIGHTS = [1,14,91,364,1001,2002,3003,3432,3003,2002,1001,364,91,14,1];
const BINOM_TOTAL   = 16384; // 2^14

function pickBucket() {
  let r = Math.random() * BINOM_TOTAL;
  for (let i = 0; i < BINOM_WEIGHTS.length; i++) {
    r -= BINOM_WEIGHTS[i];
    if (r <= 0) return i;
  }
  return BUCKETS - 1;
}

document.getElementById('drop-btn').addEventListener('click', () => {
  const bet = currentBet;
  const maxBet = MODE_MAX_BET[riskMode];
  if (bet < 10)      { showToast('Minimum bet: 10 chips', '#c0394c'); return; }
  if (bet > maxBet)  { showToast(`Max bet on ${riskMode.toUpperCase()}: ${maxBet.toLocaleString()} chips`, '#c0394c'); return; }
  if (bet > balance) { showToast('Insufficient balance!', '#c0394c'); return; }

  // Check queue
  if (ballQueue.length >= 3) { showToast('Queue full! (max 3)', '#ff9900'); return; }

  sfx.drop();
  if(navigator.vibrate) navigator.vibrate(18);

  // Determine bucket — binomial distribution (centre much more likely)
  const bucketTarget = pickBucket();
  const ball = createBall(bucketTarget, bet);

  gameBet(bet, 'plinko').then(function(d){
    if(!d.ok){ showToast(d.error||'Error','#c0394c'); return; }
    balance = d.balance; ball.betId = d.betId; saveTokens(); updateBalance();
    if (!activeBall) { activeBall = ball; isDropping = true; } else { ballQueue.push(ball); }
    updateQueueInfo();
    document.getElementById('drop-btn').disabled = (ballQueue.length >= 3);
  }).catch(function(){
    balance -= bet; ball.betId = null; saveTokens(); updateBalance();
    if (!activeBall) { activeBall = ball; isDropping = true; } else { ballQueue.push(ball); }
    updateQueueInfo();
    document.getElementById('drop-btn').disabled = (ballQueue.length >= 3);
  });
});

// ─────────────────────────────────────────────────────────────────────
//  RENDER HELPERS
// ─────────────────────────────────────────────────────────────────────
function renderResults() {
  const container = document.getElementById('results-pills');
  container.innerHTML = '';
  for (const r of recentResults) {
    const pill = document.createElement('div');
    const won = r.win >= r.bet;
    pill.className = `pill ${won ? 'win' : 'loss'}`;
    pill.textContent = r.mult + 'x';
    container.appendChild(pill);
  }
}

function renderMultLegend() {
  const legend = document.getElementById('mult-legend');
  legend.innerHTML = '';
  const mults = MULTIPLIERS[riskMode];
  for (let i = 0; i < mults.length; i++) {
    const cell = document.createElement('div');
    cell.className = 'mult-cell';
    cell.textContent = mults[i] >= 100 ? '999' : mults[i] + 'x';
    cell.style.background = getBucketColor(i);
    cell.style.opacity = '0.85';
    legend.appendChild(cell);
  }
}
renderMultLegend();

// ─────────────────────────────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────────────────────────────
let toastTimeout;
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--purple)';
  t.style.color = color || '#fff';
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────────────────────────────────
//  START
// ─────────────────────────────────────────────────────────────────────
requestAnimationFrame(draw);
</script>
