function SportsBetting({user,setUser}){
  const [apiKey,setApiKey]=useState(localStorage.getItem('odds_key')||'');
  const [apiInp,setApiInp]=useState(localStorage.getItem('odds_key')||'');
  const [sport,setSport]=useState('soccer_epl');
  const [games,setGames]=useState([]);
  const [loading,setLoading]=useState(false);
  const [slip,setSlip]=useState([]);
  const [stake,setStake]=useState(100);
  const [myBets,setMyBets]=useState([]);

  useEffect(()=>{
    if(!apiKey)return; setLoading(true);
    fetch(`/api/sports?apiKey=${apiKey}&sport=${sport}`)
      .then(r=>r.json()).then(d=>{setGames(Array.isArray(d)?d:[]);setLoading(false);})
      .catch(()=>setLoading(false));
  },[apiKey,sport]);

  const saveKey=()=>{localStorage.setItem('odds_key',apiInp);setApiKey(apiInp);sfx.click();};
  const addSlip=(g,pick,odd)=>{
    sfx.click();
    setSlip(s=>{
      const i=s.findIndex(x=>x.gid===g.id);
      if(i>=0){const n=[...s];n[i]={gid:g.id,pick,odd,match:`${g.home} v ${g.away}`};return n;}
      if(s.length>=5)return s;
      return [...s,{gid:g.id,pick,odd,match:`${g.home} v ${g.away}`}];
    });
  };
  const removeSlip=id=>setSlip(s=>s.filter(x=>x.gid!==id));
  const totalOdd=slip.reduce((a,x)=>a*x.odd,1);
  const potWin=Math.floor(stake*totalOdd);

  const placeBet=()=>{
    if(!slip.length||user.tokens<stake)return;
    sfx.chip(); setUser(u=>({...u,tokens:u.tokens-stake}));
    socket.emit('saveTokens',{tokens:user.tokens-stake});
    const b={id:Date.now(),selections:[...slip],stake,totalOdd:parseFloat(totalOdd.toFixed(2)),potWin,status:'pending',time:new Date().toLocaleTimeString()};
    setMyBets(prev=>[b,...prev]); setSlip([]);
    setTimeout(()=>{
      const won=Math.random()>.5;
      setMyBets(prev=>prev.map(x=>x.id===b.id?{...x,status:won?'won':'lost'}:x));
      if(won){setUser(u=>({...u,tokens:u.tokens+potWin}));socket.emit('saveTokens',{tokens:user.tokens-stake+potWin});sfx.win();socket.emit('addXP',{xp:50});}
      else sfx.lose();
    },6000+Math.random()*10000);
  };

  const fmtTime=iso=>{try{const d=new Date(iso);return d.toLocaleDateString('en',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});}catch{return'?';}};

  return(
    <div className="sports-scene">
      <div className="sports-hdr">
        <h2>Sports Betting</h2>
        <div className="api-row">
          <input className="api-inp" value={apiInp} onChange={e=>setApiInp(e.target.value)} placeholder="the-odds-api.com key..." onKeyDown={e=>e.key==='Enter'&&saveKey()}/>
          <button className="btn btn-ghost btn-sm" onClick={saveKey}>Load</button>
        </div>
      </div>
      {!apiKey?(
        <div className="no-api-box">
          <h3>🔑 API Key Needed</h3>
          <p>Get a <strong>free key</strong> at <a href="https://the-odds-api.com" target="_blank">the-odds-api.com</a><br/>Free plan: 500 requests/month<br/>Paste your key above and press <strong>Load</strong>.</p>
        </div>
      ):(
        <>
          <div className="sport-tabs-row">{SPORT_TABS.map(t=><button key={t.key} className={`s-tab${sport===t.key?' active':''}`} onClick={()=>{sfx.click();setSport(t.key);}}>{t.label}</button>)}</div>
          <div className="sports-body">
            <div className="match-list">
              {loading&&<div style={{textAlign:'center',padding:'48px',color:'rgba(232,224,208,.25)',fontSize:13,letterSpacing:'2px'}}>Loading matches...</div>}
              {games.map(g=>{
                const sel=slip.find(x=>x.gid===g.id);
                return(
                  <div className="match-card" key={g.id}>
                    <div className="match-meta">{fmtTime(g.time)}</div>
                    <div className="match-teams">
                      <div className="team">{g.home}</div>
                      <div className="vs">VS</div>
                      <div className="team right">{g.away}</div>
                    </div>
                    <div className="odds-btns">
                      <div className={`odd-btn${sel?.pick===g.home?' sel':''}`} onClick={()=>addSlip(g,g.home,g.odds.home)}>
                        <span className="odd-lbl">1 HOME</span>
                        <span className="odd-num">{g.odds.home?.toFixed(2)}</span>
                      </div>
                      {g.odds.draw&&<div className={`odd-btn${sel?.pick==='Draw'?' sel':''}`} onClick={()=>addSlip(g,'Draw',g.odds.draw)}>
                        <span className="odd-lbl">X DRAW</span>
                        <span className="odd-num">{g.odds.draw?.toFixed(2)}</span>
                      </div>}
                      <div className={`odd-btn${sel?.pick===g.away?' sel':''}`} onClick={()=>addSlip(g,g.away,g.odds.away)}>
                        <span className="odd-lbl">2 AWAY</span>
                        <span className="odd-num">{g.odds.away?.toFixed(2)}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
              {myBets.length>0&&(
                <div className="my-bets">
                  <div style={{fontSize:9,letterSpacing:'3px',color:'rgba(232,224,208,.25)',marginBottom:10}}>MY BETS</div>
                  {myBets.slice(0,8).map(b=>(
                    <div className="my-bet-item" key={b.id}>
                      <div className="my-bet-pick">{b.selections.map(s=>s.pick).join(' + ')}
                        {b.status==='won'&&<span className="tag-won">WON +{fmt(b.potWin)}</span>}
                        {b.status==='lost'&&<span className="tag-lost">LOST</span>}
                        {b.status==='pending'&&<span className="tag-pend">PENDING</span>}
                      </div>
                      <div className="my-bet-info">🪙{fmt(b.stake)} × {b.totalOdd} → {fmt(b.potWin)} · {b.time}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="bet-slip-panel">
              <h3>🎫 Bet Slip</h3>
              {slip.length===0?<div className="slip-empty">Click odds to add selections<br/>Max 5 picks</div>:(
                <>
                  {slip.map(s=>(
                    <div className="slip-entry" key={s.gid}>
                      <div className="slip-match">{s.match}</div>
                      <div style={{display:'flex',justifyContent:'space-between'}}>
                        <div className="slip-pick">{s.pick}</div>
                        <div className="slip-odd">{s.odd?.toFixed(2)}</div>
                      </div>
                      <button className="slip-del" onClick={()=>removeSlip(s.gid)}>×</button>
                    </div>
                  ))}
                  <div className="slip-stake-row">
                    <input className="slip-stake-inp" type="number" value={stake} onChange={e=>setStake(Math.max(10,parseInt(e.target.value)||10))} min={10} max={user.tokens}/>
                    <span style={{fontSize:11,color:'rgba(232,224,208,.3)'}}>tokens</span>
                  </div>
                  <div className="slip-summary">
                    Total odds: <strong>{totalOdd.toFixed(2)}</strong><br/>
                    Potential: <strong>{fmt(potWin)}</strong> tokens
                  </div>
                  <button className="btn btn-primary btn-block" onClick={placeBet} disabled={user.tokens<stake}>PLACE BET</button>
                </>
              )}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// LEADERBOARD
// ═══════════════════════════════════════════════════
function Leaderboard({user}){
  const [board,setBoard]=useState([]);
  useEffect(()=>{fetch('/leaderboard').then(r=>r.json()).then(setBoard).catch(()=>{});},[]);
  const rc=i=>i===0?'r1':i===1?'r2':i===2?'r3':'';
  const rm=i=>i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;
  return(
    <div className="lb-scene">
      <h2>🏆 Leaderboard</h2>
      {board.length===0?<div style={{textAlign:'center',color:'rgba(232,224,208,.2)',padding:'40px'}}>No data yet</div>
        :board.map((p,i)=>(
          <div className={`lb-row${i<3?' top3':''}`} key={i}>
            <div className={`lb-rank ${rc(i)}`}>{rm(i)}</div>
            <div className="lb-av">{p.avatar?<img src={p.avatar} alt=""/>:'👤'}</div>
            <div className="lb-name">{p.name}{p.name===user.name&&<span style={{fontSize:10,color:'var(--gold)',marginLeft:8}}>YOU</span>}</div>
            <div className="lb-lv">{p.levelInfo?.e||''}</div>
            <div className="lb-tokens">🪙{fmt(p.tokens)}</div>
          </div>
        ))}
    </div>
  );
}


// ═══════════════════════════════════════════════════
// JACKPOT TICKER
// ═══════════════════════════════════════════════════
function JackpotTicker(){
  const [amount,setAmount]=useState(50000);
  const [bump,setBump]=useState(false);
  const [winner,setWinner]=useState(null);
  useEffect(()=>{
    fetch('/api/jackpot').then(r=>r.json()).then(d=>setAmount(d.amount)).catch(()=>{});
    socket.on('jackpotUpdate',n=>{setAmount(n);setBump(true);setTimeout(()=>setBump(false),500);});
    socket.on('jackpotWon',({name,amount})=>{setWinner({name,amount});setTimeout(()=>setWinner(null),6000);});
    return()=>{socket.off('jackpotUpdate');socket.off('jackpotWon');};
  },[]);
  return(
    <>
      <div className="jackpot-ticker">
        <span className="jackpot-ticker-label">🏆 Jackpot</span>
        <span className={`jackpot-ticker-val${bump?' bump':''}`}>🪙 {fmt(amount)}</span>
      </div>
      {winner&&(
        <div className="jackpot-won-banner">
          <div className="jackpot-won-card">
            <div style={{fontSize:64,marginBottom:8}}>🏆</div>
            <h2>JACKPOT!</h2>
            <div className="amount">{fmt(winner.amount)}</div>
            <p>{winner.name} HIT THE JACKPOT!</p>
          </div>
        </div>
      )}
    </>
  );
}

// ═══════════════════════════════════════════════════
// AI CROUPIER
// ═══════════════════════════════════════════════════
const QUICK_ASKS=['💡 Give me a tip','🎲 What should I play?','📊 How am I doing?','🏆 What is the jackpot?','😊 Say something fun'];

function AICroupier({user,currentPage}){
  const [open,setOpen]=useState(false);
  const [msgs,setMsgs]=useState([{id:0,from:'viktor',text:"Sveiki, "+user.name+"! I'm Viktor, your personal croupier. Ask me anything — tips, strategy, or just chat! 🎩"}]);
  const [inp,setInp]=useState('');
  const [loading,setLoading]=useState(false);
  const [hasNew,setHasNew]=useState(false);
  const endRef=useRef();
  useEffect(()=>endRef.current?.scrollIntoView({behavior:'smooth'}),[msgs]);

  const send=async(text)=>{
    const msg=text||inp; if(!msg.trim()||loading)return;
    setInp(''); setLoading(true); setHasNew(false);
    setMsgs(m=>[...m,{id:Date.now(),from:'player',text:msg}]);
    try{
      const r=await fetch('/api/croupier',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({uid:user.uid,message:msg,context:currentPage})});
      const d=await r.json();
      setMsgs(m=>[...m,{id:Date.now()+1,from:'viktor',text:d.reply}]);
      if(!open)setHasNew(true);
      sfx.chat();
    }catch(e){setMsgs(m=>[...m,{id:Date.now()+1,from:'viktor',text:"Connection lost momentarily... try again!"}]);}
    setLoading(false);
  };

  return(
    <>
      <button className="croupier-btn" onClick={()=>{setOpen(o=>!o);setHasNew(false);sfx.click();}}>
        🎩
        {hasNew&&<div className="croupier-badge"/>}
      </button>
      {open&&(
        <div className="croupier-panel">
          <div className="croupier-header">
            <div className="croupier-avatar">🎩</div>
            <div>
              <div className="croupier-name">Viktor</div>
              <div className="croupier-status">● AI CROUPIER — ONLINE</div>
            </div>
            <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto'}} onClick={()=>setOpen(false)}>✕</button>
          </div>
          <div className="quick-asks">
            {QUICK_ASKS.map(q=><button key={q} className="quick-ask" onClick={()=>send(q)}>{q}</button>)}
          </div>
          <div className="croupier-messages">
            {msgs.map(m=>(
              <div key={m.id} className={`croupier-msg from-${m.from==='viktor'?'viktor':'player'}`}>
                <div className="croupier-bubble">{m.text}</div>
              </div>
            ))}
            {loading&&(
              <div className="croupier-msg from-viktor">
                <div className="croupier-bubble croupier-typing">
                  <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
                </div>
              </div>
            )}
            <div ref={endRef}/>
          </div>
          <div className="croupier-input-row">
            <input className="croupier-inp" value={inp} onChange={e=>setInp(e.target.value)} placeholder="Ask Viktor anything..." onKeyDown={e=>e.key==='Enter'&&send()}/>
            <button className="croupier-send" onClick={()=>send()}>↑</button>
          </div>
        </div>
      )}
    </>
  );
}

// ═══════════════════════════════════════════════════
// STATS PAGE
// ═══════════════════════════════════════════════════
const GAME_ICONS={slots:'🎰',roulette:'🎡',blackjack:'🃏',poker:'♠',sports:'⚽'};

function StatsPage({user}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    fetch(`/api/stats/${user.uid}`).then(r=>r.json()).then(d=>{setData(d);setLoading(false);}).catch(()=>setLoading(false));
  },[]);
  if(loading)return<div className="stats-scene"><p style={{color:'rgba(232,224,208,.25)',letterSpacing:'2px',textAlign:'center',paddingTop:80}}>Loading stats...</p></div>;
  if(!data)return<div className="stats-scene"><p style={{color:'rgba(232,224,208,.25)',textAlign:'center',paddingTop:80}}>No stats yet — play some games!</p></div>;
  const wr=data.totalGames>0?Math.round(data.totalWins/data.totalGames*100):0;
  const maxBar=Math.max(1,...(data.history||[]).map(h=>Math.abs(h.result)));
  return(
    <div className="stats-scene">
      <h2>📊 Your Stats</h2>
      <div className="stats-grid">
        <div className="stat-card">
          <div className="stat-card-icon">🎮</div>
          <div className="stat-card-val">{fmt(data.totalGames)}</div>
          <div className="stat-card-lbl">Games Played</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon">🏆</div>
          <div className="stat-card-val">{wr}%</div>
          <div className="stat-card-lbl">Win Rate</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon">💰</div>
          <div className="stat-card-val">{fmt(data.biggestWin)}</div>
          <div className="stat-card-lbl">Biggest Win</div>
        </div>
        <div className="stat-card">
          <div className="stat-card-icon">🪙</div>
          <div className="stat-card-val">{fmt(data.user.tokens)}</div>
          <div className="stat-card-lbl">Current Balance</div>
        </div>
      </div>
      <div className="stats-bottom">
        <div className="stats-panel">
          <h3>Recent Results</h3>
          <div className="mini-chart">
            {(data.history||[]).map((h,i)=>(
              <div key={i} className={`chart-bar ${h.won?'won':'lost'}`}
                style={{height:Math.max(8,Math.round(Math.abs(h.result)/maxBar*80))+'px'}}
                title={`${h.won?'+':''}${fmt(h.result)}`}/>
            ))}
            {data.history?.length===0&&<p style={{fontSize:11,color:'rgba(232,224,208,.2)',alignSelf:'center',width:'100%',textAlign:'center'}}>No games yet</p>}
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
            <span style={{fontSize:9,color:'var(--green)',letterSpacing:'1px'}}>■ WIN</span>
            <span style={{fontSize:9,color:'var(--red)',letterSpacing:'1px'}}>■ LOSS</span>
          </div>
        </div>
        <div className="stats-panel">
          <h3>By Game</h3>
          {Object.entries(data.byGame||{}).map(([game,s])=>{
            const gameWr=s.played>0?Math.round(s.won/s.played*100):0;
            return(
              <div className="game-stat-row" key={game}>
                <div className="game-stat-name">{GAME_ICONS[game]||'🎲'} {game.charAt(0).toUpperCase()+game.slice(1)}</div>
                <div>
                  <div className="game-stat-nums">{s.played}G · Biggest: 🪙{fmt(s.biggestWin)}</div>
                  <div className={`game-stat-wr ${gameWr>=50?'wr-high':gameWr>=35?'wr-mid':'wr-low'}`}>{gameWr}% WR</div>
                </div>
              </div>
            );
          })}
          {Object.keys(data.byGame||{}).length===0&&<p style={{fontSize:11,color:'rgba(232,224,208,.2)',textAlign:'center',padding:'20px 0'}}>Play games to see stats here!</p>}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════
const LOBBY_CARDS=[
  {pg:'poker',icon:'♠',title:"Texas Hold'em",desc:"Multiplayer · AI bots · Live chat · Up to 6 players",badge:'LIVE',bc:'badge-live',style:{'--card-glow':'linear-gradient(135deg,rgba(0,229,255,0.06),transparent)','--card-border':'rgba(0,229,255,0.3)','--card-shadow':'rgba(0,229,255,0.15)','--icon-bg':'rgba(0,229,255,0.08)','--icon-border':'rgba(0,229,255,0.15)'}},
  {pg:'slots',icon:'🎰',title:'4 Slot Machines',desc:'5×3 reels · 20 paylines · Classic, Egypt, Space, VIP',badge:'HOT',bc:'badge-hot',style:{}},
  {pg:'roulette',icon:'🎡',title:'Roulette',desc:'European wheel · Numbers, colours, dozens',badge:'LIVE',bc:'badge-live',style:{'--card-glow':'linear-gradient(135deg,rgba(0,230,118,0.05),transparent)','--card-border':'rgba(0,230,118,0.25)','--card-shadow':'rgba(0,230,118,0.12)','--icon-bg':'rgba(0,230,118,0.08)','--icon-border':'rgba(0,230,118,0.15)'}},
  {pg:'blackjack',icon:'🃏',title:'Blackjack',desc:'Beat the dealer · Hit, Stand, Double Down',badge:'HOT',bc:'badge-hot',style:{}},
  {pg:'sports',icon:'⚽',title:'Sports Betting',desc:'EPL, NBA, NHL, Tennis · Real odds via The-Odds-API',badge:'NEW',bc:'badge-new',style:{'--card-glow':'linear-gradient(135deg,rgba(124,58,237,0.07),transparent)','--card-border':'rgba(124,58,237,0.3)','--card-shadow':'rgba(124,58,237,0.15)','--icon-bg':'rgba(124,58,237,0.08)','--icon-border':'rgba(124,58,237,0.15)'}},
  {pg:'stats',icon:'📊',title:'My Stats',desc:'Win rate · Game history · Personal records · Charts',badge:'NEW',bc:'badge-new',style:{'--card-glow':'linear-gradient(135deg,rgba(0,229,255,0.06),transparent)','--card-border':'rgba(0,229,255,0.25)','--card-shadow':'rgba(0,229,255,0.12)','--icon-bg':'rgba(0,229,255,0.07)','--icon-border':'rgba(0,229,255,0.12)'}},
  {pg:'leaderboard',icon:'🏆',title:'Leaderboard',desc:'Top 20 players by token balance',badge:null,bc:'',style:{}},
];

function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('lobby');
  const [roomId,setRoomId]=useState(null);
  const [gameState,setGameState]=useState(null);
  const [showAvatar,setShowAvatar]=useState(false);
  const [showBonus,setShowBonus]=useState(false);
  const [lvUp,setLvUp]=useState(null);
  const [particles,setParticles]=useState([]);
  const [tokenBump,setTokenBump]=useState(false);

  useEffect(()=>{
    socket.on('gameState',s=>{setGameState(s);if(!roomId)setRoomId(s.roomId);});
    socket.on('roomCreated',({roomId:id})=>setRoomId(id));
    socket.on('dailyBonusAvailable',()=>setShowBonus(true));
    socket.on('levelUp',lv=>{setLvUp(lv);sfx.lv();setTimeout(()=>setLvUp(null),4000);});
    socket.on('emojiReaction',({emoji})=>{
      const id=Date.now()+Math.random();
      setParticles(p=>[...p,{id,emoji,x:5+Math.random()*90,y:10+Math.random()*70}]);
      setTimeout(()=>setParticles(p=>p.filter(e=>e.id!==id)),2200);
    });
    return()=>socket.off('gameState').off('roomCreated').off('dailyBonusAvailable').off('levelUp').off('emojiReaction');
  },[]);

  if(!user)return <Auth onLogin={d=>setUser(d)}/>;

  const lv=user.levelInfo||LEVELS[0];
  const nextLv=user.nextLevel||null;
  const nav=pg=>{sfx.click();setPage(pg);if(pg!=='poker'){setRoomId(null);setGameState(null);}};
  const bumpTokens=amt=>{setTokenBump(true);setTimeout(()=>setTokenBump(false),500);setUser(u=>({...u,tokens:u.tokens+amt}));};

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <div className="header">
        <div className="header-logo">HATHOR</div>
        <nav className="nav-tabs">
          {[['lobby','Lobby'],['slots','Slots'],['roulette','Roulette'],['blackjack','BJ'],['poker','Poker'],['sports','⚽'],['stats','📊'],['leaderboard','🏆']].map(([pg,lbl])=>(
            <button key={pg} className={`btn btn-ghost btn-sm${page===pg?' active':''}`} style={{letterSpacing:'1px',fontSize:11}} onClick={()=>nav(pg)}>{lbl}</button>
          ))}
        </nav>
        <div className="header-right">
          <LvPill xp={user.xp||0} levelInfo={lv} nextLevel={nextLv}/>
          <div className={`token-chip${tokenBump?' bump':''}`}>🪙 {fmt(user.tokens)}</div>
          <div className="avatar" onClick={()=>setShowAvatar(true)}>{user.avatar?<img src={user.avatar} alt=""/>:'👤'}</div>
        </div>
      </div>

      {page==='lobby'&&(
        <div className="lobby">
          <div className="lobby-hero">
            <h2>HATHOR ROYAL CASINO</h2>
            <p>THE FUTURE OF ONLINE GAMING</p>
            <div className="lobby-stats">
              <div className="stat-chip">Balance <strong>🪙 {fmt(user.tokens)}</strong></div>
              <div className="stat-chip">Level <strong>{lv.e} {lv.name}</strong></div>
              <div className="stat-chip">XP <strong>{fmt(user.xp||0)}</strong></div>
            </div>
          </div>
          <div className="games-grid">
            {LOBBY_CARDS.map(c=>(
              <div className="game-card" key={c.pg} style={c.style} onClick={()=>nav(c.pg)}>
                <div className="game-card-glow"/>
                {c.badge&&<span className={`game-badge ${c.bc}`}>{c.badge}</span>}
                <div className="game-icon-wrap"><span>{c.icon}</span></div>
                <h3>{c.title}</h3>
                <p>{c.desc}</p>
              </div>
            ))}
          </div>
          <p style={{textAlign:'center',marginTop:32,fontSize:10,color:'rgba(232,224,208,.12)',letterSpacing:'3px'}}>VIRTUAL TOKENS ONLY · ENTERTAINMENT ONLY · NO REAL MONEY</p>
        </div>
      )}

      {page==='slots'&&<Slots user={user} setUser={setUser}/>}
      {page==='roulette'&&<Roulette user={user} setUser={setUser}/>}
      {page==='blackjack'&&<Blackjack user={user} setUser={setUser}/>}
      {page==='leaderboard'&&<Leaderboard user={user}/>}
      {page==='stats'&&<StatsPage user={user}/>}
      <JackpotTicker/>
      <AICroupier user={user} currentPage={page}/>
      {page==='sports'&&<SportsBetting user={user} setUser={setUser}/>}

      {page==='poker'&&(
        roomId&&gameState?(
          gameState.status==='waiting'
            ?<div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',zIndex:1}}>
               <WaitingRoom state={gameState} user={user} roomId={roomId} onBack={()=>{setRoomId(null);setGameState(null);}}/>
             </div>
            :<PokerTable state={gameState} user={user} roomId={roomId} onLeave={()=>{setRoomId(null);setGameState(null);setPage('poker');}}/>
        ):<PokerLobby user={user} onJoinRoom={id=>setRoomId(id)} onBack={()=>nav('lobby')}/>
      )}

      {showAvatar&&<AvatarModal user={user} onClose={()=>setShowAvatar(false)} onUpdate={url=>setUser(u=>({...u,avatar:url}))}/>}
      {showBonus&&<DailyBonus onClose={()=>setShowBonus(false)} onClaim={amt=>bumpTokens(amt)}/>}
      {lvUp&&<div className="levelup-banner"><h3>{lvUp.e} LEVEL UP!</h3><p>You reached {lvUp.name}</p></div>}
      {page!=='poker'&&<EmojiParticles particles={particles}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
