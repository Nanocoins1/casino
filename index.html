<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HATHOR Casino 🎰</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --felt:    #0d3322;
  --felt2:   #0f3d28;
  --gold:    #c9a84c;
  --gold2:   #e8c97a;
  --cream:   #f5efe0;
  --dark:    #080f0c;
  --card-w:  52px;
  --card-h:  72px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--dark);
  font-family: 'DM Sans', sans-serif;
  color: var(--cream);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, #1a4a30 0%, #080f0c 70%);
  z-index: -1;
}

/* ── AUTH SCREEN ─────────────────────────── */
.auth-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: radial-gradient(ellipse at center, #0d3322 0%, #040a07 100%);
}
.auth-box {
  background: rgba(13,51,34,0.95);
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 4px;
  padding: 48px 56px;
  width: 420px;
  box-shadow: 0 0 80px rgba(0,0,0,0.8), inset 0 1px 0 rgba(201,168,76,0.2);
}
.auth-logo {
  text-align: center; margin-bottom: 36px;
}
.auth-logo h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px; font-weight: 900;
  color: var(--gold);
  letter-spacing: 4px;
  text-shadow: 0 0 40px rgba(201,168,76,0.4);
}
.auth-logo p { color: rgba(245,239,224,0.5); font-size: 13px; letter-spacing: 3px; margin-top: 6px; text-transform: uppercase; }
.auth-tabs { display: flex; margin-bottom: 32px; border-bottom: 1px solid rgba(201,168,76,0.2); }
.auth-tab {
  flex: 1; padding: 12px; text-align: center; cursor: pointer;
  font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;
  color: rgba(245,239,224,0.4); transition: all .2s;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.auth-tab.active { color: var(--gold); border-color: var(--gold); }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(245,239,224,0.5); margin-bottom: 8px; }
.form-group input {
  width: 100%; padding: 12px 16px;
  background: rgba(0,0,0,0.4); border: 1px solid rgba(201,168,76,0.2);
  border-radius: 2px; color: var(--cream); font-family: 'DM Sans', sans-serif;
  font-size: 15px; outline: none; transition: border-color .2s;
}
.form-group input:focus { border-color: var(--gold); }
.btn-primary {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--gold) 0%, #a8792a 100%);
  color: #0d1a0f; border: none; border-radius: 2px;
  font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  transition: all .2s; margin-top: 8px;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(201,168,76,0.4); }

/* ── LOBBY ───────────────────────────────── */
.lobby {
  min-height: 100vh;
  padding: 32px;
  max-width: 1100px; margin: 0 auto;
}
.lobby-header {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(201,168,76,0.2);
  margin-bottom: 40px;
}
.lobby-logo {
  font-family: 'Playfair Display', serif;
  font-size: 28px; color: var(--gold); letter-spacing: 3px;
}
.user-info {
  display: flex; align-items: center; gap: 16px;
}
.token-badge {
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 24px; padding: 8px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 14px; color: var(--gold);
}
.lobby-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
}
.lobby-card {
  background: rgba(13,51,34,0.6);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 4px; padding: 32px;
}
.lobby-card h2 {
  font-family: 'Playfair Display', serif;
  font-size: 22px; color: var(--gold);
  margin-bottom: 24px; letter-spacing: 1px;
}
.rooms-list { display: flex; flex-direction: column; gap: 12px; min-height: 120px; }
.room-item {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(201,168,76,0.1);
  border-radius: 3px; padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; transition: all .2s;
}
.room-item:hover { border-color: var(--gold); background: rgba(201,168,76,0.05); }
.room-item-info { font-size: 14px; }
.room-item-info strong { color: var(--gold); display: block; margin-bottom: 2px; }
.room-item-info span { color: rgba(245,239,224,0.5); font-size: 12px; }
.btn-join { padding: 6px 16px; background: transparent; border: 1px solid var(--gold); color: var(--gold); border-radius: 2px; cursor: pointer; font-size: 12px; letter-spacing: 1px; transition: all .2s; }
.btn-join:hover { background: var(--gold); color: var(--dark); }
.empty-rooms { color: rgba(245,239,224,0.3); font-size: 14px; text-align: center; padding: 32px 0; }
.select-field {
  width: 100%; padding: 12px 16px;
  background: rgba(0,0,0,0.4); border: 1px solid rgba(201,168,76,0.2);
  border-radius: 2px; color: var(--cream); font-size: 15px; outline: none;
  margin-bottom: 16px; appearance: none;
}
.join-row { display: flex; gap: 10px; }
.join-row input { flex: 1; padding: 12px 16px; background: rgba(0,0,0,0.4); border: 1px solid rgba(201,168,76,0.2); border-radius: 2px; color: var(--cream); font-size: 15px; outline: none; text-transform: uppercase; }
.join-row input:focus { border-color: var(--gold); }
.btn-secondary {
  padding: 12px 24px;
  background: transparent; border: 1px solid var(--gold);
  color: var(--gold); border-radius: 2px; cursor: pointer;
  font-size: 14px; font-weight: 500; white-space: nowrap; transition: all .2s;
}
.btn-secondary:hover { background: rgba(201,168,76,0.1); }

/* ── POKER TABLE ─────────────────────────── */
.game-screen {
  min-height: 100vh;
  display: flex; flex-direction: column;
  background: radial-gradient(ellipse at 50% 40%, #0f4a2a 0%, #040a07 100%);
}
.game-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px;
  background: rgba(0,0,0,0.5);
  border-bottom: 1px solid rgba(201,168,76,0.15);
}
.game-header .logo { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); letter-spacing: 3px; }
.phase-badge {
  background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3);
  padding: 5px 16px; border-radius: 24px;
  font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold);
}
.room-code { font-family: 'DM Mono', monospace; color: rgba(245,239,224,0.5); font-size: 13px; }

/* Table */
.table-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 32px; position: relative;
}
.poker-table {
  position: relative;
  width: 780px; height: 420px;
  background: radial-gradient(ellipse at center, #1a5c38 0%, #0d3322 60%, #08200f 100%);
  border-radius: 210px;
  border: 12px solid #2a1a08;
  box-shadow: 0 0 0 3px #c9a84c44, 0 0 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.5);
}
.poker-table::before {
  content: 'HATHOR CASINO';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Playfair Display', serif;
  font-size: 13px; letter-spacing: 6px;
  color: rgba(201,168,76,0.1);
  white-space: nowrap; pointer-events: none;
}

/* Community cards */
.community-area {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.community-cards { display: flex; gap: 6px; }
.pot-display {
  font-family: 'DM Mono', monospace;
  font-size: 13px; color: var(--gold);
  background: rgba(0,0,0,0.5); padding: 4px 14px; border-radius: 24px;
  border: 1px solid rgba(201,168,76,0.2);
}

/* Cards */
.card {
  width: var(--card-w); height: var(--card-h);
  background: white; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 2px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.5);
  font-weight: 700; font-size: 16px; line-height: 1;
  position: relative; user-select: none;
  transition: transform .2s;
}
.card.red { color: #cc2200; }
.card.black { color: #111; }
.card-rank { font-size: 14px; }
.card-suit { font-size: 18px; }
.card.hidden {
  background: linear-gradient(135deg, #1a4a2a 0%, #0d3322 100%);
  border: 1px solid rgba(201,168,76,0.3);
}
.card.hidden::after {
  content: '🂠'; font-size: 32px; color: rgba(201,168,76,0.3);
}
.card.sm { --card-w: 40px; --card-h: 56px; font-size: 11px; }
.card.sm .card-rank { font-size: 11px; }
.card.sm .card-suit { font-size: 14px; }

/* Player seats */
.seat {
  position: absolute;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  transition: all .3s;
}
.seat-0  { bottom: -80px; left: 50%; transform: translateX(-50%); }
.seat-1  { bottom: -60px; left: 12%; }
.seat-2  { top: 50%; left: -100px; transform: translateY(-50%); }
.seat-3  { top: -80px; left: 50%; transform: translateX(-50%); }
.seat-4  { top: 50%; right: -100px; transform: translateY(-50%); }
.seat-5  { bottom: -60px; right: 12%; }

.player-box {
  background: rgba(0,0,0,0.75);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 8px 14px;
  min-width: 120px; text-align: center;
  transition: all .3s;
  backdrop-filter: blur(4px);
}
.player-box.active { border-color: var(--gold); box-shadow: 0 0 20px rgba(201,168,76,0.4); }
.player-box.folded { opacity: 0.4; }
.player-box.winner { border-color: #4caf50; box-shadow: 0 0 20px rgba(76,175,80,0.5); }
.player-box.me { border-color: rgba(100,180,255,0.5); }
.player-name { font-size: 12px; font-weight: 500; color: var(--cream); white-space: nowrap; }
.player-tokens {
  font-family: 'DM Mono', monospace;
  font-size: 12px; color: var(--gold);
}
.player-bet {
  font-family: 'DM Mono', monospace;
  font-size: 11px; color: rgba(245,239,224,0.6);
}
.dealer-chip {
  background: var(--gold); color: var(--dark);
  font-size: 9px; font-weight: 900; border-radius: 50%;
  width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
  position: absolute; top: -6px; right: -6px;
}
.player-cards { display: flex; gap: 3px; }
.hand-name { font-size: 9px; color: #4caf50; margin-top: 2px; }
.status-badge {
  font-size: 9px; padding: 1px 6px; border-radius: 8px;
  background: rgba(255,100,100,0.2); color: #ff8888;
}
.status-badge.all-in { background: rgba(255,165,0,0.2); color: orange; }

/* Action panel */
.action-panel {
  background: rgba(0,0,0,0.7);
  border-top: 1px solid rgba(201,168,76,0.15);
  padding: 20px 32px;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  flex-wrap: wrap;
}
.action-panel .my-info {
  font-size: 13px; color: rgba(245,239,224,0.6);
  margin-right: 16px;
}
.btn-action {
  padding: 11px 28px; border-radius: 3px; cursor: pointer;
  font-size: 14px; font-weight: 500; letter-spacing: 1px;
  text-transform: uppercase; transition: all .2s; border: none;
}
.btn-fold  { background: rgba(180,50,50,0.3); color: #ff8888; border: 1px solid rgba(180,50,50,0.4); }
.btn-fold:hover { background: rgba(180,50,50,0.6); }
.btn-check { background: rgba(50,150,50,0.3); color: #88ff88; border: 1px solid rgba(50,150,50,0.4); }
.btn-check:hover { background: rgba(50,150,50,0.6); }
.btn-call  { background: rgba(50,100,200,0.3); color: #88aaff; border: 1px solid rgba(50,100,200,0.4); }
.btn-call:hover { background: rgba(50,100,200,0.6); }
.btn-raise { background: rgba(201,168,76,0.25); color: var(--gold); border: 1px solid rgba(201,168,76,0.4); }
.btn-raise:hover { background: rgba(201,168,76,0.4); }
.btn-allin { background: rgba(200,50,200,0.3); color: #ff88ff; border: 1px solid rgba(200,50,200,0.4); }
.btn-allin:hover { background: rgba(200,50,200,0.6); }
.raise-input {
  width: 100px; padding: 10px 12px;
  background: rgba(0,0,0,0.4); border: 1px solid rgba(201,168,76,0.3);
  border-radius: 3px; color: var(--cream);
  font-family: 'DM Mono', monospace; font-size: 14px; text-align: center; outline: none;
}

/* Waiting room */
.waiting-room {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; gap: 24px; padding: 40px;
}
.waiting-room h2 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--gold); }
.players-list { display: flex; flex-direction: column; gap: 10px; width: 360px; }
.player-waiting {
  background: rgba(13,51,34,0.6); border: 1px solid rgba(201,168,76,0.15);
  border-radius: 3px; padding: 12px 18px;
  display: flex; justify-content: space-between; align-items: center;
}
.host-tag { font-size: 11px; color: var(--gold); background: rgba(201,168,76,0.1); padding: 2px 8px; border-radius: 10px; }
.room-invite {
  text-align: center;
  font-size: 13px; color: rgba(245,239,224,0.5);
}
.invite-code {
  font-family: 'DM Mono', monospace;
  font-size: 28px; color: var(--gold); letter-spacing: 8px;
  margin: 8px 0; display: block;
}
.waiting-dots::after {
  content: ''; animation: dots 1.5s infinite;
}
@keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

/* Result toast */
.result-toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.95); border: 1px solid var(--gold);
  border-radius: 4px; padding: 16px 32px; text-align: center;
  z-index: 100; min-width: 280px;
  animation: slideDown .3s ease;
}
@keyframes slideDown { from{opacity:0;transform:translate(-50%,-20px)} to{opacity:1;transform:translate(-50%,0)} }
.result-toast h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); }
.result-toast p { font-size: 13px; color: rgba(245,239,224,0.7); margin-top: 4px; }

/* Error */
.error-msg { color: #ff6666; font-size: 13px; margin-top: 8px; text-align: center; }
.btn-sm { padding: 7px 16px; font-size: 12px; }

/* Spinner */
.spinner { width: 32px; height: 32px; border: 3px solid rgba(201,168,76,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Socket ─────────────────────────────────────────
const socket = io();

// ── Helpers ────────────────────────────────────────
const fmt = n => Number(n).toLocaleString();

function Card({ card, sm }) {
  if (!card) return <div className={`card hidden${sm?' sm':''}`}/>;
  const red = card.red;
  return (
    <div className={`card${red?' red':' black'}${sm?' sm':''}`}>
      <span className="card-rank">{card.rank}</span>
      <span className="card-suit">{card.suit}</span>
    </div>
  );
}

// ── Auth Screen ────────────────────────────────────
function AuthScreen({ onLogin }) {
  const [tab, setTab]       = useState('login');
  const [name, setName]     = useState('');
  const [error, setError]   = useState('');
  const [loading, setLoad]  = useState(false);

  const submit = () => {
    if (!name.trim()) { setError('Enter your name'); return; }
    setLoad(true);
    const uid = tab === 'login'
      ? (localStorage.getItem('hathor_uid') || null)
      : null;
    socket.emit('register', { name: name.trim(), uid });
    socket.once('registered', data => {
      localStorage.setItem('hathor_uid', data.uid);
      localStorage.setItem('hathor_name', data.name);
      onLogin(data);
      setLoad(false);
    });
  };

  useEffect(() => {
    const uid  = localStorage.getItem('hathor_uid');
    const n    = localStorage.getItem('hathor_name');
    if (uid && n) { setName(n); }
  }, []);

  return (
    <div className="auth-screen">
      <div className="auth-box">
        <div className="auth-logo">
          <h1>HATHOR</h1>
          <p>Casino & Poker</p>
        </div>
        <div className="auth-tabs">
          <div className={`auth-tab${tab==='login'?' active':''}`} onClick={()=>setTab('login')}>Sign In</div>
          <div className={`auth-tab${tab==='signup'?' active':''}`} onClick={()=>setTab('signup')}>New Account</div>
        </div>
        <div className="form-group">
          <label>Your Name</label>
          <input value={name} onChange={e=>setName(e.target.value)}
            placeholder="Enter your name" onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </div>
        {error && <p className="error-msg">{error}</p>}
        <button className="btn-primary" onClick={submit} disabled={loading}>
          {loading ? 'Connecting...' : tab==='login' ? 'Enter Casino' : 'Create Account'}
        </button>
        <p style={{textAlign:'center',marginTop:16,fontSize:12,color:'rgba(245,239,224,0.3)'}}>
          New players receive 10,000 virtual tokens
        </p>
      </div>
    </div>
  );
}

// ── Lobby ──────────────────────────────────────────
function Lobby({ user, onJoinRoom }) {
  const [rooms, setRooms]     = useState([]);
  const [buyIn, setBuyIn]     = useState('500');
  const [joinCode, setJoin]   = useState('');
  const [error, setError]     = useState('');

  useEffect(() => {
    socket.emit('getRooms');
    socket.on('roomList', setRooms);
    socket.on('error', msg => setError(msg));
    const t = setInterval(() => socket.emit('getRooms'), 3000);
    return () => { socket.off('roomList'); socket.off('error'); clearInterval(t); };
  }, []);

  const createRoom = () => {
    socket.emit('createRoom', { buyIn: parseInt(buyIn) });
    socket.once('roomCreated', ({ roomId }) => onJoinRoom(roomId));
  };

  const joinRoom = (id) => {
    socket.emit('joinRoom', { roomId: id || joinCode });
    socket.once('error', setError);
  };

  return (
    <div className="lobby">
      <div className="lobby-header">
        <div className="lobby-logo">🎰 HATHOR CASINO</div>
        <div className="user-info">
          <span style={{fontSize:14,color:'rgba(245,239,224,0.6)'}}>Welcome, <strong style={{color:'var(--cream)'}}>{user.name}</strong></span>
          <div className="token-badge">🪙 {fmt(user.tokens)}</div>
        </div>
      </div>

      <div className="lobby-grid">
        {/* Open Rooms */}
        <div className="lobby-card">
          <h2>🃏 Open Tables</h2>
          <div className="rooms-list">
            {rooms.length === 0
              ? <div className="empty-rooms">No open tables right now.<br/>Create one and invite friends!</div>
              : rooms.map(r => (
                <div className="room-item" key={r.id}>
                  <div className="room-item-info">
                    <strong>Table {r.id}</strong>
                    <span>Host: {r.host} · {r.players}/6 players · Buy-in: {fmt(r.buyIn)}</span>
                  </div>
                  <button className="btn-join" onClick={()=>joinRoom(r.id)}>Join</button>
                </div>
              ))
            }
          </div>
          <div style={{marginTop:20}}>
            <div className="form-group">
              <label>Join by Room Code</label>
            </div>
            <div className="join-row">
              <input value={joinCode} onChange={e=>setJoin(e.target.value.toUpperCase())}
                placeholder="ABCDEF" maxLength={6}
                onKeyDown={e=>e.key==='Enter'&&joinRoom()}/>
              <button className="btn-secondary" onClick={()=>joinRoom()}>Join</button>
            </div>
          </div>
        </div>

        {/* Create Room */}
        <div className="lobby-card">
          <h2>✨ Create Table</h2>
          <div className="form-group">
            <label>Buy-In Amount</label>
          </div>
          <select className="select-field" value={buyIn} onChange={e=>setBuyIn(e.target.value)}>
            <option value="200">200 tokens — Casual</option>
            <option value="500">500 tokens — Standard</option>
            <option value="1000">1,000 tokens — High Stakes</option>
            <option value="5000">5,000 tokens — VIP</option>
          </select>
          <p style={{fontSize:12,color:'rgba(245,239,224,0.4)',marginBottom:20}}>
            Blinds: {Math.max(10,Math.floor(parseInt(buyIn)/20))} / {Math.max(20,Math.floor(parseInt(buyIn)/10))} tokens<br/>
            Up to 6 players per table
          </p>
          <button className="btn-primary" onClick={createRoom}>Create Table</button>

          {error && <p className="error-msg">{error}</p>}

          <div style={{marginTop:32,padding:'20px',background:'rgba(0,0,0,0.2)',borderRadius:3}}>
            <p style={{fontSize:12,color:'rgba(245,239,224,0.5)',lineHeight:1.7}}>
              🎲 Texas Hold'em Poker<br/>
              🏆 Real-time multiplayer<br/>
              🪙 Virtual tokens — free to play<br/>
              📱 Share room code with friends
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Waiting Room ───────────────────────────────────
function WaitingRoom({ state, user, roomId, onBack }) {
  const isHost = state.players[0]?.id === user.uid;

  return (
    <div className="waiting-room">
      <h2>Waiting for Players</h2>
      <div className="room-invite">
        <p>Share this code with friends:</p>
        <span className="invite-code">{roomId}</span>
        <p style={{fontSize:12}}>Buy-in: {fmt(state.buyIn || 500)} tokens</p>
      </div>
      <div className="players-list">
        {state.players.map((p,i) => (
          <div className="player-waiting" key={p.id}>
            <span>{p.name}</span>
            {i===0 && <span className="host-tag">HOST</span>}
          </div>
        ))}
        {[...Array(Math.max(0, 2 - state.players.length))].map((_,i) => (
          <div className="player-waiting" key={`empty-${i}`} style={{opacity:0.3}}>
            <span>Waiting<span className="waiting-dots"/></span>
          </div>
        ))}
      </div>
      {isHost && state.players.length >= 2
        ? <button className="btn-primary" style={{width:200}} onClick={()=>socket.emit('startGame')}>
            Start Game ({state.players.length} players)
          </button>
        : <p style={{color:'rgba(245,239,224,0.4)',fontSize:13}}>
            {isHost ? 'Need at least 2 players to start' : 'Waiting for host to start...'}
          </p>
      }
      <button className="btn-secondary btn-sm" onClick={onBack}>← Leave Table</button>
    </div>
  );
}

// ── Poker Table ────────────────────────────────────
// Seat positions around the table (for up to 6 players)
const SEAT_CLASSES = ['seat-0','seat-1','seat-2','seat-3','seat-4','seat-5'];

function PokerTable({ state, user, roomId, onLeave }) {
  const [raiseAmt, setRaise] = useState('');
  const [toast, setToast]    = useState(null);

  const myIdx   = state.players.findIndex(p => p.id === user.uid);
  const myTurn  = state.actionIndex === myIdx && !state.players[myIdx]?.folded;
  const me      = state.players[myIdx];
  const toCall  = me ? Math.max(0, state.currentBet - me.bet) : 0;
  const canCheck= me && me.bet >= state.currentBet;

  useEffect(() => {
    socket.on('actionResult', res => {
      if (res.event === 'winner') {
        setToast({ title: `🏆 ${res.winner?.name || res.winner} wins!`, msg: `Takes the pot` });
        setTimeout(() => setToast(null), 4000);
      } else if (res.event === 'showdown') {
        setToast({ title: `🃏 Showdown!`, msg: `${res.winner} wins with ${res.hand}` });
        setTimeout(() => setToast(null), 4000);
      }
    });
    return () => socket.off('actionResult');
  }, []);

  const act = (type) => {
    const amount = type === 'raise' ? parseInt(raiseAmt) || state.bigBlind : 0;
    socket.emit('action', { type, amount });
    setRaise('');
  };

  // Rearrange players so "me" is always at bottom (seat-0)
  const reordered = [];
  if (myIdx >= 0) {
    for (let i = 0; i < state.players.length; i++) {
      reordered.push(state.players[(myIdx + i) % state.players.length]);
    }
  } else {
    reordered.push(...state.players);
  }

  const minRaise = state.bigBlind;

  return (
    <div className="game-screen">
      {/* Header */}
      <div className="game-header">
        <div className="logo">HATHOR</div>
        <div className="phase-badge">{state.phase?.toUpperCase()}</div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div className="room-code">Room: {roomId}</div>
          <div className="token-badge">🪙 {fmt(me?.tokens || 0)}</div>
          <button className="btn-secondary btn-sm" onClick={onLeave}>Leave</button>
        </div>
      </div>

      {/* Table */}
      <div className="table-area">
        <div className="poker-table">

          {/* Community cards + pot */}
          <div className="community-area">
            <div className="community-cards">
              {[0,1,2,3,4].map(i => (
                <Card key={i} card={state.community?.[i] || null}/>
              ))}
            </div>
            <div className="pot-display">POT: 🪙 {fmt(state.pot)}</div>
            {state.currentBet > 0 && (
              <div style={{fontSize:11,color:'rgba(245,239,224,0.5)'}}>Current bet: {fmt(state.currentBet)}</div>
            )}
          </div>

          {/* Player seats */}
          {reordered.map((p, seatIdx) => {
            const origIdx = state.players.findIndex(x => x.id === p.id);
            const isActive = state.actionIndex === origIdx;
            const isMe = p.id === user.uid;
            const isWinner = toast?.title?.includes(p.name);
            return (
              <div className={`seat ${SEAT_CLASSES[seatIdx]}`} key={p.id}>
                <div className={`player-box${isActive?' active':''}${p.folded?' folded':''}${isMe?' me':''}${isWinner?' winner':''}`}
                     style={{position:'relative'}}>
                  {p.isDealer && <div className="dealer-chip">D</div>}
                  <div className="player-name">{p.name}{isMe?' (you)':''}</div>
                  <div className="player-tokens">🪙 {fmt(p.tokens)}</div>
                  {p.bet > 0 && <div className="player-bet">Bet: {fmt(p.bet)}</div>}
                  {p.folded && !p.allIn && <div className="status-badge">FOLDED</div>}
                  {p.allIn && <div className="status-badge all-in">ALL IN</div>}
                  {p.bestHand && <div className="hand-name">{p.bestHand.name}</div>}
                </div>
                <div className="player-cards">
                  {p.cards?.map((c,ci) => <Card key={ci} card={c} sm/>)}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Action panel */}
      <div className="action-panel">
        {state.phase === 'waiting' ? (
          <p style={{color:'rgba(245,239,224,0.4)',fontSize:14}}>Waiting for next hand...</p>
        ) : myTurn ? (
          <>
            <span className="my-info">Your turn · Tokens: {fmt(me?.tokens)}</span>
            <button className="btn-action btn-fold"  onClick={()=>act('fold')}>Fold</button>
            {canCheck
              ? <button className="btn-action btn-check" onClick={()=>act('check')}>Check</button>
              : <button className="btn-action btn-call"  onClick={()=>act('call')}>Call {fmt(toCall)}</button>
            }
            <input
              className="raise-input"
              type="number" min={minRaise}
              placeholder={`Raise (min ${minRaise})`}
              value={raiseAmt}
              onChange={e=>setRaise(e.target.value)}
            />
            <button className="btn-action btn-raise" onClick={()=>act('raise')} disabled={!raiseAmt}>
              Raise
            </button>
            <button className="btn-action btn-allin" onClick={()=>act('allin')}>
              All In ({fmt(me?.tokens)})
            </button>
          </>
        ) : (
          <p style={{color:'rgba(245,239,224,0.4)',fontSize:14}}>
            {state.players[state.actionIndex]
              ? `Waiting for ${state.players[state.actionIndex].name}...`
              : 'Waiting...'
            }
          </p>
        )}
      </div>

      {/* Toast */}
      {toast && (
        <div className="result-toast">
          <h3>{toast.title}</h3>
          <p>{toast.msg}</p>
        </div>
      )}
    </div>
  );
}

// ── App Root ───────────────────────────────────────
function App() {
  const [user,    setUser]    = useState(null);
  const [roomId,  setRoomId]  = useState(null);
  const [state,   setState]   = useState(null);

  useEffect(() => {
    socket.on('gameState', s => setState(s));
    socket.on('roomJoined', ({ roomId: id }) => setRoomId(id));
    return () => { socket.off('gameState'); socket.off('roomJoined'); };
  }, []);

  const handleLogin = (data) => setUser(data);

  const handleJoinRoom = (id) => setRoomId(id);

  const handleLeave = () => {
    setRoomId(null);
    setState(null);
  };

  if (!user) return <AuthScreen onLogin={handleLogin}/>;

  if (roomId && state) {
    if (state.status === 'waiting') {
      return (
        <div className="game-screen">
          <WaitingRoom state={state} user={user} roomId={roomId} onBack={handleLeave}/>
        </div>
      );
    }
    return <PokerTable state={state} user={user} roomId={roomId} onLeave={handleLeave}/>;
  }

  return <Lobby user={user} onJoinRoom={handleJoinRoom}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
